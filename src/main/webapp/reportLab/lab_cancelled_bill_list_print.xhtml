<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">

                <h:form >
                    <p:panel styleClass="w-100">
                        <f:facet name="header"  >
                            <div class="d-flex justify-content-between">
                                <h:outputText value="List of Cancelled Lab Bills - Print" class="mt-2"/>
                                <div class="d-flex gap-2">
                                    <p:commandButton
                                        icon="fa-solid fa-print"
                                        class="ui-button-info"
                                        style="width: 150px"
                                        ajax="false"
                                        value="Print">
                                        <p:printer target="reportView" />
                                    </p:commandButton>
                                    <p:commandButton
                                        ajax="false"
                                        value="Back to Report"
                                        style="width: 200px"
                                        icon="fa fa-arrow-left"
                                        class="ui-button-warning"
                                        action="lab_cancelled_bill_list?faces-redirect=true" >
                                    </p:commandButton>
                                </div>

                            </div>
                        </f:facet>

                        <style>

                            @media screen{
                                .paper{
                                    position: static !important;
                                    width: 297mm!important;
                                    zoom: 2.0;
                                }

                                table {
                                    border-collapse: collapse;
                                    width: 100%;
                                    font-size: 12px!important;
                                    margin-top: 1mm!important;
                                }

                                th, td {
                                    border: 1px solid #000;
                                    padding: 0px!important;
                                    margin: 2px!important;
                                    text-align: left;
                                    margin-left: 10mm!important;
                                }

                                .header{
                                    font-size: 16px!important;
                                }

                                tfoot{
                                    font-weight: 700!important;
                                    font-size: 10px!important;
                                }
                            }

                            @media print {
                                @page {
                                    @bottom-right {
                                        content: "Page " counter(page) " of " counter(pages);
                                        font-family: Arial, sans-serif;
                                        font-size: 9pt;
                                    }

                                }

                                body {
                                    counter-reset: page;
                                }

                                .paper{
                                    position: static !important;
                                    width: 297mm!important;
                                    size: A4 landscape!important;

                                }

                                .header{
                                    line-height: 1.1;
                                    margin: 0mm!important;
                                    font-size: 10px!important;
                                }

                                table {
                                    border-collapse: collapse;
                                    width: 99.9%;
                                    font-size: 10px!important;
                                    margin-top: 1mm!important;
                                }
                                th, td {
                                    border: 1px solid #000;
                                    padding: 0px!important;
                                    margin: 2px!important;
                                    text-align: left;
                                    margin-left: 10mm!important;
                                }
                                th {

                                }
                                tfoot{
                                    font-weight: 700!important;
                                    font-size: 10px!important;
                                }
                            }
                        </style>

                        <h:panelGroup id="reportView" class="d-flex justify-content-center">
                            <div class="paper">
                                <div class="header" >
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 22px;">
                                        <h:outputText value="#{sessionController.institution.name}"/>
                                    </div>
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 18px;">
                                        <h:outputText value="List of Cancelled Lab Bills"/>
                                    </div>
                                    <div class="d-flex justify-content-center mt-2" style=" font-size: 12px;">
                                        <div class="d-flex gap-3">
                                            <h:outputText value="From Date" style="width: 5em!important; font-weight: 600;"/>
                                            <h:outputText value="#{laborataryReportController.fromDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}" />
                                            </h:outputText>
                                        </div>
                                        <h:outputText value="" style="width: 15mm!important;"/>
                                        <div class="d-flex gap-3">
                                            <h:outputText value="To Date" style="width: 4em!important; font-weight: 600;"/>
                                            <h:outputText value="#{laborataryReportController.toDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}" />
                                            </h:outputText>
                                        </div>
                                        <div></div>
                                    </div>

                                    <div class="d-flex justify-content-center mt-1 gap-3" style="font-size: 12px;">
                                        <h:panelGroup rendered="#{laborataryReportController.institution ne null}">
                                            <h:outputText value="Institution: " style="font-weight: 600;"/>
                                            <h:outputText value="#{laborataryReportController.institution.name}"/>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{laborataryReportController.site ne null}">
                                            <h:outputText value="Site: " style="font-weight: 600;"/>
                                            <h:outputText value="#{laborataryReportController.site.name}"/>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{laborataryReportController.department ne null}">
                                            <h:outputText value="Department: " style="font-weight: 600;"/>
                                            <h:outputText value="#{laborataryReportController.department.name}"/>
                                        </h:panelGroup>
                                    </div>

                                    <div class="d-flex justify-content-center mt-1" style="font-size: 12px;">
                                        <h:outputText value="Bill Sources: " style="font-weight: 600;"/>
                                        <h:outputText value=" Outpatient" rendered="#{laborataryReportController.opdLabBills}"/>
                                        <h:outputText value=" | Inpatient" rendered="#{laborataryReportController.inpatientLabBills}"/>
                                        <h:outputText value=" | Collecting Centre" rendered="#{laborataryReportController.ccLabBills}"/>
                                    </div>

                                    <h:panelGroup layout="block"
                                                  styleClass="d-flex justify-content-between mt-2"
                                                  style="font-size: 11px; color: #555;"
                                                  rendered="#{laborataryReportController.cancelledLabBillsProcessedAt ne null}">
                                        <span>
                                            <h:outputText value="Processed By : " style="font-weight: 600;"/>
                                            <h:outputText value="#{laborataryReportController.cancelledLabBillsProcessedBy}"/>
                                        </span>
                                        <span>
                                            <h:outputText value="Processed At : " style="font-weight: 600;"/>
                                            <h:outputText value="#{laborataryReportController.cancelledLabBillsProcessedAt}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                            </h:outputText>
                                        </span>
                                    </h:panelGroup>
                                </div>

                                <div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th style="width: 10mm; font-weight: 700;">
                                                    <h:outputText value="No" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="width: 14mm; font-weight: 700;">
                                                    <h:outputText value="Type" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="width: 28mm; font-weight: 700;">
                                                    <h:outputText value="Original Bill No" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="width: 28mm; font-weight: 700;">
                                                    <h:outputText value="Cancel Bill No" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="width: 32mm; font-weight: 700;">
                                                    <h:outputText value="Bill At" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="width: 32mm; font-weight: 700;">
                                                    <h:outputText value="Cancel At" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="width: 40mm; font-weight: 700;">
                                                    <h:outputText value="Cancel By" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Reason for Cancel" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="width: 22mm; font-weight: 700;">
                                                    <h:outputText value="Payment Method" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="width: 24mm; font-weight: 700; text-align: right;">
                                                    <h:outputText value="Amount" style="margin-right: 2mm;"/>
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <ui:repeat value="#{laborataryReportController.cancelledLabBills}" var="row" varStatus="i">
                                                <tr>
                                                    <td style="width: 10mm;" >
                                                        <h:outputText value="#{i.index + 1}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style="width: 14mm;">
                                                        <h:outputText value="#{row.billTypeLabel}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style="width: 28mm;">
                                                        <h:outputText value="#{row.originalBillNumber}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style="width: 28mm;">
                                                        <h:outputText value="#{row.cancelBillNumber}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style="width: 32mm;">
                                                        <h:outputText value="#{row.billedAt}" style="margin-left: 1mm;">
                                                            <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style="width: 32mm;">
                                                        <h:outputText value="#{row.cancelledAt}" style="margin-left: 1mm;">
                                                            <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style="width: 40mm;">
                                                        <h:outputText value="#{row.cancelledByDisplay}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{row.reasonForCancel}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style="width: 22mm;">
                                                        <h:outputText value="#{row.paymentMethod}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style="width: 24mm; text-align: right;">
                                                        <h:outputText value="#{row.absoluteAmount}" style="margin-right: 2mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                </tr>
                                            </ui:repeat>
                                        </tbody>
                                        <tfoot>
                                            <tr>
                                                <td colspan="9" style="text-align: right;">
                                                    <h:outputText value="Total Amount: " style="margin-right: 2mm;"/>
                                                </td>
                                                <td style="width: 24mm; text-align: right;">
                                                    <h:outputText value="#{laborataryReportController.cancelledLabBillsTotalAmount}" style="margin-right: 2mm;">
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                            </tr>
                                        </tfoot>
                                    </table>

                                </div>

                            </div>
                        </h:panelGroup>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
