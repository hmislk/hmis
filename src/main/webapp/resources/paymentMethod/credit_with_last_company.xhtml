<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="http://xmlns.jcp.org/jsf/composite"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <!-- INTERFACE -->
    <cc:interface>
        <cc:attribute name="paymentMethodData"  type="com.divudi.core.data.dataStructure.PaymentMethodData" />
        <cc:attribute name="valueRequired" type="boolean" />
        <cc:attribute name="companyList"  type="java.util.List"/>
        <cc:attribute name="controller" />
    </cc:interface>

    <!-- IMPLEMENTATION -->
    <cc:implementation>

        <div class="d-flex gap-2 w-100 mb-2">
            <p:panel header="Previous Credit Company" rendered="#{cc.attrs.companyList.size() ne 0}">
                <p:dataTable var="cmp" value="#{cc.attrs.companyList}" rowIndexVar="i" >
                    <p:column headerText="#" width="2em;" style="padding: 4px;">
                        <h:outputText value="#{i+1}" />
                    </p:column>
                    
                    <p:column headerText="Companies" style="padding: 4px;">
                        <h:outputText value="#{cmp.companyname}" />
                    </p:column>

                    <p:column headerText="Policy No" width="8em;" style="padding: 4px; text-align: center;">
                        <h:outputText value="#{cmp.policyNo}" style="text-align: center;"/>
                    </p:column>

                    <p:column headerText="Reference No" width="8em;" style="padding: 4px; text-align: center;">
                        <h:outputText value="#{cmp.referenceNo}" />
                    </p:column>
                    
                    <p:column headerText="Action" width="6em;" style="padding: 4px; text-align: center;">
                        <p:commandButton
                            value="Select"
                            icon="pi pi-check"
                            process="@this"
                            update="@form"
                            actionListener="#{cc.attrs.controller.selectCreditCompany(cmp)}">
                        </p:commandButton>
                    </p:column>
                </p:dataTable>
            </p:panel>
        </div>



        <div class="d-flex gap-2" >
            <p:autoComplete
                id="creditCompany"
                class="w-100 -mx-2"
                inputStyleClass="form-control"
                forceSelection="true"
                value="#{cc.attrs.paymentMethodData.credit.institution}"
                completeMethod="#{creditCompanyController.completeCredit}"
                var="ix"
                placeholder="Company (Type at least 4 letters to search)"
                itemLabel="#{ix.name}"
                itemValue="#{ix}"
                size="10"
                required="true"
                requiredMessage="Credit Company is required"  >

                <f:ajax
                    event="itemSelect"
                    listener="#{opdBillController.calTotals()}"
                    execute="@this"
                    render=":#{p:resolveFirstComponentWithId('pBillDetails',view).clientId}  :#{p:resolveFirstComponentWithId('tblRequests',view).clientId} :#{p:resolveFirstComponentWithId('tblBillItem',view).clientId}" />
            </p:autoComplete>

            <p:inputText
                id="polNo"
                style="width: 100px;"
                value="#{cc.attrs.paymentMethodData.credit.referralNo}"
                placeholder="Policy NO"
                required="true"
                requiredMessage="Policy NO is required" >
            </p:inputText>

            <p:inputText
                id="refNo"
                style="width: 100px;"
                value="#{cc.attrs.paymentMethodData.credit.referenceNo}"
                placeholder="Reference NO"
                required="true"
                requiredMessage="Reference NO is required" >
            </p:inputText>

            <p:inputText
                id="memo"
                style="width: 300px;"
                value="#{cc.attrs.paymentMethodData.credit.comment}"
                placeholder="Memo"
                required="true"
                requiredMessage="Memo is required" >
            </p:inputText>

            <p:commandLink
                id="btnAddNewCreditCom"
                value="(+)"
                class="mx-3 mt-1"
                title="Add New Credit Company"
                rendered="#{webUserController.hasPrivilege('Admin')}"
                ajax="false"
                action="#{navigationController.navigateToCreditCompany()}"
                actionListener="#{creditCompanyController.prepareAdd()}" />

        </div>

    </cc:implementation>
</html>
