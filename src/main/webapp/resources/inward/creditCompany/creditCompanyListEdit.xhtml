<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="http://xmlns.jcp.org/jsf/composite"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <cc:interface>
        <cc:attribute name="controller" />
    </cc:interface>

    <cc:implementation>
        <!-- Add new company form -->
        <h:panelGroup id="gpAddForm" layout="block" class="mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-12 col-md-3">
                    <h:outputLabel value="Company" styleClass="form-label" />
                    <p:autoComplete
                        id="acNewCompany"
                        class="w-100"
                        inputStyleClass="w-100"
                        forceSelection="true"
                        value="#{cc.attrs.controller.newEncounterCreditCompany.institution}"
                        completeMethod="#{creditCompanyController.completeCredit}"
                        var="ix"
                        itemLabel="#{ix.name}"
                        itemValue="#{ix}" />
                </div>
                <div class="col-6 col-md-2">
                    <h:outputLabel value="Credit Limit" styleClass="form-label" />
                    <p:inputText
                        class="w-100"
                        autocomplete="off"
                        onclick="this.select();"
                        value="#{cc.attrs.controller.newEncounterCreditCompany.creditLimit}" />
                </div>
                <div class="col-6 col-md-2">
                    <h:outputLabel value="Policy No" styleClass="form-label" />
                    <p:inputText
                        class="w-100"
                        autocomplete="off"
                        value="#{cc.attrs.controller.newEncounterCreditCompany.policyNo}" />
                </div>
                <div class="col-6 col-md-2">
                    <h:outputLabel value="Reference No" styleClass="form-label" />
                    <p:inputText
                        class="w-100"
                        autocomplete="off"
                        value="#{cc.attrs.controller.newEncounterCreditCompany.referanceNo}" />
                </div>
                <div class="col-6 col-md-3">
                    <p:commandButton
                        value="Add"
                        icon="fa fa-plus"
                        class="w-100 ui-button-success"
                        process="gpAddForm"
                        update="gpAddForm tblCom"
                        action="#{cc.attrs.controller.addNewCreditCompany()}" />
                </div>
            </div>
        </h:panelGroup>

        <!-- Existing companies table -->
        <p:dataTable
            id="tblCom"
            value="#{cc.attrs.controller.encounterCreditCompanys}"
            var="ecc"
            rowIndexVar="i"
            emptyMessage="No credit companies assigned">
            <p:column headerText="#" width="2em">
                <h:outputText value="#{i+1}" />
            </p:column>
            <p:column headerText="Credit Company">
                <h:outputText value="#{ecc.institution.name}" />
            </p:column>
            <p:column headerText="Credit Limit">
                <p:inputText
                    class="w-100"
                    style="text-align:right"
                    autocomplete="off"
                    onclick="this.select();"
                    value="#{ecc.creditLimit}" />
            </p:column>
            <p:column headerText="Policy No">
                <p:inputText
                    class="w-100"
                    autocomplete="off"
                    value="#{ecc.policyNo}" />
            </p:column>
            <p:column headerText="Reference No">
                <p:inputText
                    class="w-100"
                    autocomplete="off"
                    value="#{ecc.referanceNo}" />
            </p:column>
            <p:column headerText="Actions" width="8em">
                <div class="d-flex gap-1">
                    <p:commandButton
                        icon="fa fa-save"
                        title="Save"
                        class="ui-button-success"
                        process="tblCom"
                        update="tblCom"
                        action="#{cc.attrs.controller.saveEncounterCreditCompany(ecc)}" />
                    <p:commandButton
                        icon="fa fa-trash"
                        title="Remove"
                        class="ui-button-danger"
                        ajax="false"
                        action="#{cc.attrs.controller.removeCreditCompany(ecc)}" />
                </div>
            </p:column>
        </p:dataTable>
    </cc:implementation>
</html>
