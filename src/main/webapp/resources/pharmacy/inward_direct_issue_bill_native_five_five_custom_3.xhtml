<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="http://xmlns.jcp.org/jsf/composite"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <h:outputStylesheet library="css" name="inward_direct_issue_bill_five_five_custom_3.css" />
    </h:head>

    <h:body>
        <cc:interface>
            <cc:attribute name="bill"      required="true"  type="com.divudi.core.data.dto.PrintBillData" />
            <cc:attribute name="items"     required="true"  type="java.util.List" />
            <cc:attribute name="duplicate" required="false" />
        </cc:interface>

        <cc:implementation>
            <h:outputStylesheet library="css" name="sale_bill_five_five_custom_3.css" />

            <div class="receipt-container">
                <div class="hospital-name">
                    <h:outputLabel value="#{cc.attrs.bill.departmentName}"/>
                    <h:outputLabel value="**Duplicate**" rendered="#{cc.attrs.duplicate eq true}" />
                </div>

                <div class="separator"></div>

                <table class="info-table">
                    <h:panelGroup rendered="#{cc.attrs.bill.patientName ne null}">
                        <tr>
                            <td style="padding: 2px;">Name </td>
                            <td style="padding: 2px;" colspan="5">
                                <h:outputLabel value="#{cc.attrs.bill.patientName}"/>
                            </td>
                        </tr>
                    </h:panelGroup>

                    <h:panelGroup rendered="#{cc.attrs.bill.patientAgeSex ne null}">
                        <tr>
                            <td style="padding: 2px;">Age/Sex </td>
                            <td style="padding: 2px;" colspan="5">
                                <h:outputLabel value="#{cc.attrs.bill.patientAgeSex}"/>
                            </td>
                        </tr>
                    </h:panelGroup>

                    <h:panelGroup rendered="#{cc.attrs.bill.bhtNo ne null}">
                        <tr>
                            <td style="padding: 2px;">BHT</td>
                            <td style="padding: 2px;">
                                <h:outputLabel value="#{cc.attrs.bill.bhtNo}"/>
                            </td>
                            <td style="padding: 2px;" class="spacer"></td>
                            <td style="padding: 2px;">Room No</td>
                            <td style="padding: 2px;">
                                <h:outputLabel value="#{cc.attrs.bill.roomName}"/>
                            </td>
                        </tr>
                    </h:panelGroup>

                    <tr>
                        <td style="padding: 2px;">Bill Date</td>
                        <td style="padding: 2px;">
                            <h:outputLabel value="#{cc.attrs.bill.createdAt}">
                                <f:convertDateTime pattern="yyyy-MM-dd" />
                            </h:outputLabel>
                        </td>
                        <td style="padding: 2px;" class="spacer"></td>
                        <td style="padding: 2px;">Bill Time</td>
                        <td style="padding: 2px;">
                            <h:outputLabel value="#{cc.attrs.bill.createdAt}">
                                <f:convertDateTime pattern="HH:mm a" />
                            </h:outputLabel>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 2px;">Bill No</td>
                        <td style="padding: 2px;">#{cc.attrs.bill.billNo}</td>
                        <td style="padding: 2px;" class="spacer"></td>
                        <td style="padding: 2px;">Department</td>
                        <td style="padding: 2px;">#{cc.attrs.bill.departmentName}</td>
                    </tr>
                </table>

                <div class="separator"></div>

                <table class="receipt-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th colspan="3">Item</th>
                            <th style="text-align: right">Qty</th>
                            <th style="text-align: right">Rate</th>
                            <th style="text-align: right">Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        <ui:repeat value="#{cc.attrs.items}" var="item" varStatus="s">
                            <tr>
                                <td>#{s.index + 1}</td>
                                <td colspan="3">#{item.itemName}</td>
                                <td style="text-align: right">
                                    <h:outputLabel value="#{item.qty}">
                                        <f:convertNumber integerOnly="true" />
                                    </h:outputLabel>
                                </td>
                                <td style="text-align: right">
                                    <h:outputLabel
                                        rendered="#{configOptionApplicationController.getBooleanValueByKey('Nursing IP Billing - Show Rate and Value', false) and webUserController.hasPrivilege('NursingIPBillingViewRates')}"
                                        value="#{item.netRate}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputLabel>
                                </td>
                                <td style="text-align: right">
                                    <h:outputLabel
                                        rendered="#{configOptionApplicationController.getBooleanValueByKey('Nursing IP Billing - Show Rate and Value', false) and webUserController.hasPrivilege('NursingIPBillingViewRates')}"
                                        value="#{item.netValue}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputLabel>
                                </td>
                            </tr>
                        </ui:repeat>
                    </tbody>
                </table>

                <div class="separator"></div>

                <table class="total-table">
                    <tr>
                        <td>Total:</td>
                        <td style="text-align: right;">
                            <h:outputLabel
                                rendered="#{configOptionApplicationController.getBooleanValueByKey('Nursing IP Billing - Show Rate and Value', false) and webUserController.hasPrivilege('NursingIPBillingViewRates')}"
                                value="#{cc.attrs.bill.netTotal}">
                                <f:convertNumber pattern="#,##0.00" />
                            </h:outputLabel>
                        </td>
                    </tr>
                    <tr>
                        <td>No of Items:</td>
                        <td>
                            <h:outputLabel value="#{cc.attrs.items.size()}">
                                <f:convertNumber integerOnly="true" />
                            </h:outputLabel>
                        </td>
                    </tr>
                </table>

                <table>
                    <tr>
                        <td>
                            <h:outputLabel value="Printed By :"/>
                            <h:outputLabel value="#{sessionController.loggedUser.name}"/>
                            <h:outputLabel value="&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;"/>
                            <h:outputLabel value="#{sessionController.currentDate}">
                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                            </h:outputLabel>
                        </td>
                    </tr>
                </table>

            </div>

        </cc:implementation>

    </h:body>
</html>
