<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">
                <h:outputStylesheet library="css" name="printing/reportprint.css"/>

                <h:form>
                    <p:panel header="Channel Card Income Report Print View" styleClass="w-100">
                        <f:facet name="header">
                            <div class="d-flex justify-content-between">
                                <h:outputText value="Channel Card Income Report Print View" class="mt-2"/>
                                <div class="d-flex gap-2">
                                    <p:commandButton
                                        icon="fa-solid fa-print"
                                        class="ui-button-info"
                                        style="width: 150px"
                                        ajax="false"
                                        value="Print">
                                        <p:printer target="reportView"/>
                                    </p:commandButton>
                                    <p:commandButton
                                        ajax="false"
                                        value="Back to Report"
                                        style="width: 200px"
                                        icon="fa fa-arrow-left"
                                        class="ui-button-warning"
                                        action="income_from_card_payments?faces-redirect=true">
                                    </p:commandButton>
                                </div>

                            </div>
                        </f:facet>

                        <h:panelGroup id="reportView" class="d-flex justify-content-center">
                            <div class="paper">
                                <div class="header">
                                    <div class="d-flex justify-content-center text-5 gap-2"
                                         style="font-weight: 700; font-size: 22px;margin-bottom: 5px;">
                                        <h:outputText value="#{sessionController.institution.name}"/>
                                    </div>
                                    <div class="d-flex justify-content-center text-5 gap-2"
                                         style="font-weight: 400; font-size: 20px;margin-bottom: 5px;">
                                        <h:outputText value="Channel Card Income Report"/>
                                    </div>
                                    <div class="d-flex justify-content-center text-5 gap-2"
                                         style="font-weight: 600; font-size: 15px;margin-bottom: 5px;">
                                        <h:outputText value="From Date - "/>
                                        <h:outputText value="#{channelReportController.fromDate}">
                                            <f:convertDateTime
                                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                        </h:outputText>
                                        <h:outputText value="" style="width: 2em!important;" class="text-center"/>
                                        <h:outputText value="To Date - "/>
                                        <h:outputText value="#{channelReportController.toDate}">
                                            <f:convertDateTime
                                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                        </h:outputText>
                                        <h:outputText value="" style="width: 2em!important;" class="text-center"/>
                                        <h:outputText value="Processed By - "/>
                                        <h:outputText value="#{sessionController.loggedUser.name}"></h:outputText>
                                    </div>
                                </div>

                                <div>
                                    <table class="table">
                                        <thead>
                                            <tr>
                                                <th style="text-align: center; width: 5mm;">Serial</th>
                                                <th style="text-align: center; width: 15mm;">Created At</th>
                                                <th style="text-align: center; width: 30mm">Bill No</th>
                                                <th style="text-align: center; width: 40mm;">Patient</th>
                                                <th style="text-align: center; width: 20mm;">Cashier</th>
                                                <th style="text-align: center; width: 25mm;">Hospital Fee</th>
                                                <th style="text-align: center; width: 25mm;">Doctor fee</th>
                                                <th style="text-align: center; width: 25mm;">Bill Gross Total</th>
                                                <th style="text-align: center; width: 25mm;">Card Total</th>
                                                <th style="text-align: center; width: 20mm;">Card Last 4 Numbers</th>
                                                <th style="text-align: center; width: 40mm;">Bank</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <ui:repeat value="#{channelReportController.cardPaymentDetails.incomeDtos}" var="row" varStatus="status">
                                                <tr>
                                                    <td style="text-align: center;"><h:outputText value="#{status.index + 1}"/></td>
                                                    <td>
                                                        <h:outputText value="#{row.billedDate}">
                                                            <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateTimeFormat}"/>
                                                        </h:outputText>
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{row.billDeptId}"/>
                                                        <h:panelGroup rendered="#{row.isCancelled}">
                                                            <span style="color: red; font-weight: bold;"> [Cancelled]</span>
                                                        </h:panelGroup>
                                                        <h:panelGroup rendered="#{row.isRefunded}">
                                                            <span style="color: orange; font-weight: bold;"> [Refunded]</span>
                                                        </h:panelGroup>
                                                        <h:panelGroup rendered="#{row.billTypeAtomic eq 'CHANNEL_REFUND_WITH_PAYMENT'}">
                                                            <span style="color: orange; font-weight: bold;"> [Refund Bill]</span>
                                                        </h:panelGroup>
                                                        <h:panelGroup rendered="#{row.billTypeAtomic eq 'CHANNEL_CANCELLATION_WITH_PAYMENT'}">
                                                            <span style="color: red; font-weight: bold;"> [Cancel Bill]</span>
                                                        </h:panelGroup>
                                                    </td>
                                                    <!--                                                    <td>
                                                                                                            <h:outputText value="#{row.bill.billType}"/>
                                                                                                        </td>-->
                                                    <td>
                                                        <h:outputText value="#{row.patientName}"/>
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{row.billedBy}"/>
                                                    </td>
                                                    <td style="text-align: right;">
                                                        <h:outputText styleClass="hosValue" value="#{row.hosFee}">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                    <td style="text-align: right;">
                                                        <h:outputText styleClass="staffValue" value="#{row.doctorFee}">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                    <td style="text-align: right;">
                                                        <h:outputText styleClass="grossValue" value="#{row.totalAppoinmentFee}">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>

                                                    <td style="text-align: right;">
                                                        <h:outputText styleClass="cardValue" value="#{row.cardFee}">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>

                                                    <h:panelGroup >
                                                        <td style="text-align: right;">
                                                            <h:outputText styleClass="discountValue" value="#{row.paymentReference}">

                                                            </h:outputText>
                                                        </td>
                                                    </h:panelGroup>

                                                    <h:panelGroup>
                                                        <td style="text-align: left;">
                                                            <h:outputText value="#{row.creditCompanyName}"/>
                                                        </td>
                                                    </h:panelGroup>


                                                </tr>
                                            </ui:repeat>
                                        </tbody>
                                        <tfoot>
                                            <tr>
                                                <td colspan="5" style="text-align: center; font-weight: 700;">
                                                    <h:outputText value="Total"/>
                                                </td>
                                                <td style="text-align: right; font-weight: 700;">
                                                    <h:outputText styleClass="totalHosValue" value="0.00">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </td>
                                                <td style="text-align: right; font-weight: 700;">
                                                    <h:outputText styleClass="totalStaffValue" value="0.00">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </td>
                                                <td style="text-align: right; font-weight: 700;">
                                                    <h:outputText styleClass="totalGrossValue" value="0.00">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </td>
                                                 <td style="text-align: right; font-weight: 700;">
                                                    <h:outputText styleClass="totalCardValue" value="0.00">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </td>

                                            </tr>
                                        </tfoot>
                                    </table>
                                    <script>
                                        function calculateTotals(selector, targeter) {
                                            const values = Array.from(document.querySelectorAll(selector));
                                            const totalValue = values
                                                    .map(value => {
                                                        const cleanValue = value.innerText.replace(/,/g, "");
                                                        return isNaN(parseFloat(cleanValue)) ? 0 : parseFloat(cleanValue);
                                                    })
                                                    .reduce((total, value) => total + value, 0);

                                            const targetElement = document.querySelector(targeter);
                                            if (targetElement) {
                                                targetElement.innerText = totalValue.toLocaleString('en-US', {
                                                    minimumFractionDigits: 2,
                                                    maximumFractionDigits: 2
                                                });
                                            }
                                        }

                                        function handleRowClick() {
                                            onBillRowClick(); // triggers AJAX to server
                                            setTimeout(updateTotals, 500);
                                        }

                                        function updateTotals() {
                                            calculateTotals('.grossValue', '.totalGrossValue');
                                            calculateTotals('.hosValue', '.totalHosValue');
                                            calculateTotals('.staffValue', '.totalStaffValue');
                                            calculateTotals('.cardValue', '.totalCardValue');

                                        }

                                        // Run the calculation after page loads
                                        document.addEventListener('DOMContentLoaded', function () {
                                            setTimeout(updateTotals, 1000);
                                        });

                                        // Also run on window load as backup
                                        window.addEventListener('load', function () {
                                            setTimeout(updateTotals, 500);
                                        });

                                    </script>
                                </div>
                            </div>
                        </h:panelGroup>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
