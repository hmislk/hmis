<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:body>
    <ui:composition template="/resources/template/template.xhtml">
        <ui:define name="content">
            <h:outputStylesheet library="css" name="printing/reportprint.css"/>

            <h:form>
                <p:panel header="Income By Institution with Agent Bookings Print View" styleClass="w-100">
                    <f:facet name="header">
                        <div class="d-flex justify-content-between">
                            <h:outputText value="Income By Institution with Agent Bookings Print View" class="mt-2"/>
                            <div class="d-flex gap-2">
                                <p:commandButton
                                        icon="fa-solid fa-print"
                                        class="ui-button-info"
                                        style="width: 150px"
                                        ajax="false"
                                        value="Print">
                                    <p:printer target="reportView"/>
                                </p:commandButton>
                                <p:commandButton
                                        ajax="false"
                                        value="Back to Report"
                                        style="width: 200px"
                                        icon="fa fa-arrow-left"
                                        class="ui-button-warning"
                                        action="income_with_agent_bookings?faces-redirect=true">
                                </p:commandButton>
                            </div>

                        </div>
                    </f:facet>

                    <h:panelGroup id="reportView" class="d-flex justify-content-center">
                        <div class="paper">
                            <div class="header">
                                <div class="d-flex justify-content-center text-5 gap-2"
                                     style="font-weight: 700; font-size: 22px;margin-bottom: 5px;">
                                    <h:outputText value="#{sessionController.institution.name}"/>
                                </div>
                                <div class="d-flex justify-content-center text-5 gap-2"
                                     style="font-weight: 400; font-size: 20px;margin-bottom: 5px;">
                                    <h:outputText value="Income By Institution with Agent Bookings"/>
                                </div>
                                <div class="d-flex justify-content-center text-5 gap-2"
                                     style="font-weight: 600; font-size: 15px;margin-bottom: 5px;">
                                    <h:outputText value="Institution - " class="text-center"/>
                                    <h:outputLabel value="#{channelReportController.institution.name}"/>
                                </div>
                                <div class="d-flex justify-content-center text-5 gap-2"
                                     style="font-weight: 600; font-size: 15px;margin-bottom: 5px;">
                                    <h:outputText value="From Date - "/>
                                    <h:outputText value="#{channelReportController.fromDate}">
                                        <f:convertDateTime
                                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                    </h:outputText>
                                    <h:outputText value="" style="width: 2em!important;" class="text-center"/>
                                    <h:outputText value="To Date - "/>
                                    <h:outputText value="#{channelReportController.toDate}">
                                        <f:convertDateTime
                                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                    </h:outputText>
                                </div>
                            </div>

                            <div>
                                <table class="table">
                                    <thead>
                                    <tr>
                                        <th style="text-align: center; width: 10mm;">Serial No</th>
                                        <th style="text-align: center; width: 15mm;">Bill ID</th>
                                        <th style="text-align: center; width: 25mm;">Created At</th>
                                        <th style="text-align: center; width: 50mm;">Bill No</th>
                                        <th style="text-align: center; width: 23mm;">Bill Type</th>
                                        <th style="text-align: center; width: 35mm;">Patient</th>
                                        <th style="text-align: center; width: 30mm;">Agent</th>
                                        <th style="text-align: center; width: 25mm;">Ref No</th>
                                        <th style="text-align: center; width: 20mm;">Cashier</th>
                                        <th style="text-align: center; width: 25mm;">Hospital Fee</th>
                                        <th style="text-align: center; width: 25mm;">Doctor fee</th>
                                        <th style="text-align: center; width: 25mm;">Gross Total</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <ui:repeat value="#{channelReportController.dataBundle.reportTemplateRows}" var="row" varStatus="status">
                                        <tr>
                                            <td style="text-align: center;"><h:outputText value="#{status.index + 1}"/></td>
                                            <td>
                                                <h:outputText value="#{row.bill.id}"/>
                                            </td>
                                            <td>
                                                <h:outputText value="#{row.bill.createdAt}">
                                                    <f:convertDateTime
                                                            pattern="#{sessionController.applicationPreference.shortDateTimeFormat}"/>
                                                </h:outputText>
                                            </td>
                                            <td>
                                                <h:outputText value="#{row.bill.deptId}"/>
                                                <br/>
                                                <h:outputText rendered="#{row.bill.cancelled}" value="(Cancelled - #{row.bill.cancelledBill.deptId})" style="color: red;" />
                                                <h:outputText rendered="#{row.bill.refunded}" value="(Refunded - #{row.bill.refundedBill.deptId})"  style="color: rgba(255, 255, 0, 0.861);" />
                                                <h:outputText rendered="#{bookingControllerViewScope.checkBillClass(row.bill) eq 'RefundBill'}" value="(Refund Bill)"  style="color: rgba(255, 255, 0, 0.861);" />
                                                <h:outputText rendered="#{row.bill.billTypeAtomic eq 'CHANNEL_CANCELLATION_WITH_PAYMENT'}" value="(Cancel Bill)" style="color: red;" />
                                            </td>
                                            <td>
                                                <h:outputText value="#{row.bill.billType}"/>
                                            </td>
                                            <td>
                                                <h:outputText value="#{row.bill.patient.person.name}"/>
                                            </td>
                                            <td>
                                                <h:outputText value="#{row.bill.creditCompany.name}"/>
                                            </td>
                                            <td>
                                                <h:outputText value="#{row.bill.agentRefNo}" rendered="#{bookingControllerViewScope.checkBillClass(row.bill) eq 'BilledBill'}"/>

                                                <h:outputText value="#{row.bill.billedBill.agentRefNo}" rendered="#{bookingControllerViewScope.checkBillClass(row.bill) eq 'CancelBill'
                                                           or bookingControllerViewScope.checkBillClass(row.bill) eq 'RefundBill'}"/>
                                            </td>
                                            <td>
                                                <h:outputText value="#{row.bill.creater.name}"/>
                                            </td>
                                            <td style="text-align: right;">
                                                <h:outputText styleClass="hosFee" value="#{row.bill.hospitalFee}">
                                                    <f:convertNumber pattern="#,##0.00"/>
                                                </h:outputText>
                                            </td>
                                            <td style="text-align: right;">
                                                <h:outputText styleClass="staffFee" value="#{row.bill.staffFee}">
                                                    <f:convertNumber pattern="#,##0.00"/>
                                                </h:outputText>
                                            </td>
                                            <td style="text-align: right;">
                                                <h:outputText styleClass="grossFee" value="#{row.bill.total}">
                                                    <f:convertNumber pattern="#,##0.00"/>
                                                </h:outputText>
                                            </td>
                                        </tr>
                                    </ui:repeat>
                                    </tbody>
                                    <tfoot>
                                    <tr>
                                        <td colspan="9" style="text-align: center; font-weight: 700;">
                                            <h:outputText value="Total"/>
                                        </td>
                                        <td style="text-align: right; font-weight: 700;">
                                            <h:outputText styleClass="hosFeeTotal" value="#{channelReportController.dataBundle.long2}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                        <td style="text-align: right; font-weight: 700;">
                                            <h:outputText styleClass="staffFeeTotal" value="#{channelReportController.dataBundle.long3}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                        <td style="text-align: right; font-weight: 700;">
                                            <h:outputText styleClass="grossTotal" value="#{channelReportController.dataBundle.long1}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    </h:panelGroup>

                </p:panel>
            </h:form>
        </ui:define>
    </ui:composition>

</h:body>
</html>
