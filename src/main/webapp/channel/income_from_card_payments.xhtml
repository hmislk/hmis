<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>

        <ui:composition template="/channel/channel_reports.xhtml" >

            <ui:define name="subContent">
                <h:outputStylesheet library="css" name="eight_col_filter_panel.css" />
                <h:form>
                    <p:panel header="Income By Institution with Card Paid Appointments" >
                        <h:panelGrid columns="12" class="my-2 ui-fluid" style="table-layout: fixed; width: 100%;" 
                                            columnClasses="fp-col-label1,fp-col-input1,fp-col-space1,
                                        fp-col-label2,fp-col-input2,fp-col-space2,
                                        fp-col-label3,fp-col-input3, fp-col-space1,fp-col-label1,fp-col-input1">

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf073;" styleClass="fa" />
                                <div class="fp-label-text">
                                    <h:outputLabel value="From"/>
                                </div>
                            </h:panelGroup>
                            
                            <p:datePicker 
                                class="w-100"
                                inputStyleClass="form-control"
                                showTime="true"
                                showButtonBar="true"
                                timeInput="true"
                                value="#{channelReportController.fromDate}" 
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                            <p:spacer width="50"/>
                            
                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf073;" styleClass="fa" />
                                <div class="fp-label-text">
                                    <h:outputLabel value="To"/>
                                </div>
                            </h:panelGroup>

                            <p:datePicker
                                class="w-100"
                                inputStyleClass="form-control"
                                showTime="true"
                                showButtonBar="true"
                                timeInput="true"
                                value="#{channelReportController.toDate}" 
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                            <p:spacer width="50"/>

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf0e8;" styleClass="fa" />
                                <div class="fp-label-text">
                                    <h:outputLabel value="Institution"/>
                                </div>
                            </h:panelGroup>

                            <p:selectOneMenu styleClass="w-100 form-control" value="#{channelReportController.institution}" filter="true" >
                                <f:selectItem itemLabel="Select Institution" />
                                <f:selectItems value="#{channelReportController.institutionForChannelReports}" var="ins" itemLabel="#{ins.name}" itemValue="#{ins}" />
                                <p:ajax event="change" process="@this"/>
                            </p:selectOneMenu>
                            <p:spacer width="50"/>

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <i class="fa-solid fa-circle-check"/>
                                <div class="fp-label-text">
                                    <h:outputLabel value="Status"/>
                                </div>
                             </h:panelGroup>

                            <p:selectOneMenu
                                id="cmbDept"
                                sstyleClass="w-100 form-control"
                                value="#{channelReportController.reportStatus}"
                                >
                                <f:selectItem itemLabel="Details View" itemValue="Details"/>
                                <f:selectItem itemLabel="Summery View" itemValue="Summery" />
                                

                            </p:selectOneMenu>
                        </h:panelGrid>

                        <div class="d-flex align-items-center my-2">
                            <p:commandButton class="ui-button-warning mx-1" icon="fas fa-cogs" value="Process" action="#{channelReportController.getPaymentsForChannelCardAppoinments()}" ajax="false" ></p:commandButton>

                            <p:commandButton
                                id="btnPdf"
                                class="mx-1 ui-button-info"
                                ajax="false"
                                rendered="true"
                                icon="fas fa-file-pdf"
                                value="Export as PDF">
                                <p:fileDownload value="#{channelReportController.channelIncomeFromCardPaymentsReportAsPdf}" />
                            </p:commandButton>

                            <p:commandButton
                                id="btnPrint"
                                class="mx-1 ui-button-danger mx-2"
                                icon="fas fa-print"
                                ajax="false"
                                value="Print Table"
                                action="channel_card_income_print?faces-redirect=true">
                            </p:commandButton>

                            <p:commandButton
                                id="btnExcel"
                                class="mx-1 ui-button-success"
                                icon="fas fa-file-excel"
                                ajax="false" value="Export to Excel">
                                <p:dataExporter type="xlsx" target="tableForReportDTO" fileName="#{channelReportController.incomeFromCardPaymentReportFileName}" postProcessor="#{channelReportController.postProcessChannelCardIncomeReportExcel}"/>
                            </p:commandButton>
                        </div>

                        <style>
                            .no-header thead {
                                display: none !important;
                            }
                        </style>

                        <p:dataTable id="tableForReportDTO"  
                                     value="#{channelReportController.cardPaymentDetails.incomeDtos}" var="row" 
                                     paginator="true"
                                     scrollable="true"
                                     scrollHeight="800px"
                                     rows="10"
                                     rowIndexVar="n"
                                     expandedRow="true"
                                     paginatorPosition="bottom"
                                     paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     rowsPerPageTemplate="5,10,20,{ShowAll|'Show All'"
                                     rowKey="#{row.bill.id}"

                                     >

                            <p:ajax event="page" oncomplete="updateTotals()" />
                            <!-- <f:facet name="header">

                                <h:outputLabel value="#{channelReportController.institution.name}"/>
                                <h:outputLabel class="mx-4" value="From : " />
                                <h:outputLabel class="ml-2"  value="#{channelReportController.fromDate}" >
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputLabel>                          
                                <h:outputLabel value="&emsp;&emsp;To :"/>
                                <h:outputLabel class="ml-2"  value="#{channelReportController.toDate}" >
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputLabel>
                            </f:facet> -->

                            <p:column  headerText="Serial No" style=" text-align: center;">
                                <h:outputText value="#{n+1}">

                                </h:outputText>
                            </p:column>

                            <p:column headerText="Bill ID" style=" text-align: center;">
                                <h:outputText value="#{row.billId}">

                                </h:outputText>
                            </p:column>

                            <p:column headerText="Created At" style=" text-align: center;">
                                <h:outputText value="#{row.billedDate}">
                                    <f:convertDateTime
                                        pattern="#{sessionController.applicationPreference.shortDateTimeFormat}"/>
                                </h:outputText>
                            </p:column>

                            <p:column width="8em" headerText="Bill No" style=" text-align: center;">
                                <p:commandLink
                                    id="billNo"
                                    disabled ="#{row.billTypeAtomic eq 'PROFESSIONAL_PAYMENT_FOR_STAFF_FOR_CHANNELING_SERVICE_SESSION' 
                                                 or row.billTypeAtomic eq 'PROFESSIONAL_PAYMENT_FOR_STAFF_FOR_CHANNELING_SERVICE_RETURN'
                                                 or row.billTypeAtomic eq 'CHANNEL_AGENT_PAID_TO_HOSPITAL_FOR_ONLINE_BOOKINGS_BILL'
                                                 or row.billTypeAtomic eq 'CHANNEL_AGENT_PAID_TO_HOSPITAL_FOR_ONLINE_BOOKINGS_BILL_CANCELLATION'
                                                 or row.billTypeAtomic eq 'CHANNEL_CANCELLATION_WITH_PAYMENT'
                                                 or row.billTypeAtomic eq 'CHANNEL_REFUND_WITH_PAYMENT'                          }"
                                    ajax="false"
                                    style="font-weight: bold"
                                    value="#{row.billDeptId}"
                                    action="#{bookingControllerViewScope.navigateToViewBillSession(bookingControllerViewScope.getBillSessionFromBillId(row.billId))}">
                                </p:commandLink>

                                <p:tag rendered="#{row.isCancelled}" value="Cancelled - #{row.cancelledBillDeptId}" severity="danger" ></p:tag>
                                <p:tag rendered="#{row.isRefunded}" value="Refunded - #{row.refundBillDeptId}"  severity="warning" ></p:tag>
                                <p:tag rendered="#{row.billTypeAtomic eq 'CHANNEL_REFUND_WITH_PAYMENT'}" value="Refund Bill"  severity="warning" ></p:tag>
                                <p:tag rendered="#{row.billTypeAtomic eq 'CHANNEL_CANCELLATION_WITH_PAYMENT'}" value="Cancel Bill" severity="danger" ></p:tag>
                            </p:column>

                            <p:column headerText="Bill Type" style=" text-align: center;">
                                <h:outputText value="#{row.billType}">

                                </h:outputText>
                            </p:column>

                            <p:column headerText="Patient" style=" text-align: center;" filterMatchMode="contains" filterBy="#{row.bill.patient.person.name}">
                                <h:outputText value="#{row.patientName}">

                                </h:outputText>
                            </p:column>

                            <p:column headerText="Cashier" style=" text-align: center;">
                                <h:outputText value="#{row.billedBy}">

                                </h:outputText>
                            </p:column>

                            <p:column headerText="Hospital Fee" style=" text-align: center;">
                                <h:outputText styleClass="hosFee" value="#{row.hosFee}">

                                </h:outputText>

                                <f:facet name="footer">
                                    <h:outputText styleClass="hosFeeTotal" value="#{channelReportController.cardPaymentDetails.allHosFeeTotal}">
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputText>
                                </f:facet>
                            </p:column>

                            <p:column headerText="Doctor fee" style=" text-align: center;">
                                <h:outputText styleClass ="staffFee" value="#{row.doctorFee}">

                                </h:outputText>

                                <f:facet name="footer">
                                    <h:outputText styleClass="staffFeeTotal" value="#{channelReportController.cardPaymentDetails.allDoctorFeeTotal}">
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputText>
                                </f:facet>


                            </p:column>

                            <p:column headerText="Bill Gross Total" style=" text-align: center;">
                                <h:outputText styleClass="grossFee" value="#{row.totalAppoinmentFee}">

                                </h:outputText>
                                <f:facet name="footer">
                                    <h:outputText styleClass="grossTotal" value="#{channelReportController.cardPaymentDetails.allTotalAmount}">
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputText>
                                </f:facet>
                            </p:column>
                            
                            <p:column headerText="Card Total" style=" text-align: center; font-weight: bold">
                                <h:outputText styleClass="grossFee" value="#{row.cardFee}">
                                        <f:convertNumber pattern="#,##0.00"/>
                                </h:outputText>
                                <f:facet name="footer">
                                    <h:outputText styleClass="grossTotal" value="#{channelReportController.cardPaymentDetails.allCardTotal}">
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputText>
                                </f:facet>
                            </p:column>

                            <p:column headerText="Card Last 4 Numbers" style=" text-align: center;">
                                <h:outputText value="#{row.paymentReference}" style="font-weight: bold">

                                </h:outputText>
                            </p:column>

                            <p:column headerText="Bank" style=" text-align: center;">
                                <h:outputText value="#{row.creditCompanyName}" style="font-weight: bold">

                                </h:outputText>
                            </p:column>

                        </p:dataTable>

                                                    function calculateTotals(selector, targeter) {
                                                        const values = Array.from(document.querySelectorAll(selector));
                                                        const totalValue = values
                                                                .map(value => {
                                                                    const cleanValue = value.innerText.replace(/,/g, "");

                                                                })
                                                                .reduce((total, value) => total + value, 0);
                                                
                                                        const targetElement = document.querySelector(targeter);
                                                        if (targetElement) {
                                                            targetElement.innerText = totalValue.toFixed(2);

                                                    }
                                                
                                                    function updateTotals() {
                                                        calculateTotals('.grossFee', '.grossTotal');
                                                        calculateTotals('.staffFee', '.staffFeeTotal');
                                                        calculateTotals('.hosFee', '.hosFeeTotal');
                                                    }
                                                
                                                    setTimeout(updateTotals, 500);
                                                </script>-->

                
                    </p:panel>
                </h:form>
            </ui:define>

        </ui:composition>

    </h:body>
</html>
