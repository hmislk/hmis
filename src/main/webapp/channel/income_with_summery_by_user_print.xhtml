<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">
                <h:outputStylesheet library="css" name="printing/reportprint.css"/>
                <h:form>
                    <p:panel header="Channel Income Daily Summary Report Print View" styleClass="w-100">
                        <f:facet name="header">
                            <div class="d-flex justify-content-between">
                                <h:outputText value="Channel Income Daily Summary Report Print View" class="mt-2"/>
                                <div class="d-flex gap-2">
                                    <p:commandButton
                                        icon="fa-solid fa-print"
                                        class="ui-button-info"
                                        style="width: 150px"
                                        ajax="false"
                                        value="Print">
                                        <p:printer target="reportView"/>
                                    </p:commandButton>
                                    <p:commandButton
                                        ajax="false"
                                        value="Back to Report"
                                        style="width: 200px"
                                        icon="fa fa-arrow-left"
                                        class="ui-button-warning"
                                        action="income_with_summery_by_user?faces-redirect=true">
                                    </p:commandButton>
                                </div>

                            </div>
                        </f:facet>

                        <h:panelGroup id="reportView" class="d-flex justify-content-center">
                            <div class="paper">
                                <div class="header">
                                    <div class="d-flex justify-content-center text-5 gap-2"
                                         style="font-weight: 700; font-size: 22px;margin-bottom: 5px;">
                                        <h:outputText value="#{sessionController.institution.name}"/>
                                    </div>
                                    <div class="d-flex justify-content-center text-5 gap-2"
                                         style="font-weight: 400; font-size: 20px;margin-bottom: 5px;">
                                        <h:outputText value="Channel Income Daily Summary Report"/>
                                    </div>
                                    <div class="d-flex justify-content-center text-5 gap-2"
                                         style="font-weight: 600; font-size: 15px;margin-bottom: 5px;">
                                        <h:outputText value="From Date - "/>
                                        <h:outputText value="#{channelReportController.fromDate}">
                                            <f:convertDateTime
                                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                        </h:outputText>
                                        <h:outputText value="" style="width: 2em!important;" class="text-center"/>
                                        <h:outputText value="To Date - "/>
                                        <h:outputText value="#{channelReportController.toDate}">
                                            <f:convertDateTime
                                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                        </h:outputText>
                                    </div>
                                </div>

                                <div>
                                    <div>
                                        <p:dataTable id="tableForReport"  
                                            value="#{channelReportController.wrapperDto.incomeDtos}" var="row" 
                                            rowIndexVar="n"
                                            expandedRow="true"
                                            rowKey="#{row.bsId}"
                                            styleClass="table">

                                            <f:facet name="header">
                                                <h:outputLabel value="Detailed Report by Bill" style="font-size: 12pt!important;"/>
                                            </f:facet>

                                            <p:column  headerText="Serial No" style=" text-align: center;" width="6mm">
                                                <h:outputText value="#{n+1}"/>
                                            </p:column>

                                            <p:column headerText="Bill ID" style=" text-align: center;" width="15mm">
                                                <h:outputText value="#{row.billId}"/>
                                            </p:column>

                                            <p:column headerText="Appoinment Date" style=" text-align: center; font-weight: bold" width="25mm">
                                                <h:outputText value="#{row.appoinmentDate}">
                                                    <f:convertDateTime
                                                        pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                                </h:outputText>
                                            </p:column>

                                            <p:column headerText="Created Date" style=" text-align: center;" width="25mm">
                                                <h:outputText value="#{row.billedDate}">
                                                    <f:convertDateTime
                                                        pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                                </h:outputText>
                                            </p:column>

                                            <p:column headerText="Billed By" style=" text-align: center;" width="30mm">
                                                <h:outputText value="#{row.billedBy}"/>
                                            </p:column>

                                            <p:column headerText="Patient Name" style=" text-align: center; font-weight: bold" width="30mm">
                                                <h:outputText value="#{row.patientName}"/>
                                            </p:column>

                                            <p:column headerText="Payment Method" style=" text-align: center;" width="30mm">
                                                <h:outputText value="#{row.paymentMethod}"/>
                                            </p:column>

                                            <p:column headerText="Hospital Fee" style=" text-align: right;" width="30mm">
                                                <h:outputText styleClass="hosFee" value="#{row.hosFee}">
                                                    <f:convertNumber pattern="#,##0.00"/>
                                                </h:outputText>

                                                <f:facet name="footer">
                                                    <h:outputLabel styleClass="totalhosFee" value="0.00" width="30mm">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputLabel>
                                                </f:facet>
                                            </p:column>

                                            <p:column headerText="Doctor Fee" style=" text-align: right;" width="30mm">
                                                <h:outputText styleClass="doctorFee" value="#{row.doctorFee}">
                                                    <f:convertNumber pattern="#,##0.00"/>
                                                </h:outputText>

                                                <f:facet name="footer">
                                                    <h:outputLabel styleClass="totalDocFee" value="0.00">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputLabel>
                                                </f:facet>
                                            </p:column>

                                            <p:column headerText="Total Fee" style=" text-align: right; font-weight: bold" width="30mm">
                                                <h:outputText styleClass="total" value="#{row.totalAppoinmentFee}">
                                                    <f:convertNumber pattern="#,##0.00"/>
                                                </h:outputText>

                                                <f:facet name="footer">
                                                    <h:outputLabel styleClass="totalFee" value="0.00">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputLabel>
                                                </f:facet>
                                            </p:column>
                                        </p:dataTable>
                                    </div>
                                    <hr></hr>
                                    <h:panelGroup rendered="#{channelReportController.reportStatus eq 'Summery'}">
                                        <div style="page-break-before: always; break-before: page;">
                                            <p:dataTable id="tableForsummery"  
                                                        value="#{channelReportController.wrapperDto.summeryDtos}" var="row" 
                                                        rowIndexVar="n"
                                                        expandedRow="true"
                                                        rowKey="#{row.appoimentDate}"
                                                        styleClass="table">

                                                <f:facet name="header">
                                                    <h:outputLabel value="Summary Report by Appointment Date" style="font-size: 12pt!important;"/>
                                                </f:facet>

                                                <p:column  headerText="Serial No" style=" text-align: center;" width="6mm">
                                                    <h:outputText value="#{n+1}"/>
                                                </p:column>

                                                <p:column headerText="Appoinment Date" style=" text-align: center;" width="15mm">
                                                    <h:outputText value="#{row.appoimentDate}">
                                                        <f:convertDateTime
                                                            pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                                    </h:outputText>
                                                </p:column>

                                                <p:column headerText="Total Appoinments" style=" text-align: right; font-weight: bold" width="20mm">
                                                    <h:outputText value="#{row.totalActiveAppoinments}"/>
                                                </p:column>

                                                <p:column headerText="Total Amount" style=" text-align: right; font-weight: bold" width="30mm">
                                                    <h:outputText styleClass="summeryTotal" value="#{row.totalAmount}">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>

                                                    <f:facet name="footer">
                                                        <h:outputLabel styleClass="summeryAllTotal" value="0.00">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputLabel>
                                                    </f:facet>
                                                </p:column>

                                                <p:column headerText="Total Doc Fee" style=" text-align: right; font-weight: bold" width="30mm">
                                                    <h:outputText styleClass="summeryDocFee" value="#{row.totalDocFee}">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>

                                                    <f:facet name="footer">
                                                        <h:outputLabel styleClass="summeryDocFeeTotal" value="0.00">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputLabel>
                                                    </f:facet>
                                                </p:column>

                                                <p:column headerText="Total Hospital Fee" style=" text-align: right; font-weight: bold" width="30mm">
                                                    <h:outputText styleClass="summeryHosFee" value="#{row.totalHosFee}">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>

                                                    <f:facet name="footer">
                                                        <h:outputLabel styleClass="summeryHosFeeTotal" value="0.00">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputLabel>
                                                    </f:facet>
                                                </p:column>

                                                <p:column headerText="Card Total" style=" text-align: right;" width="30mm">
                                                    <h:outputText styleClass="summeryCardValue" value="#{row.cardTotal}">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>

                                                    <f:facet name="footer">
                                                        <h:outputLabel styleClass="summeryCardValueTotal" value="0.00">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputLabel>
                                                    </f:facet>
                                                </p:column>

                                                <p:column headerText="Cash Total" style=" text-align: right;" width="30mm">
                                                    <h:outputText styleClass="summeryCashValue" value="#{row.cashTotal}">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>

                                                    <f:facet name="footer">
                                                        <h:outputLabel styleClass="summeryCashValueTotal" value="0.00">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputLabel>
                                                    </f:facet>
                                                </p:column>
                                            </p:dataTable>
                                        </div>
                                        <hr></hr>
                                        <div style="page-break-before: always; break-before: page;">
                                            <table style="width: 100%; border-collapse: collapse; font-weight: bold; text-align: left; font-size: 9pt!important;" class="table">
                                                <div style="font-weight: bold; font-size: 12pt!important;" class="text-center">
                                                    <h:outputLabel value="Channeling Income Summery Report"/>
                                                </div>
                                                <hr></hr>
                                                <div class="d-flex align-item-center justify-content-between" style="font-weight: bold; font-size: 9pt!important;">
                                                    
                                                    <h:outputLabel value="From : " />
                                                    <h:outputLabel class="ml-2"  value="#{channelReportController.fromDate}" >
                                                        <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                    </h:outputLabel>                          
                                                    <h:outputLabel value="&emsp;&emsp;To :"/>
                                                    <h:outputLabel class="ml-2"  value="#{channelReportController.toDate}" >
                                                        <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                    </h:outputLabel>

                                                    <h:outputLabel value="&emsp;&emsp;Processed By :"/>
                                                    <h:outputLabel class="ml-2"  value="#{channelReportController.wrapperDto.processedBy}" >
                                                    </h:outputLabel>

                                                    <h:outputLabel value="&emsp;&emsp;Processed At :"/>
                                                    <h:outputLabel class="ml-2"  value="#{channelReportController.wrapperDto.processDate}" >
                                                        <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                    </h:outputLabel>
                                                </div>
                                            
                                                <hr></hr>

                                                <tr>
                                                    <td style="border: 2px solid #ccc; padding: 6px; width: 50mm;"> 
                                                        <h:outputText value="Total Cash Collection" />
                                                    </td>
                                                    <td style="border: 2px solid #ccc; padding: 6px; text-align: right; width: 30mm;"> 
                                                        <h:outputText value="#{channelReportController.wrapperDto.allCashTotal}" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td style="border: 2px solid #ccc; padding: 6px; width: 50mm;"> 
                                                        <h:outputText value="Total Card Collection" />
                                                    </td>
                                                    <td style="border: 2px solid #ccc; padding: 6px; text-align: right; width: 30mm;"> 
                                                        <h:outputText value="#{channelReportController.wrapperDto.allCardTotal}" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td style="border: 2px solid #ccc; padding: 6px;"> 
                                                        <h:outputText value="Total Credit Collection" />
                                                    </td>
                                                    <td style="border: 2px solid #ccc; padding: 6px; text-align: right;"> 
                                                        <h:outputText value="#{channelReportController.wrapperDto.allCreditTotal}" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td style="border: 2px solid #ccc; padding: 6px;"> 
                                                        <h:outputText value="Total Valid Appointments" />
                                                    </td>
                                                    <td style="border: 2px solid #ccc; padding: 6px; text-align: right;"> 
                                                        <h:outputText value="#{channelReportController.wrapperDto.totalValidAppoinments}" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td style="border: 2px solid #ccc; padding: 6px;"> 
                                                        <h:outputText value="Cancel and Refund Collection" />
                                                    </td>
                                                    <td style="border: 2px solid #ccc; padding: 6px; text-align: right;"> 
                                                        <h:outputText value="#{channelReportController.wrapperDto.allCancelTotal + channelReportController.wrapperDto.allRefundTotal}" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td style="border: 2px solid #ccc; padding: 6px;"> 
                                                        <h:outputText value="Total Cancel Appointments" />
                                                    </td>
                                                    <td style="border: 2px solid #ccc; padding: 6px; text-align: right;"> 
                                                        <h:outputText value="#{channelReportController.wrapperDto.allCancelAppoinments}" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td style="border: 2px solid #ccc; padding: 6px;"> 
                                                        <h:outputText value="Total Refund Appointments" />
                                                    </td>
                                                    <td style="border: 2px solid #ccc; padding: 6px; text-align: right;"> 
                                                        <h:outputText value="#{channelReportController.wrapperDto.allRefundAppoinments}" />
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td style="border: 2px solid #ccc; padding: 6px;"> 
                                                        <h:outputText value="Total Cancel And Refund Appointments" />
                                                    </td>
                                                    <td style="border: 2px solid #ccc; padding: 6px; text-align: right;"> 
                                                        <h:outputText value="#{channelReportController.wrapperDto.allCancelAppoinments + channelReportController.wrapperDto.allRefundAppoinments}" />
                                                    </td>
                                                </tr>
                                            </table>
                                        </div>
                                    </h:panelGroup>
                                    <script>
                                        function calculateTotals(selector, targeter) {
                                            const values = Array.from(document.querySelectorAll(selector));
                                            const totalValue = values
                                                    .map(value => {
                                                        const cleanValue = value.innerText.replace(/,/g, "");
                                                        return isNaN(parseFloat(cleanValue)) ? 0 : parseFloat(cleanValue);
                                                    })
                                                    .reduce((total, value) => total + value, 0);

                                            const targetElements = document.querySelectorAll(targeter);
                                            targetElements.forEach(el => {
                                                el.innerText = totalValue.toFixed(2);
                                            });

                                        }

                                        function updateTotals() {
                                            calculateTotals('.hosFee', '.totalhosFee');
                                            calculateTotals('.doctorFee', '.totalDocFee');
                                            calculateTotals('.total', '.totalFee');

                                            calculateTotals('.summeryTotal', '.summeryAllTotal');
                                            calculateTotals('.summeryDocFee', '.summeryDocFeeTotal');
                                            calculateTotals('.summeryHosFee', '.summeryHosFeeTotal');
                                            calculateTotals('.summeryCardValue', '.summeryCardValueTotal');
                                            calculateTotals('.summeryCashValue', '.summeryCashValueTotal');

                                        }

                                        setTimeout(updateTotals, 500);
                                    </script>
                                </div>
                            </div>
                        </h:panelGroup>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
