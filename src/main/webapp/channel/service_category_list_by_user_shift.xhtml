<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>

        <ui:composition template="/channel/channel_reports.xhtml">

            <ui:define name="subContent">

                <h:form>

                    <p:panel >
                        <f:facet name="header">
                            <i class="fa fa-money-bill-wave mt-2"/>
                            <p:outputLabel value="Channel Service Category By User Shift" class="mx-2 mt-2"></p:outputLabel>


                        </f:facet>
                        <h:panelGrid columns="9" style="width: 100%">

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;"
                                              styleClass="fa ml-5"/> <!-- FontAwesome calendar icon -->
                                <h:outputLabel value="From" for="fromDate" class="mx-3"/>
                            </h:panelGroup>

                            <p:calendar 
                                class="w-100"
                                inputStyleClass="w-100"
                                id="fromDate"
                                value="#{channelReportController.fromDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}"
                                ></p:calendar>
                            <p:spacer width="50"/>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;"
                                              styleClass="fa ml-5"/> <!-- FontAwesome calendar icon -->
                                <h:outputLabel value="To Date" for="toDate" class="mx-3"/>
                            </h:panelGroup>

                            <p:calendar 
                                class="w-100"
                                inputStyleClass="w-100"
                                id="toDate"
                                value="#{channelReportController.toDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}"
                                ></p:calendar>

                            <p:spacer width="50"/>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText styleClass="fas fa-user mr-2"/>
                                <h:outputLabel value="User" class="mx-3"/>
                            </h:panelGroup>
                            <p:autoComplete 
                                class="w-100  " 
                                inputStyleClass="w-100" 
                                id="cmbUser"  
                                placeholder="All Users"
                                forceSelection="true" 
                                completeMethod="#{webUserController.completeUser}" 
                                var="w" itemLabel="#{w.webUserPerson.name}" 
                                itemValue="#{w}"
                                value="#{channelReportController.webUser}" >
                            </p:autoComplete>



                        </h:panelGrid>

                        <div class="row my-3">
                            <div class="col-2">
                                <p:commandButton 
                                    icon="fa-solid fa-check"
                                    class="ui-button-success"
                                    style="float: left;"
                                    value="Process" 
                                    ajax="false" 
                                    action="#{channelReportController.listShiftStartBills()}" >
                                </p:commandButton>
                            </div>

                        </div>



                        <p:dataTable rendered="#{channelReportController.categorywiseDetailsWrapperDTO eq null}" value="#{channelReportController.shiftStartBills}" var="ssb" rowKey="#{ssb.id}">

                            <p:column headerText="Date" width="10%" >
                                <h:outputText value="#{ssb.billDate}" >
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}" ></f:convertDateTime>
                                </h:outputText>

                            </p:column>
                            <p:column headerText="Start Time"  width="15%" >
                                <h:outputText value="#{ssb.createdAt}" >
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longTimeFormat}" ></f:convertDateTime>
                                </h:outputText>
                            </p:column>

                            <p:column headerText="End Time"  width="15%" >
                                <h:outputText value="#{ssb.referenceBill ne null ? ssb.referenceBill.createdAt : 'Not Yet'}" >
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longTimeFormat}" ></f:convertDateTime>
                                </h:outputText>
                            </p:column>
                            <p:column width="15%" style="text-align: center; font-weight: bold" headerText="User" filterMatchMode="contains" filterBy="#{ssb.creater.name}">
                                #{ssb.creater.webUserPerson.nameWithTitle}
                            </p:column>

                            <p:column headerText="Shift End" style="text-align: center" rendered="true" width="25%" >
                                <h:panelGroup rendered="#{ssb.referenceBill eq null}" class="text-danger">
                                    <h:outputText value="NOT Ended" ></h:outputText>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{ssb.referenceBill ne null}" class="text-success">
                                    <h:outputText value="Ended at " ></h:outputText>
                                    <h:outputText value="#{ssb.referenceBill.createdAt}" >
                                        <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" ></f:convertDateTime>
                                    </h:outputText>
                                </h:panelGroup>
                            </p:column>

                            <p:column headerText="Actions" width="30%" style="text-align: center">
                                <h:panelGroup rendered="#{ssb.referenceBill eq null}" >
                                    <p:commandButton 
                                        ajax="false"
                                        class="ui-button-danger"
                                        value="View Summary - Not Closed" 
                                        action="#{channelReportController.generateChannelCategorywiseDetailsForShitEndFromChannelReportController(ssb.id)}"  
                                        ></p:commandButton>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{ssb.referenceBill ne null}" >
                                    <p:commandButton 
                                        ajax="false"
                                        class="ui-button-success"
                                        value="View Closed Summary" 
                                        action="#{channelReportController.generateChannelCategorywiseDetailsForShitEndFromChannelReportController(ssb.id)}"  
                                        ></p:commandButton>
                                </h:panelGroup>
                            </p:column>

                        </p:dataTable>
                        <h:panelGroup rendered="#{channelReportController.categorywiseDetailsWrapperDTO ne null}">

                            <div class="row my-4" style="font-weight: bold">
                                <div class="col-4" >
                                    <h:outputLabel value="Shift Start Date :" ></h:outputLabel>
                                    <h:outputLabel class="mx-3" value="#{channelReportController.categorywiseDetailsWrapperDTO.billingStartDate}">
                                        <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" ></f:convertDateTime>
                                    </h:outputLabel>
                                </div>
                                <div class="col-4">
                                    <h:outputLabel value="Shift End Date :" class="mx-3"></h:outputLabel>
                                    <h:outputLabel value="#{channelReportController.categorywiseDetailsWrapperDTO.billingEndDate eq null ? 'Not End Yet':channelReportController.categorywiseDetailsWrapperDTO.billingEndDate}">
                                        <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" ></f:convertDateTime>
                                    </h:outputLabel>
                                </div>
                                <div class="col-4">
                                    <h:outputLabel value="Cashier Name :" class="mx-3"></h:outputLabel>
                                    <h:outputLabel value="#{channelReportController.categorywiseDetailsWrapperDTO.cashierUserName}"></h:outputLabel>
                                </div>
                            </div>

                            <hr></hr>

                            <p:outputLabel value="Channel Income for the Shift" style="display:block; text-align:center; font-weight:bold; font-size:22px;
                                           border-bottom:2px solid black; padding-bottom:5px; width:fit-content; margin:20px auto;"></p:outputLabel>

                            <p:dataTable  value="#{channelReportController.categorywiseDetailsWrapperDTO.dtoList}" var="wrapper" >

                                <p:column headerText="Category" width="10em" >
                                    <h:outputText value="#{wrapper.category}" > 
                                    </h:outputText>

                                </p:column>

                                <p:column headerText="Cash Total" width="10em" >
                                    <h:outputText value="#{wrapper.cashTotal}" > 
                                    </h:outputText>

                                </p:column>

                                <p:column headerText="Card Total" width="10em" >
                                    <h:outputText value="#{wrapper.cardTotal}" > 
                                    </h:outputText>

                                </p:column>

                                <p:column headerText="Agent Total" width="10em" >
                                    <h:outputText value="#{wrapper.agentTotal}" > 
                                    </h:outputText>

                                </p:column>

                                <p:column headerText="Cancel Total" width="10em" >
                                    <h:outputText value="#{wrapper.cancelTotal}" > 
                                    </h:outputText>

                                </p:column>

                                <p:column headerText="Refund Total" width="10em" >
                                    <h:outputText value="#{wrapper.refundTotal}" > 
                                    </h:outputText>

                                </p:column>

                                <p:column headerText="Doctor Payment" width="10em" >
                                    <h:outputText value="#{wrapper.totalDoctorPayment}" > 
                                    </h:outputText>

                                </p:column>

                                <p:column headerText="Hospital Payment" width="10em" >
                                    <h:outputText value="#{wrapper.totalHospitalPayment}" > 
                                    </h:outputText>

                                </p:column>

                            </p:dataTable>

                            <hr></hr>
                            
                            <p:outputLabel value="OPD Income for the Shift" style="display:block; text-align:center; font-weight:bold; font-size:22px;
                                           border-bottom:2px solid black; padding-bottom:5px; width:fit-content; margin:20px auto;"></p:outputLabel>


                            <p:dataTable
                                id="tblOpd"
                                style="padding: 0px!important; margin: 0px!important;" 

                                value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.rows}" var="row"
                                paginator="true" 
                                rows="#{opdReportController.rowsPerPageForScreen}" 
                                rowsPerPageTemplate="#{opdReportController.rowsPerPageForScreen}, 5,10,15,50,100,500,1000,2000,5000,10000"
                                paginatorPosition="bottom">
                                <p:column headerText="Bill No" width="16em" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.bill.deptId}"  style="padding: 0px!important; margin: 0px!important;" />
                                    <f:facet name="footer" >
                                        <h:outputText value="Total Amounts" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >

                                        </h:outputText>
                                    </f:facet>
                                </p:column>
                                <p:column headerText="Patient"  style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.bill.patient.person.nameWithTitle}"  style="padding: 0px!important; margin: 0px!important;" />
                                </p:column>
                                <p:column headerText="Date"   width="10em" >
                                    <h:outputText value="#{row.bill.createdAt}"  style="padding: 0px!important; margin: 0px!important;" >
                                        <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateTimeFormat}" />
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Net Total"  width="10em" class="text-end" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.bill.netTotal}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.netTotal}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>
                                </p:column>
                                <p:column headerText="Cash"   width="10em"  class="text-end" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.cashValue}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.cashValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Card"   width="10em" class="text-end" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.cardValue}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.cardValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Cheque" rendered="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.chequeValue gt 0}"   width="10em"  class="text-end" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.chequeValue}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.chequeValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Slip" rendered="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.slipValue gt 0}"   width="10em"  class="text-end" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.slipValue}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.slipValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Online" rendered="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.onlineSettlementValue gt 0}"  width="10em"  class="text-end" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.onlineSettlementValue}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.onlineSettlementValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Inpatient Credit" rendered="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.inpatientCreditValue gt 0}"  width="10em" class="text-end light-grey-background"  style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.inpatientCreditValue}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.inpatientCreditValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Outpatient Credit" rendered="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.opdCreditValue gt 0}"  width="10em"  class="text-end light-grey-background" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.opdCreditValue}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.opdCreditValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Staff Credit"  rendered="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.staffValue gt 0}"  width="10em"  class="text-end light-grey-background"  style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.staffValue}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.staffValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Agent Credit" rendered="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.agentValue gt 0}"  width="10em"  class="text-end light-grey-background"  style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.agentValue}">
                                        <f:convertNumber pattern="#,##0.00" />
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.agentValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Total"    width="10em" class="text-end" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.grossTotal}" >
                                        <f:convertNumber pattern="#,##0.00" ></f:convertNumber>
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.grossTotal}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>
                                </p:column>
                                <p:column headerText="Discount"   width="10em"  class="text-end" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.discount}" >
                                        <f:convertNumber pattern="#,##0.00" ></f:convertNumber>
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.discount}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Service Charge" rendered="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.serviceCharge gt 0}" width="10em"   class="text-end"  style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.serviceCharge}" >
                                        <f:convertNumber pattern="#,##0.00" ></f:convertNumber>
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.serviceCharge}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Actual Total"    width="10em" class="text-end" style="padding: 0px!important; margin: 0px!important;" >
                                    <h:outputText value="#{row.netTotal}" >
                                        <f:convertNumber pattern="#,##0.00" ></f:convertNumber>
                                    </h:outputText>
                                    <f:facet name="footer" >
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.opdBundle.summaryRow.netTotal}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                            <f:convertNumber pattern="#,##0.00" />
                                        </h:outputText>
                                    </f:facet>

                                </p:column>
                                <p:column headerText="Actions" exportable="false" styleClass="alignTop" width="5em">
                                    <p:commandLink 
                                        value="View" 
                                        style="font-size: #{opdReportController.fontSizeForScreen}!important;" 
                                        class="mx-1"
                                        action="#{billSearch.navigateToViewBillByAtomicBillType()}" 
                                        ajax="false">
                                        <f:setPropertyActionListener value="#{row.bill}" target="#{billSearch.bill}" />
                                    </p:commandLink>
                                    <p:commandLink 
                                        value="Admin" 
                                        style="font-size: #{opdReportController.fontSizeForScreen}!important;" 
                                        class="mx-1"
                                        action="#{billSearch.navigateToAdminBillByAtomicBillType()}" 
                                        ajax="false" 
                                        rendered="#{webUserController.hasPrivilege('Developers')}">
                                        <f:setPropertyActionListener value="#{row.bill}" target="#{billSearch.bill}" />
                                    </p:commandLink>
                                </p:column>
                            </p:dataTable>

                            <hr></hr>
                            
                            <p:outputLabel value="Pharmacy Income for the Shift" style="display:block; text-align:center; font-weight:bold; font-size:22px;
                                           border-bottom:2px solid black; padding-bottom:5px; width:fit-content; margin:20px auto;"></p:outputLabel>

                            <p:dataTable
                                id="tblPharmacy"
                                style="padding: 0px!important; margin: 0px!important;"

                                value="#{channelReportController.categorywiseDetailsWrapperDTO.pharmacyBundle.rows}" var="row"
                                paginator="true"
                                rows="#{pharmacySummaryReportController.rowsPerPageForScreen}"
                                rowsPerPageTemplate="#{pharmacySummaryReportController.rowsPerPageForScreen}, 5,10,15,50,100,500,1000,2000,5000,10000"
                                paginatorPosition="bottom">
                                <!-- use for the add title for the excel-->
                                <p:column headerText="Bill No" width="16em"
                                          style="padding: 0px!important; margin: 0px!important;">
                                    <h:outputText value="#{row.bill.deptId}"
                                                  style="padding: 0px!important; margin: 0px!important;"/>
                                    <f:facet name="footer">
                                        <h:outputText value="Total Amounts"
                                                      style="padding: 0px!important; margin: 0px!important; font-weight: bold">
                                        </h:outputText>
                                    </f:facet>
                                </p:column>
                                <p:column headerText="Patient" width="10em" style="padding: 0px!important; margin: 0px!important;"
                                          rendered="#{userSettingsController.pharmacyIncomeReportPatientVisible}">
                                    <h:outputText value="#{row.bill.patient.person.nameWithTitle}"
                                                  style="padding: 0px!important; margin: 0px!important;"/>
                                </p:column>

                                <p:column headerText="Date" width="10em"
                                          rendered="#{userSettingsController.pharmacyIncomeReportDateVisible}">
                                    <h:outputText value="#{row.bill.createdAt}"
                                                  style="padding: 0px!important; margin: 0px!important;">
                                        <f:convertDateTime
                                            pattern="#{sessionController.applicationPreference.shortDateTimeFormat}"/>
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Net Total" width="10em" class="text-end"
                                          style="padding: 0px!important; margin: 0px!important;"
                                          rendered="#{userSettingsController.pharmacyIncomeReportNetTotalVisible}">
                                    <h:outputText value="#{row.bill.netTotal}">
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.pharmacyBundle.summaryRow.netTotal}"
                                                      style="padding: 0px!important; margin: 0px!important; font-weight: bold">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </f:facet>
                                </p:column>
                                <p:column headerText="Cash" width="10em" class="text-end"
                                          style="padding: 0px!important; margin: 0px!important;"
                                          rendered="#{userSettingsController.pharmacyIncomeReportCashVisible}">
                                    <h:outputText value="#{row.cashValue}">
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value="#{channelReportController.categorywiseDetailsWrapperDTO.pharmacyBundle.summaryRow.cashValue}"
                                                      style="padding: 0px!important; margin: 0px!important; font-weight: bold">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </f:facet>
                                </p:column>
                                <p:column headerText="Card" width="10em" class="text-end"
                                          style="padding: 0px!important; margin: 0px!important;"
