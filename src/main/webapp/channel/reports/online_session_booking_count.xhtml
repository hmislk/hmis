<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>

        <ui:composition template="/channel/channel_reports.xhtml" >

            <ui:define name="subContent">
                <h:outputStylesheet library="css" name="eight_col_filter_panel.css" />
                <h:form>
                    <p:panel header="Online Session Bookings" >
                        <h:panelGrid columns="5" class="my-2 ui-fluid" style="table-layout: fixed; width: 100%;" 
                                            columnClasses="fp-col-label1,fp-col-input1,fp-col-space1,
                                        fp-col-label2,fp-col-input2">

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf2b9;" styleClass="fa" /> 
                                <div class="fp-label-text">
                                    <h:outputLabel value="Speciality"/>
                                </div>
                            </h:panelGroup>
                            <p:autoComplete id="acSpeciality" 
                                            value="#{channelReportTemplateController.speciality}" 
                                            completeMethod="#{specialityController.completeSpeciality}" 
                                            var="speciality" 
                                            itemLabel="#{speciality.name}" 
                                            itemValue="#{speciality}"
                                            inputStyleClass="w-100"
                                            class="w-100">
                                <p:ajax event="itemSelect" update="scStaff" />
                            </p:autoComplete>
                            <p:spacer width="50"/>

                            <h:panelGroup layout="block" styleClass="form-group fp-label"> 
                                <h:outputText value="&#xf0f0;" styleClass="fa" /> 
                                <div class="fp-label-text">
                                    <h:outputLabel value="Doctor"/>
                                </div>
                            </h:panelGroup>

                            <p:selectOneMenu id="scStaff" 
                                             value="#{channelReportTemplateController.staff}" 
                                             filter="true" 
                                             filterMatchMode="contains" 
                                             class="w-100">
                                <f:selectItem itemLabel="Please Select" noSelectionOption="true" />
                                <f:selectItems
                                    value="#{staffController.getSpecialityStaff(channelReportTemplateController.speciality)}" 
                                    var="staff" 
                                    itemLabel="#{staff.person.nameWithTitle}" 
                                    itemValue="#{staff}" />
                            </p:selectOneMenu>

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf073;" styleClass="fa" />
                                <div class="fp-label-text">
                                    <h:outputLabel value="From Date"/>
                                </div>
                            </h:panelGroup>

                            <p:datePicker 
                                class=" w-100"
                                inputStyleClass="form-control"
                                showTime="true"
                                showButtonBar="true"
                                timeInput="true"
                                value="#{channelReportTemplateController.fromDate}" 
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" ></p:datePicker> 
                            <p:spacer width="50"/>

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf073;" styleClass="fa" />
                                <div class="fp-label-text">
                                    <h:outputLabel value="To Date"/>
                                </div>
                            </h:panelGroup>

                            <p:datePicker
                                class="w-100"
                                inputStyleClass="form-control"
                                showTime="true"
                                showButtonBar="true"
                                timeInput="true"
                                value="#{channelReportTemplateController.toDate}" 
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" ></p:datePicker>

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf19c;" styleClass="fa" />
                                <div class="fp-label-text">
                                    <h:outputLabel value="Institution"/>
                                </div>
                            </h:panelGroup>

                            <p:autoComplete  class="w-100" inputStyleClass="w-100" value="#{channelReportTemplateController.institution}"
                                             completeMethod="#{institutionController.completeIns}" 
                                             var="dept" itemValue="#{dept}" itemLabel="#{dept.name}" forceSelection="true" rendered="true" requiredMessage="You must select a department" >
                            </p:autoComplete>
                            <p:spacer width="50"/>
                            
                             <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf19c;" styleClass="fa" />
                                <div class="fp-label-text">
                                    <h:outputLabel value="Bill Type"/>
                                </div>
                            </h:panelGroup>
                            
                            <p:selectOneMenu id="billType" 
                                             value="#{channelReportTemplateController.selectedBillTypeInOBReport}" 
                                             filter="true" 
                                             filterMatchMode="contains" 
                                             class="w-100">
                                <f:selectItem itemLabel="Please Select" noSelectionOption="true" />
                                <f:selectItems
                                    value="#{channelReportTemplateController.billTypeInOBReport}" 
                                    var="type" 
                                    itemLabel="#{type}" 
                                    itemValue="#{type}" />
                            </p:selectOneMenu>


                        </h:panelGrid>

                        <div class="d-flex align-items-center my-2">
                            <p:commandButton 
                                class="ui-button-warning mx-1" 
                                icon="fas fa-cogs" 
                                value="Process" 
                                action="#{channelReportTemplateController.generateOnlineSessionBookingsReport()}" ajax="false" />

                            <p:commandButton
                                id="btnPrint"
                                class="ui-button-danger mx-1"
                                icon="fas fa-print"
                                ajax="false"
                                value="Print Table"
                                action="online_session_booking_count_print?faces-redirect=true">
                            </p:commandButton>

                            <p:commandButton 
                                class="ui-button-success mx-1"
                                icon ="fas fa-file-excel"
                                ajax="false"
                                value="Excel">
                                <p:dataExporter target="tbl1" fileName="Online_Seesion_Bookings_#{channelReportTemplateController.toDate}" type="xlsx" />
                            </p:commandButton>
                        </div>

                        <p:dataTable 
                            value="#{channelReportTemplateController.onlineBookingDetialRows}" 
                            var="a" 
                            id="tbl1" 
                            rowIndexVar="i"
                            rowKey="#{a.id}"
                            paginator="true"
                            rows="10"
                            scrollable="true"
                            scrollWidth="100%"
                            paginatorPosition="bottom"
                            paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                            rowsPerPageTemplate="5,10,20,{ShowAll|'Show All'}">
                            <f:facet name="header">
                                <p:outputLabel value="Online Session Bookings" />
                                <p:outputLabel value="#{channelReportTemplateController.institution.name}" />
                                <br></br>
                                <p:outputLabel value="From :" />
                                <p:outputLabel class="ml-2" value="#{channelReportTemplateController.fromDate}" >
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"  />
                                </p:outputLabel>
                                <p:outputLabel class="ml-5" value="To :" />
                                <p:outputLabel class="ml-2" value="#{channelReportTemplateController.toDate}" >
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"  />
                                </p:outputLabel>
                            </f:facet>
                            <p:column width="2em">
                                <f:facet name="header">
                                    <p:outputLabel value="No" />
                                </f:facet>
                                <p:outputLabel value="#{i+1}" />
                            </p:column>

                            <p:column width="10em">
                                <f:facet name="header">
                                    <p:outputLabel value="Bill No" />
                                </f:facet>
                                <p:outputLabel value="#{a.billDeptId}" />
                            </p:column>

                            <p:column width="6em">
                                <f:facet name="header">
                                    <p:outputLabel value="Session Date" />
                                </f:facet>
                                <p:outputLabel value="#{a.sessionDate}" >
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"  />
                                </p:outputLabel>
                            </p:column>
                            <p:column width="10em">
                                <f:facet name="header">
                                    <p:outputLabel value="Consultant" />
                                </f:facet>
                                <p:outputLabel value="#{a.consultantName}" />
                            </p:column>
                            <p:column width="8em">
                                <f:facet name="header">
                                    <p:outputLabel value="Speciality" />
                                </f:facet>
                                <p:outputLabel value="#{a.consultantSpeciality}" />
                            </p:column>
                            <p:column width="10em">
                                <f:facet name="header">
                                    <p:outputLabel value="Session" />
                                </f:facet>
                                <p:outputLabel value="#{a.sessionName}" />
                            </p:column>
                            <p:column width="10em">
                                <f:facet name="header">
                                    <p:outputLabel value="Patient Name" />
                                </f:facet>
                                 <f:facet name="footer">
                                    <p:outputLabel value="Net Amount" />
                                </f:facet>
                                <p:outputLabel value="#{a.patientName}" />
                            </p:column>
                            <p:column width="4em">
                                <f:facet name="header">
                                    <p:outputLabel value="Amount" />
                                </f:facet>
                                <f:facet name="footer">
                                    <p:outputLabel value="#{channelReportTemplateController.totalNetTotalInOBReport}" />
                                </f:facet>
                                <p:outputLabel value="#{a.paidAmount}" />
                            </p:column>
                            <p:column width="4em">
                                <f:facet name="header">
                                    <p:outputLabel value="Agent" />
                                </f:facet>
                                <p:outputLabel value="#{a.agentName}" />

                            </p:column>

                            <p:column width="6em">
                                <f:facet name="header">
                                    <p:outputLabel value="Phone Number" />
                                </f:facet>
                                <p:outputLabel value="#{a.patientPhone}" />

                            </p:column>

                            <p:column width="6em">
                                <f:facet name="header">
                                    <p:outputLabel value="State" />
                                </f:facet>
                                <p:badge rendered="#{a.billCancelled eq true}" value="Cancelled Bill" severity="danger"></p:badge>
                                <p:badge rendered="#{a.billRefunded eq true}" value="Refunded bill" severity="warning"></p:badge>
                                <p:badge rendered="#{a.onlineBookingStatus eq 'COMPLETED'}" value="Completed bill" severity="success">
                                </p:badge>
                                <p:badge value="Absent" rendered="#{(a.billCancelled eq false and a.billRefunded eq false) and a.absent == true}"></p:badge>

                            </p:column>

                            <p:column width="6em">
                                <f:facet name="header">
                                    <p:outputLabel value="Action" />
                                </f:facet>
                                <p:commandLink 
                                    ajax="false" 
                                    value="View BillSession" 
                                    action="#{bookingControllerViewScope.navigateToViewBillSession(bookingControllerViewScope.getBillSessionFromBillId(a.billId))}">
                                </p:commandLink>
                            </p:column>
                            
                        </p:dataTable>

                    </p:panel>
                </h:form>
            </ui:define>

        </ui:composition>

    </h:body>
</html>
