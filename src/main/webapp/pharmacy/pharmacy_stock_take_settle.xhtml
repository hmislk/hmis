<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head />
    <h:body>
        <ui:composition template="/pharmacy/adjustments/pharmacy_adjustment_index.xhtml">
            <ui:define name="subcontent">
                <div class="container-fluid">
                    <div class="card">
                        <div class="card-header">
                            <h:outputText value="Review Stock Count Bill" style="font-size: 1.5rem; font-weight: bold; color: #495057;"/>
                        </div>
                        <div class="card-body">
                            <h:form>
                                <div class="row mb-4">
                                    <div class="col-lg-8">
                                        <p:panelGrid columns="2" styleClass="ui-panelgrid-blank"
                                                     columnClasses="text-right pr-3 font-weight-bold,text-left">
                                            <h:outputText value="Institution:" style="font-weight:bold; color: #6c757d;"/>
                                            <h:outputText value="#{empty pharmacyStockTakeController.snapshotBill or empty pharmacyStockTakeController.snapshotBill.institution ? 'N/A' : pharmacyStockTakeController.snapshotBill.institution.name}"
                                                          style="color: #495057;"/>
                                            <h:outputText value="Department:" style="font-weight:bold; color: #6c757d;"/>
                                            <h:outputText value="#{pharmacyStockTakeController.snapshotBill.department.name}"
                                                          style="color: #495057;"/>
                                            <h:outputText value="Cost Value:" style="font-weight:bold; color: #155724;"/>
                                            <h:outputText value="#{pharmacyStockTakeController.inMemoryCostTotal}"
                                                          style="font-weight: bold; color: #155724; font-size: 1.1rem;">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                            <h:outputText value="Purchase Value:" style="font-weight:bold; color: #004085;"/>
                                            <h:outputText value="#{pharmacyStockTakeController.inMemoryPurchaseTotal}"
                                                          style="font-weight: bold; color: #004085; font-size: 1.1rem;">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                            <h:outputText value="Retail Value:" style="font-weight:bold; color: #856404;"/>
                                            <h:outputText value="#{pharmacyStockTakeController.inMemoryRetailTotal}"
                                                          style="font-weight: bold; color: #856404; font-size: 1.1rem;">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </p:panelGrid>
                                    </div>
                                    <div class="col-lg-4 text-right">
                                        <div class="btn-group" role="group">
                                            <p:commandButton value="Back" ajax="false"
                                                             styleClass="ui-button-secondary mx-2"
                                                             icon="fa fa-arrow-left"
                                                             action="pharmacy_stock_take?faces-redirect=true"/>
                                            <p:commandButton value="Record Stock Counts to Start Stock Taking" ajax="false"
                                                             styleClass="ui-button-success mx-2"
                                                             icon="fa fa-check"
                                                             rendered="#{webUserController.hasPrivilege('PharmacyStockAdjustment')}"
                                                             action="#{pharmacyStockTakeController.settleStockCount}"/>
                                        </div>
                                    </div>
                                </div>


                                <p:separator/>

                                <p:dataTable value="#{pharmacyStockTakeController.snapshotBill.billItems}"
                                             var="bi"
                                             rows="25"
                                             paginator="true"
                                             paginatorPosition="both"
                                             paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                             rowsPerPageTemplate="10,25,50,100"
                                             styleClass="ui-datatable-striped ui-datatable-gridlines"
                                             emptyMessage="No stock items found for this count."
                                             sortMode="multiple">

                                    <p:column headerText="Category" sortBy="#{bi.catId}"
                                              filterBy="#{bi.catId}" filterMatchMode="contains"
                                              style="width: 120px;">
                                        <h:outputText value="#{bi.catId}"
                                                      style="color: #495057;"/>
                                    </p:column>

                                    <p:column headerText="Dosage Form" sortBy="#{bi.pharmaceuticalBillItem.description}"
                                              filterBy="#{bi.pharmaceuticalBillItem.description}" filterMatchMode="contains"
                                              style="width: 120px;">
                                        <h:outputText value="#{bi.pharmaceuticalBillItem.description}"
                                                      style="color: #6c757d;"/>
                                    </p:column>

                                    <p:column headerText="Item" sortBy="#{bi.descreption}"
                                              filterBy="#{bi.descreption}" filterMatchMode="contains"
                                              style="min-width: 200px;">
                                        <h:outputText value="#{bi.descreption}"
                                                      style="color: #495057; font-weight: 500;"/>
                                    </p:column>



                                    <p:column headerText="Expiry Date" sortBy="#{bi.pharmaceuticalBillItem.doe}"
                                              filterBy="#{bi.pharmaceuticalBillItem.doe}" filterMatchMode="contains"
                                              style="width: 110px; text-align: center;">
                                        <h:outputText value="#{bi.pharmaceuticalBillItem.doe}"
                                                      style="color: #6c757d;">
                                            <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column headerText="Batch No." sortBy="#{bi.pharmaceuticalBillItem.stringValue}"
                                              filterBy="#{bi.pharmaceuticalBillItem.stringValue}" filterMatchMode="contains"
                                              style="width: 100px; text-align: center;">
                                        <h:outputText value="#{bi.pharmaceuticalBillItem.stringValue}"
                                                      style="color: #6c757d; font-family: monospace;"/>
                                    </p:column>



                                    <p:column headerText="Quantity" sortBy="#{bi.qty}"
                                              filterBy="#{bi.qty}" filterMatchMode="exact"
                                              style="width: 80px; text-align: right;">
                                        <h:outputText value="#{bi.qty}"
                                                      style="color: #495057; font-weight: 500;">
                                            <f:convertNumber pattern="#,##0.##"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column headerText="Purchase Rate" sortBy="#{bi.pharmaceuticalBillItem.purchaseRate}"
                                              filterBy="#{bi.pharmaceuticalBillItem.purchaseRate}" filterMatchMode="exact"
                                              style="width: 110px; text-align: right;">
                                        <h:outputText value="#{bi.pharmaceuticalBillItem.purchaseRate}"
                                                      style="color: #6c757d;">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column headerText="Retail Rate" sortBy="#{bi.pharmaceuticalBillItem.retailRate}"
                                              filterBy="#{bi.pharmaceuticalBillItem.retailRate}" filterMatchMode="exact"
                                              style="width: 110px; text-align: right;">
                                        <h:outputText value="#{bi.pharmaceuticalBillItem.retailRate}"
                                                      style="color: #6c757d;">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column headerText="Cost Rate" sortBy="#{bi.pharmaceuticalBillItem.costRate}"
                                              filterBy="#{bi.pharmaceuticalBillItem.costRate}" filterMatchMode="exact"
                                              style="width: 110px; text-align: right;">
                                        <h:outputText value="#{bi.pharmaceuticalBillItem.costRate}"
                                                      style="color: #6c757d;">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column headerText="Purchase Value"
                                              style="width: 120px; text-align: right;">
                                        <h:outputText value="#{bi.pharmaceuticalBillItem.purchaseRate * bi.qty}"
                                                      style="color: #004085;">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column headerText="Cost Value"
                                              style="width: 120px; text-align: right;">
                                        <h:outputText value="#{bi.pharmaceuticalBillItem.costRate * bi.qty}"
                                                      style="color: #155724; font-weight: bold;">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column headerText="Retail Value"
                                              style="width: 120px; text-align: right;">
                                        <h:outputText value="#{bi.pharmaceuticalBillItem.retailRate * bi.qty}"
                                                      style="color: #856404;">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </p:column>
                                </p:dataTable>

                                <div class="row mt-4">
                                    <div class="col-lg-8"/>
                                    <div class="col-lg-4">
                                        <div class="card">
                                            <div class="card-header" style="background-color: #495057; color: white;">
                                                <h:outputText value="Total Stock Value" style="font-weight: bold;"/>
                                            </div>
                                            <div class="card-body p-0">
                                                <table class="table table-sm mb-0">
                                                    <tbody>
                                                        <tr style="background-color: #d4edda;">
                                                            <td style="font-weight: bold; color: #155724; padding: 10px 15px;">Cost Value</td>
                                                            <td style="font-weight: bold; color: #155724; text-align: right; font-size: 1.2rem; padding: 10px 15px;">
                                                                <h:outputText value="#{pharmacyStockTakeController.inMemoryCostTotal}">
                                                                    <f:convertNumber pattern="#,##0.00"/>
                                                                </h:outputText>
                                                            </td>
                                                        </tr>
                                                        <tr style="background-color: #cce5ff;">
                                                            <td style="font-weight: bold; color: #004085; padding: 10px 15px;">Purchase Value</td>
                                                            <td style="font-weight: bold; color: #004085; text-align: right; font-size: 1.2rem; padding: 10px 15px;">
                                                                <h:outputText value="#{pharmacyStockTakeController.inMemoryPurchaseTotal}">
                                                                    <f:convertNumber pattern="#,##0.00"/>
                                                                </h:outputText>
                                                            </td>
                                                        </tr>
                                                        <tr style="background-color: #fff3cd;">
                                                            <td style="font-weight: bold; color: #856404; padding: 10px 15px;">Retail Value</td>
                                                            <td style="font-weight: bold; color: #856404; text-align: right; font-size: 1.2rem; padding: 10px 15px;">
                                                                <h:outputText value="#{pharmacyStockTakeController.inMemoryRetailTotal}">
                                                                    <f:convertNumber pattern="#,##0.00"/>
                                                                </h:outputText>
                                                            </td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </h:form>
                        </div>
                    </div>
                </div>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
