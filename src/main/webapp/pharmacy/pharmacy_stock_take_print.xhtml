<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head />
    <h:body>
        <ui:composition template="/pharmacy/adjustments/pharmacy_adjustment_index.xhtml">
            <ui:define name="subcontent">
                <div class="container-fluid">
                    <div class="card">
                        <div class="card-header">
                            <h:outputText value="Pharmacy Stock Count Bill" style="font-size: 1.5rem; font-weight: bold; color: #495057;"/>
                        </div>
                        <div class="card-body">
                            <h:form>
                                <!-- Display status badge -->
                                <h:panelGroup rendered="#{pharmacyStockTakeController.snapshotBillDisplay != null}">
                                <div class="row mb-3">
                                    <div class="col-12">
                                        <div class="alert" style="#{pharmacyStockTakeController.snapshotBillDisplay.completed ? 'background-color: #d4edda; border-color: #c3e6cb; color: #155724;' : 'background-color: #fff3cd; border-color: #ffeaa7; color: #856404;'}">
                                            <div class="d-flex align-items-center justify-content-between">
                                                <div>
                                                    <i class="fa #{pharmacyStockTakeController.snapshotBillDisplay.completed ? 'fa-check-circle' : 'fa-clock'}" style="margin-right: 8px;"></i>
                                                    <strong>Stock Taking Status:</strong>
                                                    <span style="margin-left: 8px; font-weight: bold;">
                                                        #{pharmacyStockTakeController.snapshotBillDisplay.completed ? 'Completed' : 'Ongoing'}
                                                    </span>
                                                </div>
                                                <div>
                                                    <p:commandButton value="Complete Stock Taking"
                                                                     icon="fa fa-check-circle"
                                                                     styleClass="ui-button-success"
                                                                     action="#{pharmacyStockTakeController.completeStockTaking}"
                                                                     ajax="false"
                                                                     onclick="return confirm('Are you sure you want to complete this stock taking session? Once completed, no further uploads will be allowed.');"
                                                                     rendered="#{not pharmacyStockTakeController.snapshotBillDisplay.completed}"/>
                                                    <p:commandButton value="Reverse Completion"
                                                                     icon="fa fa-undo"
                                                                     styleClass="ui-button-warning mx-2"
                                                                     action="#{pharmacyStockTakeController.reverseStockTakingCompletion}"
                                                                     ajax="false"
                                                                     onclick="return confirm('Are you sure you want to reverse the completion of this stock taking session? This will allow further uploads again.');"
                                                                     rendered="#{pharmacyStockTakeController.snapshotBillDisplay.completed and webUserController.hasPrivilege('Developers')}"/>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                </h:panelGroup>

                                <div class="row mb-4">
                                    <div class="col-lg-8">
                                        <div class="btn-toolbar" role="toolbar">
                                            <div class="btn-group mr-3" role="group" aria-label="Print Actions">
                                                <p:commandButton
                                                    value="Print Report"
                                                    icon="fa fa-print"
                                                    ajax="false"
                                                    styleClass="ui-button-info mx-1">
                                                    <p:printer target="reportView" />
                                                </p:commandButton>
                                                <p:commandButton
                                                    value="Export PDF"
                                                    icon="fa fa-file-pdf"
                                                    ajax="false"
                                                    styleClass="ui-button-secondary mx-1">
                                                    <p:dataExporter type="pdf" target=":#{p:resolveFirstComponentWithId('tbl',view).clientId}" fileName="pharmacy_stock_count_#{pharmacyStockTakeController.snapshotBillDisplay.deptId}" />
                                                </p:commandButton>
                                            </div>
                                            <div class="btn-group mr-3" role="group" aria-label="Download Sheets">
                                                <p:commandButton value="Download Guided Sheet for All" ajax="false"
                                                                 styleClass="ui-button-success mx-1" icon="fa fa-download">
                                                    <p:fileDownload value="#{pharmacyStockTakeController.downloadGuidedSheet}" />
                                                </p:commandButton>
                                                <p:commandButton value="Download Blind Sheet for All" ajax="false"
                                                                 styleClass="ui-button-warning mx-1" icon="fa fa-download">
                                                    <p:fileDownload value="#{pharmacyStockTakeController.downloadBlindSheet}" />
                                                </p:commandButton>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-lg-4 text-right">
                                        <p:commandButton value="Back to Stock Take" ajax="false"
                                                         styleClass="ui-button-secondary" icon="fa fa-arrow-left"
                                                         action="pharmacy_stock_take?faces-redirect=true"/>
                                    </div>
                                </div>



                                <h:panelGroup id="reportView">
                                    <div class="row mb-4">
                                        <div class="col-lg-6">
                                            <div class="card bg-light">
                                                <div class="card-body">
                                                    <h:outputText value="Bill Information" 
                                                                  style="font-weight: bold; color: #495057; font-size: 1.1rem;"/>
                                                    <p:panelGrid columns="2" styleClass="ui-panelgrid-blank mt-2" 
                                                                 columnClasses="text-right pr-3 font-weight-bold,text-left">
                                                        <h:outputText value="Institution:" style="font-weight:bold; color: #6c757d;"/>
                                                        <h:outputText value="#{pharmacyStockTakeController.snapshotBillDisplay.institutionName}"
                                                                      style="color: #495057;"/>
                                                        <h:outputText value="Department:" style="font-weight:bold; color: #6c757d;"/>
                                                        <h:outputText value="#{pharmacyStockTakeController.snapshotBillDisplay.departmentName}"
                                                                      style="color: #495057;"/>
                                                        <h:outputText value="Bill No:" style="font-weight:bold; color: #6c757d;"/>
                                                        <h:outputText value="#{pharmacyStockTakeController.snapshotBillDisplay.deptId}"
                                                                      style="color: #495057; font-family: monospace;"/>
                                                    </p:panelGrid>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="col-lg-6">
                                            <div class="card">
                                                <div class="card-header" style="background-color: #495057; color: white;">
                                                    <h:outputText value="Total Stock Value" style="font-weight: bold;"/>
                                                </div>
                                                <div class="card-body p-0">
                                                    <table class="table table-sm mb-0">
                                                        <tbody>
                                                            <tr style="background-color: #d4edda;">
                                                                <td style="font-weight: bold; color: #155724; padding: 10px 15px;">Cost Value</td>
                                                                <td style="font-weight: bold; color: #155724; text-align: right; font-size: 1.2rem; padding: 10px 15px;">
                                                                    <h:outputText value="#{pharmacyStockTakeController.snapshotCostTotal}">
                                                                        <f:convertNumber pattern="#,##0.00"/>
                                                                    </h:outputText>
                                                                </td>
                                                            </tr>
                                                            <tr style="background-color: #cce5ff;">
                                                                <td style="font-weight: bold; color: #004085; padding: 10px 15px;">Purchase Value</td>
                                                                <td style="font-weight: bold; color: #004085; text-align: right; font-size: 1.2rem; padding: 10px 15px;">
                                                                    <h:outputText value="#{pharmacyStockTakeController.snapshotPurchaseTotal}">
                                                                        <f:convertNumber pattern="#,##0.00"/>
                                                                    </h:outputText>
                                                                </td>
                                                            </tr>
                                                            <tr style="background-color: #fff3cd;">
                                                                <td style="font-weight: bold; color: #856404; padding: 10px 15px;">Retail Value</td>
                                                                <td style="font-weight: bold; color: #856404; text-align: right; font-size: 1.2rem; padding: 10px 15px;">
                                                                    <h:outputText value="#{pharmacyStockTakeController.snapshotRetailTotal}">
                                                                        <f:convertNumber pattern="#,##0.00"/>
                                                                    </h:outputText>
                                                                </td>
                                                            </tr>
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                            <!-- Filtered download section -->
                                            <div class="card mt-3">
                                                <div class="card-header">
                                                    <h:outputText value="Download by Category / Dosage Form" style="font-size: 1.2rem; font-weight: bold; color: #495057;"/>
                                                </div>
                                                <div class="card-body">
                                                    <div class="row mb-2">
                                                        <div class="col-lg-6">
                                                            <h:outputLabel for="categoryFilter" value="Category (optional):" styleClass="form-label font-weight-bold"/>
                                                            <p:autoComplete id="categoryFilter"
                                                                            value="#{pharmacyStockTakeController.selectedCategory}"
                                                                            completeMethod="#{pharmaceuticalItemCategoryController.completeCategory}"
                                                                            var="cat"
                                                                            itemLabel="#{cat.name}"
                                                                            itemValue="#{cat}"
                                                                            cache="false"
                                                                            queryDelay="300"
                                                                            minQueryLength="2"
                                                                            styleClass="w-100"
                                                                            inputStyleClass="w-100"
                                                                            placeholder="Type to search categories...">
                                                                <p:ajax event="itemSelect" update="filteredDownloadButtons"/>
                                                                <p:ajax event="itemUnselect" update="filteredDownloadButtons"/>
                                                            </p:autoComplete>
                                                        </div>
                                                        <div class="col-lg-6">
                                                            <h:outputLabel for="dosageFormFilter" value="Dosage Form (optional):" styleClass="form-label font-weight-bold"/>
                                                            <p:autoComplete id="dosageFormFilter"
                                                                            value="#{pharmacyStockTakeController.selectedDosageForm}"
                                                                            completeMethod="#{dosageFormController.completeCategory}"
                                                                            var="df"
                                                                            itemLabel="#{df.name}"
                                                                            itemValue="#{df}"
                                                                            cache="false"
                                                                            queryDelay="300"
                                                                            minQueryLength="2"
                                                                            styleClass="w-100"
                                                                            inputStyleClass="w-100"
                                                                            placeholder="Type to search dosage forms...">
                                                                <p:ajax event="itemSelect" update="filteredDownloadButtons"/>
                                                                <p:ajax event="itemUnselect" update="filteredDownloadButtons"/>
                                                            </p:autoComplete>
                                                        </div>
                                                    </div>
                                                    <div class="row mt-2">
                                                        <div class="col-12">
                                                            <h:panelGroup id="filteredDownloadButtons">
                                                                <p:commandButton value="Download Guided Sheet"
                                                                                 ajax="false"
                                                                                 styleClass="ui-button-success mx-1"
                                                                                 icon="fa fa-download"
                                                                                 disabled="#{pharmacyStockTakeController.selectedCategory == null and pharmacyStockTakeController.selectedDosageForm == null}">
                                                                    <p:fileDownload value="#{pharmacyStockTakeController.downloadFilteredGuidedSheet}" />
                                                                </p:commandButton>
                                                                <p:commandButton value="Download Blind Sheet"
                                                                                 ajax="false"
                                                                                 styleClass="ui-button-warning mx-1"
                                                                                 icon="fa fa-download"
                                                                                 disabled="#{pharmacyStockTakeController.selectedCategory == null and pharmacyStockTakeController.selectedDosageForm == null}">
                                                                    <p:fileDownload value="#{pharmacyStockTakeController.downloadFilteredBlindSheet}" />
                                                                </p:commandButton>
                                                            </h:panelGroup>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                    </div>

                                    <p:separator style="margin: 2rem 0;"/>

                                    <p:dataTable id="tbl"
                                                 widgetVar="tbl"
                                                 value="#{pharmacyStockTakeController.snapshotItems}"
                                                 var="bi"
                                                 rows="25"
                                                 paginator="true"
                                                 paginatorPosition="both"
                                                 paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                                 rowsPerPageTemplate="10,25,50,100"
                                                 styleClass="ui-datatable-striped ui-datatable-gridlines"
                                                 emptyMessage="No stock items found for this bill."
                                                 sortMode="multiple">

                                        <p:column headerText="Bill Item ID" sortBy="#{bi.billItemId}"
                                                  filterBy="#{bi.billItemId}" filterMatchMode="exact"
                                                  style="width: 110px; text-align: right;">
                                            <h:outputText value="#{bi.billItemId}"
                                                          style="color: #6c757d; font-family: monospace;"/>
                                        </p:column>

                                        <p:column headerText="Category" sortBy="#{bi.categoryName}"
                                                  filterBy="#{bi.categoryName}" filterMatchMode="contains"
                                                  style="width: 120px;">
                                            <h:outputText value="#{bi.categoryName}"
                                                          style="color: #495057;"/>
                                        </p:column>

                                        <p:column headerText="Dosage Form" sortBy="#{bi.dosageForm}"
                                                  filterBy="#{bi.dosageForm}" filterMatchMode="contains"
                                                  style="width: 120px;">
                                            <h:outputText value="#{bi.dosageForm}"
                                                          style="color: #6c757d;"/>
                                        </p:column>

                                        <p:column headerText="Item Description" sortBy="#{bi.itemName}"
                                                  filterBy="#{bi.itemName}" filterMatchMode="contains"
                                                  style="min-width: 200px;">
                                            <h:outputText value="#{bi.itemName}"
                                                          style="color: #495057; font-weight: 500;"/>
                                        </p:column>

                                        <p:column headerText="Batch No." sortBy="#{bi.batchNo}"
                                                  filterBy="#{bi.batchNo}" filterMatchMode="contains"
                                                  style="width: 100px; text-align: center;">
                                            <h:outputText value="#{bi.batchNo}"
                                                          style="color: #6c757d; font-family: monospace;"/>
                                        </p:column>

                                        <p:column headerText="Expiry Date" sortBy="#{bi.expiryDate}"
                                                  style="width: 110px; text-align: center;">
                                            <h:outputText value="#{bi.expiryDate}"
                                                          style="color: #6c757d;">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}"/>
                                            </h:outputText>
                                        </p:column>

                                        <p:column headerText="Quantity" sortBy="#{bi.qty}"
                                                  filterBy="#{bi.qty}" filterMatchMode="exact"
                                                  style="width: 80px; text-align: right;">
                                            <h:outputText value="#{bi.qty}"
                                                          style="color: #495057; font-weight: 500;">
                                                <f:convertNumber integerOnly="true"/>
                                            </h:outputText>
                                        </p:column>

                                        <p:column headerText="Purchase Rate" sortBy="#{bi.purchaseRate}"
                                                  filterBy="#{bi.purchaseRate}" filterMatchMode="exact"
                                                  style="width: 110px; text-align: right;">
                                            <h:outputText value="#{bi.purchaseRate}"
                                                          style="color: #6c757d;">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </p:column>

                                        <p:column headerText="Retail Rate" sortBy="#{bi.retailRate}"
                                                  filterBy="#{bi.retailRate}" filterMatchMode="exact"
                                                  style="width: 110px; text-align: right;">
                                            <h:outputText value="#{bi.retailRate}"
                                                          style="color: #6c757d;">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </p:column>

                                        <p:column headerText="Cost Rate" sortBy="#{bi.costRate}"
                                                  filterBy="#{bi.costRate}" filterMatchMode="exact"
                                                  style="width: 110px; text-align: right;">
                                            <h:outputText value="#{bi.costRate}"
                                                          style="color: #6c757d;">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </p:column>

                                        <p:column headerText="Purchase Value"
                                                  style="width: 120px; text-align: right;">
                                            <h:outputText value="#{bi.purchaseValue}"
                                                          style="color: #004085;">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </p:column>

                                        <p:column headerText="Cost Value"
                                                  style="width: 120px; text-align: right;">
                                            <h:outputText value="#{bi.costValue}"
                                                          style="color: #155724; font-weight: bold;">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </p:column>

                                        <p:column headerText="Retail Value"
                                                  style="width: 120px; text-align: right;">
                                            <h:outputText value="#{bi.retailValue}"
                                                          style="color: #856404;">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </p:column>
                                    </p:dataTable>

                                    <div class="row mt-4 no-print">
                                        <div class="col-lg-8">
                                            <p:messages id="messages" showDetail="true" closable="true" />
                                        </div>
                                        <div class="col-lg-4">
                                            <div class="card bg-light">
                                                <div class="card-body text-right">
                                                    <h:outputText value="Report Summary"
                                                                  style="font-weight: bold; color: #6c757d; font-size: 1.1rem; display: block; margin-bottom: 10px;"/>
                                                    <h:outputText value="Total Items: "
                                                                  style="font-weight: bold; color: #6c757d;"/>
                                                    <h:outputText value="#{pharmacyStockTakeController.snapshotBillItemsCount}"
                                                                  style="color: #495057; font-weight: bold;"/>
                                                    <br/><br/>
                                                    <h:outputText value="Cost Total: "
                                                                  style="font-weight: bold; color: #155724;"/>
                                                    <h:outputText value="#{pharmacyStockTakeController.snapshotCostTotal}"
                                                                  style="font-weight: bold; color: #155724; font-size: 1.2rem;">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                    <br/>
                                                    <h:outputText value="Purchase Total: "
                                                                  style="font-weight: bold; color: #004085;"/>
                                                    <h:outputText value="#{pharmacyStockTakeController.snapshotPurchaseTotal}"
                                                                  style="font-weight: bold; color: #004085; font-size: 1.2rem;">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                    <br/>
                                                    <h:outputText value="Retail Total: "
                                                                  style="font-weight: bold; color: #856404;"/>
                                                    <h:outputText value="#{pharmacyStockTakeController.snapshotRetailTotal}"
                                                                  style="font-weight: bold; color: #856404; font-size: 1.2rem;">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                </h:panelGroup>

                                <style type="text/css">
                                    @media print {
                                        .no-print, .no-print * {
                                            display: none !important;
                                        }
                                        .card {
                                            border: 1px solid #dee2e6 !important;
                                            box-shadow: none !important;
                                        }
                                        .btn-toolbar, .btn-group {
                                            display: none !important;
                                        }
                                        .ui-paginator {
                                            display: none !important;
                                        }
                                        .ui-datatable .ui-datatable-header {
                                            background: #f8f9fa !important;
                                            print-color-adjust: exact;
                                        }
                                        body {
                                            font-size: 12px !important;
                                        }
                                        .card-header {
                                            background: #e9ecef !important;
                                            print-color-adjust: exact;
                                        }
                                        .bg-success {
                                            background-color: #28a745 !important;
                                            print-color-adjust: exact;
                                        }
                                    }
                                </style>

                            </h:form>
                        </div>
                    </div>
                </div>
            </ui:define>
        </ui:composition>
    </h:body>

</html>
