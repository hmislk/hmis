<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">

                <h:form >
                    <p:panel header="Stock Report by Expiry Print" styleClass="w-100">
                        <f:facet name="header"  >
                            <div class="d-flex justify-content-between">
                                <h:outputText value="Stock Report by Expiry Print" class="mt-2"/>
                                <div class="d-flex gap-2">
                                    <p:commandButton 
                                        icon="fa-solid fa-print"
                                        class="ui-button-info"
                                        style="width: 150px"
                                        ajax="false" 
                                        value="Print">
                                        <p:printer target="reportView" />
                                    </p:commandButton>
                                    <p:commandButton 
                                        ajax="false" 
                                        value="Back to Report" 
                                        style="width: 200px"
                                        icon="fa fa-arrow-left"
                                        class="ui-button-warning"
                                        action="pharmacy_report_department_stock_by_batch_expiary?faces-redirect=true" >
                                    </p:commandButton>
                                </div>

                            </div>
                        </f:facet>

                        <style>

                            @media screen{
                                .paper{
                                    width: 297mm;
                                    margin: auto;
                                    zoom: 1.8;
                                }

                                table{
                                    border-collapse: collapse;
                                    width: 99.9%;
                                    table-layout: fixed;
                                    font-size: 11px;
                                }

                                th, td{
                                    border: 1px solid #000;
                                    padding: 2px 3px;
                                    text-align: left;
                                    word-wrap: break-word;
                                }

                                th{
                                    font-weight: bold;
                                }

                                .header{
                                    font-size: 13px;
                                    text-align: center;
                                }

                                tfoot{
                                    font-weight: bold;
                                }
                            }



                            @media print{

                                @page{
                                    size: A4 landscape;
                                    margin: 8mm;
                                }

                                body{
                                    margin:0;
                                    padding:0;
                                }

                                .paper{
                                    width: 100%;
                                }

                                table{
                                    border-collapse: collapse;
                                    width: 99.9%;
                                    table-layout: fixed;
                                    font-size: 11px;
                                }

                                th, td{
                                    border: 1px solid #000;
                                    padding: 2px;
                                    text-align: left;
                                    word-break: break-word;
                                }

                                th{
                                    font-weight: bold;
                                }

                                .header{
                                    font-size: 12px;
                                    text-align: center;
                                    margin-bottom: 4px;
                                }

                                tfoot{
                                    font-weight: bold;
                                    font-size: 12px;
                                }

                            }
                        </style>

                        <h:panelGroup id="reportView" class="d-flex justify-content-center">
                            <div class="paper">
                                <div class="header" >

                                    <!-- Institution -->
                                    <h:panelGroup layout="block"
                                                  styleClass="d-flex justify-content-center text-5 gap-2"
                                                  style="font-weight: 700; font-size: 22px;"
                                                  rendered="#{not empty reportsStock.institution}">
                                        <h:outputText value="#{reportsStock.institution.name}" />
                                    </h:panelGroup>

                                    <!-- Site -->
                                    <h:panelGroup layout="block"
                                                  styleClass="d-flex justify-content-center text-5 gap-2"
                                                  style="font-weight: 700; font-size: 16px;"
                                                  rendered="#{not empty reportsStock.site}">
                                        <h:outputText value="#{reportsStock.site.name}" />
                                    </h:panelGroup>

                                    <!-- Department -->
                                    <h:panelGroup layout="block"
                                                  styleClass="d-flex justify-content-center text-5 gap-2"
                                                  style="font-weight: 700; font-size: 14px;"
                                                  rendered="#{not empty reportsStock.department}">
                                        <h:outputText value="#{reportsStock.department.name}" />
                                    </h:panelGroup>

                                    <div class="d-flex justify-content-center gap-2" style="  font-size: 11px; margin-top:5px;">

                                        <!-- Category -->
                                        <span>
                                            Category :
                                            <h:outputText value="#{not empty reportsStock.category ? reportsStock.category.name : 'All'}" />

                                        </span>

                                        |
                                        <!-- Dosage Form -->
                                        <span>
                                            Dosage Form :
                                            <h:outputText value="#{not empty reportsStock.dosageForm ? reportsStock.dosageForm.name : 'All'}" />
                                        </span>

                                        |
                                        <!-- Department Types -->
                                        <span>
                                            Department Type :
                                            <h:outputText value="#{reportsStock.selectedDepartmentTypesPrintDisplay}" />
                                        </span>

                                    </div>

                                    <div class="d-flex justify-content-center gap-2" style="font-size:11px; ">
                                        <span>
                                            From Date :
                                            <h:outputText value="#{reportsStock.fromDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                            </h:outputText>
                                        </span>
                                        
                                        |
                                        
                                        <span>
                                            To Date :
                                            <h:outputText value="#{reportsStock.toDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                            </h:outputText>
                                        </span>
                                    </div>

                                    <!-- Report Name -->
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 12px; margin-top:5px; margin-bottom: 5px;">
                                        <h:outputText value="Stock Report by Expiry" />
                                    </div>

                                </div>

                                <div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th style="font-weight: 700; text-align: center;">
                                                    <h:outputText value="Category" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700; text-align: center;">
                                                    <h:outputText value="Dosage Form" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Item" style="margin-left:  1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Type" style="margin-left:  1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Code" style="margin-left:  1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Expiry" style="margin-left:  1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Batch No" style=" margin-left:  1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Stock" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Purchase Rate" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Purchase Value" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Cost Rate" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Cost Value" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Retail Rate" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Retail Value" style="margin-right: 1mm;"/>
                                                </th>
                                                
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <ui:repeat value="#{reportsStock.stockDtos}" var="i" >
                                                <tr>
                                                    <td style=" text-align: left;" >
                                                        <h:outputText value="#{i.categoryName}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style=" text-align: left;">
                                                        <h:outputText value="#{i.dosageFormName}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style=" text-align: left;">
                                                        <h:outputText value="#{i.itemName}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style=" text-align: left;">
                                                        <h:outputText value="#{i.departmentType}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style=" text-align: left;">
                                                        <h:outputText value="#{i.code}" style="margin-left: 1mm;"/>
                                                    </td>   
                                                    <td style=" text-align: left;" >
                                                        <h:outputText value="#{i.dateOfExpire}" >
                                                            <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: left;">
                                                        <h:outputText value="#{i.batchNo}" style="margin-left: 1mm;"/>
                                                    </td> 
                                                    <td style=" text-align: right;">
                                                       <h:outputText value="#{i.stockQty}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{i.purchaseRate}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{i.purchaseRate * i.stockQty}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{i.costRate}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{i.costRate * i.stockQty}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{i.retailRate}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{i.retailRate * i.stockQty}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    
                                                </tr>
                                            </ui:repeat>
                                        </tbody>
                                        <tfoot>
                                            <tr>
                                                <td style=" text-align: left;" >
                                                    <h:outputText value="Total" style="margin-left:1mm;font-weight: bold;" />
                                                </td>
                                                <td style=" text-align: left;"/>
                                                <td style=" text-align: left;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;">
                                                    <h:outputText value="#{reportsStock.stockPurchaseValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;">
                                                    <h:outputText value="#{reportsStock.stockCostValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;">
                                                    <h:outputText value="#{reportsStock.stockSaleValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                
                                            </tr>
                                        </tfoot>
                                    </table>

                                </div>

                            </div>
                        </h:panelGroup>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
