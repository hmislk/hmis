<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>

        <ui:composition template="./index.xhtml">
            <ui:define name="subcontent">
                <h:form>
                    <p:panel>
                        <f:facet name="header">
                            <i class="fa fa-inbox mt-2"/>
                            <h:outputLabel value="Float Transfer Requests For Me" class="mx-2"/>
                            <p:commandButton
                                value="Refresh"
                                icon="pi pi-refresh"
                                action="#{financialTransactionController.fillFundTransferRequestsForMe()}"
                                update="tblRequests"
                                class="ui-button-secondary ms-3"/>
                        </f:facet>

                        <p:dataTable
                            id="tblRequests"
                            value="#{financialTransactionController.fundTransferRequestsForMe}"
                            var="bp"
                            rowKey="#{bp.id}"
                            emptyMessage="No pending float transfer requests"
                            paginator="true"
                            rows="20"
                            paginatorPosition="bottom">

                            <p:column headerText="Requested By">
                                <h:outputText value="#{bp.fromWebUser.webUserPerson.nameWithTitle}"/>
                            </p:column>

                            <p:column headerText="Request Date/Time">
                                <h:outputText value="#{bp.createdAt}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Requested Amount" styleClass="text-end">
                                <h:outputText value="#{bp.netTotal}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Comments">
                                <h:outputText value="#{bp.comments}"/>
                            </p:column>

                            <p:column headerText="Actions" style="width: 160px;">
                                <p:commandButton
                                    value="Initiate Transfer"
                                    icon="fa fa-exchange-alt"
                                    title="Start float transfer to fulfil this request"
                                    action="#{financialTransactionController.navigateToFundTransferBillFromRequest(bp)}"
                                    ajax="false"
                                    class="ui-button-success"/>
                            </p:column>

                        </p:dataTable>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
