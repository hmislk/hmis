<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>

        <ui:composition template="./index.xhtml">

            <ui:define name="subcontent">
                <f:metadata>
                    <f:viewAction action="#{financialTransactionController.ensureFundTransferRequestBillInitialized()}" />
                </f:metadata>
                <h:form>

                    <p:panel>
                        <f:facet name="header">
                            <i class="fa fa-hand-holding-usd mt-2"/>
                            <p:outputLabel value="Request Float Transfer" class="mx-2 mt-2"/>
                        </f:facet>

                        <p:panelGrid columns="2" class="w-100">

                            <p:outputLabel value="Request Float From" for="acFromUser"/>
                            <p:autoComplete
                                completeMethod="#{webUserController.completeUser}"
                                class="mx-2 w-100"
                                id="acFromUser"
                                value="#{financialTransactionController.currentBill.toWebUser}"
                                var="s"
                                scrollHeight="450"
                                inputStyleClass="w-100"
                                itemLabel="#{s.webUserPerson.nameWithTitle}"
                                itemValue="#{s}">
                                <p:column headerText="Username">
                                    <h:outputText value="#{s.name}" />
                                </p:column>
                                <p:column headerText="Person Name">
                                    <h:outputText value="#{s.webUserPerson.nameWithTitle}" />
                                </p:column>
                                <p:column headerText="Code">
                                    <h:outputText value="#{s.code}" />
                                </p:column>
                            </p:autoComplete>

                            <p:outputLabel value="Requested Amount" for="txtAmount"/>
                            <p:inputText
                                id="txtAmount"
                                class="mx-2 text-end"
                                onfocus="this.select();"
                                value="#{financialTransactionController.currentBill.netTotal}"/>

                            <p:outputLabel value="Comments" for="txtComments"/>
                            <p:inputTextarea
                                id="txtComments"
                                class="mx-2 w-100"
                                value="#{financialTransactionController.currentBill.comments}"/>

                            <p:spacer/>
                            <p:commandButton
                                icon="fa fa-paper-plane"
                                class="ui-button-success"
                                value="Submit Request"
                                title="Submit float transfer request"
                                ajax="false"
                                rendered="#{webUserController.hasPrivilege('RequestFundTransfer')}"
                                action="#{financialTransactionController.settleFloatTransferRequest()}"/>

                        </p:panelGrid>

                    </p:panel>

                </h:form>

            </ui:define>
        </ui:composition>

    </h:body>
</html>
