<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>

        <ui:composition template="./index.xhtml">
            <ui:define name="subcontent">
                <h:form>
                    <p:panel header="My Float Ins">
                        <div class="row mb-3">
                            <div class="col-md-3">
                                <h:outputLabel value="From Date" class="fw-bold" />
                                <p:datePicker
                                    id="fromDate"
                                    showTime="true"
                                    value="#{financialTransactionController.myFloatInsFromDate}"
                                    pattern="#{sessionController.applicationPreference.longDateTimeFormat}"
                                    class="w-100" />
                            </div>
                            <div class="col-md-3">
                                <h:outputLabel value="To Date" class="fw-bold" />
                                <p:datePicker
                                    id="toDate"
                                    showTime="true"
                                    value="#{financialTransactionController.myFloatInsToDate}"
                                    pattern="#{sessionController.applicationPreference.longDateTimeFormat}"
                                    class="w-100" />
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <p:commandButton
                                    value="Search"
                                    icon="pi pi-search"
                                    action="#{financialTransactionController.fillMyFundTransferBillsIn()}"
                                    update="tblMyFloatIns"
                                    styleClass="ui-button-primary" />
                            </div>
                            <div class="col-md-4 d-flex align-items-end justify-content-end">
                                <p:commandButton
                                    value="Pending Transfers"
                                    icon="fa fa-inbox"
                                    action="#{financialTransactionController.navigateBackToMyFloatIns()}"
                                    ajax="false"
                                    styleClass="ui-button-secondary" />
                            </div>
                        </div>

                        <p:dataTable
                            id="tblMyFloatIns"
                            value="#{financialTransactionController.myFundTransferBillsIn}"
                            var="bp"
                            rowKey="#{bp.id}"
                            emptyMessage="No float transfers found for the selected period"
                            paginator="true"
                            rows="20"
                            paginatorPosition="bottom">

                            <p:column headerText="Bill ID">
                                <h:outputText value="#{bp.deptId}" />
                            </p:column>

                            <p:column headerText="Received At">
                                <h:outputText value="#{bp.createdAt}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="From User">
                                <h:outputText value="#{bp.fromWebUser.webUserPerson.nameWithTitle}" />
                            </p:column>

                            <p:column headerText="Amount" style="text-align: right;">
                                <h:outputText value="#{bp.absoluteNetTotalTransient}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Status">
                                <h:panelGroup rendered="#{bp.referenceBill ne null}">
                                    <span class="badge bg-success">Accepted</span>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{bp.referenceBill eq null and not bp.cancelled}">
                                    <span class="badge bg-warning text-dark">Pending</span>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{bp.cancelled and bp.cancelledBill ne null and bp.cancelledBill.billTypeAtomic.name() eq 'FUND_TRANSFER_BILL_DECLINED'}">
                                    <span class="badge bg-danger">Declined by You</span>
                                    <h:panelGroup rendered="#{not empty bp.cancelledBill.comments}">
                                        <br />
                                        <small class="text-muted"><i class="pi pi-info-circle me-1" /><h:outputText value="#{bp.cancelledBill.comments}" /></small>
                                    </h:panelGroup>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{bp.cancelled and (bp.cancelledBill eq null or bp.cancelledBill.billTypeAtomic.name() ne 'FUND_TRANSFER_BILL_DECLINED')}">
                                    <span class="badge bg-secondary">Cancelled by Sender</span>
                                </h:panelGroup>
                            </p:column>

                            <p:column headerText="Actions">
                                <p:commandButton
                                    value="View"
                                    icon="pi pi-eye"
                                    action="#{financialTransactionController.navigateToViewFundTransferBill(bp)}"
                                    ajax="false"
                                    styleClass="ui-button-info ui-button-sm" />
                            </p:column>

                        </p:dataTable>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
