<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:prints="http://xmlns.jcp.org/jsf/composite/ezcomp/prints">
    <h:body>
        <ui:composition template="./index.xhtml">
            <ui:define name="subcontent">
                <h:form>
                    <p:panel>
                        <f:facet name="header">
                            <h:panelGroup class="d-flex justify-content-between align-items-center">
                                <div>
                                    <i class="fa fa-minus-circle me-2"/>
                                    <h:outputText value="Shift Shortage Summary"/>
                                    <h:panelGroup rendered="#{billSearch.bill.paid}">
                                        <span class="ms-3 badge bg-success">Fully Settled</span>
                                    </h:panelGroup>
                                    <h:panelGroup rendered="#{billSearch.bill.cancelled}">
                                        <span class="ms-3 badge bg-danger">Cancelled</span>
                                    </h:panelGroup>
                                    <h:panelGroup rendered="#{!billSearch.bill.paid and !billSearch.bill.cancelled}">
                                        <span class="ms-3 badge bg-warning text-dark">Outstanding</span>
                                    </h:panelGroup>
                                </div>
                                <div class="d-flex gap-2">
                                    <p:commandButton
                                        value="Settle This Shortage"
                                        icon="fa fa-money"
                                        styleClass="ui-button-success"
                                        ajax="false"
                                        action="#{financialTransactionController.navigateToSettleShiftShortageBill()}"
                                        rendered="#{!billSearch.bill.paid and !billSearch.bill.cancelled}"/>
                                    <p:commandButton
                                        value="Back to Search"
                                        icon="fa fa-arrow-left"
                                        styleClass="ui-button-secondary"
                                        ajax="false"
                                        action="/cashier/cashier_shift_bill_search?faces-redirect=true"/>
                                </div>
                            </h:panelGroup>
                        </f:facet>

                        <div class="row g-3 mb-3">
                            <div class="col-md-3">
                                <h:outputText value="Shortage Amount" styleClass="fw-medium d-block"/>
                                <h:outputText value="#{billSearch.bill.total}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputText>
                            </div>
                            <div class="col-md-3">
                                <h:outputText value="Settled So Far" styleClass="fw-medium d-block"/>
                                <h:outputText value="#{financialTransactionController.shortageSettledSoFar}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputText>
                            </div>
                            <div class="col-md-3">
                                <h:outputText value="Outstanding" styleClass="fw-medium d-block"/>
                                <h:outputText value="#{financialTransactionController.shortageOutstanding}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputText>
                            </div>
                            <div class="col-md-3">
                                <h:outputText value="Recorded By" styleClass="fw-medium d-block"/>
                                <h:outputText value="#{billSearch.bill.fromWebUser.webUserPerson.name}"/>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-lg-6">
                                <p:panel>
                                    <f:facet name="header">
                                        <div class="d-flex align-items-center justify-content-between">
                                            <h:outputText value="Shift Shortage Bill Preview"/>
                                            <p:commandButton class="ui-button-info" icon="fas fa-print" value="Print">
                                                <p:printer target="shortagebill"/>
                                            </p:commandButton>
                                        </div>
                                    </f:facet>
                                    <h:panelGroup id="shortagebill">
                                        <div class="d-flex justify-content-center">
                                            <h:panelGroup rendered="#{configOptionApplicationController.getBooleanValueByKey('Shift Shortage Bill is Five Five Paper', true)}">
                                                <prints:five_five_paper_with_headings_for_shift_shortage
                                                    payments="#{billSearch.viewingBillPayments}"
                                                    bill="#{billSearch.bill}"/>
                                            </h:panelGroup>
                                            <h:panelGroup rendered="#{configOptionApplicationController.getBooleanValueByKey('Shift Shortage Bill is POS Paper', false)}">
                                                <prints:pos_paper_for_shift_shortage
                                                    payments="#{billSearch.viewingBillPayments}"
                                                    bill="#{billSearch.bill}"/>
                                            </h:panelGroup>
                                        </div>
                                    </h:panelGroup>
                                </p:panel>
                            </div>
                        </div>
                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
