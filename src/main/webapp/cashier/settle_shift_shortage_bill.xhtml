<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/cashier/index.xhtml">
            <ui:define name="subcontent">
                <h:form>
                    <p:panel>
                        <f:facet name="header">
                            <div class="d-flex align-items-center justify-content-between">
                                <div>
                                    <i class="fa fa-money me-2"/>
                                    <h:outputText value="Settle Shift Shortage"/>
                                </div>
                                <p:commandButton
                                    value="Back"
                                    icon="fa fa-arrow-left"
                                    styleClass="ui-button-secondary"
                                    ajax="false"
                                    action="#{billSearch.navigateToViewCashierShiftShortageBill(financialTransactionController.selectedBill)}"/>
                            </div>
                        </f:facet>

                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <p:outputLabel value="Shortage Bill No." styleClass="fw-medium mb-1 d-block"/>
                                <h:outputText value="#{financialTransactionController.selectedBill.idStr}" styleClass="fw-bold"/>
                            </div>
                            <div class="col-md-4">
                                <p:outputLabel value="Total Shortage" styleClass="fw-medium mb-1 d-block"/>
                                <h:outputText value="#{financialTransactionController.selectedBill.total}" styleClass="fw-bold text-danger">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputText>
                            </div>
                            <div class="col-md-4">
                                <p:outputLabel value="Outstanding Amount" styleClass="fw-medium mb-1 d-block"/>
                                <h:outputText value="#{financialTransactionController.shortageOutstanding}" styleClass="fw-bold text-warning">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputText>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <p:outputLabel for="txtSettlementAmount" value="Settlement Amount (Cash)" styleClass="fw-medium mb-1 d-block"/>
                                <p:inputText
                                    id="txtSettlementAmount"
                                    styleClass="w-100 text-end"
                                    onfocus="this.select();"
                                    value="#{financialTransactionController.currentPayment.paidValue}"/>
                            </div>
                            <div class="col-md-6">
                                <p:outputLabel for="txtSettlementComments" value="Comments" styleClass="fw-medium mb-1 d-block"/>
                                <p:inputTextarea
                                    id="txtSettlementComments"
                                    styleClass="w-100"
                                    rows="3"
                                    value="#{financialTransactionController.currentBill.comments}"/>
                            </div>
                        </div>

                        <div class="text-end">
                            <p:commandButton
                                icon="fa fa-check"
                                styleClass="ui-button-success"
                                value="Confirm Settlement"
                                ajax="false"
                                action="#{financialTransactionController.settleShiftShortageBill()}"/>
                        </div>
                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
