<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="./index.xhtml">
            <ui:define name="subcontent">
                <h:form>
                    <h:panelGroup layout="block"
                                  rendered="#{not empty sessionController.institution
                                              and not empty financialTransactionController.currentBill
                                              and not empty financialTransactionController.currentPayment
                                              and not empty financialTransactionController.selectedBill}">
                        <p:panel>
                            <f:facet name="header">
                                <div class="d-flex align-items-center justify-content-between">
                                    <div>
                                        <i class="fa fa-check-circle me-2"/>
                                        <h:outputText value="Proof Missing Settlement Recorded"/>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <p:commandButton
                                            value="Back to Search"
                                            icon="fa fa-search"
                                            styleClass="ui-button-info"
                                            ajax="false"
                                            action="#{financialTransactionController.navigateToCashierShiftBillSearchWithTodayResults()}"/>
                                        <p:commandButton
                                            value="Print"
                                            icon="fa fa-print"
                                            styleClass="ui-button-secondary">
                                            <p:printer target="proofmissingreceipt"/>
                                        </p:commandButton>
                                    </div>
                                </div>
                            </f:facet>

                            <h:panelGroup id="proofmissingreceipt">
                                <div class="d-flex justify-content-center">
                                    <div style="width: 400px; border: 1px solid #ccc; padding: 20px; font-family: monospace;">
                                        <div class="text-center mb-3">
                                            <h:outputText value="#{sessionController.institution.name}" styleClass="fw-bold d-block"/>
                                            <h:outputText value="PROOF MISSING SETTLEMENT RECEIPT" styleClass="fw-bold d-block mt-1"/>
                                            <hr/>
                                        </div>

                                        <table style="width: 100%;">
                                            <tr>
                                                <td style="width: 50%;">
                                                    <h:outputText value="Settlement Bill No."/>
                                                </td>
                                                <td class="text-end fw-bold">
                                                    <h:outputText value="#{financialTransactionController.currentBill.idStr}"/>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>
                                                    <h:outputText value="Settlement Date"/>
                                                </td>
                                                <td class="text-end">
                                                    <h:outputText value="#{financialTransactionController.currentBill.billTime}">
                                                        <f:convertDateTime timeZone="Asia/Colombo"
                                                            pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                                    </h:outputText>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>
                                                    <h:outputText value="Settled By"/>
                                                </td>
                                                <td class="text-end">
                                                    <h:outputText value="#{financialTransactionController.currentBill.fromWebUser.webUserPerson.name}"/>
                                                </td>
                                            </tr>
                                            <tr><td colspan="2"><hr/></td></tr>
                                            <tr>
                                                <td>
                                                    <h:outputText value="Proof Missing Bill No."/>
                                                </td>
                                                <td class="text-end">
                                                    <h:outputText value="#{financialTransactionController.selectedBill.idStr}"/>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>
                                                    <h:outputText value="Total Proof Missing"/>
                                                </td>
                                                <td class="text-end">
                                                    <h:outputText value="#{financialTransactionController.selectedBill.total}">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </td>
                                            </tr>
                                            <tr><td colspan="2"><hr/></td></tr>
                                            <tr>
                                                <td class="fw-bold">
                                                    <h:outputText value="Amount Settled"/>
                                                </td>
                                                <td class="text-end fw-bold">
                                                    <h:outputText value="#{financialTransactionController.currentPayment.paidValue}">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </td>
                                            </tr>
                                            <tr><td colspan="2"><hr/></td></tr>
                                            <tr>
                                                <td colspan="2" class="text-center fw-bold text-success">
                                                    <h:outputText value="*** SETTLED ***"/>
                                                </td>
                                            </tr>
                                        </table>

                                        <div class="text-center mt-3">
                                            <h:outputText value="#{financialTransactionController.currentBill.comments}"
                                                          rendered="#{not empty financialTransactionController.currentBill.comments}"
                                                          styleClass="d-block mt-1 fst-italic"/>
                                        </div>
                                    </div>
                                </div>
                            </h:panelGroup>
                        </p:panel>
                    </h:panelGroup>
                    <h:panelGroup layout="block"
                                  rendered="#{empty sessionController.institution
                                              or empty financialTransactionController.currentBill
                                              or empty financialTransactionController.currentPayment
                                              or empty financialTransactionController.selectedBill}">
                        <p:panel header="Proof Missing Settlement Receipt">
                            <p:messages/>
                            <h:outputText value="No settlement receipt context." styleClass="d-block mb-3"/>
                        </p:panel>
                    </h:panelGroup>
                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
