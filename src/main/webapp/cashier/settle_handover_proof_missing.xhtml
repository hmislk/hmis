<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/cashier/index.xhtml">
            <ui:define name="subcontent">
                <h:form>
                    <h:panelGroup layout="block"
                                  rendered="#{not empty financialTransactionController.selectedBill
                                              and not empty financialTransactionController.currentPayment
                                              and not empty financialTransactionController.currentBill
                                              and webUserController.hasPrivilege('SettleHandoverProofMissing')}">
                        <p:panel>
                            <f:facet name="header">
                                <div class="d-flex align-items-center justify-content-between">
                                    <div>
                                        <i class="fa fa-file-alt me-2"/>
                                        <h:outputText value="Settle Handover Proof Missing"/>
                                    </div>
                                </div>
                            </f:facet>

                            <div class="row g-3 mb-3">
                                <div class="col-md-4">
                                    <h:outputText value="Proof Missing Bill No." styleClass="fw-medium mb-1 d-block"/>
                                    <h:outputText value="#{financialTransactionController.selectedBill.idStr}" styleClass="fw-bold"/>
                                </div>
                                <div class="col-md-4">
                                    <h:outputText value="Total Proof Missing Value" styleClass="fw-medium mb-1 d-block"/>
                                    <h:outputText value="#{financialTransactionController.selectedBill.total}" styleClass="fw-bold text-warning">
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputText>
                                </div>
                                <div class="col-md-4">
                                    <h:outputText value="Cashier" styleClass="fw-medium mb-1 d-block"/>
                                    <h:outputText value="#{financialTransactionController.selectedBill.fromWebUser.webUserPerson.nameWithTitle}" styleClass="fw-bold"/>
                                </div>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <h:outputText value="Settlement Amount" styleClass="fw-medium mb-1 d-block"/>
                                    <p:inputText
                                        id="txtSettlementAmount"
                                        styleClass="w-100 text-end"
                                        onfocus="this.select();"
                                        value="#{financialTransactionController.currentPayment.paidValue}"/>
                                </div>
                                <div class="col-md-6">
                                    <h:outputText value="Resolution Notes" styleClass="fw-medium mb-1 d-block"/>
                                    <p:inputTextarea
                                        id="txtSettlementComments"
                                        styleClass="w-100"
                                        rows="3"
                                        value="#{financialTransactionController.currentBill.comments}"/>
                                </div>
                            </div>

                            <div class="text-end">
                                <p:commandButton
                                    icon="fa fa-check"
                                    styleClass="ui-button-success"
                                    value="Confirm Settlement"
                                    ajax="false"
                                    action="#{financialTransactionController.settleHandoverProofMissingBill()}"/>
                            </div>
                        </p:panel>
                    </h:panelGroup>
                    <h:panelGroup layout="block"
                                  rendered="#{not webUserController.hasPrivilege('SettleHandoverProofMissing')}">
                        <p:panel header="Settle Handover Proof Missing">
                            <p:messages/>
                            <h:outputText value="You do not have the required privilege to settle a proof missing bill." styleClass="d-block mb-3 text-danger"/>
                        </p:panel>
                    </h:panelGroup>
                    <h:panelGroup layout="block"
                                  rendered="#{webUserController.hasPrivilege('SettleHandoverProofMissing')
                                              and (empty financialTransactionController.selectedBill
                                              or empty financialTransactionController.currentPayment
                                              or empty financialTransactionController.currentBill)}">
                        <p:panel header="Settle Handover Proof Missing">
                            <p:messages/>
                            <h:outputText value="No settlement context - please navigate from the proof missing bill list." styleClass="d-block mb-3"/>
                        </p:panel>
                    </h:panelGroup>
                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
