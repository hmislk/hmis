<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:body>
        <ui:composition template="/opd/analytics/index.xhtml">
            <ui:define name="subcontent">
                <h:form>
                    <p:panel  header="OPD Bill Item">
                        <div class="row">
                            <div class="col-md-12">
                                <h:panelGrid columns="2" styleClass="w-100 form-grid" columnClasses="label-icon-column, input-column">
                                    <h:panelGroup layout="block" styleClass="form-group">
                                        <h:outputText value="&#xf073;" styleClass="fa ml-5" />
                                        <h:outputLabel value="From" for="fromDate" class="mx-3"/>
                                    </h:panelGroup>
                                    <p:calendar
                                        styleClass="w-100"
                                        inputStyleClass="w-100 form-control"
                                        id="fromDate"
                                        value="#{searchController.fromDate}"
                                        pattern="#{sessionController.applicationPreference.longDateTimeFormat}"
                                        />
                                    <h:panelGroup layout="block" styleClass="form-group">
                                        <h:outputText value="&#xf073;" styleClass="fa mr-2" />
                                        <h:outputLabel value="To" for="toDate" class="mx-3"/>
                                    </h:panelGroup>
                                    <p:calendar
                                        styleClass="w-100"
                                        inputStyleClass="w-100 form-control"
                                        id="toDate"
                                        value="#{searchController.toDate}"
                                        navigator="false"
                                        pattern="#{sessionController.applicationPreference.longDateTimeFormat}"
                                        />

                                    <h:panelGroup layout="block" styleClass="form-group">
                                        <h:outputText value="&#xf19c;" styleClass="fa mr-2" />
                                        <h:outputLabel value="Institution" for="cmbIns" class="mx-3"/>
                                    </h:panelGroup>
                                    <p:selectOneMenu
                                        id="cmbIns"
                                        styleClass="w-100 form-control"
                                        value="#{searchController.institution}"
                                        filter="true">
                                        <f:selectItem itemLabel="All Institutions" />
                                        <f:selectItems value="#{institutionController.companies}" var="ins" itemLabel="#{ins.name}" itemValue="#{ins}" />
                                        <p:ajax process="cmbIns" update="cmbDept" />
                                    </p:selectOneMenu>

                                    <h:panelGroup layout="block" styleClass="form-group">
                                        <h:outputText value="&#xf0e8;" styleClass="fa mr-2" />
                                        <h:outputLabel value="Department" for="cmbDept" class="mx-3"/>
                                    </h:panelGroup>
                                    <p:selectOneMenu
                                        id="cmbDept"
                                        styleClass="w-100 form-control"
                                        value="#{searchController.department}"
                                        filter="true">
                                        <f:selectItem itemLabel="All Departments" />
                                        <f:selectItems value="#{departmentController.getInsDepartments(searchController.institution)}" var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                    </p:selectOneMenu>

                                    <h:panelGroup layout="block" styleClass="form-group">
                                        <h:outputText value="&#xf3c5;" styleClass="fa mr-2" />
                                        <h:outputLabel value="Site" for="siteMenu" class="mx-3"/>
                                    </h:panelGroup>
                                    <p:selectOneMenu
                                        id="siteMenu"
                                        styleClass="w-100 form-control"
                                        value="#{searchController.site}"
                                        filter="true">
                                        <f:selectItem itemLabel="All Sites" />
                                        <f:selectItems value="#{institutionController.sites}" var="site" itemLabel="#{site.name}" itemValue="#{site}" />
                                    </p:selectOneMenu>

                                    <h:panelGroup layout="block" styleClass="form-group">
                                        <h:outputText title="Category" value="&#xf02d;" styleClass="fa mr-2" />
                                        <h:outputLabel value="Category"  class="mx-3"/>
                                    </h:panelGroup>
                                    <p:autoComplete value="#{searchController.category}"
                                                    completeMethod="#{categoryController.completeCategoryServiceInvestigation}"
                                                    var="category"
                                                    class="w-100"
                                                    inputStyleClass="w-100"
                                                    itemLabel="#{category.name}"
                                                    itemValue="#{category}">
                                    </p:autoComplete>

                                    <h:panelGroup layout="block" styleClass="form-group">
                                        <h:outputText title="Item" value="&#xf0f6;" styleClass="fa mr-2" />
                                        <h:outputLabel value="Item"  class="mx-3"/>
                                    </h:panelGroup>
                                    <p:autoComplete value="#{searchController.item}"
                                                    class="w-100"
                                                    inputStyleClass="w-100"
                                                    completeMethod="#{itemController.completeAllServicesAndInvestigations}"
                                                    var="item"
                                                    itemLabel="#{item.name}"
                                                    itemValue="#{item}">
                                    </p:autoComplete>

                                </h:panelGrid>

                                <p:commandButton id="btnSearch" class="m-1 ui-button-info"
                                                 icon="fas fa-list-alt"
                                                 ajax="false" value="List"
                                                 action="#{searchController.generateOpdServicesByBillItem()}" />

                                <p:commandButton id="btnBack" class="m-1 ui-button-secondary"
                                                 icon="fas fa-arrow-left"
                                                 value="Back"
                                                 action="#{searchController.navigateBack()}" />

                                <p:commandButton value="Excel" class="m-1 ui-button-success"
                                                 icon="fas fa-file-excel"
                                                 ajax="false">
                                    <p:dataExporter type="xlsx" target="tblBills" fileName="Bill Item Report" />
                                </p:commandButton>

                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-12">
                                <p:dataTable
                                    rowIndexVar="i"
                                    id="tblBillsDisplay"
                                    value="#{searchController.opdBillItemDtos}"
                                    var="dto"
                                    rows="10"
                                    rowKey="#{dto.billItemId}"
                                    paginatorPosition="bottom"
                                    paginator="true"
                                    class="w-100"
                                    paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                    rowsPerPageTemplate="5,10,15"
                                    >

                                    <p:column headerText="No" width="40px;">
                                        <h:outputLabel value="#{i+1}"/>
                                    </p:column>

                                    <p:column headerText="Bill No" sortBy="#{dto.deptId}" filterBy="#{dto.deptId}" filterMatchMode="contains">
                                        <h:outputLabel value="#{dto.deptId}"/>
                                        <p:commandButton icon="pi pi-wallet" styleClass="m-1" ajax="false" title="Manage Bill"
                                                         action="#{billSearch.navigateToManageBillByAtomicBillTypeByBillId(dto.billId)}"/>
                                        <p:commandButton icon="pi pi-list" styleClass="m-1" ajax="false" title="Manage Batch Bill"
                                                         rendered="#{dto.backwardReferenceBillId ne null}"
                                                         action="#{billSearch.navigateToManageBillByAtomicBillTypeByBillId(dto.backwardReferenceBillId)}"/>
                                        <p:commandButton icon="pi pi-search" styleClass="m-1" ajax="false" title="View Bill"
                                                         action="#{billSearch.navigateToViewBillByAtomicBillTypeByBillId(dto.billId)}"/>
                                        <p:commandButton icon="pi pi-search-plus" styleClass="m-1" ajax="false" title="View Batch Bill"
                                                         rendered="#{dto.backwardReferenceBillId ne null}"
                                                         action="#{billSearch.navigateToViewBillByAtomicBillTypeByBillId(dto.backwardReferenceBillId)}"/>
                                        <p:commandButton
                                            title="Admin"
                                            icon="fa fa-shield-alt"
                                            class="m-1 ui-button-danger"
                                            action="#{billSearch.navigateToAdminBillByAtomicBillTypeByBillId(dto.billId)}"
                                            ajax="false"
                                            rendered="#{webUserController.hasPrivilege('Developers')}">
                                            #{dto.billId}
                                        </p:commandButton>
                                    </p:column>

                                    <p:column headerText="Institution" sortBy="#{dto.toInstitutionName}" filterBy="#{dto.toInstitutionName}" filterMatchMode="contains">
                                        <h:outputLabel value="#{dto.toInstitutionName}"/>
                                    </p:column>

                                    <p:column headerText="Credit Company" sortBy="#{dto.creditCompanyName}" filterBy="#{dto.creditCompanyName}" filterMatchMode="contains">
                                        <h:outputLabel value="#{dto.creditCompanyName}"/>
                                    </p:column>

                                    <p:column headerText="Patient" sortBy="#{dto.patientName}" filterBy="#{dto.patientName}" filterMatchMode="contains">
                                        <h:outputLabel value="#{dto.patientNameWithTitle}"/>
                                        <br/>
                                        <h:outputLabel value="#{dto.patientAgeAsString}"/>
                                        <br/>
                                        <h:outputLabel value="#{dto.patientSex}"/>
                                        <br/>
                                        <h:outputLabel value="#{dto.patientPhone}"/>
                                    </p:column>

                                    <p:column headerText="Category" sortBy="#{dto.categoryName}" filterBy="#{dto.categoryName}" filterMatchMode="contains">
                                        <h:outputLabel value="#{dto.categoryName}"/>
                                    </p:column>

                                    <p:column headerText="Bill Type"
                                              rendered="#{webUserController.hasPrivilege('Developers')}"
                                              sortBy="#{dto.billTypeAtomic}"
                                              filterBy="#{dto.billTypeAtomic}" filterMatchMode="contains">
                                        <h:outputLabel value="#{dto.billTypeAtomic}"/>
                                    </p:column>

                                    <p:column headerText="Investigation or Service" sortBy="#{dto.itemName}" filterBy="#{dto.itemName}" filterMatchMode="contains">
                                        <h:outputLabel value="#{dto.itemName}"/>
                                    </p:column>

                                    <p:column headerText="Billed At" sortBy="#{dto.billedAt}">
                                        <h:outputLabel value="Billed at "/>
                                        <h:outputLabel value="#{dto.billedAt}">
                                            <f:convertDateTime timeZone="Asia/Colombo" pattern="#{sessionController.applicationPreference.shortDateTimeFormat}"/>
                                        </h:outputLabel>
                                        <br/>
                                        <h:panelGroup rendered="#{dto.cancelled}">
                                            <h:outputLabel style="color: red;" value="Cancelled at "/>
                                            <h:outputLabel style="color: red;" value="#{dto.cancelledAt}">
                                                <f:convertDateTime timeZone="Asia/Colombo" pattern="#{sessionController.applicationPreference.shortDateTimeFormat}"/>
                                            </h:outputLabel>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{dto.refunded}">
                                            <h:outputLabel style="color: red;" value="Refunded at "/>
                                            <h:outputLabel style="color: red;" value="#{dto.refundedAt}">
                                                <f:convertDateTime timeZone="Asia/Colombo" pattern="#{sessionController.applicationPreference.shortDateTimeFormat}"/>
                                            </h:outputLabel>
                                        </h:panelGroup>
                                    </p:column>

                                    <p:column headerText="Billed By" sortBy="#{dto.billedByName}" filterBy="#{dto.billedByName}" filterMatchMode="contains">
                                        <h:outputLabel value="#{dto.billedByName}"/>
                                        <br/>
                                        <h:panelGroup rendered="#{dto.cancelled}">
                                            <h:outputLabel style="color: red;" value="Cancelled By "/>
                                            <h:outputLabel style="color: red;" value="#{dto.cancelledByName}"/>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{dto.refunded}">
                                            <h:outputLabel style="color: red;" value="Refunded By "/>
                                            <h:outputLabel style="color: red;" value="#{dto.refundedByName}"/>
                                        </h:panelGroup>
                                    </p:column>

                                    <p:column headerText="Payment Method" sortBy="#{dto.paymentMethod}" filterBy="#{dto.paymentMethod}" filterMatchMode="contains">
                                        <h:outputLabel value="#{dto.paymentMethod}"/>
                                    </p:column>

                                    <p:column headerText="Discount Scheme" sortBy="#{dto.paymentSchemeName}" filterBy="#{dto.paymentSchemeName}" filterMatchMode="contains">
                                        <h:outputLabel value="#{dto.paymentSchemeName}"/>
                                    </p:column>

                                    <p:column headerText="Gross Value*" sortBy="#{dto.grossValue}" filterBy="#{dto.grossValue}" filterMatchMode="gte">
                                        <h:outputLabel value="#{dto.grossValue}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputLabel>
                                    </p:column>

                                    <p:column headerText="Discount*" sortBy="#{dto.discount}" filterBy="#{dto.discount}" filterMatchMode="gte">
                                        <h:outputLabel value="#{dto.discount}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputLabel>
                                    </p:column>

                                    <p:column headerText="Net Value*" sortBy="#{dto.netValue}" filterBy="#{dto.netValue}" filterMatchMode="gte">
                                        <h:outputLabel value="#{dto.netValue}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputLabel>
                                    </p:column>

                                    <p:column headerText="Doctor" sortBy="#{dto.doctorName}" filterBy="#{dto.doctorName}" filterMatchMode="contains">
                                        <p:outputLabel value="#{dto.doctorNameWithTitle}"/>
                                    </p:column>

                                </p:dataTable>
                            </div>
                        </div>

                        <!-- Hidden table for Excel export -->
                        <p:dataTable
                            style="display: none;"
                            rowIndexVar="i"
                            id="tblBills"
                            value="#{searchController.opdBillItemDtos}"
                            var="dto"
                            rows="10"
                            rowKey="#{dto.billItemId}"
                            paginator="true"
                            class="w-100">

                            <p:column headerText="No">
                                <h:outputLabel value="#{i+1}"/>
                            </p:column>

                            <p:column headerText="Bill No">
                                <h:outputLabel value="#{dto.deptId}"/>
                            </p:column>

                            <p:column headerText="Bill Type Atomic">
                                <h:outputLabel value="#{dto.billTypeAtomic}"/>
                            </p:column>

                            <p:column headerText="Bill Class Type">
                                <h:outputLabel value="#{dto.billClassType}"/>
                            </p:column>

                            <p:column headerText="Institution Name">
                                <h:outputLabel value="#{dto.toInstitutionName}"/>
                            </p:column>

                            <p:column headerText="Credit Company">
                                <h:outputLabel value="#{dto.creditCompanyName}"/>
                            </p:column>

                            <p:column headerText="Patient Name">
                                <h:outputLabel value="#{dto.patientNameWithTitle}"/>
                            </p:column>

                            <p:column headerText="Patient Age">
                                <h:outputLabel value="#{dto.patientAgeAsString}"/>
                            </p:column>

                            <p:column headerText="Patient Sex">
                                <h:outputLabel value="#{dto.patientSex}"/>
                            </p:column>

                            <p:column headerText="Patient Phone">
                                <h:outputLabel value="#{dto.patientPhone}"/>
                            </p:column>

                            <p:column headerText="Category">
                                <h:outputLabel value="#{dto.categoryName}"/>
                            </p:column>

                            <p:column headerText="Investigation or Service">
                                <h:outputLabel value="#{dto.itemName}"/>
                            </p:column>

                            <p:column headerText="Billed At">
                                <h:outputLabel value="#{dto.billedAt}">
                                    <f:convertDateTime timeZone="Asia/Colombo" pattern="#{sessionController.applicationPreference.shortDateTimeFormat}"/>
                                </h:outputLabel>
                            </p:column>

                            <p:column headerText="Billed By">
                                <h:outputLabel value="#{dto.billedByName}"/>
                            </p:column>

                            <p:column headerText="Cancelled At">
                                <h:outputLabel style="color: red;" rendered="#{dto.cancelled}" value="#{dto.cancelledAt}">
                                    <f:convertDateTime timeZone="Asia/Colombo" pattern="#{sessionController.applicationPreference.shortDateTimeFormat}"/>
                                </h:outputLabel>
                            </p:column>

                            <p:column headerText="Cancelled By">
                                <h:outputLabel style="color: red;" rendered="#{dto.cancelled}" value="#{dto.cancelledByName}"/>
                            </p:column>

                            <p:column headerText="Refunded At">
                                <h:outputLabel style="color: red;" rendered="#{dto.refunded}" value="#{dto.refundedAt}">
                                    <f:convertDateTime timeZone="Asia/Colombo" pattern="#{sessionController.applicationPreference.shortDateTimeFormat}"/>
                                </h:outputLabel>
                            </p:column>

                            <p:column headerText="Refunded By">
                                <h:outputLabel style="color: red;" rendered="#{dto.refunded}" value="#{dto.refundedByName}"/>
                            </p:column>

                            <p:column headerText="Payment Method">
                                <h:outputLabel value="#{dto.paymentMethod}"/>
                            </p:column>

                            <p:column headerText="Discount Scheme">
                                <h:outputLabel value="#{dto.paymentSchemeName}"/>
                            </p:column>

                            <p:column headerText="Gross Value">
                                <h:outputLabel value="#{dto.grossValue}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputLabel>
                            </p:column>

                            <p:column headerText="Discount">
                                <h:outputLabel value="#{dto.discount}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputLabel>
                            </p:column>

                            <p:column headerText="Net Value">
                                <h:outputLabel value="#{dto.netValue}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputLabel>
                            </p:column>

                            <p:column headerText="Doctor">
                                <p:outputLabel value="#{dto.doctorNameWithTitle}"/>
                            </p:column>

                        </p:dataTable>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
