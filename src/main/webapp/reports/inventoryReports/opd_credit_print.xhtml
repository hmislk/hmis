<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">

                <h:form >
                    <p:panel header="OPD Credit Report Print" styleClass="w-100">
                        <f:facet name="header"  >
                            <div class="d-flex justify-content-between">
                                <h:outputText value="OPD Credit Report Print" class="mt-2"/>
                                <div class="d-flex gap-2">
                                    <p:commandButton 
                                        icon="fa-solid fa-print"
                                        class="ui-button-info"
                                        style="width: 150px"
                                        ajax="false" 
                                        value="Print">
                                        <p:printer target="reportView" />
                                    </p:commandButton>
                                    <p:commandButton 
                                        ajax="false" 
                                        value="Back to Report" 
                                        style="width: 200px"
                                        icon="fa fa-arrow-left"
                                        class="ui-button-warning"
                                        action="opd_credit?faces-redirect=true" >
                                    </p:commandButton>
                                </div>

                            </div>
                        </f:facet>

                        <style>

                            @media screen{
                                .paper{
                                    width: 297mm;
                                    margin: auto;
                                    zoom: 1.8;
                                }

                                table{
                                    border-collapse: collapse;
                                    width: 99.9%;
                                    table-layout: fixed;
                                    font-size: 11px;
                                }

                                th, td{
                                    border: 1px solid #000;
                                    padding: 2px 3px;
                                    text-align: left;
                                    word-wrap: break-word;
                                }

                                th{
                                    font-weight: bold;
                                }

                                .header{
                                    font-size: 13px;
                                    text-align: center;
                                }

                                tfoot{
                                    font-weight: bold;
                                }
                            }



                            @media print{

                                @page{
                                    size: A4 landscape;
                                    margin: 8mm;
                                }

                                body{
                                    margin:0;
                                    padding:0;
                                }

                                .paper{
                                    width: 100%;
                                }

                                table{
                                    border-collapse: collapse;
                                    width: 99.9%;
                                    table-layout: fixed;
                                    font-size: 11px;
                                }

                                th, td{
                                    border: 1px solid #000;
                                    padding: 2px;
                                    text-align: left;
                                    word-break: break-word;
                                }

                                th{
                                    font-weight: bold;
                                }

                                .header{
                                    font-size: 12px;
                                    text-align: center;
                                    margin-bottom: 4px;
                                }

                                tfoot{
                                    font-weight: bold;
                                    font-size: 12px;
                                }

                            }
                        </style>

                        <h:panelGroup id="reportView" class="d-flex justify-content-center">
                            <div class="paper">
                                <div class="header" >

                                    <!-- Institution -->
                                    <h:panelGroup layout="block"
                                                  styleClass="d-flex justify-content-center text-5 gap-2"
                                                  style="font-weight: 700; font-size: 22px;"
                                                  rendered="#{not empty pharmacyReportController.institution}">
                                        <h:outputText value="#{pharmacyReportController.institution.name}" />
                                    </h:panelGroup>

                                    <!-- Site -->
                                    <h:panelGroup layout="block"
                                                  styleClass="d-flex justify-content-center text-5 gap-2"
                                                  style="font-weight: 700; font-size: 16px;"
                                                  rendered="#{not empty pharmacyReportController.site}">
                                        <h:outputText value="#{pharmacyReportController.site.name}" />
                                    </h:panelGroup>

                                    <!-- Department -->
                                    <h:panelGroup layout="block"
                                                  styleClass="d-flex justify-content-center text-5 gap-2"
                                                  style="font-weight: 700; font-size: 14px;"
                                                  rendered="#{not empty pharmacyReportController.department}">
                                        <h:outputText value="#{pharmacyReportController.department.name}" />
                                    </h:panelGroup>

                                    <div class="text-center" style="font-size:11px; margin-top:5px;">

                                        From Date :
                                        <h:outputText value="#{pharmacyReportController.fromDate}">
                                            <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                        </h:outputText>

                                        |

                                        To Date :
                                        <h:outputText value="#{pharmacyReportController.toDate}">
                                            <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                        </h:outputText>

                                    </div>

                                    <div class="text-center" style="font-size:11px; margin-top:5px;">
                                        Department Type :
                                        <h:outputText value="#{pharmacyReportController.departmentTypeFilterValue}" />
                                    </div>                                

                                    <!-- Report Name -->
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 12px; margin-top:5px; margin-bottom: 5px;">
                                        <h:outputText value="OPD Credit Report" />
                                    </div>

                                </div>

                                <div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th style="font-weight: 700; text-align: left;">
                                                    <h:outputText value="Date" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700; text-align: center;">
                                                    <h:outputText value="Credit Company" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700; text-align: center;">
                                                    <h:outputText value="Item Name" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: left;">
                                                    <h:outputText value="Doc No" style="margin-left:  1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: left;">
                                                    <h:outputText value="Code" style="margin-left:  1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: left;">
                                                    <h:outputText value="Batch Code" style="margin-left:  1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="QTY" style="margin-left:  1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Rate" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Gross Value" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Discount" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Net Value" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Bill Net Total" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Bill Discount" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Cost Rate" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Cost Value" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Sale Rate" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style=" font-weight: 700; text-align: center;">
                                                    <h:outputText value="Sale Value" style="margin-right: 1mm;"/>
                                                </th>
                                                
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <ui:repeat value="#{pharmacyReportController.billItems}" var="f" varStatus="i">
                                                <tr>
                                                    <td style=" text-align: left;" >
                                                        <h:outputText value="#{f.bill.createdAt}" >
                                                            <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: left;">
                                                        <h:outputText value="#{f.bill.toInstitution.name}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style=" text-align: left;">
                                                        <h:outputText value="#{f.item.name}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style=" text-align: left;">
                                                        <h:outputText value="#{f.bill.deptId}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style=" text-align: left;">
                                                        <h:outputText value="#{f.item.code}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style=" text-align: left;">
                                                        <h:outputText value="#{f.pharmaceuticalBillItem.itemBatch.batchNo}" style="margin-left: 1mm;"/>
                                                    </td>    
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.qty}"  style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.rate}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.grossValue}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.discount}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.netValue}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.bill.netTotal}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.bill.discount}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.pharmaceuticalBillItem.itemBatch.costRate}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.pharmaceuticalBillItem.itemBatch.costRate * f.qty}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.pharmaceuticalBillItem.retailRate}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style=" text-align: right;">
                                                        <h:outputText value="#{f.pharmaceuticalBillItem.retailRate * f.qty}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    
                                                </tr>
                                            </ui:repeat>
                                        </tbody>
                                        <tfoot>
                                            <tr>
                                                <td style=" text-align: left;" >
                                                    <h:outputLabel value="Total" style="margin-left:1mm;font-weight: bold;" />
                                                </td>
                                                <td style=" text-align: left;"/>
                                                <td style=" text-align: left;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;">
                                                    <h:outputText value="#{pharmacyReportController.netTotal}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;">
                                                    <h:outputText value="#{pharmacyReportController.totalCostValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                <td style=" text-align: right;"/>
                                                <td style=" text-align: right;">
                                                    <h:outputText value="#{pharmacyReportController.totalSaleValue}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                
                                            </tr>
                                        </tfoot>
                                    </table>

                                </div>

                            </div>
                        </h:panelGroup>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
