<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:body>
    <ui:composition template="/reports/index.xhtml">
        <ui:define name="subcontent">
            <h:form>
                <p:panel header="Slow/Fast/None Movement Report">
                    <h:panelGrid columns="8" class="w-100">
                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText value="&#xf073;" styleClass="fa mr-2"/>
                            <p:outputLabel value="From Date" for="fromDate" class="m-3">
                            </p:outputLabel>
                        </h:panelGroup>
                        <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="fromDate"
                                value="#{pharmacyReportController.fromDate}"
                                navigator="false"
                                pattern="#{sessionController.applicationPreference.longDateFormat}"
                        />

                        <p:spacer width="20"/>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText value="&#xf073;" styleClass="fa mr-2"/>
                            <p:outputLabel value="To Date" for="toDate" class="m-3">
                            </p:outputLabel>
                        </h:panelGroup>
                        <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="toDate"
                                value="#{pharmacyReportController.toDate}"
                                navigator="false"
                                pattern="#{sessionController.applicationPreference.longDateFormat}"
                        />

                        <p:spacer width="20"/>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText value="&#xf073;" styleClass="fa mr-2"/>
                            <p:outputLabel value="Date Range" for="phmDateRange" class="m-3"/>
                        </h:panelGroup>
                        <p:selectOneMenu
                                id="phmDateRange"
                                styleClass="w-100"
                                value="#{pharmacyReportController.dateRange}">
                            <f:selectItem itemLabel="Select" itemValue=""/>
                            <f:selectItem itemLabel="Within 3 Months" itemValue="within3months"/>
                            <f:selectItem itemLabel="Within 6 Months" itemValue="within6months"/>
                            <f:selectItem itemLabel="Within 12 Months" itemValue="within12months"/>
                            <p:ajax
                                    event="change"
                                    listener="#{pharmacyReportController.updateDateRange}"
                                    update="fromDate toDate"/>
                        </p:selectOneMenu>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText styleClass="fa fa-university mr-2"/>
                            <p:outputLabel value="Institution" for="phmIns" class="m-3">
                            </p:outputLabel>
                        </h:panelGroup>
                        <p:selectOneMenu
                                id="phmIns"
                                class="w-100"
                                value="#{pharmacyReportController.institution}"
                                filter="true">
                            <f:selectItem itemLabel="All Institutions"/>
                            <f:selectItems
                                    value="#{institutionController.companies}"
                                    var="ins"
                                    itemLabel="#{ins.name}"
                                    itemValue="#{ins}"/>
                            <p:ajax process="phmIns" update="phmDept"/>
                        </p:selectOneMenu>

                        <p:spacer width="20"/>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText styleClass="fa fa-map-marker-alt mr-2"/>
                            <p:outputLabel value="Site" for="phmSite" class="m-3"/>
                        </h:panelGroup>
                        <p:selectOneMenu
                                id="phmSite"
                                class="w-100"
                                value="#{pharmacyReportController.site}"
                                filter="true">
                            <f:selectItem itemLabel="All Sites"/>
                            <f:selectItems value="#{institutionController.sites}" var="site" itemLabel="#{site.name}"
                                           itemValue="#{site}"/>
                            <p:ajax process="phmSite" update="phmDept"/>
                        </p:selectOneMenu>

                        <p:spacer width="20"/>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText styleClass="fa fa-building mr-2"/>
                            <p:outputLabel value="Department" for="phmDept" class="m-3">
                            </p:outputLabel>
                        </h:panelGroup>
                        <h:panelGroup id="phmDept">

                            <!-- Component 1: Without Institution and Site -->
                            <p:selectOneMenu

                                    rendered="#{pharmacyReportController.institution eq null and pharmacyReportController.site eq null}"
                                    styleClass="w-100 form-control"
                                    value="#{pharmacyReportController.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                <f:selectItem itemLabel="All Departments"/>
                                <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite()}"
                                        var="dept"
                                        itemLabel="#{dept.name}"
                                        itemValue="#{dept}"/>
                            </p:selectOneMenu>

                            <!-- Component 2: With Site Only -->
                            <p:selectOneMenu

                                    rendered="#{pharmacyReportController.institution eq null and pharmacyReportController.site ne null}"
                                    styleClass="w-100 form-control"
                                    value="#{pharmacyReportController.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                <f:selectItem itemLabel="All Departments"/>
                                <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite(pharmacyReportController.site)}"
                                        var="dept"
                                        itemLabel="#{dept.name}"
                                        itemValue="#{dept}"/>
                            </p:selectOneMenu>

                            <!-- Component 3: With Institution Only -->
                            <p:selectOneMenu

                                    rendered="#{pharmacyReportController.institution ne null and pharmacyReportController.site eq null}"
                                    styleClass="w-100 form-control"
                                    value="#{pharmacyReportController.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                <f:selectItem itemLabel="All Departments"/>
                                <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite(pharmacyReportController.institution)}"
                                        var="dept"
                                        itemLabel="#{dept.name}"
                                        itemValue="#{dept}"/>
                            </p:selectOneMenu>

                            <!-- Component 4: With Both Institution and Site -->
                            <p:selectOneMenu

                                    rendered="#{pharmacyReportController.institution ne null and pharmacyReportController.site ne null}"
                                    styleClass="w-100 form-control"
                                    value="#{pharmacyReportController.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                <f:selectItem itemLabel="All Departments"/>
                                <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite(pharmacyReportController.institution, pharmacyReportController.site)}"
                                        var="dept"
                                        itemLabel="#{dept.name}"
                                        itemValue="#{dept}"/>
                            </p:selectOneMenu>
                        </h:panelGroup>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText styleClass="fa fa-tags mr-2"/>
                            <p:outputLabel value="Item Category" for="phmCategory" class="m-3">
                            </p:outputLabel>
                        </h:panelGroup>
                        <p:selectOneMenu
                                id="phmCategory"
                                value="#{pharmacyReportController.category}"
                                filter="true"
                                class="w-100 ">
                            <f:selectItem itemLabel="All Categories"/>
                            <f:selectItems
                                    value="#{pharmaceuticalItemCategoryController.items}"
                                    var="category"
                                    itemLabel="#{category.name}"
                                    itemValue="#{category}"/>
                            <p:ajax process="phmCategory" update="phmItem"/>
                        </p:selectOneMenu>

                        <p:spacer width="20"/>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText styleClass="fa fa-capsules ml-5"/>
                            <p:outputLabel value="Dosage Form" for="phmDf" class="mx-3">
                            </p:outputLabel>
                        </h:panelGroup>
                        <p:selectOneMenu
                            id="phmDf"
                            value="#{pharmacyReportController.dosageForm}"
                            class="w-100"
                            filter="true"
                            filterMatchMode="contains">
                            <f:selectItem itemLabel="All Dosage Forms"/>
                            <f:selectItems value="#{dosageFormController.items}" var="df" itemLabel="#{df.name}" itemValue="#{df}"/>
                        </p:selectOneMenu>

                        <p:spacer width="20"/>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText styleClass="fa fa-building mr-2"/>
                            <p:outputLabel value="Department Type" for="departmentTypeFilter" class="m-3"/>
                        </h:panelGroup>
                        <h:panelGroup layout="block" styleClass="form-group">
                            <p:selectCheckboxMenu
                                id="departmentTypeFilter"
                                value="#{pharmacyReportController.selectedDepartmentTypes}"
                                label="Select Department Types"
                                class="w-100"
                                filter="true"
                                filterMatchMode="contains"
                                showHeader="true"
                                scrollHeight="200"
                                title="Select one or more department types to filter results. Leave empty to include all.">
                                <f:selectItems
                                    value="#{pharmacyReportController.availableDepartmentTypes}"
                                    var="depType"
                                    itemLabel="#{depType.label}"
                                    itemValue="#{depType}"/>
                            </p:selectCheckboxMenu>
                        </h:panelGroup>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText styleClass="fa fa-box mr-2"/>
                            <p:outputLabel value="Item" for="phmItem" class="m-3">
                            </p:outputLabel>
                        </h:panelGroup>
                        <p:autoComplete
                                id="phmItem"
                                value="#{pharmacyReportController.selectedAmpDto}"
                                completeMethod="#{itemController.completeAmpItemDto}"
                                converter="ampDtoConverter"
                                var="item"
                                class="w-100"
                                minQueryLength="3"
                                maxResults="20"
                                inputStyleClass="w-100"
                                itemLabel="#{item.name}"
                                itemValue="#{item}">
                                <p:column headerText="Name">
                                    <h:outputText value="#{item.name}"/>
                                </p:column>
                                <p:column headerText="Code">
                                    <h:outputText value="#{item.code}"/>
                                </p:column>
                                <p:column headerText="Dept. Type">
                                    <h:outputText value="#{item.departmentTypeLabel}"/>
                                </p:column>
                                <p:column headerText="Status">
                                    <p:badge value="#{item.inactive ? 'Inactive' : 'Active'}"
                                             severity="#{item.inactive ? 'danger' : 'success'}"
                                             style="font-size: 0.65em;"/>
                                </p:column>
                        </p:autoComplete>

                        <p:spacer width="20"/>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText styleClass="fa fa-file-alt ml-5"/>
                            <p:outputLabel value="Report Type" for="repType" class="mx-2">
                            </p:outputLabel>
                        </h:panelGroup>
                        <p:selectOneMenu
                                id="repType"
                                value="#{pharmacyReportController.reportType}"
                                class="w-100">
                            <f:selectItem itemLabel="Fast Movement" itemValue="fmovement"/>
                            <f:selectItem itemLabel="Slow Movement" itemValue="smovement"/>
                            <f:selectItem itemLabel="Non Movement" itemValue="nmovement"/>
                            <f:selectItems/>
                        </p:selectOneMenu>

                        <p:spacer width="20"/>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText styleClass="fa fa-sort ml-5"/>
                            <p:outputLabel value="Sort Type" for="sortType" class="mx-2">
                            </p:outputLabel>
                        </h:panelGroup>
                        <p:selectOneMenu
                                id="sortType"
                                value="#{pharmacyReportController.sortType}"
                                class="w-100">
                            <f:selectItem itemLabel="By Cost Value" itemValue="byvalue"/>
                            <f:selectItem itemLabel="By Quantity" itemValue="byquantity"/>
                            <f:selectItems/>
                        </p:selectOneMenu>

                        <!-- XHTML View -->
                        <h:outputStylesheet>
                            /* Add custom label text before the Select All checkbox */
                            [id$="billTypes_panel"] .ui-selectcheckboxmenu-header:before {
                                content: " Select All Bill Types";
                                margin-right: .5rem;
                                font-weight: bold; /* optional */
                                color: #333; /* optional */
                            }
                        </h:outputStylesheet>

                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText styleClass="fa fa-receipt"/>
                            <p:outputLabel value="Bill Type" for="billTypes" class="mx-2"/>
                        </h:panelGroup>

                        <p:selectCheckboxMenu
                                id="billTypes"
                                class="w-100"
                                value="#{pharmacyReportController.billTypes}"
                                label="Bill Types">
                            <f:selectItems
                                    value="#{enumController.pharmacyBillTypesForMovementReports}"
                                    var="pbt"
                                    itemLabel="#{pbt.label}"
                                    itemValue="#{pbt}"/>
                        </p:selectCheckboxMenu>

                    </h:panelGrid>

                    <div class="d-flex align-items-center mt-3">
                        <p:commandButton
                                class="ui-button-warning mx-1"
                                icon="fas fa-cogs"
                                ajax="false"
                                value="Process"
                                action="#{pharmacyReportController.processSlowFastNonMovementReport()}">
                        </p:commandButton>
                        
                    </div>

                    <p:panel
                            id="fastmovement"
                            rendered="#{pharmacyReportController.reportType eq 'fmovement'}">
                        <div class="mt-3">
                            <div class="text-center mb-3">
                                <h:outputText value="#{sessionController.institution.name}" styleClass="d-block fw-bold" style="font-size:1.1rem;"/>
                                <h:outputText value="Fast Movement Report" styleClass="d-block fw-bold" style="font-size:1rem;"/>
                            </div>
                            <h:panelGrid columns="6" styleClass="table table-sm table-borderless mb-3" style="font-size:0.8rem;" columnClasses="fw-bold,text-muted,fw-bold,text-muted,fw-bold,text-muted">
                                <h:outputText value="From Date:"/>
                                <h:outputText value="#{pharmacyReportController.fromDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                </h:outputText>
                                <h:outputText value="To Date:"/>
                                <h:outputText value="#{pharmacyReportController.toDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                </h:outputText>
                                <h:outputText value="Date Range:"/>
                                <h:outputText value="#{pharmacyReportController.dateRangeAsString}"/>
                                <h:outputText value="Institution:"/>
                                <h:outputText value="#{pharmacyReportController.institution != null ? pharmacyReportController.institution.name : 'All'}"/>
                                <h:outputText value="Site:"/>
                                <h:outputText value="#{pharmacyReportController.site != null ? pharmacyReportController.site.name : 'All'}"/>
                                <h:outputText value="Department:"/>
                                <h:outputText value="#{pharmacyReportController.department != null ? pharmacyReportController.department.name : 'All'}"/>
                                <h:outputText value="Item Category:"/>
                                <h:outputText value="#{pharmacyReportController.category != null ? pharmacyReportController.category.name : 'All'}"/>
                                <h:outputText value="Dosage Form:"/>
                                <h:outputText value="#{pharmacyReportController.dosageForm != null ? pharmacyReportController.dosageForm.name : 'All'}"/>
                                <h:outputText value="Department Type:"/>
                                <h:outputText value="#{pharmacyReportController.selectedDepartmentTypesString}"/>
                                <h:outputText value="Item:"/>
                                <h:outputText value="#{pharmacyReportController.selectedAmpDto != null ? pharmacyReportController.selectedAmpDto.name : '-'}"/>
                                <h:outputText value="Sort Type:"/>
                                <h:outputText value="#{pharmacyReportController.sortType eq 'byvalue' ? 'By Cost Value' : 'By Quantity'}"/>
                                <h:outputText value="Bill Types:"/>
                                <h:outputText value="#{pharmacyReportController.billTypesForMovementReportAsString}"/>
                            </h:panelGrid>
                            <div class="d-flex gap-2 mb-3">
                                <p:commandButton
                                    class="ui-button-primary mx-1"
                                    icon="fas fa-print"
                                    ajax="false"
                                    action="slow_fast_none_movement_print?faces-redirect=true"
                                    value="To Print">
                                </p:commandButton>
                                <p:commandButton
                                        class="ui-button-success mx-1"
                                        icon="fas fa-file-excel"
                                        ajax="false"
                                        value="Download"
                                        action="#{pharmacyReportController.exportSlowFastMovementReportToExcel()}">
                                </p:commandButton>
                                <p:commandButton
                                        class="ui-button-danger mx-1"
                                        icon="fas fa-file-pdf"
                                        ajax="false"
                                        value="PDF"
                                        action="#{pharmacyReportController.exportSlowFastMovementReportToPDF()}">
                                </p:commandButton>
                            </div>
                            <p:dataTable id="tbl1"
                                         value="#{pharmacyReportController.sortType eq 'byvalue' ? pharmacyReportController.movementRecords : pharmacyReportController.movementRecordsQty }"
                                         var="f"
                                         rowIndexVar="n"
                                         paginator="true"
                                         paginatorPosition="bottom"
                                         rows="10"
                                         paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                         currentPageReportTemplate="Showing {startRecord} to {endRecord} of {totalRecords}"
                                         rowsPerPageTemplate="5,10,15,25,50,100,500,1000">

                                <p:column headerText="Sl No." width="50" styleClass="text-center">
                                    <h:outputText value="#{n+1}"/>
                                </p:column>
                                <p:column headerText="Item Code" width="80">
                                    <h:outputText value="#{f.itemCode}"/>
                                </p:column>
                                <p:column headerText="Item Name">
                                    <h:outputText value="#{f.itemName}"/>
                                </p:column>
                                <p:column headerText="Drug Form">
                                    <h:outputText value="#{f.categoryName}"/>
                                </p:column>
                                <p:column headerText="Dosage Form">
                                    <h:outputText value="#{f.dosageFormName}"/>
                                </p:column>
                                <p:column headerText="Supplier(Last Purchase)">
                                    <h:outputText value="#{f.lastPurchaseSupplierName}"/>
                                </p:column>
                                <p:column headerText="Quantity" width="90" styleClass="text-end">
                                    <h:outputText value="#{f.qty}">
                                        <f:convertNumber pattern="#,###"/>
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Cost Value" width="100" styleClass="text-end">
                                    <h:outputText value="#{f.purchaseValue}">
                                        <f:convertNumber pattern="#,###.00"/>
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Sale Value" width="100" styleClass="text-end">
                                    <h:outputText value="#{f.retailsaleValue}">
                                        <f:convertNumber pattern="#,###.00"/>
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Value of QIH" width="100" styleClass="text-end">
                                    <h:outputText value="#{f.stockQty}">
                                        <f:convertNumber pattern="#,##0.00"></f:convertNumber>
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="QIH" width="80" styleClass="text-end">
                                    <h:outputText value="#{f.stockOnHand}">
                                        <f:convertNumber pattern="#,###"></f:convertNumber>
                                    </h:outputText>
                                </p:column>

                            </p:dataTable>
                            <div class="d-flex justify-content-between mt-3 px-2" style="font-size:0.8rem;">
                                <h:panelGroup>
                                    <h:outputText value="Reported by: " styleClass="fw-bold"/>
                                    <h:outputText value="#{sessionController.loggedUser.name}"/>
                                </h:panelGroup>
                                <h:panelGroup>
                                    <h:outputText value="Printed on: " styleClass="fw-bold"/>
                                    <h:outputText value="#{pharmacyReportController.currentDateTime}">
                                        <f:convertDateTime pattern="dd MMM yyyy hh:mm a"/>
                                    </h:outputText>
                                </h:panelGroup>
                            </div>
                        </div>
                    </p:panel>

                    <p:panel
                            id="slowmovement"
                            rendered="#{pharmacyReportController.reportType eq 'smovement'}">
                        <div class="mt-3">
                            <div class="text-center mb-3">
                                <h:outputText value="#{sessionController.institution.name}" styleClass="d-block fw-bold" style="font-size:1.1rem;"/>
                                <h:outputText value="Slow Movement Report" styleClass="d-block fw-bold" style="font-size:1rem;"/>
                            </div>
                            <h:panelGrid columns="6" styleClass="table table-sm table-borderless mb-3" style="font-size:0.8rem;" columnClasses="fw-bold,text-muted,fw-bold,text-muted,fw-bold,text-muted">
                                <h:outputText value="From Date:"/>
                                <h:outputText value="#{pharmacyReportController.fromDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                </h:outputText>
                                <h:outputText value="To Date:"/>
                                <h:outputText value="#{pharmacyReportController.toDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                </h:outputText>
                                <h:outputText value="Date Range:"/>
                                <h:outputText value="#{pharmacyReportController.dateRangeAsString}"/>
                                <h:outputText value="Institution:"/>
                                <h:outputText value="#{pharmacyReportController.institution != null ? pharmacyReportController.institution.name : 'All'}"/>
                                <h:outputText value="Site:"/>
                                <h:outputText value="#{pharmacyReportController.site != null ? pharmacyReportController.site.name : 'All'}"/>
                                <h:outputText value="Department:"/>
                                <h:outputText value="#{pharmacyReportController.department != null ? pharmacyReportController.department.name : 'All'}"/>
                                <h:outputText value="Item Category:"/>
                                <h:outputText value="#{pharmacyReportController.category != null ? pharmacyReportController.category.name : 'All'}"/>
                                <h:outputText value="Dosage Form:"/>
                                <h:outputText value="#{pharmacyReportController.dosageForm != null ? pharmacyReportController.dosageForm.name : 'All'}"/>
                                <h:outputText value="Department Type:"/>
                                <h:outputText value="#{pharmacyReportController.selectedDepartmentTypesString}"/>
                                <h:outputText value="Item:"/>
                                <h:outputText value="#{pharmacyReportController.selectedAmpDto != null ? pharmacyReportController.selectedAmpDto.name : '-'}"/>
                                <h:outputText value="Sort Type:"/>
                                <h:outputText value="#{pharmacyReportController.sortType eq 'byvalue' ? 'By Cost Value' : 'By Quantity'}"/>
                                <h:outputText value="Bill Types:"/>
                                <h:outputText value="#{pharmacyReportController.billTypesForMovementReportAsString}"/>
                            </h:panelGrid>
                            <div class="d-flex gap-2 mb-3">
                                <p:commandButton
                                    class="ui-button-primary mx-1"
                                    icon="fas fa-print"
                                    ajax="false"
                                    action="slow_fast_none_movement_print?faces-redirect=true"
                                    value="To Print">
                                </p:commandButton>
                                <p:commandButton
                                        class="ui-button-success mx-1"
                                        icon="fas fa-file-excel"
                                        ajax="false"
                                        value="Download"
                                        action="#{pharmacyReportController.exportSlowFastMovementReportToExcel()}">
                                </p:commandButton>
                                <p:commandButton
                                        class="ui-button-danger mx-1"
                                        icon="fas fa-file-pdf"
                                        ajax="false"
                                        value="PDF"
                                        action="#{pharmacyReportController.exportSlowFastMovementReportToPDF()}">
                                </p:commandButton>
                            </div>

                            <p:dataTable id="tbl2"
                                         value="#{pharmacyReportController.sortType eq 'byvalue' ? pharmacyReportController.movementRecords : pharmacyReportController.movementRecordsQty }"
                                         var="s"
                                         rowIndexVar="n"
                                         paginator="true"
                                         paginatorPosition="bottom"
                                         rows="10"
                                         paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                         currentPageReportTemplate="Showing {startRecord} to {endRecord} of {totalRecords}"
                                         rowsPerPageTemplate="5,10,15,25,50,100,500,1000">

                                <p:column headerText="Sl No." width="50" styleClass="text-center">
                                    <h:outputText value="#{n+1}"/>
                                </p:column>
                                <p:column headerText="Item Code" width="80">
                                    <h:outputText value="#{s.itemCode}"/>
                                </p:column>
                                <p:column headerText="Item Name">
                                    <h:outputText value="#{s.itemName}"/>
                                </p:column>
                                <p:column headerText="Drug Form">
                                    <h:outputText value="#{s.categoryName}"/>
                                </p:column>
                                <p:column headerText="Dosage Form">
                                    <h:outputText value="#{s.dosageFormName}"/>
                                </p:column>
                                <p:column headerText="Supplier(Last Purchase)">
                                    <h:outputText value="#{s.lastPurchaseSupplierName}"/>
                                </p:column>
                                <p:column headerText="Quantity" width="90" styleClass="text-end">
                                    <h:outputText value="#{s.qty}">
                                        <f:convertNumber pattern="#,##0.00"></f:convertNumber>
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Cost Value" width="100" styleClass="text-end">
                                    <h:outputText value="#{s.purchaseValue}">
                                        <f:convertNumber pattern="#,##0.00"></f:convertNumber>
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Sale Value" width="100" styleClass="text-end">
                                    <h:outputText value="#{s.retailsaleValue}">
                                        <f:convertNumber pattern="#,##0.00"></f:convertNumber>
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Value of QIH" width="100" styleClass="text-end">
                                    <h:outputText value="#{s.stockQty}">
                                        <f:convertNumber pattern="#,##0.00"></f:convertNumber>
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="QIH" width="80" styleClass="text-end">
                                    <h:outputText value="#{s.stockOnHand}">
                                        <f:convertNumber pattern="#,##0.00"></f:convertNumber>
                                    </h:outputText>
                                </p:column>

                            </p:dataTable>
                            <div class="d-flex justify-content-between mt-3 px-2" style="font-size:0.8rem;">
                                <h:panelGroup>
                                    <h:outputText value="Reported by: " styleClass="fw-bold"/>
                                    <h:outputText value="#{sessionController.loggedUser.name}"/>
                                </h:panelGroup>
                                <h:panelGroup>
                                    <h:outputText value="Printed on: " styleClass="fw-bold"/>
                                    <h:outputText value="#{pharmacyReportController.currentDateTime}">
                                        <f:convertDateTime pattern="dd MMM yyyy hh:mm a"/>
                                    </h:outputText>
                                </h:panelGroup>
                            </div>

                        </div>
                    </p:panel>

                    <p:panel
                            id="nonmovement"
                            rendered="#{pharmacyReportController.reportType eq 'nmovement'}">
                        <div class="mt-3">
                            <div class="text-center mb-3">
                                <h:outputText value="#{sessionController.institution.name}" styleClass="d-block fw-bold" style="font-size:1.1rem;"/>
                                <h:outputText value="Non Movement Report" styleClass="d-block fw-bold" style="font-size:1rem;"/>
                            </div>
                            <h:panelGrid columns="6" styleClass="table table-sm table-borderless mb-3" style="font-size:0.8rem;" columnClasses="fw-bold,text-muted,fw-bold,text-muted,fw-bold,text-muted">
                                <h:outputText value="From Date:"/>
                                <h:outputText value="#{pharmacyReportController.fromDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                </h:outputText>
                                <h:outputText value="To Date:"/>
                                <h:outputText value="#{pharmacyReportController.toDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                </h:outputText>
                                <h:outputText value="Date Range:"/>
                                <h:outputText value="#{pharmacyReportController.dateRangeAsString}"/>
                                <h:outputText value="Institution:"/>
                                <h:outputText value="#{pharmacyReportController.institution != null ? pharmacyReportController.institution.name : 'All'}"/>
                                <h:outputText value="Site:"/>
                                <h:outputText value="#{pharmacyReportController.site != null ? pharmacyReportController.site.name : 'All'}"/>
                                <h:outputText value="Department:"/>
                                <h:outputText value="#{pharmacyReportController.department != null ? pharmacyReportController.department.name : 'All'}"/>
                                <h:outputText value="Item Category:"/>
                                <h:outputText value="#{pharmacyReportController.category != null ? pharmacyReportController.category.name : 'All'}"/>
                                <h:outputText value="Dosage Form:"/>
                                <h:outputText value="#{pharmacyReportController.dosageForm != null ? pharmacyReportController.dosageForm.name : 'All'}"/>
                                <h:outputText value="Department Type:"/>
                                <h:outputText value="#{pharmacyReportController.selectedDepartmentTypesString}"/>
                            </h:panelGrid>
                            <div class="d-flex gap-2 mb-3">
                                <p:commandButton
                                    class="ui-button-primary mx-1"
                                    icon="fas fa-print"
                                    ajax="false"
                                    action="slow_fast_none_movement_print?faces-redirect=true"
                                    value="To Print">
                                </p:commandButton>
                                <p:commandButton
                                        class="ui-button-success mx-1"
                                        icon="fas fa-file-excel"
                                        ajax="false"
                                        value="Download"
                                        action="#{pharmacyReportController.exportNonMovementReportToExcel()}">
                                </p:commandButton>
                                <p:commandButton
                                        class="ui-button-danger mx-1"
                                        icon="fas fa-file-pdf"
                                        ajax="false"
                                        value="PDF"
                                        action="#{pharmacyReportController.exportNonMovementReportToPDF()}">
                                </p:commandButton>
                            </div>

                            <p:dataTable id="tbl3"
                                         value="#{pharmacyReportController.itemLastSuppliers}"
                                         var="no"
                                         rowIndexVar="n"
                                         paginator="true"
                                         paginatorPosition="bottom"
                                         rows="10"
                                         paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                         currentPageReportTemplate="Showing {startRecord} to {endRecord} of {totalRecords}"
                                         rowsPerPageTemplate="5,10,15,25,50,100,500,1000">

                                <p:column headerText="Sl No." width="50" styleClass="text-center">
                                    <h:outputText value="#{n+1}"/>
                                </p:column>
                                <p:column headerText="Item Code" width="80">
                                    <h:outputText value="#{no.itemCode}"/>
                                </p:column>
                                <p:column headerText="Item Name">
                                    <h:outputText value="#{no.itemName}"/>
                                </p:column>
                                <p:column headerText="Drug Form">
                                    <h:outputText value="#{no.categoryName}"/>
                                </p:column>
                                <p:column headerText="Dosage Form">
                                    <h:outputText value="#{no.dosageFormName}"/>
                                </p:column>
                                <p:column headerText="Supplier(Last Purchase)">
                                    <h:outputText value="#{no.lastSupplierName}"/>
                                </p:column>

                            </p:dataTable>
                            <div class="d-flex justify-content-between mt-3 px-2" style="font-size:0.8rem;">
                                <h:panelGroup>
                                    <h:outputText value="Reported by: " styleClass="fw-bold"/>
                                    <h:outputText value="#{sessionController.loggedUser.name}"/>
                                </h:panelGroup>
                                <h:panelGroup>
                                    <h:outputText value="Printed on: " styleClass="fw-bold"/>
                                    <h:outputText value="#{pharmacyReportController.currentDateTime}">
                                        <f:convertDateTime pattern="dd MMM yyyy hh:mm a"/>
                                    </h:outputText>
                                </h:panelGroup>
                            </div>

                        </div>
                    </p:panel>
                </p:panel>

            </h:form>

        </ui:define>
    </ui:composition>

</h:body>
</html>
