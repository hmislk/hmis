<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">
                <h:outputStylesheet library="css" name="printing/reportprint.css"/>
                <h:form >
                        <h:panelGroup>
                            <p:panel header="Shift End Summary Report" styleClass="my-2" >
                                <f:facet name="header">
                                    <div class="d-flex justify-content-between">
                                        <h:outputText value="Shift End Summary Report" class="mt-2"/>
                                        <div class="d-flex gap-2">
                                            <p:commandButton 
                                                icon="fa-solid fa-print"
                                                class="ui-button-info"
                                                style="width: 150px"
                                                ajax="false" 
                                                value="Print">
                                                <p:printer target="shiftRp" />
                                            </p:commandButton>
                                            <p:commandButton 
                                                ajax="false" 
                                                value="Back to Report" 
                                                style="width: 200px"
                                                icon="fa fa-arrow-left"
                                                class="ui-button-warning"
                                                action="/reports/cashier_reports/shift_start_and_ends?faces-redirect=true">
                                            </p:commandButton>
                                        </div>
                                    </div>
                                </f:facet>
                            </p:panel>

                            <h:panelGroup id="shiftRp" class="d-flex justify-content-center">
                                <div class="paper">
                                    <div class="header" >
                                            <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 18px;">
                                                <h:outputText value="#{sessionController.institution.name}"/>
                                            </div>
                                            <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 16px;">
                                                <h:outputText value="Shift End Summary Report"/>
                                            </div>
                                        <div class="d-flex justify-content-center m-3">
                                            <h:panelGrid columns="6" styleClass="report-header-table" style="font-size:10px; width:75%;" columnClasses="label,value,label,value,label,value">

                                                <!-- Row 1 -->
                                                <h:outputText value="From Date:" styleClass="label"/>
                                                <h:outputText value="#{searchController.fromDate}">
                                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                </h:outputText>

                                                <h:outputText value="To Date:" styleClass="label"/>
                                                <h:outputText value="#{searchController.toDate}">
                                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                </h:outputText>

                                                <h:outputText value="User:" styleClass="label"/>
                                                <h:outputText value="#{searchController.webUser != null ? searchController.webUser.webUserPerson.name : 'All'}"/>


                                                <!-- Row 2 -->
                                                <h:outputText value="Institution:" styleClass="label"/>
                                                <h:outputText value="#{searchController.institution != null ? searchController.institution.name : 'All'}"/>

                                                <h:outputText value="Site:" styleClass="label"/>
                                                <h:outputText value="#{searchController.site != null ? searchController.site.name : 'All'}"/>

                                                <h:outputText value="Department:" styleClass="label"/>
                                                <h:outputText value="#{searchController.department != null ? searchController.department.name : 'All'}"/>

                                            </h:panelGrid>
                                        </div>   
                                    </div>
                                    <p:dataTable 
                                        value="#{searchController.bills}" 
                                        var="bill"
                                        styleClass="table">
                                        
                                        <p:column 
                                            headerText="ID" 
                                            sortBy="#{summary.department.institution.name}"
                                            width="15mm">
                                            <h:outputText value="#{bill.id}" />
                                        </p:column>
                                        
                                        <p:column 
                                            headerText="Institution" 
                                            sortBy="#{summary.department.institution.name}"
                                            width="35mm">
                                            <h:outputText value="#{bill.institution.name}" />
                                        </p:column>

                                        <p:column 
                                            headerText="Site" 
                                            sortBy="#{summary.department.site.name}"
                                            width="35mm">
                                            <h:outputText value="#{bill.department.site.name}" />
                                        </p:column>

                                        <p:column 
                                            headerText="Department" 
                                            sortBy="#{summary.department.name}"
                                            width="35mm">
                                            <h:outputText value="#{bill.department.name}" />
                                        </p:column>

                                        <p:column 
                                            headerText="Date" 
                                            sortBy="#{summary.date}"
                                            width="22mm">
                                            <h:outputText value="#{bill.createdAt}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateTimeFormat}" />
                                            </h:outputText>
                                        </p:column>
                                        
                                        <p:column 
                                            headerText="Staff" 
                                            sortBy="#{summary.department.name}"
                                            width="27mm">
                                            <h:outputText value="#{bill.staff.person.name}" />
                                        </p:column>

                                        <p:column 
                                            headerText="Starting Bill" 
                                            width="35mm">
                                            <h:outputText value="#{bill.referenceBill.billTypeAtomic}" />
                                        </p:column>

                                        <p:column 
                                            headerText="Ending Bill" 
                                            width="35mm">
                                            <h:outputText value="#{bill.referenceBill.insId}" />
                                        </p:column>
                                        
                                        <p:column 
                                            headerText="Short or Excess" 
                                            width="15mm">
                                        </p:column>
                                    </p:dataTable>
                                </div>     
                            </h:panelGroup>
                        </h:panelGroup>
                </h:form>

            </ui:define>
        </ui:composition>

    </h:body>
</html>
