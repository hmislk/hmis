<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/reports/index.xhtml">
            <ui:define name="subcontent">
                <h:form>
                    <p:panel class="m-1 p-1 container-flex">
                        <f:facet name="header">
                            <p:outputLabel value="Handover Status Report" />
                        </f:facet>

                        <p:panelGrid layout="tabular" columns="2" class="w-100">

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputLabel value="From Date" for="fromDate" class="mx-3 fw-bold" />
                            </h:panelGroup>
                            <p:datePicker
                                styleClass="w-100"
                                inputStyleClass="w-100"
                                id="fromDate"
                                showTime="true"
                                value="#{financialTransactionController.fromDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputLabel value="To Date" for="toDate" class="mx-3 fw-bold" />
                            </h:panelGroup>
                            <p:datePicker
                                styleClass="w-100"
                                inputStyleClass="w-100"
                                id="toDate"
                                showTime="true"
                                value="#{financialTransactionController.toDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputLabel value="From User (Initiator)" for="acFromUser" class="mx-3 fw-bold" />
                            </h:panelGroup>
                            <p:autoComplete
                                completeMethod="#{webUserController.completeUser}"
                                class="w-100"
                                id="acFromUser"
                                inputStyleClass="w-100"
                                value="#{financialTransactionController.user}"
                                var="u"
                                scrollHeight="450"
                                itemLabel="#{u.webUserPerson.name}"
                                itemValue="#{u}">
                                <p:column headerText="Username">
                                    <h:outputText value="#{u.name}" />
                                </p:column>
                                <p:column headerText="Name">
                                    <h:outputText value="#{u.webUserPerson.name}" />
                                </p:column>
                            </p:autoComplete>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputLabel value="To User (Acceptor)" for="acToUser" class="mx-3 fw-bold" />
                            </h:panelGroup>
                            <p:autoComplete
                                completeMethod="#{webUserController.completeUser}"
                                class="w-100"
                                id="acToUser"
                                inputStyleClass="w-100"
                                value="#{financialTransactionController.toUser}"
                                var="u"
                                scrollHeight="450"
                                itemLabel="#{u.webUserPerson.name}"
                                itemValue="#{u}">
                                <p:column headerText="Username">
                                    <h:outputText value="#{u.name}" />
                                </p:column>
                                <p:column headerText="Name">
                                    <h:outputText value="#{u.webUserPerson.name}" />
                                </p:column>
                            </p:autoComplete>

                        </p:panelGrid>

                        <p:panelGrid columns="1" styleClass="m-3">
                            <h:panelGroup layout="block" styleClass="form-group">
                                <p:commandButton
                                    value="Search"
                                    action="#{financialTransactionController.fillHandoverStatusReport()}"
                                    ajax="false"
                                    styleClass="ui-button-success m-1"
                                    icon="pi pi-search" />
                            </h:panelGroup>
                        </p:panelGrid>

                        <p:dataTable
                            id="tblHandoverStatus"
                            value="#{financialTransactionController.currentBills}"
                            var="bp"
                            rowKey="#{bp.id}"
                            emptyMessage="No handovers found for the selected criteria"
                            paginator="true"
                            rows="20"
                            paginatorPosition="bottom">

                            <p:column headerText="Bill ID" width="8em">
                                <h:outputText value="#{bp.deptId}" />
                            </p:column>

                            <p:column headerText="Date / Time" width="12em">
                                <h:outputText value="#{bp.createdAt}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Initiated By">
                                <h:outputText value="#{bp.fromWebUser.webUserPerson.nameWithTitle}" />
                                <h:outputText value="&nbsp;(" />
                                <h:outputText value="#{bp.fromWebUser.name}" />
                                <h:outputText value=")" />
                            </p:column>

                            <p:column headerText="Accepted By">
                                <h:outputText value="#{bp.toWebUser.webUserPerson.nameWithTitle}" />
                                <h:outputText value="&nbsp;(" />
                                <h:outputText value="#{bp.toWebUser.name}" />
                                <h:outputText value=")" />
                            </p:column>

                            <p:column headerText="Amount" style="text-align: right;" width="10em">
                                <h:outputText value="#{bp.netTotal}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Status" width="10em" styleClass="text-center">
                                <h:panelGroup rendered="#{not bp.completed and not bp.cancelled}">
                                    <span class="badge bg-warning text-dark">Pending</span>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{bp.completed and not bp.cancelled}">
                                    <span class="badge bg-success">Completed</span>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{bp.cancelled}">
                                    <span class="badge bg-danger">Recalled</span>
                                </h:panelGroup>
                            </p:column>

                        </p:dataTable>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
