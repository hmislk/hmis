<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body class="w-100 border">

        <ui:composition template="/reports/index.xhtml" class="w-100 border">
            <ui:define name="subcontent">
                <h:outputStylesheet library="css" name="eight_col_filter_panel.css" />
                <p:panel>
                    <f:facet name="header" >
                        <h:outputLabel value="OPD Professional Fee Payments"/>                          
                    </f:facet>

                    <h:form>
                        <h:panelGrid 
                            columns="8" 
                            class="ui-fluid" 
                            style="table-layout: fixed; width: 100%;"
                            columnClasses="fp-col-label1,fp-col-input1,fp-col-space1,
                                        fp-col-label2,fp-col-input2,fp-col-space2,
                                        fp-col-label3,fp-col-input3">
                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf073;" styleClass="fa" /> <!-- FontAwesome calendar icon -->
                                <div class="fp-label-text">
                                    <h:outputLabel value="From" for="fromDate"/>
                                </div>
                            </h:panelGroup>
                            <p:calendar 
                                styleClass="w-100" 
                                inputStyleClass="w-100 form-control" 
                                id="fromDate" 
                                value="#{searchController.fromDate}" 
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" 
                                />

                            <p:spacer width="50" ></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf073;" styleClass="fa" /> <!-- FontAwesome calendar icon -->
                                <div class="fp-label-text">
                                    <h:outputLabel value="To" for="toDate"/>
                                </div>
                            </h:panelGroup>
                            <p:calendar 
                                styleClass="w-100" 
                                inputStyleClass="w-100 form-control" 
                                id="toDate" 
                                value="#{searchController.toDate}" 
                                navigator="false" 
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" 
                                />

                            <p:spacer width="50" ></p:spacer>

                            <p:spacer width="50" ></p:spacer>
                            <p:spacer width="50" ></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf19c;" styleClass="fa" /> <!-- FontAwesome building icon -->
                                <div class="fp-label-text">
                                    <h:outputLabel value="Institution" for="cmbIns"/>
                                </div>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="cmbIns"
                                styleClass="w-100 form-control" 
                                value="#{searchController.institution}" 
                                filter="true">
                                <f:selectItem itemLabel="All Institutions" />
                                <f:selectItems value="#{institutionController.companies}" var="ins" itemLabel="#{ins.name}" itemValue="#{ins}" />
                                <p:ajax process="cmbIns" update="cmbDept" />
                            </p:selectOneMenu>

                            <p:spacer ></p:spacer>



                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf3c5;" styleClass="fa" /> <!-- FontAwesome map marker icon -->
                                <div class="fp-label-text">
                                    <h:outputLabel value="Site" for="siteMenu"/>
                                </div>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="siteMenu"
                                styleClass="w-100 form-control"  
                                value="#{searchController.site}" 
                                filter="true">
                                <f:selectItem itemLabel="All Sites" />
                                <f:selectItems value="#{institutionController.sites}" var="site" itemLabel="#{site.name}" itemValue="#{site}" />
                                <p:ajax process="siteMenu" update="cmbDept" />
                            </p:selectOneMenu>


                            <p:spacer ></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf0e8;" styleClass="fa" /> <!-- FontAwesome sitemap icon -->
                                <div class="fp-label-text">
                                    <h:outputLabel value="Department" for="cmbDept"/>
                                </div>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="cmbDept"
                                styleClass="w-100 form-control"  
                                value="#{searchController.department}" 
                                filter="true">
                                <f:selectItem itemLabel="All Departments" />
                                <f:selectItems value="#{departmentController.getDepartmentsOfInstitutionAndSite(searchController.institution, searchController.site)}" var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                            </p:selectOneMenu>




                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText title="Category" value="&#xf02d;" styleClass="fa" /> <!-- FontAwesome book icon -->
                                <div class="fp-label-text">
                                    <h:outputLabel value="Category"/>
                                </div>
                            </h:panelGroup>
                            <p:autoComplete value="#{searchController.category}"
                                            completeMethod="#{categoryController.completeCategory}" 
                                            var="category"
                                            class="w-100"
                                            inputStyleClass="w-100"
                                            itemLabel="#{category.name}"
                                            itemValue="#{category}">
                            </p:autoComplete>

                            <p:spacer ></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText title="Item" value="&#xf0f6;" styleClass="fa" /> <!-- FontAwesome box icon -->
                                <div class="fp-label-text">
                                    <h:outputLabel value="Item"/>
                                </div>
                            </h:panelGroup>
                            <p:autoComplete value="#{searchController.item}"
                                            class="w-100"
                                            inputStyleClass="w-100"
                                            completeMethod="#{itemController.completeAllServicesAndInvestigations}" 
                                            var="item"
                                            itemLabel="#{item.name}"
                                            itemValue="#{item}">
                            </p:autoComplete>

                            <p:spacer width="50" ></p:spacer>
                            
                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                        <h:outputText value="&#xf0f0;" styleClass="fa" /> 
                                        <div class="fp-label-text">
                                            <h:outputLabel value="MRN" for="scMRN"/>
                                        </div>
                                    </h:panelGroup>
                                    
                                    <p:inputText value="#{searchController.mrnNo}" class="w-100"/>


                            <!-- New Speciality Field with Icon -->
                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf2b9;" styleClass="fa" /> <!-- FontAwesome user-md icon for Speciality -->
                                <div class="fp-label-text">
                                    <h:outputLabel value="Speciality" for="acSpeciality"/>
                                </div>
                            </h:panelGroup>
                            <p:autoComplete id="acSpeciality" 
                                            value="#{searchController.speciality}" 
                                            completeMethod="#{specialityController.completeSpeciality}" 
                                            var="speciality" 
                                            itemLabel="#{speciality.name}" 
                                            itemValue="#{speciality}"
                                            inputStyleClass="w-100"
                                            styleClass="w-100">
                                <p:ajax process="acSpeciality" event="change" update="scStaff" />
                            </p:autoComplete>

                            <p:spacer ></p:spacer>

                            <!-- New Doctor Field with Icon -->
                            <h:panelGroup layout="block" styleClass="form-group fp-label">
                                <h:outputText value="&#xf0f0;" styleClass="fa" /> 
                                <div class="fp-label-text">
                                    <h:outputLabel value="Doctor" for="scStaff"/>
                                </div>
                            </h:panelGroup>
                            <p:selectOneMenu id="scStaff" 
                                             value="#{searchController.staff}" 
                                             filter="true" 
                                             filterMatchMode="contains" 
                                             styleClass="w-100 form-control">
                                <f:selectItem itemLabel="Please Select" noSelectionOption="true" />
                                <f:selectItems
                                    value="#{staffController.getSpecialityStaffOptional(searchController.speciality)}" 
                                    var="staff" 
                                    itemLabel="#{staff.person.nameWithTitle}" 
                                    itemValue="#{staff}" />
                            </p:selectOneMenu>
                        </h:panelGrid>

                        <div class="my-3">
                            <p:commandButton 
                                id="btnSearch" 
                                class="m-1 ui-button-danger"
                                icon="fas fa-list"
                                ajax="false" 
                                value="View List"
                                action="#{searchController.searchOpdProfessionalPaymentBillFees()}"/>

                            <p:commandButton 
                                class="ui-button-primary mx-1"
                                icon="fas fa-print"
                                ajax="false"
                                action="professional_fee_payments_opd_print?faces-redirect=true"
                                value="To Print">
                            </p:commandButton>

                            <p:commandButton 
                                class="ui-button-success mx-2" 
                                icon="fas fa-file-excel"
                                id="btnExcel" 
                                ajax="false" 
                                value="Download" >
                                <p:fileDownload value="#{searchController.opdProfessionalFeePaymentsAsExcel}" />
                            </p:commandButton>

                            <p:commandButton 
                                    value="PDF" 
                                    ajax="false" 
                                    icon="fas fa-file-pdf"
                                    class="ui-button-danger mx-1"
                                    style="background-color: #17a2b8; border-color: #17a2b8;" >
                                    <p:fileDownload value="#{searchController.opdProfessionalFeePaymentsAsPdf}" />
                            </p:commandButton>
                        </div>

                        <p:dataTable 
                            rowIndexVar="i" 
                            id="tblBills" 
                            value="#{searchController.bundle.reportTemplateRows}" 
                            var="row" 
                            class="w-100"
                            rows="20"
                            paginator="true" 
                            paginatorPosition="bottom"
                            paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                            currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                            rowsPerPageTemplate="20,50,{ShowAll|'All'}">


                            <p:column headerText="Paid Date" style="text-align: left;" >
                                <p:outputLabel value="#{row.billFee.bill.billDate}" >
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" ></f:convertDateTime>
                                </p:outputLabel>
                            </p:column>

                            <p:column headerText="Payment No" style="text-align: left;">
                                <p:outputLabel value="#{row.billFee.bill.deptId}" />
                                <p:outputLabel value="#{row.billFee.bill.billTypeAtomic}" />
                                <p:commandLink 
                                    ajax="false"
                                    action="#{billSearch.navigateToViewBillByAtomicBillType()}">
                                    <h:outputText title="View Bill" styleClass="fa fa-eye" />
                                    <f:setPropertyActionListener 
                                        value="#{row.billFee.bill}" 
                                        target="#{billSearch.bill}" >
                                    </f:setPropertyActionListener>
                                </p:commandLink>
                            </p:column>

                            <p:column headerText="Billed Date" style="text-align: left;" >
                                <p:outputLabel value="#{row.billFee.billItem.referanceBillItem.bill.createdAt}" >
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" ></f:convertDateTime>
                                </p:outputLabel>
                            </p:column>


                            <p:column headerText="Bill" style="text-align: left;" >
                                <p:outputLabel value="#{row.billFee.billItem.referanceBillItem.bill.deptId}" >
                                </p:outputLabel>
                                <p:badge severity="warning" value="Cancelled" rendered="#{row.billFee.billItem.bill.cancelled}" ></p:badge>
<!--                                <p:commandLink 
                                    ajax="false"
                                    class="m-1"
                                    rendered="#{row.billFee ne null}"
                                    action="#{billSearch.navigateToViewBillByAtomicBillType()}">
                                    <i class="pi pi-eye" style="font-size:14px;" title="View Bill"></i> 
                                    <f:setPropertyActionListener 
                                        value="#{row.billFee.billItem.referanceBillItem.bill}" 
                                        target="#{billSearch.bill}" />
                                </p:commandLink>
                                <p:commandLink 
                                    ajax="false"
                                    class="m-1"
                                    rendered="#{row.billFee ne null}"
                                    action="#{billSearch.navigateToManageBillByAtomicBillType()}">
                                    <i class="pi pi-pencil" style="font-size:14px;" title="Manage Bill"></i> 
                                    <f:setPropertyActionListener 
                                        value="#{row.billFee.billItem.referanceBillItem.bill}" 
                                        target="#{billSearch.bill}" />
                                </p:commandLink>-->

                            </p:column>
                            <p:column 
                                headerText="Patient"
                                filterMatchMode="contains"
                                style="text-align: left;">
                                <h:outputLabel value="#{row.billFee.referenceBillFee.bill.patient.person.nameWithTitle}" rendered="#{row.billFee.referenceBillFee.bill.patient ne null}" />
                                <h:outputLabel value="#{row.billFee.patient.person.nameWithTitle}"  rendered="#{row.billFee.referenceBillFee.bill.patient eq null}"/>
                            </p:column>

                            <p:column 
                                headerText="Professional" 
                                style="text-align: left;">
                                <h:outputLabel value="#{row.billFee.bill.toStaff.person.name}" />
                            </p:column>

                            <p:column headerText="Fee Value" width="100" style="text-align: right;">                              
                                <h:outputLabel value="#{row.billFee.feeValue}" >
                                    <f:convertNumber pattern="#,##0.00" ></f:convertNumber>
                                </h:outputLabel>
                                <f:facet name="footer" >
                                    <h:outputText value="#{searchController.bundle.total}" >
                                        <f:convertNumber pattern="#,##0.00"  ></f:convertNumber>
                                    </h:outputText>
                                </f:facet>
                            </p:column>
                        </p:dataTable>

                    </h:form>



                </p:panel>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
