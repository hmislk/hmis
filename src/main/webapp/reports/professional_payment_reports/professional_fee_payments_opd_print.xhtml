<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">
                <h:outputStylesheet library="css" name="printing/reportprint.css"/>
                <h:form >
                        <h:panelGroup>
                            <p:panel header="OPD Professional Fee Payments Report" styleClass="my-2" >
                                <f:facet name="header">
                                    <div class="d-flex justify-content-between">
                                        <h:outputText value="OPD Professional Fee Payments Report" class="mt-2"/>
                                        <div class="d-flex gap-2">
                                            <p:commandButton 
                                                icon="fa-solid fa-print"
                                                class="ui-button-info"
                                                style="width: 150px"
                                                ajax="false" 
                                                value="Print">
                                                <p:printer target="feeRp" />
                                            </p:commandButton>
                                            <p:commandButton 
                                                ajax="false" 
                                                value="Back to Report" 
                                                style="width: 200px"
                                                icon="fa fa-arrow-left"
                                                class="ui-button-warning"
                                                action="/reports/professional_payment_reports/professional_fee_payments_opd?faces-redirect=true">
                                            </p:commandButton>
                                        </div>
                                    </div>
                                </f:facet>
                            </p:panel>

                            <h:panelGroup id="feeRp" class="d-flex justify-content-center">
                                <div class="paper">
                                    <div class="header" >
                                            <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 18px;">
                                                <h:outputText value="#{sessionController.institution.name}"/>
                                            </div>
                                            <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 16px;">
                                                <h:outputText value="OPD Professional Fee Payments Report"/>
                                            </div>

                                            <div class="d-flex justify-content-center m-3">
                                                <h:panelGrid columns="6"
                                                            styleClass="report-header-table"
                                                            style="font-size:10px; width:75%;"
                                                            columnClasses="label,value,label,value,label,value">

                                                    <!-- Row 1 -->
                                                    <h:outputText value="From Date:" styleClass="label"/>
                                                    <h:outputText value="#{searchController.fromDate}">
                                                        <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                    </h:outputText>

                                                    <h:outputText value="To Date:" styleClass="label"/>
                                                    <h:outputText value="#{searchController.toDate}">
                                                        <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                    </h:outputText>

                                                    <h:outputText value="Institute:" styleClass="label"/>
                                                    <h:outputText value="#{searchController.institution != null ? searchController.institution.name : 'All'}"/>

                                                    <!-- Row 2 -->
                                                    <h:outputText value="Site:" styleClass="label"/>
                                                    <h:outputText value="#{searchController.site != null ? searchController.site.name : 'All'}"/>

                                                    <h:outputText value="Department:" styleClass="label"/>
                                                    <h:outputText value="#{searchController.department != null ? searchController.department.name : 'All'}"/>


                                                    <!-- Row 3 -->
                                                    <h:outputText value="Category:" styleClass="label"/>
                                                    <h:outputText value="#{searchController.category != null ? searchController.category.name : 'All'}"/>

                                                    <h:outputText value="Item:" styleClass="label"/>
                                                    <h:outputText value="#{searchController.item != null ? searchController.item.name : 'All'}"/>

                                                    <h:outputText value="MRN:" styleClass="label"/>
                                                    <h:outputText value="#{!searchController.mrnNo.isEmpty() ? searchController.mrnNo : '-'}"/>

                                                    <!-- Row 4 -->
                                                    <h:outputText value="Speciality:" styleClass="label"/>
                                                    <h:outputText value="#{searchController.speciality != null ? searchController.speciality.name : 'All'}"/>

                                                    <h:outputText value="Doctor:" styleClass="label"/>
                                                    <h:outputText value="#{searchController.staff != null ? searchController.staff.person.nameWithTitle : 'All'}"/>

                                                </h:panelGrid>
                                            </div>
                                            
                                    </div>
                                        <p:dataTable 
                                            rowIndexVar="i" 
                                            id="tblBills" 
                                            value="#{searchController.bundle.reportTemplateRows}" 
                                            var="row"
                                            styleClass="table">


                                            <p:column 
                                                headerText="Paid Date" 
                                                style="text-align: left;" 
                                                width="15mm">
                                                <h:outputText value="#{row.billFee.bill.billDate}" >
                                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" ></f:convertDateTime>
                                                </h:outputText>
                                            </p:column>

                                            <p:column 
                                                headerText="Payment No" 
                                                style="text-align: left;">
                                                <h:outputText value="#{row.billFee.bill.deptId}" /><br />
                                                <h:outputText value="#{row.billFee.bill.billTypeAtomic}" />
                                            </p:column>

                                            <p:column 
                                                headerText="Billed Date" 
                                                style="text-align: left;" 
                                                width="15mm">
                                                <h:outputText value="#{row.billFee.billItem.referanceBillItem.bill.createdAt}" >
                                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" ></f:convertDateTime>
                                                </h:outputText>
                                            </p:column>


                                            <p:column 
                                                headerText="Bill" 
                                                style="text-align: left;" 
                                                width="45mm">
                                                <h:outputText value="#{row.billFee.billItem.referanceBillItem.bill.deptId} " />
                                                <br/>
                                                <h:outputText value="Cancelled" rendered="#{row.billFee.billItem.bill.cancelled}" style="color: red; font-weight: 600;"/>
                                            </p:column>

                                            <p:column 
                                                headerText="Patient"
                                                filterMatchMode="contains"
                                                style="text-align: left;"
                                                width="45mm">
                                                <h:outputText value="#{row.billFee.referenceBillFee.bill.patient.person.nameWithTitle}" rendered="#{row.billFee.referenceBillFee.bill.patient ne null}" />
                                                <h:outputText value="#{row.billFee.patient.person.nameWithTitle}"  rendered="#{row.billFee.referenceBillFee.bill.patient eq null}"/>
                                            </p:column>

                                            <p:column 
                                                headerText="Professional" 
                                                style="text-align: left;"
                                                width="40mm">
                                                <h:outputText value="#{row.billFee.bill.toStaff.person.name}" />
                                            </p:column>

                                            <p:column 
                                                headerText="Fee Value" 
                                                style="text-align: right;" 
                                                width="30mm">                              
                                                <h:outputText value="#{row.billFee.feeValue}" >
                                                    <f:convertNumber pattern="#,##0.00" ></f:convertNumber>
                                                </h:outputText>
                                                <f:facet name="footer" >
                                                    <h:outputText value="#{searchController.bundle.total}" >
                                                        <f:convertNumber pattern="#,##0.00"  ></f:convertNumber>
                                                    </h:outputText>
                                                </f:facet>
                                            </p:column>
                                        </p:dataTable>
                                    </div>
                            </h:panelGroup>
                        </h:panelGroup>
                        
                </h:form>

            </ui:define>
        </ui:composition>

    </h:body>
</html>
