<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:body class="w-100 border">

    <ui:composition template="/reports/index.xhtml" class="w-100 border">
        <ui:define name="subcontent">
            <style>
                    .report-table {
                        border-collapse: collapse;
                        width: 100%;
                    }

                    .report-table.ui-datatable {
                        border: 1px solid #000000;
                        border-radius: 3px;
                    }

                    .report-table.ui-datatable th,
                    .report-table.ui-datatable td {
                        border: 1px solid #000000;
                        padding: 6px;
                        font-size: larger;
                    }

                    .report-table.ui-datatable tbody td {
                        text-align: right;
                    }

                    .report-table.ui-datatable thead th {
                        font-weight: bold;
                        background: #f8f8f8;
                        text-align: center;
                    }

                    .report-table.ui-datatable tfoot td {
                        font-weight: bold;
                        background: #f8f8f8;
                        text-align: right;
                    }

                    .subtotal {
                        font-weight: bold;
                        background: #f8f8f8;
                        color: #333;
                    }

                    .cmbIns .ui-selectonemenu-label {
                        overflow: hidden;
                        text-overflow: ellipsis;
                        white-space: nowrap;
                    }

            </style>

            <h:form class="w-100">
                <p:panel header="All Department Sale Report" class="w-100">
                    <div class="d-flex flex-wrap align-items-center gap-3 mb-2 ms-2">
                        <h:panelGroup layout="block" styleClass="form-group">
                            <h:outputText value="&#xf19c;" styleClass="fa mr-2"/> <!-- FontAwesome building icon -->
                            <h:outputLabel value="Department" for="cmbIns" class="m-3"/>
                        </h:panelGroup>
                        <p:selectOneMenu
                                id="cmbIns"
                                styleClass="form-control cmbIns"
                                style="width: 300px"
                                filter="true">
                            <f:selectItem itemLabel="All Departments"/>
                            <f:selectItems 
                                value="#{departmentController.getDepartmentsOfInstitutionAndSite()}" 
                                var="dept" 
                                itemLabel="#{dept.name}"
                                itemValue="#{dept}"/>
                        </p:selectOneMenu>
                    </div>

                    <h:panelGroup>
                         <div class="d-flex align-items-center my-4">
                            <p:commandButton
                                    id="btnProcess"
                                    class="ui-button-warning mx-1"
                                    ajax="false"
                                    value="Process"
                                    icon="fas fa-cogs">
                            </p:commandButton>
                            <p:defaultCommand target="btnProcess"/>

                            <p:commandButton
                                id="btnPrint"
                                class="ui-button-primary mx-1"
                                ajax="false"
                                value="Print"
                                icon="fas fa-print">
                            </p:commandButton>

                            <p:commandButton
                                    id="btnExportExcel"
                                    class="ui-button-success mx-1"
                                    ajax="false"
                                    value="Download"
                                    icon="fas fa-file-excel">
                            </p:commandButton>
                            
                            <p:commandButton
                                    id="btnExportPdf"
                                    class="ui-button-danger mx-1"
                                    ajax="false"
                                    value="PDF"
                                    icon="fas fa-file-pdf">
                            </p:commandButton>
                        </div>
                    </h:panelGroup>

                    <p:panel id="report">
                        <div style="overflow-x: auto; width: 100%;">
                            <table class="report-table ui-datatable">
                                <thead>
                                    <tr>
                                        <th colspan="7" style="text-align: center;">
                                            <h:outputText value="All Department Sale Report" />
                                        </th>
                                    </tr>
                                    <tr>
                                        <th colspan="7">
                                            <h:outputText value=" " />
                                        </th>
                                    </tr>
                                    <tr>
                                        <th>
                                            <h:outputText value="Department"/>
                                        </th>
                                        <th>
                                            <h:outputText value="Billed Value"/>
                                        </th>
                                        <th>
                                            <h:outputText value="Returned Value"/>
                                        </th>
                                        <th>
                                            <h:outputText value="Net Value"/>
                                        </th>
                                        <th>
                                            <h:outputText value="Billed Count"/>
                                        </th>
                                        <th>
                                            <h:outputText value="Returned Count"/>
                                        </th>
                                        <th>
                                            <h:outputText value="Net Count"/>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <ui:repeat value="#{['Cash', 'Cash + Credit Card', 'Credit Card']}" var="v">
                                        <tr>
                                            <td colspan="7" style="text-align: left;">
                                                <h:outputText value="#{v}" style="font-weight: 700;"/>
                                            </td>
                                        </tr>
                                        <ui:repeat value="#{['']}" var="data">
                                            <tr>
                                                <td style="text-align: left;">
                                                    <h:outputText value="Main Pharmacy"/>
                                                </td>
                                                <td>
                                                    <h:outputText value="2353445.42">
                                                        <f:convertNumber pattern="#,##0.0000"/>
                                                    </h:outputText>
                                                </td>
                                                <td>
                                                    <h:outputText value="49218.62">
                                                        <f:convertNumber pattern="#,##0.0000"/>
                                                    </h:outputText>
                                                </td>
                                                <td>
                                                    <h:outputText value="2304226.8">
                                                        <f:convertNumber pattern="#,##0.0000"/>
                                                    </h:outputText>
                                                </td>
                                                <td>
                                                    <h:outputText value="1193">
                                                        <f:convertNumber pattern="#0"/>
                                                    </h:outputText>
                                                </td>
                                                <td>
                                                    <h:outputText value="53">
                                                        <f:convertNumber pattern="#0"/>
                                                    </h:outputText>
                                                </td>
                                                <td>
                                                    <h:outputText value="1140">
                                                        <f:convertNumber pattern="#0"/>
                                                    </h:outputText>
                                                </td>
                                            </tr>
                                        </ui:repeat>
                                        <tr class="subtotal">
                                            <td style="text-align: left;">
                                                <h:outputText value="Sub Total"/>
                                            </td>
                                            <td>
                                                <h:outputText value="2353445.42">
                                                    <f:convertNumber pattern="#,##0.0000"/>
                                                </h:outputText>
                                            </td>
                                            <td>
                                                <h:outputText value="49218.62">
                                                    <f:convertNumber pattern="#,##0.0000"/>
                                                </h:outputText>
                                            </td>
                                            <td>
                                                <h:outputText value="2304226.8">
                                                    <f:convertNumber pattern="#,##0.0000"/>
                                                </h:outputText>
                                            </td>
                                            <td>
                                                <h:outputText value="1193">
                                                    <f:convertNumber pattern="#0"/>
                                                </h:outputText>
                                            </td>
                                            <td>
                                                <h:outputText value="53">
                                                    <f:convertNumber pattern="#0"/>
                                                </h:outputText>
                                            </td>
                                            <td>
                                                <h:outputText value="1140">
                                                    <f:convertNumber pattern="#0"/>
                                                </h:outputText>
                                            </td>
                                        </tr>
                                    </ui:repeat>
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <td style="text-align: left;">
                                            <h:outputText value="Grand Total"/>
                                        </td>
                                        <td>
                                            <h:outputText value="2353445.42">
                                                <f:convertNumber pattern="#,##0.0000"/>
                                            </h:outputText>
                                        </td>
                                        <td>
                                            <h:outputText value="49218.62">
                                                <f:convertNumber pattern="#,##0.0000"/>
                                            </h:outputText>
                                        </td>
                                        <td>
                                            <h:outputText value="2304226.8">
                                                <f:convertNumber pattern="#,##0.0000"/>
                                            </h:outputText>
                                        </td>
                                        <td>
                                            <h:outputText value="1193">
                                                <f:convertNumber pattern="#0"/>
                                            </h:outputText>
                                        </td>
                                        <td>
                                            <h:outputText value="53">
                                                <f:convertNumber pattern="#0"/>
                                            </h:outputText>
                                        </td>
                                        <td>
                                            <h:outputText value="1140">
                                                <f:convertNumber pattern="#0"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                </tfoot>    
                            </table>
                        </div>
                    </p:panel>
                </p:panel>
            </h:form>
        </ui:define>
    </ui:composition>
</h:body>
</html>
