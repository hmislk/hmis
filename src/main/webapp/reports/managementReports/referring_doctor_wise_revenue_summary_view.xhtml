<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">

                <h:form >
                    <p:panel header="Referring Doctor Wise Revenue Summary Print" styleClass="w-100">
                        <f:facet name="header"  >
                            <div class="d-flex justify-content-between">
                                <h:outputText value="Referring Doctor Wise Revenue Summary Print" class="mt-2"/>
                                <div class="d-flex gap-2">
                                    <p:commandButton 
                                        icon="fa-solid fa-print"
                                        class="ui-button-info"
                                        style="width: 150px"
                                        ajax="false" 
                                        value="Print">
                                        <p:printer target="reportView" />
                                    </p:commandButton>
                                    <p:commandButton 
                                        ajax="false" 
                                        value="Back to Report" 
                                        style="width: 200px"
                                        icon="fa fa-arrow-left"
                                        class="ui-button-warning"
                                        action="referring_doctor_wise_revenue?faces-redirect=true" >
                                    </p:commandButton>
                                </div>

                            </div>
                        </f:facet>

                        <style>

                            @media screen{
                                .paper{
                                    position: static !important;
                                    width: 297mm!important;
                                    zoom: 2.0;
                                }
                                
                                table {
                                    border-collapse: collapse;
                                    width: 100%;
                                    font-size: 12px!important;
                                    margin-top: 1mm!important;
                                }
                                
                                th, td {
                                    border: 1px solid #000;
                                    padding: 0px!important;
                                    margin: 2px!important;
                                    text-align: left;
                                    margin-left: 10mm!important;
                                }
                                
                                .header{
                                    font-size: 16px!important;
                                }
                                
                                tfoot{
                                    font-weight: 700!important;
                                    font-size: 11px!important;
                                }
                            }

                            @media print {
                                @page {
                                    @bottom-right {
                                        content: "Page " counter(page) " of " counter(pages);
                                        font-family: Arial, sans-serif;
                                        font-size: 10pt;
                                    }
                                    size: A4 landscape;
                                }

                                body {
                                    counter-reset: page;
                                }

                                .paper{
                                    position: static !important;
                                    width: 297mm!important;
                                }

                                .header{
                                    line-height: 1.1;
                                    margin: 0mm!important;
                                    font-size: 13px!important;
                                }

                                table {
                                    border-collapse: collapse;
                                    width: 99.9%;
                                    font-size: 12px!important;
                                    margin-top: 1mm!important;
                                }
                                th, td {
                                    border: 1px solid #000;
                                    padding: 0px!important;
                                    margin: 2px!important;
                                    text-align: left;
                                    margin-left: 10mm!important;
                                }
                                th {

                                }
                                tfoot{
                                    font-weight: 700!important;
                                    font-size: 11px!important;
                                }
                            }
                        </style>

                        <h:panelGroup id="reportView" class="d-flex justify-content-center">
                            <div class="paper">
                                <div class="header" >
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 22px;">
                                        <h:outputText value="#{sessionController.institution.name}"/>
                                    </div>
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 18px;">
                                        <h:outputText value="Referring Doctor Wise Revenue Report"/>
                                        <h:panelGroup  rendered="#{reportController.department ne null}">
                                            <div class="d-flex gap-2">
                                                <h:outputText value="-" style="width: 1em!important;" class="text-center"/>
                                                <h:outputText value="#{reportController.department.name}"/>
                                            </div>
                                        </h:panelGroup>
                                    </div>
                                    <div class="d-flex justify-content-center mt-2" style="font-size:12px; flex-wrap:wrap; gap:16px;">
    
                                        <div class="d-flex gap-2">
                                            <h:outputText value="From Date" style="font-weight:600;"/>
                                            <h:outputText value="#{reportController.fromDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}" />
                                            </h:outputText>
                                        </div>

                                        <div class="d-flex gap-2">
                                            <h:outputText value="To Date" style="font-weight:600;"/>
                                            <h:outputText value="#{reportController.toDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}" />
                                            </h:outputText>
                                        </div>

                                        <div class="d-flex gap-2">
                                            <h:outputText value="By Site" style="font-weight:600;"/>
                                            <h:outputText value="#{empty reportController.site ? 'All Sites' : reportController.site.name}"/>
                                        </div>

                                        <div class="d-flex gap-2">
                                            <h:outputText value="Service Group" style="font-weight:600;"/>
                                            <h:outputText 
                                                value="#{empty reportController.category ? 'All Service Groups':reportController.category.name}"/>
                                        </div>

                                        <div class="d-flex gap-2">
                                            <h:outputText value="Service Name" style="font-weight:600;"/>
                                            <h:outputText 
                                                value="#{empty reportController.item ? 'All services' :reportController.item.name}"/>
                                        </div>
                                        
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Visit Type" style="font-weight:600;"/>
                                            <h:outputText 
                                                value="#{empty reportController.type  ? 'All types' :reportController.type}"/>
                                        </div>
                                        
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Speciality" style="font-weight:600;"/>
                                            <h:outputText 
                                                value="#{empty reportController.speciality ? 'Any Speciality' :reportController.speciality.name}"/>
                                        </div>
                                        
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Consultant" style="font-weight:600;"/>
                                            <h:outputText 
                                                value="#{empty reportController.doctor ? 'All doctors' :reportController.doctor.name}"/>
                                        </div>

                                        <div class="d-flex gap-2">
                                            <h:outputText value="Report Type" style="font-weight:600;"/>
                                            <h:outputText value="#{reportController.reportType}"/>
                                        </div>

                                    </div>
                                </div>

                                <div>
                                    <table >
                                        <thead>
                                            <tr>
                                                <th style="width: 5mm;font-weight: 700;">
                                                    <h:outputText value="S.No" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="width: 17mm; font-weight: 700; text-align: left;">
                                                    <h:outputText value="Referring Doctor" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style="width: 17mm; font-weight: 700; text-align: left;">
                                                    <h:outputText value="Agent Name" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style="width: 17mm; font-weight: 700; text-align: right;">
                                                    <h:outputText value="Total Count" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style="width: 17mm; font-weight: 700; text-align: right;">
                                                    <h:outputText value="Gross Amount" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style="width: 17mm; font-weight: 700; text-align: right;">
                                                    <h:outputText value="Hos. Amount" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style="width: 10mm; font-weight: 700; text-align: right;">
                                                    <h:outputText value="CC Amount" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style="width: 10mm; font-weight: 700; text-align: right;">
                                                    <h:outputText value="Dis. Amount" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style="width: 10mm; font-weight: 700; text-align: right;">
                                                    <h:outputText value="Pro. Amount" style="margin-right: 1mm;"/>
                                                </th>
                                                <th style="width: 10mm; font-weight: 700; text-align: right;">
                                                    <h:outputText value="Net Amount" style="margin-right: 1mm;"/>
                                                </th>
                
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <ui:repeat value="#{reportController.testWiseCounts}" var="row" varStatus="i">
                                                <tr>
                                                    <td style="width: 5mm; text-align: left;">
                                                        <h:outputText value="#{i.index +1}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style="width: 17mm; text-align: left;">
                                                        <h:outputText value="#{row.doctor.nameWithTitle}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style="width: 17mm; text-align: left;">
                                                        <h:outputText value="#{row.billItem.bill.collectingCentre.name}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style="width: 17mm; text-align: right;">
                                                        <h:outputText value="#{row.count}" style="margin-right: 1mm;"/>
                                                    </td>
                                                    <td style="width: 17mm; text-align: right;">
                                                        <h:outputText value="#{row.total + row.discount}" style="margin-right: 1mm;">
                                                           <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style="width: 17mm; text-align: right;">
                                                        <h:outputText value="#{row.hosFee}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style="width: 10mm; text-align: right;">
                                                        <h:outputText value="#{row.ccFee}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style="width: 10mm; text-align: right;">
                                                        <h:outputText value="#{row.discount}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style="width: 10mm; text-align: right;">
                                                        <h:outputText value="#{row.proFee}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style="width: 10mm; text-align: right;">
                                                        <h:outputText value="#{row.total}" style="margin-right: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00" />
                                                        </h:outputText>
                                                    </td>
                                                    
                                                </tr>
                                            </ui:repeat>
                                        </tbody>
                                        <tfoot>
                                            <tr>
                                                <td colspan="3" style="width: 39mm; text-align: center;">
                                                    <h:outputText value="Total" style="padding: 0px!important; margin: 0px!important; font-weight: bold"/>
                                                </td>
                                                <td style="width: 10mm; text-align: right;">
                                                    <h:outputText value="#{reportController.totalCount}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                <td style="width: 10mm; text-align: right;">
                                                    <h:outputText value="#{reportController.totalNetTotal + reportController.totalDiscount}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                <td style="width: 10mm; text-align: right;">
                                                    <h:outputText value="#{reportController.totalHosFee}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                <td style="width: 10mm; text-align: right;">
                                                    <h:outputText value="#{reportController.totalCCFee}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                <td style="width: 10mm; text-align: right;">
                                                    <h:outputText value="#{reportController.totalDiscount}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                 <td style="width: 10mm; text-align: right;">
                                                    <h:outputText value="#{reportController.totalProFee}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                                 <td style="width: 10mm; text-align: right;">
                                                    <h:outputText value="#{reportController.totalNetTotal}" style="padding: 0px!important; margin: 0px!important; font-weight: bold" >
                                                        <f:convertNumber pattern="#,##0.00" />
                                                    </h:outputText>
                                                </td>
                                              
                                            </tr>
                                        </tfoot>
                                    </table>

                                </div>

                            </div>
                        </h:panelGroup>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
