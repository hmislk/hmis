<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"

      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:body>
        <ui:composition template="/reports/index.xhtml">
            <ui:define name="subcontent">
                <h:form >
                    <p:panel header="Surgery wise count" styleClass="my-2" >
                        <h:panelGrid columns="5" class="w-100">

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa mr-2"/>
                                <p:outputLabel value="From Date" for="fromDate" styleClass="m-3"/>
                            </h:panelGroup>

                            <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="fromDate"
                                value="#{inwardReportController.fromYearStartDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}"
                                />

                            <p:spacer width="40"/>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa mr-2"/>
                                <p:outputLabel value="To Date" for="toDate" styleClass="m-3"/>
                            </h:panelGroup>

                            <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="toDate"
                                value="#{inwardReportController.toYearEndDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}"
                                />

                                                            <h:outputText value="&#xf0f1;" styleClass="fa mr-2"/> 
                                                            <p:outputLabel value="Surgery Name" for="cmdFromSurgery" styleClass="m-3"/>
                                                        </h:panelGroup>
                                                        <p:selectOneMenu id="cmdFromSurgery" value="" filter="true" styleClass="w-100 form-control">

                                                            <p:outputLabel value="Surgery Category" for="cmdSurgeryCategory" styleClass="m-3"/>
                                                        </h:panelGroup>
                                                        <p:selectOneMenu id="cmdSurgeryCategory" value="" filter="true" styleClass="w-100 form-control">
                                                            <f:selectItem itemLabel="All" itemValue="" />
                            
                                                        </p:selectOneMenu>
                            
                            
                            
                                                        <h:panelGroup layout="block" styleClass="form-group">
                                                            <h:outputText value="&#xf080;" styleClass="fa mr-2"/> 
                                                            <p:outputLabel value="Chart Type" for="chartType" styleClass="m-3"/>
                                                        </h:panelGroup>
                                                        <p:selectOneMenu id="chartType" styleClass="w-100">
                                                            <f:selectItem itemLabel="Select Chart Type" itemValue="" noSelectionOption="true"/>
                                                            <f:selectItem itemLabel="Bar Chart" itemValue="bar"/>
                                                            <f:selectItem itemLabel="Line Chart" itemValue="line"/>
                                                        </p:selectOneMenu>-->

                        </h:panelGrid>

                        <div class="d-flex align-items-center my-4">

                            <p:commandButton 
                                class="ui-button-warning mx-1"
                                icon="fas fa-cogs"
                                ajax="false"
                                action="#{inwardReportController.processSurgeryCountSurgeryWiseReport()}"
                                value="Process" />

                            <p:commandButton 
                                class="ui-button-primary mx-1"
                                icon="fas fa-print"
                                ajax="false"
                                value="Print All" />

                            <p:commandButton 
                                class="ui-button-success mx-1"
                                icon="fas fa-file-excel"
                                ajax="false"
                                value="Download" />

                            <p:commandButton 
                                class="ui-button-danger mx-1"
                                icon="fas fa-file-pdf"
                                ajax="false"
                                value="PDF" />

                        </div>


                        <p:dataTable id="tb"
                                     value="#{inwardReportController.surgeryCountSurgeryWiseList}"
                                     var="row"
                                     rowIndexVar="n"
                                     paginator="true"
                                     paginatorPosition="bottom"
                                     rows="25"
                                     paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                     currentPageReportTemplate="Showing {startRecord} to {endRecord} of {totalRecords}"
                                     rowsPerPageTemplate="10,25,50,100,500,1000"
                                     rowStyleClass="#{row.grandTotal ? 'ui-state-highlight' : ''}"
                                     styleClass="table-sm">

                            <p:columnGroup type="header">
                                <p:row>
                                    <p:column rowspan="2" headerText="#" style="width:40px; text-align:center;"/>
                                    <p:column rowspan="2" headerText="Surgery Name"/>
                                    <p:column rowspan="2" headerText="Surgery Category"/>
                                    <p:column colspan="12" headerText="Monthly Count" style="text-align:center;"/>
                                    <p:column rowspan="2" headerText="Total" style="text-align:center;"/>
                                </p:row>
                                <p:row>
                                    <p:column headerText="Jan" style="text-align:center;"/>
                                    <p:column headerText="Feb" style="text-align:center;"/>
                                    <p:column headerText="Mar" style="text-align:center;"/>
                                    <p:column headerText="Apr" style="text-align:center;"/>
                                    <p:column headerText="May" style="text-align:center;"/>
                                    <p:column headerText="Jun" style="text-align:center;"/>
                                    <p:column headerText="Jul" style="text-align:center;"/>
                                    <p:column headerText="Aug" style="text-align:center;"/>
                                    <p:column headerText="Sep" style="text-align:center;"/>
                                    <p:column headerText="Oct" style="text-align:center;"/>
                                    <p:column headerText="Nov" style="text-align:center;"/>
                                    <p:column headerText="Dec" style="text-align:center;"/>
                                </p:row>
                            </p:columnGroup>

                            <p:column style="text-align:center; width:40px;">
                                <h:outputText value="#{n + 1}" rendered="#{!row.grandTotal}" />
                            </p:column>

                            <p:column>
                                <h:outputText value="#{row.surgeryName}"
                                              style="#{row.grandTotal ? 'font-weight:bold;' : ''}" />
                            </p:column>

                            <p:column>
                                <h:outputText value="#{row.surgeryCategory}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.january}" rendered="#{row.january != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.february}" rendered="#{row.february != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.march}" rendered="#{row.march != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.april}" rendered="#{row.april != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.may}" rendered="#{row.may != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.june}" rendered="#{row.june != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.july}" rendered="#{row.july != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.august}" rendered="#{row.august != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.september}" rendered="#{row.september != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.october}" rendered="#{row.october != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.november}" rendered="#{row.november != 0}" />
                            </p:column>

                            <p:column style="text-align:center;">
                                <h:outputText value="#{row.december}" rendered="#{row.december != 0}" />
                            </p:column>

                            <p:column style="text-align:center; font-weight:bold;">
                                <h:outputText value="#{row.yearTotal}" />
                            </p:column>

                        </p:dataTable>


                    </p:panel>

                </h:form>

            </ui:define>
        </ui:composition>

    </h:body>
</html>
