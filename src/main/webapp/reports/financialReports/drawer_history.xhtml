<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Drawer History</title>
    </h:head>
    <h:body>
        <ui:composition template="/reports/index.xhtml">
            <ui:define name="subcontent">
                <h:form>
                    <p:panel>
                        <f:facet name="header">
                            <h:outputLabel value="Drawer History" />
                        </f:facet>

                        <h:panelGrid columns="4" class="w-100">
                            <p:outputLabel for="fromDatePicker" value="From Date" />
                            <p:datePicker id="fromDatePicker"
                                          showTime="true"
                                          class="w-100"
                                          inputStyleClass="w-100"
                                          value="#{drawerEntryController.fromDate}"
                                          pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                            <p:outputLabel for="toDatePicker" value="To Date" />
                            <p:datePicker id="toDatePicker"
                                          showTime="true"
                                          class="w-100"
                                          inputStyleClass="w-100"
                                          value="#{drawerEntryController.toDate}"
                                          pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                            <p:outputLabel for="userSearch" value="User" />
                            <p:autoComplete id="userSearch"
                                            value="#{drawerEntryController.webUser}"
                                            completeMethod="#{webUserController.completeUser}"
                                            var="w"
                                            class="w-100"
                                            inputStyleClass="form-control"
                                            itemLabel="#{w.webUserPerson.name}"
                                            itemValue="#{w}" />
                        </h:panelGrid>

                        <div class="my-2">
                            <p:commandButton ajax="false"
                                             value="Process"
                                             action="#{drawerEntryController.prosessingCashierDrawerEntry()}"
                                             icon="fas fa-cogs"
                                             class="ui-button-warning mx-1" />
                            <p:commandButton ajax="false"
                                             value="Print"
                                             icon="fas fa-print"
                                             class="ui-button-info mx-1">
                                <p:printer target="tbl" />
                            </p:commandButton>
                            <p:commandButton ajax="false"
                                             value="Excel"
                                             icon="fas fa-file-excel"
                                             class="ui-button-success mx-1">
                                <p:dataExporter fileName="#{drawerEntryController.exportFileName}" type="xlsx" target="tbl" />
                            </p:commandButton>
                            <p:commandButton ajax="false"
                                             value="PDF"
                                             icon="fas fa-file-pdf"
                                             class="ui-button-danger mx-1">
                                <p:dataExporter fileName="#{drawerEntryController.exportFileName}" type="pdf" target="tbl" />
                            </p:commandButton>
                        </div>

                        <p:dataTable id="tbl"
                                     var="drawerentry"
                                     value="#{drawerEntryController.userDrawerEntry}"
                                     scrollable="true"
                                     scrollWidth="100%"
                                     class="mt-2">

                            <f:facet name="header">
                                <h:outputText value="Drawer History" style="font-size:1.1em; font-weight:bold; display:block;" />
                                <h:outputText value="From: " style="font-weight:bold;" />
                                <h:outputText value="#{drawerEntryController.fromDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputText>
                                <h:outputText value="   To: " style="font-weight:bold; margin-left:1em;" />
                                <h:outputText value="#{drawerEntryController.toDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputText>
                                <h:outputText rendered="#{drawerEntryController.webUser != null}"
                                              value="   User: #{drawerEntryController.webUser.webUserPerson.name}"
                                              style="font-weight:bold; margin-left:1em;" />
                            </f:facet>

                            <f:facet name="footer">
                                <h:outputText value="Printed by: #{sessionController.loggedUser.webUserPerson.name}" style="font-weight:bold;" />
                                <h:outputText value="   Printed at: " style="margin-left:1em;" />
                                <h:outputText value="#{sessionController.currentDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputText>
                            </f:facet>

                            <p:column headerText="#" style="width:3em; text-align:center;">
                                <h:outputText value="#{drawerEntryController.userDrawerEntry.indexOf(drawerentry) + 1}" />
                            </p:column>

                            <p:column headerText="Bill Number" style="width:10em;">
                                <h:outputText value="#{drawerentry.bill.deptId}" />
                            </p:column>

                            <p:column headerText="Created" style="width:12em;">
                                <h:outputText value="#{drawerentry.bill.createdAt}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Department" style="width:12em;">
                                <h:outputText value="#{drawerentry.bill.fromDepartment.name}" />
                            </p:column>

                            <p:column headerText="Method" style="width:10em; text-align:center;">
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'Cash'}"                  value="#{drawerentry.paymentMethod.label}" severity="success" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'Card'}"                  value="#{drawerentry.paymentMethod.label}" severity="warning" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'Cheque'}"                value="#{drawerentry.paymentMethod.label}" severity="info" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'ewallet'}"               value="#{drawerentry.paymentMethod.label}" severity="info" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'Slip'}"                  value="#{drawerentry.paymentMethod.label}" severity="info" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'Agent'}"                 value="#{drawerentry.paymentMethod.label}" severity="warning" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'IOU'}"                   value="#{drawerentry.paymentMethod.label}" severity="danger" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'Staff'}"                 value="#{drawerentry.paymentMethod.label}" severity="danger" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'Credit'}"                value="#{drawerentry.paymentMethod.label}" severity="danger" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'Staff_Welfare'}"         value="#{drawerentry.paymentMethod.label}" severity="warning" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'PatientDeposit'}"        value="#{drawerentry.paymentMethod.label}" severity="info" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'PatientPoints'}"         value="#{drawerentry.paymentMethod.label}" severity="info" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'OnlineSettlement'}"      value="#{drawerentry.paymentMethod.label}" severity="info" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'MultiplePaymentMethods'}" value="#{drawerentry.paymentMethod.label}" severity="warning" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'Voucher'}"               value="#{drawerentry.paymentMethod.label}" severity="info" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'YouOweMe'}"              value="#{drawerentry.paymentMethod.label}" severity="danger" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'OnCall'}"                value="#{drawerentry.paymentMethod.label}" severity="secondary" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'None'}"                  value="#{drawerentry.paymentMethod.label}" severity="secondary" />
                                <p:badge rendered="#{drawerentry.paymentMethod eq 'OnlineBookingAgent'}"    value="#{drawerentry.paymentMethod.label}" severity="info" />
                            </p:column>

                            <p:column headerText="Before In Hand" style="width:9em; background-color:#c4fcff; text-align:right;">
                                <h:outputText value="#{drawerentry.beforeInHandValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="After In Hand" style="width:9em; background-color:#c4fcff; text-align:right;">
                                <h:outputText value="#{drawerentry.afterInHandValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Cash" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'Cash'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Card" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'Card'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Cheque" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'Cheque'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="e-Wallet" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'ewallet'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Slip" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'Slip'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Agent" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'Agent'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="IOU" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'IOU'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Staff Credit" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'Staff'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Credit" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'Credit'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Staff Welfare" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'Staff_Welfare'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Patient Deposit" style="width:9em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'PatientDeposit'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Patient Points" style="width:9em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'PatientPoints'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Online Settlement" style="width:10em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'OnlineSettlement'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Multiple" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'MultiplePaymentMethods'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Voucher" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'Voucher'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="You Owe Me" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'YouOweMe'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Online Booking" style="width:9em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'OnlineBookingAgent'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="On Call" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'OnCall'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="None" style="width:8em; text-align:right;">
                                <h:outputText rendered="#{drawerentry.paymentMethod eq 'None'}" value="#{drawerentry.payment.paidValue}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Before Balance" style="width:9em; background-color:#b8ffc7; text-align:right;">
                                <h:outputText value="#{drawerentry.beforeBalance}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="After Balance" style="width:9em; background-color:#b8ffc7; text-align:right;">
                                <h:outputText value="#{drawerentry.afterBalance}">
                                    <f:convertNumber pattern="#,##0.00" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Navigate" exportable="false" style="width:10em; text-align:center;">
                                <p:commandButton value="View"
                                                 ajax="false"
                                                 icon="fas fa-external-link-alt"
                                                 styleClass="ui-button-info ui-button-outlined"
                                                 action="#{billSearch.navigateToViewBillByAtomicBillType()}">
                                    <f:setPropertyActionListener value="#{drawerentry.bill}" target="#{billSearch.bill}" />
                                </p:commandButton>
                            </p:column>

                        </p:dataTable>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
