<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:body>
        <ui:composition template="/reports/index.xhtml">
            <ui:define name="subcontent">
                <h:form >
                    <p:panel>
                        <f:facet name="header">
                            <h:outputLabel value="Drawer Adjustments" />
                        </f:facet>

                        <h:panelGrid columns="5" class="w-100">

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf133;" styleClass="fa mr-2" />
                                <p:outputLabel value="From Date"  class="mx-3"></p:outputLabel>
                            </h:panelGroup>
                            <p:datePicker  showTime="true"
                                           class="w-100"
                                           inputStyleClass="w-100"
                                           value="#{drawerEntryController.fromDate}"
                                           pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>

                            <p:spacer width="20"></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf133;" styleClass="fa mr-2" />
                                <p:outputLabel value="To Date"  class="mx-3"></p:outputLabel>
                            </h:panelGroup>
                            <p:datePicker  showTime="true"
                                           class="w-100"
                                           inputStyleClass="w-100"
                                           value="#{drawerEntryController.toDate}"
                                           pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>

                        </h:panelGrid>

                        <h:panelGrid columns="4" class="w-100 mt-2">
                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf007;" styleClass="fa mr-2" />
                                <p:outputLabel value="User"  class="mx-3"></p:outputLabel>
                            </h:panelGroup>
                            <p:autoComplete
                                value="#{drawerEntryController.webUser}"
                                completeMethod="#{webUserController.completeUser}"
                                var="wu"
                                itemLabel="#{wu.name}"
                                itemValue="#{wu}"
                                converter="#{webUserConverter}"
                                forceSelection="true"
                                class="w-100"
                                inputStyleClass="w-100" />

                            <p:commandButton
                                value="Process"
                                ajax="false"
                                icon="pi pi-search"
                                class="ui-button-primary mx-2"
                                action="#{drawerEntryController.findAllUsersDrawerAdjustments}"/>
                            <p:commandButton
                                value="Download"
                                ajax="false"
                                icon="pi pi-download"
                                class="ui-button-success">
                                <p:dataExporter fileName="drawer_adjustments" target="tblDrawerAdjustments" type="xlsx" />
                            </p:commandButton>
                        </h:panelGrid>

                        <p:dataTable
                            value="#{drawerEntryController.userDrawerEntry}"
                            var="drawerentry"
                            id="tblDrawerAdjustments"
                            class="mt-3"
                            paginator="true"
                            rows="20"
                            paginatorPosition="bottom"
                            paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                            currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                            rowsPerPageTemplate="10,20,50,{ShowAll|'All'}">

                            <p:column headerText="User" width="10em;">
                                <h:outputText value="#{drawerentry.webUser.name}" />
                            </p:column>

                            <p:column headerText="Bill No." width="12em;">
                                <p:commandLink
                                    value="#{drawerentry.bill.deptId}"
                                    ajax="false"
                                    action="#{billSearch.navigateToViewBillByAtomicBillType()}">
                                    <f:setPropertyActionListener value="#{drawerentry.bill}" target="#{billSearch.bill}"/>
                                </p:commandLink>
                            </p:column>

                            <p:column headerText="Bill Type" style="padding: 6px;" width="12em;">
                                <h:outputText value="#{drawerentry.bill.billTypeAtomic.label}"/>
                            </p:column>

                            <p:column headerText="Date/Time" width="10em;">
                                <h:outputText value="#{drawerentry.createdAt}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Payment Method" width="8em;">
                                <h:outputText value="#{drawerentry.paymentMethod.label}" />
                            </p:column>

                            <p:column headerText="Before in Hand" class="text-end" width="8em;">
                                <p:outputLabel value="#{drawerentry.beforeInHandValue}" class="d-flex justify-content-end">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </p:outputLabel>
                            </p:column>

                            <p:column headerText="Adjustment" class="text-end" width="8em;">
                                <p:outputLabel value="#{drawerentry.transactionValue}" class="d-flex justify-content-end">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </p:outputLabel>
                            </p:column>

                            <p:column headerText="After in Hand" class="text-end" width="8em;">
                                <p:outputLabel value="#{drawerentry.afterInHandValue}" class="d-flex justify-content-end">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </p:outputLabel>
                            </p:column>

                        </p:dataTable>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
