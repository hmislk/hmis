<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">
                <h:outputStylesheet library="css" name="printing/reportprint.css" />
                <h:form >
                        <h:panelGroup>
                            <p:panel header="Petty Cash Payment Report" styleClass="my-2" >
                                <f:facet name="header">
                                    <div class="d-flex justify-content-between">
                                        <h:outputText value="Petty Cash Payment Report" class="mt-2"/>
                                        <div class="d-flex gap-2">
                                            <p:commandButton 
                                                icon="fa-solid fa-print"
                                                class="ui-button-info"
                                                style="width: 150px"
                                                ajax="false" 
                                                value="Print">
                                                <p:printer target="pettyRp" />
                                            </p:commandButton>
                                            <p:commandButton 
                                                ajax="false" 
                                                value="Back to Report" 
                                                style="width: 200px"
                                                icon="fa fa-arrow-left"
                                                class="ui-button-warning"
                                                action="/reports/financialReports/petty_cash_payment?faces-redirect=true">
                                            </p:commandButton>
                                        </div>
                                    </div>
                                </f:facet>
                            </p:panel>

                            <h:panelGroup id="pettyRp" class="d-flex justify-content-center">
                                <div class="paper">
                                    <div class="header" >
                                            <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 18px;">
                                                <h:outputText value="#{sessionController.institution.name}"/>
                                            </div>
                                            <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 16px;">
                                                <h:outputText value="Petty Cash Payment Report"/>
                                            </div>
                                        <div class="d-flex justify-content-center m-3">
                                            <h:panelGrid columns="6" styleClass="report-header-table" style="font-size:10px; width:75%;" columnClasses="label,value,label,value,label,value">

                                                <!-- Row 1 -->
                                                <h:outputText value="From Date:" styleClass="label"/>
                                                <h:outputText value="#{reportController.fromDate}">
                                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                </h:outputText>

                                                <h:outputText value="To Date:" styleClass="label"/>
                                                <h:outputText value="#{reportController.toDate}">
                                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                                </h:outputText>

                                                <h:outputText value="Paid To Department" styleClass="label"/>
                                                <h:outputText value="#{reportController.toDepartment != null ? reportController.toDepartment.name : 'All'}"/>   


                                                <!-- Row 2 -->
                                                <h:outputText value="Institution:" styleClass="label"/>
                                                <h:outputText value="#{reportController.institution != null ? reportController.institution.name : 'All'}"/>

                                                <h:outputText value="Site:" styleClass="label"/>
                                                <h:outputText value="#{reportController.site != null ? reportController.site.name : 'All'}"/>

                                                <h:outputText value="Department:" styleClass="label"/>
                                                <h:outputText value="#{reportController.department != null ? reportController.department.name : 'All'}"/>

                                                <!-- Row 3 -->
                                                <h:outputText value="Paid To Staff:" styleClass="label"/>
                                                <h:outputText value="#{reportController.toStaff != null ? reportController.toStaff.person.name : 'All'}"/>

                                                <h:outputText value="User:" styleClass="label"/>
                                                <h:outputText value="#{reportController.webUser != null ? reportController.webUser.webUserPerson.name : 'All'}"/>

                                            </h:panelGrid>
                                        </div>   
                                    </div>
                                    <p:dataTable id="dtaPr" value="#{reportController.bills}" var="pc" rowIndexVar="rowIndex" styleClass="table" style="font-size: 8pt!important;">
                                        <p:column 
                                            headerText="S" 
                                            width="7mm">
                                            <h:outputText value="#{rowIndex+1}" ></h:outputText>
                                        </p:column>
                                        <p:column 
                                            headerText="Cashier"
                                            width="26mm">
                                            <h:outputText value="#{pc.creater.webUserPerson.name}" ></h:outputText>
                                        </p:column>
                                        <p:column 
                                            headerText="Bill No" 
                                            width="32mm">
                                            <h:outputText value="#{pc.deptId}" ></h:outputText> <br/>
                                            <h:outputText value="Cancelled - #{pc.cancelledBill.deptId}" rendered="#{pc.cancelledBill ne null}" style="font-size: 7pt!important; color: red;"/>
                                            <h:outputText value="Refunded - #{pc.refundedBill.deptId}" rendered="#{pc.refundedBill ne null}" style="font-size: 7pt!important; color: rgb(178, 178, 42);"/>
                                        </p:column>
                                        <p:column 
                                            headerText="Bill Date" 
                                            width="27mm">
                                            <h:outputText value="#{pc.billDate}">
                                                <f:convertDateTime pattern="yyyy MM dd hh:mm a" />
                                            </h:outputText>
                                        </p:column>
                                        <p:column 
                                            headerText="Document No" 
                                            width="22mm">
                                            <h:outputText value="#{pc.invoiceNumber}" ></h:outputText>
                                        </p:column>
                                        <p:column 
                                            headerText="Date" 
                                            width="25mm">
                                            <h:outputText value="#{pc.billDate}" >
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}" />
                                            </h:outputText>
                                        </p:column>
                                        <p:column 
                                            headerText="For Whom" 
                                            width="26mm">
                                            <h:outputText value="#{pc.staff.person.name}" rendered="#{pc.staff ne null}" ></h:outputText>
                                            <h:outputText value="#{pc.person.name}" rendered="#{pc.person ne null}" ></h:outputText>
                                        </p:column>
                                        <p:column 
                                            headerText="Paid For" 
                                            width="26mm">
                                            <h:outputText value="#{pc.toDepartment.name}" ></h:outputText>
                                        </p:column>
                                        <p:column 
                                            headerText="Purpose" 
                                            width="30mm">
                                            <h:outputText value="#{pc.comments}" ></h:outputText>
                                        </p:column>
                                        <p:column 
                                            headerText="Status" 
                                            width="19mm">
                                            <h:outputText value="Approved" rendered="#{pc.approveUser ne null}" style="color: green; font-weight: 700;"/>
                                            <h:outputText value="Not Approved" rendered="#{pc.approveUser eq null}" style="color: red; font-weight: 700;"/>
                                        </p:column>
                                        <p:column 
                                            headerText="Amount" 
                                            style="text-align: right"  
                                            width="22mm">
                                            <h:outputText value="#{0-pc.total}">
                                                <f:convertNumber pattern="#,##0.00" />
                                            </h:outputText>
                                            <f:facet name="footer">
                                                <h:outputText value="#{0 - reportController.netTotal}" >
                                                    <f:convertNumber pattern="#,##0.00" />
                                                </h:outputText>
                                            </f:facet>
                                        </p:column>
                                    </p:dataTable>
                                </div>
                            </h:panelGroup>
                    </h:panelGroup>

                </h:form>

            </ui:define>
        </ui:composition>

    </h:body>
</html>
