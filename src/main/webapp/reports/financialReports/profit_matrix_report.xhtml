<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body class="w-100 border">

        <ui:composition template="/reports/index.xhtml" class="w-100 border">
            <ui:define name="subcontent">
                <h:form class="w-100">
                    <p:panel header="Profit Matrix Report" class="w-100 my-2">
                        <h:panelGrid columns="5" class="w-100">

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa mr-2" />
                                <p:outputLabel value="From" for="fromDate" styleClass="m-3" />
                            </h:panelGroup>

                            <p:datePicker
                                value="#{reportController.fromDate}"
                                id="fromDate"
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                pattern="dd/MM/yyyy HH:mm:ss"   
                                showTime="true"                                                           
                                monthNavigator="true"           
                                yearNavigator="true"                              
                                timeInput="true"                
                                />

                            <p:spacer width="20"></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;"
                                              styleClass="fa mr-2"/> 
                                <p:outputLabel value="To" for="toDate" class="m-3"/>
                            </h:panelGroup>
                            <p:datePicker
                                value="#{reportController.toDate}"
                                id="toDate"
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                pattern="dd/MM/yyyy HH:mm:ss"   
                                showTime="true"                                                           
                                monthNavigator="true"           
                                yearNavigator="true"                              
                                timeInput="true"                
                                />

                            <h:panelGroup layout="block" class="form-group">
                                <h:outputText value="&#xf084;" styleClass="fa mr-2" />
                                <h:outputLabel for="adType" value="Admission Types"  styleClass="m-3" />
                            </h:panelGroup>

                            <p:selectCheckboxMenu id="adType"
                                                  value="#{reportController.admissionTypes}"
                                                  styleClass="w-100"
                                                  label="Select Type"
                                                  updateLabel="true">
                                <!--                                <f:selectItem itemLabel="Normal" itemValue="1" />
                                                                <f:selectItem itemLabel="Dialysis" itemValue="2" />
                                                                <f:selectItem itemLabel="ETU" itemValue="3" />
                                                                <f:selectItem itemLabel="Day Care" itemValue="4" />-->
                                <f:selectItems  value="#{admissionTypeController.items}" var="myItem" itemValue="#{myItem}" ></f:selectItems>

                            </p:selectCheckboxMenu>

                            <p:spacer width="20"></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf236;" styleClass="fa mr-2" />
                                <h:outputLabel value="Room Category" for="rCat" class="m-3"/>
                            </h:panelGroup>
                            <p:selectCheckboxMenu id="rCat"
                                                  value="#{reportController.roomCategories}"
                                                  styleClass="w-100"
                                                  label="Select Category"
                                                  updateLabel="true">
                                <!--                                <f:selectItem itemLabel="Suprior A" itemValue="1" />
                                                                <f:selectItem itemLabel="Suprior B" itemValue="2" />
                                                                <f:selectItem itemLabel="Premium Rage" itemValue="3" />
                                                                <f:selectItem itemLabel="Bay Window" itemValue="4" />
                                                                <f:selectItem itemLabel="Kings Court" itemValue="4" />-->
                                <f:selectItems value="#{roomCategoryController.items}" var="cat" itemLabel="#{cat.name}" itemValue="#{cat}" />
                            </p:selectCheckboxMenu>


                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf02b;" styleClass="fa mr-2" />
                                <h:outputLabel value="Type" for="type" class="m-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="type"
                                value="#{reportController.reportType}"
                                class="w-100"
                                filter="true">
                                <f:selectItem itemLabel="Select Type"/>
                                <f:selectItem itemLabel="Detail" itemValue="detail"/>
                                <f:selectItem itemLabel="Summary" itemValue="summery"/>
                            </p:selectOneMenu>


                            <p:spacer width="20"></p:spacer>


                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf0a0;" styleClass="fa mr-2" />
                                <h:outputLabel value="Invoice No" for="acInvoice" class="m-3"/>
                            </h:panelGroup>
                            <p:autoComplete 
                                id="acInvoice"
                                value="#{reportController.invoiceNumber}"
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                placeholder="Invoice Number"
                                >
                            </p:autoComplete>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf15c;" styleClass="fa mr-2" />
                                <h:outputLabel value="BHT NO" for="acBht" class="m-3"/>
                            </h:panelGroup>
                            <p:autoComplete 
                                id="acBht"
                                value="#{reportController.bhtNo}"
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                placeholder="BHT Number"
                                completeMethod="#{admissionController.completePatient}"
                                >
                            </p:autoComplete>

                            <p:spacer width="20"></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf007;" styleClass="fa mr-2" />
                                <h:outputLabel value="Patient Name/MRN" for="acName" class="m-3"/>
                            </h:panelGroup>
                            <p:autoComplete 
                                id="acName"
                                value="#{reportController.patientName}"
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                placeholder="Patient Name/MRN"
                                completeMethod="#{admissionController.completePatient}"
                                >
                            </p:autoComplete>


                        </h:panelGrid>

                        <div class="d-flex align-items-center my-3">

                            <p:commandButton 
                                class="ui-button-warning mx-1"
                                icon="fas fa-cogs"
                                ajax="false"
                                value="Process" 
                                action="#{reportController.createProfitMatrixReport}"/>

                            <p:commandButton 
                                class="ui-button-primary mx-1"
                                icon="fas fa-print"
                                ajax="false"
                                value="Print All" />

                            <p:commandButton 
                                class="ui-button-success mx-1"
                                icon="fas fa-file-excel"
                                ajax="false"
                                value="Download" />

                            <p:commandButton 
                                class="ui-button-danger mx-1"
                                icon="fas fa-file-pdf"
                                ajax="false"
                                value="PDF" />

                        </div>

                        <h:panelGroup id="printPanel" >
                            <p:panel header="Type: Summary"
                                     styleClass="m-3"
                                     rendered="#{empty reportController.reportType or reportController.reportType eq 'summery'}">
                                <p:dataTable
                                    id="summeryWise"
                                    value="#{reportController.inPatientBillList}"
                                    var="pe"
                                    rowIndexVar="n"
                                    paginator="true"
                                    paginatorPosition="bottom"
                                    rows="10"
                                    rendered="true"
                                    paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                    currentPageReportTemplate="Showing {startRecord} to {endRecord} of {totalRecords}"
                                    rowsPerPageTemplate="5,10,15,25,50,100,500,1000"
                                    styleClass="table-sm">

                                    <p:column width="4em" styleClass="text-center">
                                        <f:facet name="header"><h:outputText value="S.No"/></f:facet>
                                        <h:outputText value="#{n+1}"/>
                                        <f:facet name="footer"><h:outputText value="Total"/></f:facet>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header"><h:outputText value="Invoice No"/></f:facet>
                                        <h:outputText value="#{pe.finalBill.deptId}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header"><h:outputText value="Admission No"/></f:facet>
                                        <h:outputText value="#{pe.bhtNo}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header"><h:outputText value="MRNO"/></f:facet>
                                        <h:outputText value="#{pe.patient.phn}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header"><h:outputText value="Patient Name"/></f:facet>
                                        <h:outputText value="#{pe.patient.person.nameWithTitle}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header"><h:outputText value="Visit Type"/></f:facet>
                                        <h:outputText value="#{pe.patientEncounterType}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header"><h:outputText value="Referring Doctor Name"/></f:facet>
                                        <h:outputText value="#{pe.referringDoctor.person.name}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header"><h:outputText value="Invoice Amount"/></f:facet>
                                        <h:outputText value="#{pe.grantTotal}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                        <f:facet name="footer">
                                            <h:outputText >
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </f:facet>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header"><h:outputText value="Profit Margin"/></f:facet>
                                        <h:outputText value="#{pe.grantTotal - pe.netTotal}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                        <f:facet name="footer">
                                            <h:outputText >
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </f:facet>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header"><h:outputText value="Final Amount"/></f:facet>
                                        <h:outputText value="#{pe.netTotal}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                        <f:facet name="footer">
                                            <h:outputText value="#{reportController.totalNetTotal}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </f:facet>
                                    </p:column>

                                </p:dataTable>
                            </p:panel>
                            <p:panel header="Type: Detail"
                                     styleClass="m-3"
                                     rendered="#{reportController.reportType eq 'detail'}">
                                <p:dataTable
                                    id="detailWise"
                                    value="#{reportController.billItems}"
                                    var="bi"
                                    rowIndexVar="n"
                                    paginator="true"
                                    paginatorPosition="bottom"
                                    rows="10"
                                    paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                    currentPageReportTemplate="Showing {startRecord} to {endRecord} of {totalRecords}"
                                    rowsPerPageTemplate="5,10,15,25,50,100,500,1000"
                                    styleClass="table-sm">

                                    <p:column width="4em" styleClass="text-center">
                                        <f:facet name="header">
                                            <h:outputText value="S.No" />
                                        </f:facet>
                                        <h:outputText value="#{n+1}"/>
                                        <f:facet name="footer">
                                            <h:outputText value="Total"/>
                                        </f:facet>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Invoice No" />
                                        </f:facet>
                                        <h:outputText value="#{bi.bill.deptId}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Admission No" />
                                        </f:facet>
                                        <h:outputText value="#{bi.bill.patientEncounter.bhtNo}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="MRNO" />
                                        </f:facet>
                                        <h:outputText value="#{bi.bill.patientEncounter.patient.phn}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Patient Name" />
                                        </f:facet>
                                        <h:outputText value="#{bi.bill.patientEncounter.patient.person.nameWithTitle}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Visit Type" />
                                        </f:facet>
                                        <h:outputText value="#{bi.bill.patientEncounter.patientEncounterType}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Referring Doctor Name" />
                                        </f:facet>
                                        <h:outputText value="#{bi.bill.patientEncounter.referringDoctor.person.name}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Service Name" />
                                        </f:facet>
                                        <h:outputText value="#{bi.item.name}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Service Department" />
                                        </f:facet>
                                        <h:outputText value="#{bi.item.department.name}"/>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Invoice Amount" />
                                        </f:facet>
                                        <h:outputText value="#{bi.grossValue}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Service Value" />
                                        </f:facet>
                                        <h:outputText value="#{bi.item.itemFee.fee}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Profit Margin" />
                                        </f:facet>
                                        <h:outputText value="#{bi.item.itemFee. - bi.netValue}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Matrix Percentage" />
                                        </f:facet>
                                        <h:outputText
                                            value="#{bi.grossValue ne 0 ? ((bi.grossValue - bi.netValue) * 100.0 / bi.grossValue) : 0}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </p:column>

                                    <p:column width="8em">
                                        <f:facet name="header">
                                            <h:outputText value="Final Amount" />
                                        </f:facet>
                                        <h:outputText value="#{bi.netValue}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                        <f:facet name="footer">
                                            <h:outputText value="#{reportController.totalNetTotal}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </f:facet>
                                    </p:column>

                                </p:dataTable>
                            </p:panel>
                        </h:panelGroup>
