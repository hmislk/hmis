<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/reports/index.xhtml">
            <ui:define name="subcontent">

                <h:form>
                    <p:panel header="Organism Antibiotic Sensitivity Report">

                        <!-- Filter Fields -->
                        <div class="container-fluid px-0">

                            <div class="row align-items-center mb-2">
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-calendar-alt mr-2"/>
                                    <p:outputLabel value="From (Billed) Date"/>
                                </div>
                                <div class="col-md-4">
                                    <p:datePicker value="#{reportController.fromDate}"
                                                  styleClass="d-block w-100"
                                                  inputStyleClass="form-control"
                                                  pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                </div>
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-calendar-alt mr-2"/>
                                    <p:outputLabel value="To (Billed) Date"/>
                                </div>
                                <div class="col-md-4">
                                    <p:datePicker value="#{reportController.toDate}"
                                                  styleClass="d-block w-100"
                                                  inputStyleClass="form-control"
                                                  pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                </div>
                            </div>

                            <div class="row align-items-center mb-2">
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-user mr-2"/>
                                    <p:outputLabel value="Age"/>
                                </div>
                                <div class="col-md-4">
                                    <p:selectOneMenu value="#{reportController.patient.age}" style="width:100%">
                                        <f:selectItem itemLabel="Select Age to filter"/>
                                    </p:selectOneMenu>
                                </div>
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-hospital mr-2"/>
                                    <p:outputLabel value="Branch"/>
                                </div>
                                <div class="col-md-4">
                                    <p:selectOneMenu
                                        id="cmdInstitution"
                                        value="#{reportController.institution}"
                                        style="width:100%"
                                        filter="true">
                                        <f:selectItem itemLabel="All"></f:selectItem>
                                        <f:selectItems value="#{institutionController.items}"
                                                       var="i"
                                                       itemLabel="#{i.name}"
                                                       itemValue="#{i}"></f:selectItems>
                                        <p:ajax process="@this" update="cmdDepartment"></p:ajax>
                                    </p:selectOneMenu>
                                </div>
                            </div>

                            <div class="row align-items-center mb-2">
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-sitemap mr-2"/>
                                    <p:outputLabel value="Department"/>
                                </div>
                                <div class="col-md-4">
                                    <p:selectOneMenu
                                        id="cmdDepartment"
                                        value="#{reportController.department}"
                                        style="width:100%"
                                        filter="true">
                                        <f:selectItem itemLabel="All"></f:selectItem>
                                        <f:selectItems value="#{departmentController.getInsDepartments(reportController.institution)}"
                                                       var="d"
                                                       itemLabel="#{d.name}"
                                                       itemValue="#{d}"></f:selectItems>
                                    </p:selectOneMenu>
                                </div>
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-id-card mr-2"/>
                                    <p:outputLabel value="Pateint MRN"/>
                                </div>
                                <div class="col-md-4">
                                    <p:inputText autocomplete="off" id="txtMrn"
                                                 value="#{reportController.patient.phn}"
                                                 styleClass="form-control w-100"/>
                                </div>
                            </div>

                            <div class="row align-items-center mb-2">
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-flask mr-2"/>
                                    <p:outputLabel value="Investigation"/>
                                </div>
                                <div class="col-md-4">
                                    <p:selectOneMenu value="#{reportController.investigation}" style="width:100%">
                                        <f:selectItem itemLabel="Select Investigation"/>
                                        <f:selectItems value="#{investigationController.investigationItems}" itemLabel="#{i.sname}" var="i" itemValue="#{i}"/>
                                    </p:selectOneMenu>
                                </div>
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-user-md mr-2"/>
                                    <p:outputLabel value="Referring Doctor Name"/>
                                </div>
                                <div class="col-md-4">
                                    <p:selectOneMenu value="#{reportController.referingDoctor}" style="width:100%">
                                        <f:selectItem itemLabel="Select referring doctor"/>
                                        <f:selectItems value="#{doctorController.items}" itemLabel="#{d.name}" var="d" itemValue="#{d}"/>
                                    </p:selectOneMenu>
                                </div>
                            </div>

                            <div class="row align-items-center mb-2">
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-stethoscope mr-2"/>
                                    <p:outputLabel value="Visiting Type"/>
                                </div>
                                <div class="col-md-4">
                                    <p:selectOneMenu value="" style="width:100%">
                                        <f:selectItem itemLabel="All visits"/>
                                    </p:selectOneMenu>
                                </div>
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-bug mr-2"/>
                                    <p:outputLabel value="Organism"/>
                                </div>
                                <div class="col-md-4">
                                    <p:selectOneMenu
                                        value=""
                                        style="width:100%"
                                        filter="true">
                                        <f:selectItem itemLabel="Select Organism"></f:selectItem>
                                        <f:selectItems value="#{investigationController.items}" itemLabel="#{d.name}" var="d" itemValue="#{d}"/>
                                    </p:selectOneMenu>
                                </div>
                            </div>

                            <div class="row align-items-center mb-2">
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-pills mr-2"/>
                                    <p:outputLabel value="Antibiotics"/>
                                </div>
                                <div class="col-md-4">
                                    <p:selectOneMenu
                                        value=""
                                        style="width:100%"
                                        filter="true">
                                        <f:selectItems value="#{antibioticController.selectedItems}" var="myItem" itemValue="#{myItem}" itemLabel="#{myItem.name}"></f:selectItems>
                                    </p:selectOneMenu>
                                </div>
                                <div class="col-md-2 text-right font-weight-bold">
                                    <i class="fas fa-chart-bar mr-2"/>
                                    <p:outputLabel value="Sensitivity"/>
                                </div>
                                <div class="col-md-4">
                                    <p:selectOneMenu
                                        value=""
                                        style="width:100%"
                                        filter="true">
                                        <f:selectItem itemLabel="Select Sensitivity"/>
                                        <f:selectItems value="" var="myItem" itemValue="#{myItem}" itemLabel="#{myItem.name}"></f:selectItems>
                                    </p:selectOneMenu>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-12 d-flex justify-content-start" style="gap:8px">
                                    <p:commandButton ajax="false" value="Process" action="null"
                                                     icon="fas fa-cog"
                                                     styleClass="ui-button-warning"/>
                                    <p:commandButton ajax="false" value="Print" action="null"
                                                     icon="fas fa-print"
                                                     styleClass="ui-button-info"/>
                                    <p:commandButton ajax="false" value="Export PDF" action="null"
                                                     icon="fas fa-file-pdf"
                                                     styleClass="ui-button-danger"/>
                                    <p:commandButton ajax="false" value="Export Excel" action="null"
                                                     icon="fas fa-file-excel"
                                                     styleClass="ui-button-success"/>
                                </div>
                            </div>

                        </div>

                    </p:panel>

                    <p:panel header="Report Results" styleClass="mt-3">

                        <h:panelGrid columns="2"
                                     styleClass="table table-bordered table-sm table-striped w-50"
                                     columnClasses="font-weight-bold w-25,w-75">
                            <h:outputLabel value="Branch"/>
                            <h:outputLabel value="#{reportController.institution}"></h:outputLabel>

                            <h:outputLabel value="From Date"/>
                            <h:outputLabel value="#{reportController.fromDate}">
                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}" />
                            </h:outputLabel>

                            <h:outputLabel value="To Date"/>
                            <h:outputLabel value="#{reportController.toDate}">
                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}" />
                            </h:outputLabel>

                            <p:outputLabel value="MRN"/>
                            <p:outputLabel value="#{reportController.patient.phn}"/>

                            <p:outputLabel value="Organism"/>
<!--                            <h:outputLabel value="#{reportController.organism}">
                            </h:outputLabel>-->

                            <p:outputLabel value="Antibiotic"/>
                            <!--                            <p:outputLabel
                                                            value="#{reportController.antibiotic}">

                                                        </p:outputLabel>-->
                            <p:outputLabel value="Sensitivity"/>
                            <!--                            <p:outputLabel
                                                            value="#{reportController.sensitivity}">

                                                        </p:outputLabel>-->

                        </h:panelGrid>


                        <p:dataTable value="null" var="c" styleClass="table table-sm">
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="MRN">
                                <h:outputText value="" />
                            </p:column>
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="Sample Id">
                                <h:outputText value="" />
                            </p:column>
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="Investigation">
                                <h:outputText value="" />
                            </p:column>
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="Specimen">
                                <h:outputText value="" />
                            </p:column>
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="Visit Type">
                                <h:outputText value="" />
                            </p:column>
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="Name">
                                <h:outputText value="" />
                            </p:column>
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="Patient Location">
                                <h:outputText value="" />
                            </p:column>
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="Organism">
                                <h:outputText value="" />
                            </p:column>
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="Antibiotics">
                                <h:outputText value="" />
                            </p:column>
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="Sensitivity">
                                <h:outputText value="" />
                            </p:column>
                            <p:column headerStyle="background:#f8f9fa; color:#212529; font-weight:bold;" headerText="Remarks">
                                <h:outputText value="" />
                            </p:column>

                            <f:facet name="footer">
                                <div class="d-flex justify-content-between align-items-center mt-1">
                                    <div>
                                        <span class="font-weight-bold mr-1">Generated By:</span>
                                        <h:outputText value="#{sessionController.loggedUser.name}" />
                                    </div>
                                    <div>
                                        <span class="font-weight-bold mr-1">Generated On:</span>
                                        <h:outputText value="#{reportController.toDate}">
                                            <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                        </h:outputText>
                                    </div>
                                </div>
                            </f:facet>
                        </p:dataTable>

                    </p:panel>


                </h:form>

            </ui:define>
        </ui:composition>

    </h:body>
</html>
