<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body class="w-100 border">

        <ui:composition template="/reports/index.xhtml" class="w-100 border">
            <ui:define name="subcontent">
                <h:form class="w-100">
                    <p:panel header="Investigation Wise Report" class="w-100">

                        <h:panelGrid columns="5" class="w-100" >

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa mr-2" />
                                <p:outputLabel value="From Date" for="fromDate" styleClass="m-3" />
                            </h:panelGroup>

                            <p:datePicker
                                id="fromDate"
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                pattern="dd/MM/yyyy HH:mm:ss"   
                                showTime="true"                                                           
                                monthNavigator="true"           
                                yearNavigator="true"                              
                                timeInput="true"                
                                />

                            <p:spacer width="20"></p:spacer>


                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;"
                                              styleClass="fa mr-2"/> 
                                <p:outputLabel value="To Date" for="toDate" class="m-3"/>
                            </h:panelGroup>

                            <p:datePicker
                                id="toDate"
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                pattern="dd/MM/yyyy HH:mm:ss"   
                                showTime="true"                                                           
                                monthNavigator="true"           
                                yearNavigator="true"                              
                                timeInput="true"                
                                />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText styleClass="fa fa-university mr-2"/>
                                <p:outputLabel value="Institution" for="phmIns" class="m-3">
                                </p:outputLabel>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="phmIns"
                                class="w-100"
                                filter="true">
                                <f:selectItem itemLabel="All Institutions"/>
                            </p:selectOneMenu>

                            <p:spacer width="20"></p:spacer>


                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText styleClass="fa fa-map-marker-alt mr-2"/>
                                <p:outputLabel value="Site" for="phmSite" class="m-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="phmSite"
                                class="w-100"
                                filter="true">
                                <f:selectItem itemLabel="All Sites"/>
                            </p:selectOneMenu>


                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf0e8;" styleClass="fa mr-2" />
                                <h:outputLabel value="Department" for="sto" class="m-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu id="sto" filter="true"  class="w-100 " >
                                <f:selectItem itemLabel="All Departments" ></f:selectItem>
                            </p:selectOneMenu>

                            <p:spacer width="20"></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText styleClass="fa fa-microscope mr-2" />
                                <h:outputLabel value="Laboratory" for="sLab" class="m-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu id="sLab" class="w-100 " >
                                <f:selectItem itemValue="All" itemLabel="All" ></f:selectItem>
                                <f:selectItem itemValue="B" itemLabel="Biochemistry" />
                                <f:selectItem itemValue="P" itemLabel="Pathelogy" />
                            </p:selectOneMenu>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf492;" styleClass="fa mr-2"/>
                                <h:outputLabel value="Investigation" for="acInvestigationItem" class="m-3"/>
                            </h:panelGroup>
                            <p:autoComplete id="acInvestigationItem" inputStyleClass="w-100"
                                            styleClass="w-100" value=""
                                            completeMethod="#" var="ix"
                                            itemLabel=""
                                            itemValue="" />

                            <p:spacer width="20"></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText styleClass="fa fa-sliders-h mr-2" />
                                <h:outputLabel value="Parameter" for="sParms" class="m-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu id="sParms" class="w-100 " >
                                <f:selectItem itemLabel="Select" ></f:selectItem>                              
                            </p:selectOneMenu>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText  styleClass="fa fa-user-clock mr-2" />
                                <h:outputLabel value="Age" for="sAge" class="m-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu id="sAge" class="w-100 " >
                                <f:selectItem itemLabel="Select" ></f:selectItem>
                                <f:selectItem itemValue="LT" itemLabel="Less than" />
                                <f:selectItem itemValue="GT" itemLabel="Greater than" />
                                <f:selectItem itemValue="E" itemLabel="=" />
                                <f:selectItem itemValue="B" itemLabel="Between" />
                            </p:selectOneMenu>

                            <p:spacer width="20"></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText styleClass="fa fa-cogs mr-2" />
                                <h:outputLabel value="Result" for="sRst" class="m-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu id="sRst" class="w-100 " >
                                <f:selectItem itemLabel="Select" ></f:selectItem>
                                <f:selectItem itemValue="LT" itemLabel="Less than" />
                                <f:selectItem itemValue="GT" itemLabel="Greater than" />
                                <f:selectItem itemValue="E" itemLabel="=" />
                                <f:selectItem itemValue="B" itemLabel="Between" />
                            </p:selectOneMenu>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText  styleClass="fa fa-male mr-2" />
                                <h:outputLabel value="Gender" for="sG" class="m-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu id="sG" class="w-100 " >
                                <f:selectItem itemLabel="All" ></f:selectItem>
                                <f:selectItem itemValue="MALE" itemLabel="Male" />
                                <f:selectItem itemValue="FEMALE" itemLabel="Female" />
                            </p:selectOneMenu>

                            <p:spacer width="20"></p:spacer>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText styleClass="fa fa-stethoscope mr-2"/>
                                <h:outputLabel value="Diagnosis" for="acDiagnosisItem" class="m-3"/>
                            </h:panelGroup>
                            <p:autoComplete id="acDiagnosisItem" inputStyleClass="w-100"
                                            styleClass="w-100" value=""
                                            completeMethod="#" var="ix"
                                            itemLabel=""
                                            itemValue="" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText  styleClass="fa fa-procedures mr-2" />
                                <h:outputLabel value="Visit Type" for="type" class="m-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu id="type" class="w-100 " >
                                <f:selectItem itemValue="All" itemLabel="All" ></f:selectItem>
                                <f:selectItem itemValue="OP" itemLabel="OP" />
                                <f:selectItem itemValue="IP" itemLabel="IP" />
                                <f:selectItem itemValue="CC" itemLabel="CC" />
                            </p:selectOneMenu>

                        </h:panelGrid>

                        <div class="d-flex align-items-center my-4">

                            <p:commandButton 
                                class="ui-button-warning mx-1"
                                icon="fas fa-cogs"
                                ajax="false"
                                value="Process" />

                            <p:commandButton 
                                class="ui-button-primary mx-1"
                                icon="fas fa-print"
                                ajax="false"
                                value="Print All" />

                            <p:commandButton 
                                class="ui-button-success mx-1"
                                icon="fas fa-file-excel"
                                ajax="false"
                                value="Download" />

                            <p:commandButton 
                                class="ui-button-danger mx-1"
                                icon="fas fa-file-pdf"
                                ajax="false"
                                value="PDF" />

                        </div>



                        <p:panel header="Investigation Wise Report" styleClass="my-3">

                            <h:panelGrid columns="4" columnClasses="col-2,col-3,col-2,col-3" styleClass="table table-bordered table-sm mb-3">

                                <h:outputText value="From Date :" />
                                <h:outputText value="">
                                    <f:convertDateTime pattern="dd/MM/yyyy HH:mm:ss"/>
                                </h:outputText>

                                <h:outputText value="To Date :" />
                                <h:outputText value="">
                                    <f:convertDateTime pattern="dd/MM/yyyy HH:mm:ss"/>
                                </h:outputText>
                                
                                <h:outputText value="Institution :" />
                                <h:outputText value="" />

                                <h:outputText value="Site :" />
                                <h:outputText value="" />

                                <h:outputText value="Department :" />
                                <h:outputText value="" />
                                
                                <h:outputText value="Laboratory :" />
                                <h:outputText value="" />

                                <h:outputText value="Investigation :" />
                                <h:outputText value="" />
                                
                                <h:outputText value="Parameter :" />
                                <h:outputText value="" />
                                
                                <h:outputText value="Age :" />
                                <h:outputText value="" />

                                <h:outputText value="Result :" />
                                <h:outputText value="" />

                                <h:outputText value="Gender :" />
                                <h:outputText value="" />
                                
                                <h:outputText value="Diagnosis :" />
                                <h:outputText value="" />

                                <h:outputText value="Visit Type :" />
                                <h:outputText value="" />

                            </h:panelGrid>


                            <p:dataTable
                                id="invesWiseTable"
                                var="var"
                                rowIndexVar="n"
                                paginator="true"
                                paginatorPosition="bottom"
                                rows="10"
                                rendered="true"
                                paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                currentPageReportTemplate="Showing {startRecord} to {endRecord} of {totalRecords}"
                                rowsPerPageTemplate="5,10,15,25,50,100,500,1000"
                                styleClass="table-sm">

                                <p:column width= "20em" >
                                    <f:facet name="header" >
                                        <h:outputText value="MRN" />
                                    </f:facet>
                                    <h:outputText value="">
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value=""/>
                                    </f:facet>
                                </p:column>

                                <p:column width= "8em" >
                                    <f:facet name="header" >
                                        <h:outputText value="Visit Type" />
                                    </f:facet>
                                    <h:outputText value="">
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value=""/>
                                    </f:facet>
                                </p:column>

                                <p:column width="8em">
                                    <f:facet name="header">
                                        <h:outputText value="Lab Department" />
                                    </f:facet>
                                    <h:outputText value=""> 
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value=""/>
                                    </f:facet>
                                </p:column>

                                <p:column width="8em">
                                    <f:facet name="header">
                                        <h:outputText value="Gender" />
                                    </f:facet>
                                    <h:outputText value=""> 
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value=""/>
                                    </f:facet>
                                </p:column>

                                <p:column width="8em">
                                    <f:facet name="header">
                                        <h:outputText value="Name" />
                                    </f:facet>
                                    <h:outputText value=""> 
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value=""/>
                                    </f:facet>
                                </p:column>

                                <p:column width="8em">
                                    <f:facet name="header">
                                        <h:outputText value="Diagnosis" />
                                    </f:facet>
                                    <h:outputText value=""> 
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value=""/>
                                    </f:facet>
                                </p:column>

                                <p:column width="8em">
                                    <f:facet name="header">
                                        <h:outputText value="Age" />
                                    </f:facet>
                                    <h:outputText value=""> 
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value=""/>
                                    </f:facet>
                                </p:column>

                                <p:column width="8em">
                                    <f:facet name="header">
                                        <h:outputText value="Investigation" />
                                    </f:facet>
                                    <h:outputText value=""> 
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value=""/>
                                    </f:facet>
                                </p:column>

                                <p:column width="8em">
                                    <f:facet name="header">
                                        <h:outputText value="Result" />
                                    </f:facet>
                                    <h:outputText value=""> 
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value=""/>
                                    </f:facet>
                                </p:column>

                                <p:column width="8em">
                                    <f:facet name="header">
                                        <h:outputText value="Remarks" />
                                    </f:facet>
                                    <h:outputText value=""> 
                                    </h:outputText>
                                    <f:facet name="footer">
                                        <h:outputText value=""/>
                                    </f:facet>
                                </p:column>

                            </p:dataTable>

                        </p:panel>





                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
