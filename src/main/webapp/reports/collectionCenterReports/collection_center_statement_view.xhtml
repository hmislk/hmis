<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">

                <h:form >
                    <p:panel header="Collection Center Statement Report Print" styleClass="w-100">
                        <f:facet name="header"  >
                            <div class="d-flex justify-content-between">
                                <h:outputText value="Collection Center Statement Report Print" class="mt-2"/>
                                <div class="d-flex gap-2">
                                    <p:commandButton 
                                        icon="fa-solid fa-print"
                                        class="ui-button-info"
                                        style="width: 150px"
                                        ajax="false" 
                                        value="Print">
                                        <p:printer target="reportView" />
                                    </p:commandButton>
                                    <p:commandButton 
                                        ajax="false" 
                                        value="Back to Report" 
                                        style="width: 200px"
                                        icon="fa fa-arrow-left"
                                        class="ui-button-warning"
                                        action="collection_center_statement_report?faces-redirect=true" >
                                    </p:commandButton>
                                </div>

                            </div>
                        </f:facet>

                        <style>

                            @media screen{
                                .paper{
                                    position: static !important;
                                    width: 297mm!important;
                                    zoom: 2.0;
                                }
                                
                                table {
                                    border-collapse: collapse;
                                    width: 100%;
                                    font-size: 12px!important;
                                    margin-top: 1mm!important;
                                }
                                
                                th, td {
                                    border: 1px solid #000;
                                    padding: 0px!important;
                                    margin: 2px!important;
                                    text-align: left;
                                    margin-left: 10mm!important;
                                }
                                
                                .header{
                                    font-size: 16px!important;
                                }
                                
                                tfoot{
                                    font-weight: 700!important;
                                    font-size: 11px!important;
                                }
                            }

                            @media print {
                                @page {
                                    @bottom-right {
                                        content: "Page " counter(page) " of " counter(pages);
                                        font-family: Arial, sans-serif;
                                        font-size: 10pt;
                                    }
                                    size: A4 landscape;
                                }

                                body {
                                    counter-reset: page;
                                }

                                .paper{
                                    position: static !important;
                                    width: 297mm!important;

                                }

                                .header{
                                    line-height: 1.1;
                                    margin: 0mm!important;
                                    font-size: 13px!important;
                                }

                                table {
                                    border-collapse: collapse;
                                    width: 99.9%;
                                    font-size: 12px!important;
                                    margin-top: 1mm!important;
                                }
                                th, td {
                                    border: 1px solid #000;
                                    padding: 0px!important;
                                    margin: 2px!important;
                                    text-align: left;
                                    margin-left: 10mm!important;
                                }
                                th {

                                }
                                tfoot{
                                    font-weight: 700!important;
                                    font-size: 11px!important;
                                }
                            }
                        </style>

                        <h:panelGroup id="reportView" class="d-flex justify-content-center">
                            <div class="paper">
                                <div class="header" >
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 22px;">
                                        <h:outputText value="#{sessionController.institution.name}"/>
                                    </div>
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 18px;">
                                        <h:outputText value="Collection Center Statement Report"/>
                                        <h:panelGroup  rendered="#{reportController.department ne null}">
                                            <div class="d-flex gap-2">
                                                <h:outputText value="-" style="width: 1em!important;" class="text-center"/>
                                                <h:outputText value="#{reportController.department.name}"/>
                                            </div>
                                        </h:panelGroup>
                                    </div>
                                    <div class="d-flex justify-content-center mt-2" style="font-size:12px; flex-wrap:wrap; gap:16px;">
    
                                        <div class="d-flex gap-2">
                                            <h:outputText value="From Date" style="font-weight:600;"/>
                                            <h:outputText value="#{reportController.fromDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                            </h:outputText>
                                        </div>

                                        <div class="d-flex gap-2">
                                            <h:outputText value="To Date" style="font-weight:600;"/>
                                            <h:outputText value="#{reportController.toDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                            </h:outputText>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Institution/Branch" style="font-weight:600;"/>
                                            <h:outputText value="#{empty reportController.institution ? 'All institutions' : reportController.institution.name}"/>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Collection Center" style="font-weight:600;"/>
                                            <h:outputText value="#{empty reportController.collectingCentre ? 'All Collection Centers' : reportController.collectingCentre.name}"/>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Invoice Number" style="font-weight:600;"/>
                                            <h:outputText value="#{empty reportController.invoiceNumber ? 'All Invoice Numbers' : reportController.invoiceNumber}"/>
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Bill No." style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Ref Bill No." style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Date and Time" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Bill Type" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="History Type" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Code" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Name" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Leaf No." style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Hospital Fee" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Staff Fee" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Fee" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Received from CC" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Paid to CC" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Adjustment to CC Balance" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Balance Before Transaction" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Transaction Amount" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Balance After Transaction" style="margin-left: 1mm;"/>
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <ui:repeat value="#{reportController.agentHistories}" var="agentHx">
                                                <tr style="background-color: #{reportController.getTableRowColor(agentHx)}">
                                                    <!-- Bill Number -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.bill.deptId}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <!-- Ref Bill Nos -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.bill.cancelledBill.deptId}" style="margin-left: 1mm;" rendered="#{agentHx.bill.cancelled}"/>
                                                    </td>
                                                    <!-- Date and Time -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.createdAt}" style="margin-left: 1mm;">
                                                            <f:convertDateTime pattern="dd MM yyyy hh:mm:ss a"/>
                                                        </h:outputText>
                                                    </td>
                                                    <!-- Bill Type -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.bill.billTypeAtomic}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <!-- History Type -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.historyType}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <!-- CC Code -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.agency.code}" style="margin-left: 1mm; text-align: right; display: block;" rendered="#{agentHx.historyType eq 'RepaymentToCollectingCentre'}"/>
                                                        <h:outputText value="#{agentHx.bill.fromInstitution.code}" style="margin-left: 1mm; text-align: right; display: block;" rendered="#{agentHx.historyType ne 'RepaymentToCollectingCentre'}"/>
                                                    </td>
                                                    <!-- CC Name -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.agency.name}" style="margin-left: 1mm;" rendered="#{agentHx.historyType eq 'RepaymentToCollectingCentre'}"/>
                                                        <h:outputText value="#{agentHx.bill.fromInstitution.name}" style="margin-left: 1mm;" rendered="#{agentHx.historyType ne 'RepaymentToCollectingCentre'}"/>
                                                    </td>
                                                    <!-- Leaf No. -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.bill.referenceNumber}" style="margin-left: 1mm; text-align: right; display: block;"/>
                                                        <h:outputText value="#{agentHx.bill.invoiceNumber}" style="margin-left: 1mm; text-align: right; display: block;"/>
                                                    </td>
                                                    <!-- Hospital Fee -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.companyTransactionValue}" style="margin-left: 1mm; text-align: right; display: block;">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                    <!-- Staff Fee -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.staffTrasnactionValue}" style="margin-left: 1mm; text-align: right; display: block;">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                    <!-- CC Fee -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.agentTransactionValue}" style="margin-left: 1mm; text-align: right; display: block;">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                    <!-- Received from CC -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.paidAmountByAgency}" style="margin-left: 1mm; text-align: right; display: block;">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                    <!-- Paid to CC -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.paidAmountToAgency}" style="margin-left: 1mm; text-align: right; display: block;">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                    <!-- Adjustment to CC Balance -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.adjustmentToAgencyBalance}" style="margin-left: 1mm; text-align: right; display: block;">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                    <!-- CC Balance Before Transaction -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.balanceBeforeTransaction}" style="margin-left: 1mm; text-align: right; display: block;">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                    <!-- Transaction Amount -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.transactionValue}" style="margin-left: 1mm; text-align: right; display: block;">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                    <!-- CC Balance After Transaction -->
                                                    <td>
                                                        <h:outputText value="#{agentHx.balanceAfterTransaction}" style="margin-left: 1mm; text-align: right; display: block;">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                </tr>
                                            </ui:repeat>
                                        </tbody>
                                    </table>

                                </div>

                            </div>
                        </h:panelGroup>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
