<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">

                <h:form >
                    <p:panel header="Collection Center Book Wise Detail Report Print" styleClass="w-100">
                        <f:facet name="header"  >
                            <div class="d-flex justify-content-between">
                                <h:outputText value="Collection Center Book Wise Detail Report Print" class="mt-2"/>
                                <div class="d-flex gap-2">
                                    <p:commandButton 
                                        icon="fa-solid fa-print"
                                        class="ui-button-info"
                                        style="width: 150px"
                                        ajax="false" 
                                        value="Print">
                                        <p:printer target="reportView" />
                                    </p:commandButton>
                                    <p:commandButton 
                                        ajax="false" 
                                        value="Back to Report" 
                                        style="width: 200px"
                                        icon="fa fa-arrow-left"
                                        class="ui-button-warning"
                                        action="collection_centre_book_wise_detail?faces-redirect=true" >
                                    </p:commandButton>
                                </div>

                            </div>
                        </f:facet>

                        <style>

                            @media screen{
                                .paper{
                                    position: static !important;
                                    width: 297mm!important;
                                    zoom: 2.0;
                                }
                                
                                table {
                                    border-collapse: collapse;
                                    width: 100%;
                                    font-size: 12px!important;
                                    margin-top: 1mm!important;
                                }
                                
                                th, td {
                                    border: 1px solid #000;
                                    padding: 0px!important;
                                    margin: 2px!important;
                                    text-align: left;
                                    margin-left: 10mm!important;
                                }
                                
                                .header{
                                    font-size: 16px!important;
                                }
                                
                                tfoot{
                                    font-weight: 700!important;
                                    font-size: 11px!important;
                                }
                            }

                            @media print {
                                @page {
                                    @bottom-right {
                                        content: "Page " counter(page) " of " counter(pages);
                                        font-family: Arial, sans-serif;
                                        font-size: 10pt;
                                    }
                                    size: A4 landscape;
                                }

                                body {
                                    counter-reset: page;
                                }

                                .paper{
                                    position: static !important;
                                    width: 297mm!important;

                                }

                                .header{
                                    line-height: 1.1;
                                    margin: 0mm!important;
                                    font-size: 13px!important;
                                }

                                table {
                                    border-collapse: collapse;
                                    width: 99.9%;
                                    font-size: 12px!important;
                                    margin-top: 1mm!important;
                                }
                                th, td {
                                    border: 1px solid #000;
                                    padding: 0px!important;
                                    margin: 2px!important;
                                    text-align: left;
                                    margin-left: 10mm!important;
                                }
                                th {

                                }
                                tfoot{
                                    font-weight: 700!important;
                                    font-size: 11px!important;
                                }
                            }
                        </style>

                        <h:panelGroup id="reportView" class="d-flex justify-content-center">
                            <div class="paper">
                                <div class="header" >
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 22px;">
                                        <h:outputText value="#{sessionController.institution.name}"/>
                                    </div>
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 18px;">
                                        <h:outputText value="Collection Center Book Wise Detail Report Print"/>
                                        <h:panelGroup  rendered="#{reportsController.department ne null}">
                                            <div class="d-flex gap-2">
                                                <h:outputText value="-" style="width: 1em!important;" class="text-center"/>
                                                <h:outputText value="#{reportsController.department.name}"/>
                                            </div>
                                        </h:panelGroup>
                                    </div>
                                    <div class="d-flex justify-content-center mt-2" style="font-size:12px; flex-wrap:wrap; gap:16px;">
    
                                        <div class="d-flex gap-2">
                                            <h:outputText value="From Date" style="font-weight:600;"/>
                                            <h:outputText value="#{reportsController.fromDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                            </h:outputText>
                                        </div>

                                        <div class="d-flex gap-2">
                                            <h:outputText value="To Date" style="font-weight:600;"/>
                                            <h:outputText value="#{reportsController.toDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                            </h:outputText>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Without Date Range" style="font-weight:600;"/>
                                            <h:outputText value="#{reportsController.withoutDateRange ? 'Yes' : 'No'}"/>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Collection Center" style="font-weight:600;"/>
                                            <h:outputText value="#{empty reportsController.collectingCentre ? 'All Collection Centers' : reportsController.collectingCentre.name}"/>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Book Number" style="font-weight:600;"/>
                                            <h:outputText value="#{empty reportsController.cashBookNumber ? 'All cashbooks' : reportsController.cashBookNumber}"/>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <h:outputText value="With Deleted Books" style="font-weight:600;"/>
                                            <h:outputText value="#{reportsController.withDeletedBooks ? 'Yes' : 'No'}"/>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <h:outputText value="With Inactive Books" style="font-weight:600;"/>
                                            <h:outputText value="#{reportsController.withInactiveBooks ? 'Yes' : 'No'}"/>
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Bill No." style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Book No." style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Book Reference No." style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Patient" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Creater" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Created Date" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Bill Value" style="margin-left: 1mm;"/>
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <ui:repeat value="#{reportsController.bundle.reportTemplateRows}" var="c" varStatus="b">
                                                <tr>
                                                    <td>
                                                        <h:outputText value="#{c.bill.deptId}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td>
                                                        <!-- Cancelled / Refund bills: derive book number from billedBill -->
                                                        <h:outputText
                                                            rendered="#{c.bill.billClassType eq 'CancelledBill' or c.bill.billClassType eq 'RefundBill'}"
                                                            value="#{collectingCentreBillController.generateBookNumberFromReference(c.bill.billedBill.referenceNumber)}"
                                                            style="margin-left: 1mm;"/>
                                                        <!-- Normal bills: derive book number from referenceNumber -->
                                                        <h:outputText
                                                            rendered="#{c.bill.billClassType ne 'CancelledBill' and c.bill.billClassType ne 'RefundBill'}"
                                                            value="#{collectingCentreBillController.generateBookNumberFromReference(c.bill.referenceNumber)}"
                                                            style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td>
                                                        <!-- Normal bills: referenceNumber + book status -->
                                                        <h:panelGroup rendered="#{c.bill.billClassType ne 'CancelledBill' and c.bill.billClassType ne 'RefundBill'}">
                                                            <h:outputText value="#{c.bill.referenceNumber}" style="margin-left: 1mm;"/>
                                                            <h:outputText
                                                                rendered="#{c.agentReferenceBook.active eq false and c.agentReferenceBook.retired eq false}"
                                                                value=" [Deactivated]" style="margin-left: 1mm; font-weight: 700;"/>
                                                            <h:outputText
                                                                rendered="#{c.agentReferenceBook.active eq true and c.agentReferenceBook.retired eq false}"
                                                                value=" [Active]" style="margin-left: 1mm; font-weight: 700;"/>
                                                            <h:outputText
                                                                rendered="#{c.agentReferenceBook.retired eq true}"
                                                                value=" [Deleted]" style="margin-left: 1mm; font-weight: 700;"/>
                                                        </h:panelGroup>
                                                        <!-- Cancelled / Refund bills: billedBill referenceNumber + book status -->
                                                        <h:panelGroup rendered="#{c.bill.billClassType eq 'CancelledBill' or c.bill.billClassType eq 'RefundBill'}">
                                                            <h:outputText value="#{c.bill.billedBill.referenceNumber}" style="margin-left: 1mm;"/>
                                                            <h:outputText
                                                                rendered="#{c.agentReferenceBook.active eq false and c.agentReferenceBook.retired eq false}"
                                                                value=" [Deactivated]" style="margin-left: 1mm; font-weight: 700;"/>
                                                            <h:outputText
                                                                rendered="#{c.agentReferenceBook.active eq true and c.agentReferenceBook.retired eq false}"
                                                                value=" [Active]" style="margin-left: 1mm; font-weight: 700;"/>
                                                            <h:outputText
                                                                rendered="#{c.agentReferenceBook.retired eq true}"
                                                                value=" [Deleted]" style="margin-left: 1mm; font-weight: 700;"/>
                                                        </h:panelGroup>
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{c.bill.patient.person.nameWithTitle}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{c.bill.creater.webUserPerson.name}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{c.bill.createdAt}" style="margin-left: 1mm;">
                                                            <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                                        </h:outputText>
                                                    </td>
                                                    <td style="text-align: right;">
                                                        <h:outputText value="#{c.bill.netTotal}" style="margin-left: 1mm;">
                                                            <f:convertNumber pattern="#,##0.00"/>
                                                        </h:outputText>
                                                    </td>
                                                </tr>
                                            </ui:repeat>
                                        </tbody>
                                        <tfoot>
                                            <tr>
                                                <td colspan="6" style="font-weight: 700; margin-left: 1mm;">
                                                    <h:outputText value="Total" style="margin-left: 1mm;"/>
                                                </td>
                                                <td style="font-weight: 700; text-align: right;">
                                                    <h:outputText value="#{reportsController.bundle.grossTotal}" style="margin-left: 1mm;">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </td>
                                            </tr>
                                        </tfoot>
                                    </table>

                                </div>

                            </div>
                        </h:panelGroup>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
