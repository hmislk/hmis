<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">

                <h:form >
                    <p:panel header="Collection Center Balance Report Print" styleClass="w-100">
                        <f:facet name="header"  >
                            <div class="d-flex justify-content-between">
                                <h:outputText value="Collection Center Balance Report Print" class="mt-2"/>
                                <div class="d-flex gap-2">
                                    <p:commandButton 
                                        icon="fa-solid fa-print"
                                        class="ui-button-info"
                                        style="width: 150px"
                                        ajax="false" 
                                        value="Print">
                                        <p:printer target="reportView" />
                                    </p:commandButton>
                                    <p:commandButton 
                                        ajax="false" 
                                        value="Back to Report" 
                                        style="width: 200px"
                                        icon="fa fa-arrow-left"
                                        class="ui-button-warning"
                                        action="collection_center_balance_report?faces-redirect=true" >
                                    </p:commandButton>
                                </div>

                            </div>
                        </f:facet>

                        <style>

                            @media screen{
                                .paper{
                                    position: static !important;
                                    width: 297mm!important;
                                    zoom: 2.0;
                                }
                                
                                table {
                                    border-collapse: collapse;
                                    width: 100%;
                                    font-size: 12px!important;
                                    margin-top: 1mm!important;
                                }
                                
                                th, td {
                                    border: 1px solid #000;
                                    padding: 0px!important;
                                    margin: 2px!important;
                                    text-align: left;
                                    margin-left: 10mm!important;
                                }
                                
                                .header{
                                    font-size: 16px!important;
                                }
                                
                                tfoot{
                                    font-weight: 700!important;
                                    font-size: 11px!important;
                                }
                            }

                            @media print {
                                @page {
                                    @bottom-right {
                                        content: "Page " counter(page) " of " counter(pages);
                                        font-family: Arial, sans-serif;
                                        font-size: 10pt;
                                    }
                                    size: A4 landscape;
                                }

                                body {
                                    counter-reset: page;
                                }

                                .paper{
                                    position: static !important;
                                    width: 297mm!important;

                                }

                                .header{
                                    line-height: 1.1;
                                    margin: 0mm!important;
                                    font-size: 13px!important;
                                }

                                table {
                                    border-collapse: collapse;
                                    width: 99.9%;
                                    font-size: 12px!important;
                                    margin-top: 1mm!important;
                                }
                                th, td {
                                    border: 1px solid #000;
                                    padding: 0px!important;
                                    margin: 2px!important;
                                    text-align: left;
                                    margin-left: 10mm!important;
                                }
                                th {

                                }
                                tfoot{
                                    font-weight: 700!important;
                                    font-size: 11px!important;
                                }
                            }
                        </style>

                        <h:panelGroup id="reportView" class="d-flex justify-content-center">
                            <div class="paper">
                                <div class="header" >
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 22px;">
                                        <h:outputText value="#{sessionController.institution.name}"/>
                                    </div>
                                    <div class="d-flex justify-content-center text-5 gap-2" style="font-weight: 700; font-size: 18px;">
                                        <h:outputText value="Collection Center Balance Report Print"/>
                                        <h:panelGroup  rendered="#{reportController.department ne null}">
                                            <div class="d-flex gap-2">
                                                <h:outputText value="-" style="width: 1em!important;" class="text-center"/>
                                                <h:outputText value="#{reportController.department.name}"/>
                                            </div>
                                        </h:panelGroup>
                                    </div>
                                    <div class="d-flex justify-content-center mt-2" style="font-size:12px; flex-wrap:wrap; gap:16px;">
    
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Date" style="font-weight:600;"/>
                                            <h:outputText value="#{reportController.fromDate}">
                                                <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                            </h:outputText>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <h:outputText value="Collection Center Name" style="font-weight:600;"/>
                                            <h:outputText value="#{empty reportController.collectingCentre ? 'All CCs' : reportController.collectingCentre.code+reportController.collectingCentre.name}"/>
                                        </div>

                                    </div>
                                </div>

                                <div>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="S. No" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Name" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Route" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Code" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Phone No." style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Credit Limit" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="Max Credit Limit" style="margin-left: 1mm;"/>
                                                </th>
                                                <th style="font-weight: 700;">
                                                    <h:outputText value="CC Balance" style="margin-left: 1mm;"/>
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <ui:repeat value="#{reportController.bundle.reportTemplateRows}" var="ah" varStatus="i">
                                                <tr>
                                                    <td>
                                                        <h:outputText value="#{i.index + 1}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{ah.agentHistory.agency.name}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{ah.agentHistory.agency.route.name}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{ah.agentHistory.agency.code}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td>
                                                        <h:outputText value="#{ah.agentHistory.agency.phone}" style="margin-left: 1mm;"/>
                                                    </td>
                                                    <td style="text-align: right;">
                                                        <h:outputText value="#{ah.agentHistory.agency.maxCreditLimit}" style="margin-left: 1mm;">
                                                            <f:convertNumber groupingUsed="true" maxFractionDigits="2" minFractionDigits="2" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style="text-align: right;">
                                                        <h:outputText value="#{ah.agentHistory.agency.maxCreditLimit}" style="margin-left: 1mm;">
                                                            <f:convertNumber groupingUsed="true" maxFractionDigits="2" minFractionDigits="2" />
                                                        </h:outputText>
                                                    </td>
                                                    <td style="text-align: right;">
                                                        <h:outputText value="#{ah.agentHistory.balanceAfterTransaction}" style="margin-left: 1mm;">
                                                            <f:convertNumber groupingUsed="true" maxFractionDigits="2" minFractionDigits="2" />
                                                        </h:outputText>
                                                    </td>
                                                </tr>
                                            </ui:repeat>
                                        </tbody>
                                    </table>

                                </div>

                            </div>
                        </h:panelGroup>

                    </p:panel>
                </h:form>
            </ui:define>
        </ui:composition>

    </h:body>
</html>
