<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/inward/inward_reports.xhtml">
            <ui:define name="subcontent">
                <h:form id="frm">

                    <p:panel header="BHT Deposit and Credit Settlement Summary">

                        <div class="row mb-2">

                            <div class="col-md-2">
                                <p:outputLabel value="From Date" />
                                <p:datePicker
                                    value="#{bhtPaymentSummaryReportController.fromDate}"
                                    class="w-100"
                                    showTime="true"
                                    showButtonBar="true"
                                    timeInput="true"
                                    inputStyleClass="form-control"
                                    pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                            </div>

                            <div class="col-md-2">
                                <p:outputLabel value="To Date" />
                                <p:datePicker
                                    value="#{bhtPaymentSummaryReportController.toDate}"
                                    class="w-100"
                                    showTime="true"
                                    showButtonBar="true"
                                    timeInput="true"
                                    inputStyleClass="form-control"
                                    pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                            </div>

                            <div class="col-md-2">
                                <p:outputLabel value="Date Basis" />
                                <p:selectOneMenu
                                    value="#{bhtPaymentSummaryReportController.dateBasis}"
                                    class="w-100">
                                    <f:selectItem itemValue="dischargeDate" itemLabel="Discharge Date" />
                                    <f:selectItem itemValue="admissionDate" itemLabel="Admission Date" />
                                </p:selectOneMenu>
                            </div>

                            <div class="col-md-2">
                                <p:outputLabel value="Admission Status" />
                                <p:selectOneMenu
                                    value="#{bhtPaymentSummaryReportController.admissionStatus}"
                                    class="w-100">
                                    <f:selectItems
                                        value="#{enumController.admissionStatuses}"
                                        var="s"
                                        itemValue="#{s}"
                                        itemLabel="#{s.label}" />
                                </p:selectOneMenu>
                            </div>

                            <div class="col-md-2">
                                <p:outputLabel value="Admission Type" />
                                <p:selectOneMenu
                                    value="#{bhtPaymentSummaryReportController.admissionType}"
                                    class="w-100">
                                    <f:selectItem itemLabel="All" itemValue="#{null}" />
                                    <f:selectItems
                                        value="#{admissionTypeController.items}"
                                        var="at"
                                        itemValue="#{at}"
                                        itemLabel="#{at.name}" />
                                </p:selectOneMenu>
                            </div>

                        </div>

                        <div class="row mb-2">

                            <div class="col-md-3">
                                <p:outputLabel value="Institution" />
                                <p:selectOneMenu
                                    id="cmbIns"
                                    value="#{bhtPaymentSummaryReportController.institution}"
                                    class="w-100"
                                    filter="true"
                                    autoWidth="false">
                                    <f:selectItem itemLabel="All" itemValue="#{null}" />
                                    <f:selectItems
                                        value="#{institutionController.companies}"
                                        var="ins"
                                        itemLabel="#{ins.name}"
                                        itemValue="#{ins}" />
                                    <p:ajax process="cmbIns" update="cmbSite" />
                                </p:selectOneMenu>
                            </div>

                            <div class="col-md-3">
                                <p:outputLabel value="Site" />
                                <p:selectOneMenu
                                    id="cmbSite"
                                    value="#{bhtPaymentSummaryReportController.site}"
                                    class="w-100"
                                    filter="true"
                                    autoWidth="false">
                                    <f:selectItem itemLabel="All" itemValue="#{null}" />
                                    <f:selectItems
                                        value="#{institutionController.sites}"
                                        var="site"
                                        itemLabel="#{site.name}"
                                        itemValue="#{site}" />
                                    <p:ajax process="cmbSite" update="cmbDept" />
                                </p:selectOneMenu>
                            </div>

                            <div class="col-md-3">
                                <p:outputLabel value="Department" />
                                <p:selectOneMenu
                                    id="cmbDept"
                                    value="#{bhtPaymentSummaryReportController.department}"
                                    class="w-100"
                                    filter="true"
                                    autoWidth="false">
                                    <f:selectItem itemLabel="All" itemValue="#{null}" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite(bhtPaymentSummaryReportController.institution, bhtPaymentSummaryReportController.site)}"
                                        var="d"
                                        itemLabel="#{d.name}"
                                        itemValue="#{d}" />
                                </p:selectOneMenu>
                            </div>

                            <div class="col-md-3 d-flex align-items-end">
                                <p:commandButton
                                    value="Generate"
                                    icon="fas fa-play"
                                    action="#{bhtPaymentSummaryReportController.generateReport()}"
                                    ajax="true"
                                    process="@form"
                                    update="pnlResults"
                                    class="ui-button-warning w-100" />
                            </div>

                        </div>

                    </p:panel>

                    <p:panel id="pnlResults"
                             rendered="#{bhtPaymentSummaryReportController.reportRows != null}">

                        <f:facet name="header">
                            <div class="d-flex justify-content-between align-items-center">
                                <h:outputText value="Results" />
                            </div>
                        </f:facet>

                        <p:dataTable
                            id="tblReport"
                            value="#{bhtPaymentSummaryReportController.reportRows}"
                            var="row"
                            emptyMessage="No records found"
                            paginator="true"
                            rows="20"
                            paginatorAlwaysVisible="false"
                            paginatorPosition="bottom"
                            paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                            currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                            rowsPerPageTemplate="10,20,50,{ShowAll|'All'}"
                            styleClass="w-100">

                            <p:column headerText="BHT No" style="white-space:nowrap;">
                                <h:outputText value="#{row.bhtNo}" />
                            </p:column>

                            <p:column headerText="Patient Name">
                                <h:outputText value="#{row.patientName}" />
                            </p:column>

                            <p:column headerText="Admission Type" style="white-space:nowrap;">
                                <h:outputText value="#{row.admissionType != null ? row.admissionType.name : ''}" />
                            </p:column>

                            <p:column headerText="Admitted" style="white-space:nowrap;">
                                <h:outputText value="#{row.dateOfAdmission}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Discharged" style="white-space:nowrap;">
                                <h:outputText value="#{row.dateOfDischarge}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" />
                                </h:outputText>
                            </p:column>

                            <!-- One column per PaymentMethod -->
                            <p:columns
                                value="#{bhtPaymentSummaryReportController.allPaymentMethods}"
                                var="pm"
                                headerText="#{pm.label}"
                                style="text-align:right; white-space:nowrap;">
                                <h:outputText value="#{row.getDepositForMethod(pm)}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText>
                                <f:facet name="footer">
                                    <h:outputText value="#{bhtPaymentSummaryReportController.getColumnTotal(pm)}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </f:facet>
                            </p:columns>

                            <p:column headerText="Credit Settlement" style="text-align:right; white-space:nowrap; font-weight:bold;">
                                <h:outputText value="#{row.creditSettlementTotal}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText>
                                <f:facet name="footer">
                                    <h:outputText value="#{bhtPaymentSummaryReportController.grandTotalCreditSettlement}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </f:facet>
                            </p:column>

                            <p:column headerText="Credit Company">
                                <h:outputText value="#{row.creditCompanyNames}" />
                            </p:column>

                            <f:facet name="footer">
                                <div class="text-end">
                                    <strong>Grand Total Deposits: </strong>
                                    <h:outputText value="#{bhtPaymentSummaryReportController.grandTotalDeposits}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                    &#160;&#160;&#160;
                                    <strong>Grand Total Credit Settlements: </strong>
                                    <h:outputText value="#{bhtPaymentSummaryReportController.grandTotalCreditSettlement}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </div>
                            </f:facet>

                        </p:dataTable>

                    </p:panel>

                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
