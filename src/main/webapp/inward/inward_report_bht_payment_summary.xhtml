<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/inward/inward_reports.xhtml">
            <ui:define name="subcontent">
                <h:form id="frm">

                    <p:panel header="BHT Deposit and Credit Settlement Summary" class="m-1">

                        <h:panelGrid columns="8" styleClass="w-100 form-grid" columnClasses="label-icon-column, input-column">

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa ml-5" />
                                <h:outputLabel value="From" for="fromDate" class="mx-3"/>
                            </h:panelGroup>
                            <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="fromDate"
                                value="#{bhtPaymentSummaryReportController.fromDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa mr-2" />
                                <h:outputLabel value="To" for="toDate" class="mx-3"/>
                            </h:panelGroup>
                            <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="toDate"
                                value="#{bhtPaymentSummaryReportController.toDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf017;" styleClass="fa mr-2" />
                                <h:outputLabel value="Date Basis" for="dateBasisMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="dateBasisMenu"
                                styleClass="w-100 form-control"
                                value="#{bhtPaymentSummaryReportController.dateBasis}">
                                <f:selectItem itemValue="dischargeDate" itemLabel="Discharge Date" />
                                <f:selectItem itemValue="admissionDate" itemLabel="Admission Date" />
                            </p:selectOneMenu>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf05a;" styleClass="fa mr-2" />
                                <h:outputLabel value="Admission Status" for="admStatusMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="admStatusMenu"
                                styleClass="w-100 form-control"
                                value="#{bhtPaymentSummaryReportController.admissionStatus}">
                                <f:selectItems
                                    value="#{enumController.admissionStatuses}"
                                    var="s"
                                    itemValue="#{s}"
                                    itemLabel="#{s.label}" />
                            </p:selectOneMenu>

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf0f0;" styleClass="fa mr-2" />
                                <h:outputLabel value="Admission Type" for="admTypeMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="admTypeMenu"
                                styleClass="w-100 form-control"
                                value="#{bhtPaymentSummaryReportController.admissionType}">
                                <f:selectItem itemLabel="All" itemValue="#{null}" />
                                <f:selectItems
                                    value="#{admissionTypeController.items}"
                                    var="at"
                                    itemValue="#{at}"
                                    itemLabel="#{at.name}" />
                            </p:selectOneMenu>

                            <p:spacer width="50" />
                            <p:spacer width="50" />
                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf19c;" styleClass="fa mr-2" />
                                <h:outputLabel value="Institution" for="cmbIns" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="cmbIns"
                                styleClass="w-100 form-control"
                                value="#{bhtPaymentSummaryReportController.institution}"
                                filter="true">
                                <f:selectItem itemLabel="All Institutions" />
                                <f:selectItems value="#{institutionController.companies}" var="ins" itemLabel="#{ins.name}" itemValue="#{ins}" />
                                <p:ajax process="cmbIns" update="cmbDept" />
                            </p:selectOneMenu>

                            <p:spacer />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf3c5;" styleClass="fa mr-2" />
                                <h:outputLabel value="Site" for="siteMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="siteMenu"
                                styleClass="w-100 form-control"
                                value="#{bhtPaymentSummaryReportController.site}"
                                filter="true">
                                <f:selectItem itemLabel="All Sites" />
                                <f:selectItems value="#{institutionController.sites}" var="site" itemLabel="#{site.name}" itemValue="#{site}" />
                                <p:ajax process="siteMenu" update="cmbDept" />
                            </p:selectOneMenu>

                            <p:spacer />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf0e8;" styleClass="fa mr-2" />
                                <h:outputLabel value="Department" for="cmbDept" class="mx-3"/>
                            </h:panelGroup>
                            <h:panelGroup id="cmbDept">

                                <p:selectOneMenu
                                    rendered="#{bhtPaymentSummaryReportController.institution eq null and bhtPaymentSummaryReportController.site eq null}"
                                    styleClass="w-100 form-control"
                                    value="#{bhtPaymentSummaryReportController.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                    <f:selectItem itemLabel="All Departments" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite()}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>

                                <p:selectOneMenu
                                    rendered="#{bhtPaymentSummaryReportController.institution eq null and bhtPaymentSummaryReportController.site ne null}"
                                    styleClass="w-100 form-control"
                                    value="#{bhtPaymentSummaryReportController.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                    <f:selectItem itemLabel="All Departments" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite(bhtPaymentSummaryReportController.site)}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>

                                <p:selectOneMenu
                                    rendered="#{bhtPaymentSummaryReportController.institution ne null and bhtPaymentSummaryReportController.site eq null}"
                                    styleClass="w-100 form-control"
                                    value="#{bhtPaymentSummaryReportController.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                    <f:selectItem itemLabel="All Departments" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSiteForInstitution(bhtPaymentSummaryReportController.institution)}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>

                                <p:selectOneMenu
                                    rendered="#{bhtPaymentSummaryReportController.institution ne null and bhtPaymentSummaryReportController.site ne null}"
                                    styleClass="w-100 form-control"
                                    value="#{bhtPaymentSummaryReportController.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                    <f:selectItem itemLabel="All Departments" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite(bhtPaymentSummaryReportController.institution, bhtPaymentSummaryReportController.site)}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>

                            </h:panelGroup>

                        </h:panelGrid>

                        <p:commandButton
                            value="Generate"
                            icon="fas fa-cogs"
                            action="#{bhtPaymentSummaryReportController.generateReport()}"
                            ajax="false"
                            class="ui-button-success m-1" />

                    </p:panel>

                    <p:panel id="pnlResults"
                             rendered="#{bhtPaymentSummaryReportController.reportRows != null}">

                        <f:facet name="header">
                            <div class="d-flex justify-content-between align-items-center">
                                <h:outputText value="Results" />
                                <div>
                                    <p:commandButton value="Print"
                                                     icon="fas fa-print"
                                                     class="ui-button-info me-1"
                                                     ajax="false">
                                        <p:printer target="tblReport" />
                                    </p:commandButton>
                                    <p:commandButton value="Excel"
                                                     icon="fas fa-file-excel"
                                                     class="ui-button-success"
                                                     ajax="false">
                                        <p:dataExporter type="xlsx"
                                                        target="tblReport"
                                                        fileName="BHT_Payment_Summary" />
                                    </p:commandButton>
                                </div>
                            </div>
                        </f:facet>

                        <p:dataTable
                            id="tblReport"
                            value="#{bhtPaymentSummaryReportController.reportRows}"
                            var="row"
                            emptyMessage="No records found"
                            paginator="true"
                            rows="20"
                            paginatorAlwaysVisible="false"
                            paginatorPosition="bottom"
                            paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                            currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                            rowsPerPageTemplate="10,20,50,{ShowAll|'All'}"
                            styleClass="w-100">

                            <p:column headerText="BHT No" style="white-space:nowrap;">
                                <h:outputText value="#{row.bhtNo}" />
                            </p:column>

                            <p:column headerText="Patient Name">
                                <h:outputText value="#{row.patientName}" />
                            </p:column>

                            <p:column headerText="Admission Type" style="white-space:nowrap;">
                                <h:outputText value="#{row.admissionType != null ? row.admissionType.name : ''}" />
                            </p:column>

                            <p:column headerText="Admitted" style="white-space:nowrap;">
                                <h:outputText value="#{row.dateOfAdmission}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Discharged" style="white-space:nowrap;">
                                <h:outputText value="#{row.dateOfDischarge}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:columns
                                value="#{bhtPaymentSummaryReportController.allPaymentMethods}"
                                var="pm"
                                headerText="#{pm.label}"
                                style="text-align:right; white-space:nowrap;">
                                <h:outputText value="#{row.getDepositForMethod(pm)}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText>
                                <f:facet name="footer">
                                    <h:outputText value="#{bhtPaymentSummaryReportController.getColumnTotal(pm)}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </f:facet>
                            </p:columns>

                            <p:column headerText="Credit Settlement" style="text-align:right; white-space:nowrap; font-weight:bold;">
                                <h:outputText value="#{row.creditSettlementTotal}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText>
                                <f:facet name="footer">
                                    <h:outputText value="#{bhtPaymentSummaryReportController.grandTotalCreditSettlement}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </f:facet>
                            </p:column>

                            <p:column headerText="Credit Company">
                                <h:outputText value="#{row.creditCompanyNames}" />
                            </p:column>

                            <f:facet name="footer">
                                <div class="text-end">
                                    <strong>Grand Total Deposits: </strong>
                                    <h:outputText value="#{bhtPaymentSummaryReportController.grandTotalDeposits}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                    &#160;&#160;&#160;
                                    <strong>Grand Total Credit Settlements: </strong>
                                    <h:outputText value="#{bhtPaymentSummaryReportController.grandTotalCreditSettlement}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </div>
                            </f:facet>

                        </p:dataTable>

                    </p:panel>

                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
