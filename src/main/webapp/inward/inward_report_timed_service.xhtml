<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/inward/inward_reports.xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                >


    <ui:define name="subcontent">

        <h:panelGroup >
            <h:form  >
                <p:panel >

                    <p:panel class="mt-2" header="Timed Service" id="gpBillPreview">

                            <h:panelGrid columns="4" styleClass="w-100 form-grid">
                                <h:outputLabel value="From" />
                                <p:calendar class="mx-4" id="fd" value="#{inwardTimedItemController.frmDate}" pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                <h:outputLabel value="To" />
                                <p:calendar class="mx-4" id="td" value="#{inwardTimedItemController.toDate}" pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                                <h:outputLabel value="Timed Item" />
                                <p:autoComplete class="mx-4" id="it" forceSelection="false"
                                                value="#{inwardTimedItemController.current.item}"
                                                completeMethod="#{timedItemController.completeInvest}" var="ix"
                                                itemLabel="#{ix.name}" itemValue="#{ix}" >
                                    <p:column>#{ix.name}</p:column>
                                    <p:column>#{ix.total}</p:column>
                                </p:autoComplete>
                                <h:panelGroup />
                                <h:panelGroup />

                                <!-- Institution -->
                                <h:outputLabel value="Institution" for="cmbIns" />
                                <p:selectOneMenu id="cmbIns" styleClass="mx-4 w-100 form-control"
                                                value="#{inwardTimedItemController.institution}" filter="true">
                                    <f:selectItem itemLabel="All Institutions" itemValue="#{null}" />
                                    <f:selectItems value="#{institutionController.companies}" var="ins"
                                                   itemLabel="#{ins.name}" itemValue="#{ins}" />
                                    <p:ajax process="cmbIns" update="cmbDept"
                                           listener="#{inwardTimedItemController.clearDepartment()}" />
                                </p:selectOneMenu>

                                <!-- Site -->
                                <h:outputLabel value="Site" for="siteMenu" />
                                <p:selectOneMenu id="siteMenu" styleClass="mx-4 w-100 form-control"
                                                value="#{inwardTimedItemController.site}" filter="true">
                                    <f:selectItem itemLabel="All Sites" itemValue="#{null}" />
                                    <f:selectItems value="#{institutionController.sites}" var="site"
                                                   itemLabel="#{site.name}" itemValue="#{site}" />
                                    <p:ajax process="siteMenu" update="cmbDept"
                                           listener="#{inwardTimedItemController.clearDepartment()}" />
                                </p:selectOneMenu>

                                <!-- Department -->
                                <h:outputLabel value="Department" for="cmbDept" />
                                <h:panelGroup id="cmbDept">
                                    <p:selectOneMenu
                                        rendered="#{inwardTimedItemController.institution eq null and inwardTimedItemController.site eq null}"
                                        styleClass="mx-4 w-100 form-control"
                                        value="#{inwardTimedItemController.department}"
                                        filterMatchMode="contains" filter="true">
                                        <f:selectItem itemLabel="All Departments" itemValue="#{null}" />
                                        <f:selectItems value="#{departmentController.getDepartmentsOfInstitutionAndSite()}"
                                                       var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                    </p:selectOneMenu>
                                    <p:selectOneMenu
                                        rendered="#{inwardTimedItemController.institution eq null and inwardTimedItemController.site ne null}"
                                        styleClass="mx-4 w-100 form-control"
                                        value="#{inwardTimedItemController.department}"
                                        filterMatchMode="contains" filter="true">
                                        <f:selectItem itemLabel="All Departments" itemValue="#{null}" />
                                        <f:selectItems value="#{departmentController.getDepartmentsOfInstitutionAndSite(inwardTimedItemController.site)}"
                                                       var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                    </p:selectOneMenu>
                                    <p:selectOneMenu
                                        rendered="#{inwardTimedItemController.institution ne null and inwardTimedItemController.site eq null}"
                                        styleClass="mx-4 w-100 form-control"
                                        value="#{inwardTimedItemController.department}"
                                        filterMatchMode="contains" filter="true">
                                        <f:selectItem itemLabel="All Departments" itemValue="#{null}" />
                                        <f:selectItems value="#{departmentController.getDepartmentsOfInstitutionAndSiteForInstitution(inwardTimedItemController.institution)}"
                                                       var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                    </p:selectOneMenu>
                                    <p:selectOneMenu
                                        rendered="#{inwardTimedItemController.institution ne null and inwardTimedItemController.site ne null}"
                                        styleClass="mx-4 w-100 form-control"
                                        value="#{inwardTimedItemController.department}"
                                        filterMatchMode="contains" filter="true">
                                        <f:selectItem itemLabel="All Departments" itemValue="#{null}" />
                                        <f:selectItems value="#{departmentController.getDepartmentsOfInstitutionAndSite(inwardTimedItemController.institution, inwardTimedItemController.site)}"
                                                       var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                    </p:selectOneMenu>
                                </h:panelGroup>
                            </h:panelGrid>

                            <div class="my-4">
                                <p:commandButton ajax="false" class="ui-button-warning" icon="fas fa-fill" value="Fill" action="#{inwardTimedItemController.createTimeServiceList}" />
                                
                                <p:commandButton ajax="false" icon="fas fa-file-excel" value="Excel" class="ui-button-success mx-1 " actionListener="#{inwardTimedItemController.createTimeServiceList}">
                                    <p:dataExporter type="xlsx" target="tbl" fileName="inward_report_timed_service" />
                                </p:commandButton>
                                
                                <p:commandButton value="Print" ajax="false" action="#" icon="fas fa-print" class="ui-button-info" >
                                    <p:printer target="gpBillPreview" ></p:printer>
                                </p:commandButton>
                            </div>
                      

                        <p:dataTable id="tbl" value="#{inwardTimedItemController.items}" var="ti">


                            <f:facet name="header">
                                <h:outputLabel value="#{inwardTimedItemController.current.item.name}"/>
                                <h:outputLabel value=" : "/>
                                <h:outputLabel value="#{inwardTimedItemController.frmDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                </h:outputLabel>
                                <h:outputLabel value="--"/>
                                <h:outputLabel value="#{inwardTimedItemController.toDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateFormat}"/>
                                </h:outputLabel>
                            </f:facet>


                            <p:column headerText="BHT Number">
                                <f:facet name="header">
                                    <p:outputLabel value="BHT Number"/>
                                </f:facet>
                                <p:outputLabel value="#{ti.patientEncounter.bhtNo}" />
                            </p:column>
                            <p:column headerText="Service Name">
                                <f:facet name="header">
                                    <p:outputLabel value="Service Name"/>
                                </f:facet>
                                <p:outputLabel value="#{ti.item.name}" />
                            </p:column>
                            <p:column headerText="Service Name">
                                <f:facet name="header">
                                    <p:outputLabel value="Service Name"/>
                                </f:facet>
                                <p:outputLabel value="#{ti.bill}" />
                            </p:column>
                            <p:column headerText="Inward Charge Type">
                                <f:facet name="header">
                                    <p:outputLabel value="Inward Charge Type"/>
                                </f:facet>
                                <p:outputLabel value="#{ti.item.inwardChargeType}" />
                            </p:column>
                            <p:column headerText="Start Time">
                                <f:facet name="header">
                                    <p:outputLabel value="Start Time"/>
                                </f:facet>
                                <h:outputLabel value="#{ti.fromTime}">
                                    <f:convertDateTime pattern="yy/MM/dd hh:mm:ss a" />
                                </h:outputLabel>
                            </p:column>                               
                            <p:column headerText="Stopped Time">
                                <f:facet name="header">
                                    <p:outputLabel value="Stopped Time"/>
                                </f:facet>
                                <h:outputLabel value="#{ti.toTime}">
                                    <f:convertDateTime pattern="yy/MM/dd hh:mm:ss a" />
                                </h:outputLabel>
                            </p:column>
                            <p:column headerText="Time(Minutes)" styleClass="averageNumericColumn">
                                <f:facet name="header">
                                    <p:outputLabel value="Time(Min.)"/>
                                </f:facet>
                                <h:outputLabel value="#{ti.tmpConsumedTime}" >
                                    <f:convertNumber pattern="##0.0"/>
                                </h:outputLabel>
                            </p:column>
                            <p:column style="text-align: right;" headerText="Discount">
                                <f:facet name="header">
                                    <p:outputLabel value="Discount"/>
                                </f:facet>
                                <h:outputLabel  value="#{ti.discount}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputLabel>
                            </p:column>
                            <p:column style="text-align: right;" headerText="Adjusted Value">
                                <f:facet name="header">
                                    <p:outputLabel value="Adjusted Value"/>
                                </f:facet>
                                <h:outputLabel  value="#{ti.adjustedValue}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputLabel>
                            </p:column>
                            <p:column style="text-align: right;" headerText="Total">
                                <f:facet name="header">
                                    <p:outputLabel value="Total"/>
                                </f:facet>
                                <h:outputLabel  value="#{ti.serviceValue}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputLabel>
                            </p:column>
                            <p:column headerText="Creator">
                                <f:facet name="header">
                                    <p:outputLabel value="Creator"/>
                                </f:facet>

                                <h:outputLabel value="#{ti.creater.webUserPerson.name}"/>     

                                <h:panelGroup rendered="#{ti.retired}" >
                                    <h:outputLabel style="color: red;" value="Deleted By " />

                                    <h:outputLabel style="color: red;"  value="#{ti.retirer.webUserPerson.name}" >                                       
                                    </h:outputLabel>
                                </h:panelGroup>
                            </p:column>  
                            <p:columnGroup type="footer">
                                <p:row>
                                    <p:column footerText="Total" colspan="5">
                                        <f:facet name="footer" >
                                            <p:outputLabel value="Total"></p:outputLabel>
                                        </f:facet>
                                    </p:column>
                                    <p:column footerText="#{inwardTimedItemController.totalMins}" style="text-align: right;" colspan="2">
                                        <f:facet name="footer" >
                                            <p:outputLabel value="#{inwardTimedItemController.totalMins}"></p:outputLabel>
                                        </f:facet>
                                    </p:column>
                                    <p:column footerText="" colspan="2">
                                        <f:facet name="footer" >
                                            <p:outputLabel value=""></p:outputLabel>
                                        </f:facet>
                                    </p:column>
                                    <p:column style="text-align: right;" footerText="#{inwardTimedItemController.total}">

                                        <f:facet name="footer" >
                                            <h:outputLabel value="#{inwardTimedItemController.total}">
                                                <f:convertNumber pattern="#,#00.00" />
                                            </h:outputLabel>
                                        </f:facet>
                                    </p:column>
                                </p:row>
                            </p:columnGroup>

                        </p:dataTable>
                    </p:panel>



                </p:panel>
            </h:form>

        </h:panelGroup>

    </ui:define>

</ui:composition>
