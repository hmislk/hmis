<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/inward/inward_reports.xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="subcontent">
        <h:form>
            <p:panel header="Itemized Service Summary - OPD and Inward (Fast - DTO-Based)">
                <div class="row">
                    <div class="col-md-12">
                        <h:panelGrid columns="2" styleClass="w-100 form-grid" columnClasses="label-icon-column, input-column">
                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa ml-5" />
                                <h:outputLabel value="From" for="fromDate" class="mx-3"/>
                            </h:panelGroup>
                            <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="fromDate"
                                value="#{searchController.fromDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa mr-2" />
                                <h:outputLabel value="To" for="toDate" class="mx-3"/>
                            </h:panelGroup>
                            <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="toDate"
                                value="#{searchController.toDate}"
                                navigator="false"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf19c;" styleClass="fa mr-2" />
                                <h:outputLabel value="Institution" for="cmbIns" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="cmbIns"
                                styleClass="w-100 form-control"
                                value="#{searchController.institution}"
                                filter="true">
                                <f:selectItem itemLabel="All Institutions" />
                                <f:selectItems value="#{institutionController.companies}" var="ins" itemLabel="#{ins.name}" itemValue="#{ins}" />
                                <p:ajax process="cmbIns" update="cmbDept" />
                            </p:selectOneMenu>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf0e8;" styleClass="fa mr-2" />
                                <h:outputLabel value="Department" for="cmbDept" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="cmbDept"
                                styleClass="w-100 form-control"
                                value="#{searchController.department}"
                                filter="true">
                                <f:selectItem itemLabel="All Departments" />
                                <f:selectItems value="#{departmentController.getInsDepartments(searchController.institution)}" var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                            </p:selectOneMenu>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf3c5;" styleClass="fa mr-2" />
                                <h:outputLabel value="Site" for="siteMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="siteMenu"
                                styleClass="w-100 form-control"
                                value="#{searchController.site}"
                                filter="true">
                                <f:selectItem itemLabel="All Sites" />
                                <f:selectItems value="#{institutionController.sites}" var="site" itemLabel="#{site.name}" itemValue="#{site}" />
                            </p:selectOneMenu>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText title="Category" value="&#xf02d;" styleClass="fa mr-2" />
                                <h:outputLabel value="Category" class="mx-3"/>
                            </h:panelGroup>
                            <p:autoComplete value="#{searchController.category}"
                                            completeMethod="#{categoryController.completeCategory}"
                                            var="category"
                                            class="w-100"
                                            inputStyleClass="w-100"
                                            itemLabel="#{category.name}"
                                            itemValue="#{category}">
                            </p:autoComplete>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText title="Item" value="&#xf0f6;" styleClass="fa mr-2" />
                                <h:outputLabel value="Item" class="mx-3"/>
                            </h:panelGroup>
                            <p:autoComplete value="#{searchController.item}"
                                            class="w-100"
                                            inputStyleClass="w-100"
                                            completeMethod="#{itemController.completeAllServicesAndInvestigations}"
                                            var="item"
                                            itemLabel="#{item.name}"
                                            itemValue="#{item}">
                            </p:autoComplete>
                        </h:panelGrid>

                        <p:commandButton id="btnList" class="m-1 ui-button-danger"
                                         icon="fas fa-list"
                                         ajax="false" value="View List"
                                         action="#{searchController.createCombinedItemizedServiceSummaryDto()}" />

                        <p:commandButton id="btnExcel" class="m-1 ui-button-success"
                                         icon="fas fa-file-excel"
                                         ajax="false" value="Export to Excel">
                            <p:dataExporter type="xlsx" target="tbl" fileName="itemized_service_summary" />
                        </p:commandButton>
                    </div>
                </div>

                <h:panelGroup rendered="#{not empty searchController.opdSaleSummaryDtos}">
                    <div class="alert alert-success mt-3" role="alert">
                        <h:outputText value="&#xf058;" styleClass="fa mr-2"/>
                        <strong>Performance Optimized:</strong> Using DTO-based queries for improved memory usage and load times.
                    </div>
                </h:panelGroup>

                <p:dataTable id="tbl"
                             value="#{searchController.opdSaleSummaryDtos}"
                             var="row"
                             paginator="true"
                             rows="20"
                             paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                             rowsPerPageTemplate="10,20,50"
                             rowKey="#{row.itemId}_#{row.staffName}">
                    <f:facet name="header">
                        <h:outputText value="Itemized Service Summary - OPD and Inward (DTO - Optimized)" />
                    </f:facet>
                    <p:column>
                        <f:facet name="header"><h:outputText value="Category" /></f:facet>
                        <f:facet name="footer"><h:outputText value="Grand Total" style="font-weight: bold;" /></f:facet>
                        <h:outputText value="#{row.categoryName}" />
                    </p:column>
                    <p:column>
                        <f:facet name="header"><h:outputText value="Item / Service" /></f:facet>
                        <h:outputText value="#{row.itemName}" />
                    </p:column>
                    <p:column>
                        <f:facet name="header"><h:outputText value="Doctor / Technician" /></f:facet>
                        <h:outputText value="#{row.staffName}" />
                    </p:column>
                    <p:column>
                        <f:facet name="header"><h:outputText value="Count" /></f:facet>
                        <h:outputText value="#{row.itemCount}">
                            <f:convertNumber pattern="#,##0" />
                        </h:outputText>
                    </p:column>
                    <p:column class="text-end">
                        <f:facet name="header"><h:outputText value="Hospital Fee" /></f:facet>
                        <h:outputText value="#{row.hospitalFee}">
                            <f:convertNumber pattern="#,##0.00" />
                        </h:outputText>
                    </p:column>
                    <p:column class="text-end">
                        <f:facet name="header"><h:outputText value="Professional Fee" /></f:facet>
                        <h:outputText value="#{row.professionalFee}">
                            <f:convertNumber pattern="#,##0.00" />
                        </h:outputText>
                    </p:column>
                    <p:column class="text-end">
                        <f:facet name="header"><h:outputText value="Gross Amount" /></f:facet>
                        <h:outputText value="#{row.grossAmount}">
                            <f:convertNumber pattern="#,##0.00" />
                        </h:outputText>
                    </p:column>
                    <p:column class="text-end">
                        <f:facet name="header"><h:outputText value="Discount" /></f:facet>
                        <h:outputText value="#{row.discountAmount}">
                            <f:convertNumber pattern="#,##0.00" />
                        </h:outputText>
                    </p:column>
                    <p:column class="text-end">
                        <f:facet name="header"><h:outputText value="Net Amount" /></f:facet>
                        <f:facet name="footer">
                            <h:outputText value="#{searchController.opdSaleSummaryTotal}" style="font-weight: bold;">
                                <f:convertNumber pattern="#,##0.00" />
                            </h:outputText>
                        </f:facet>
                        <h:outputText value="#{row.netTotal}">
                            <f:convertNumber pattern="#,##0.00" />
                        </h:outputText>
                    </p:column>
                </p:dataTable>
            </p:panel>
        </h:form>
    </ui:define>

</ui:composition>
