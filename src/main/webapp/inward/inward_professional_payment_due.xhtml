<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      >

    <h:body>
        <ui:composition template="/inward/inward_reports.xhtml">
            <ui:define name="subcontent">
                <h:outputStylesheet library="css" name="printing.css" />

                <h:form>
                    <p:panel header="Search Bills" >

                        <h:panelGrid columns="2" class="mt-4 mb-2">
                            <h:outputLabel value="From Date" />
                            <p:calendar
                                class="w-100"
                                inputStyleClass="w-100"
                                id="fromDate"
                                value="#{admissionReportController.fromDate}"
                                navigator="false"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <h:outputLabel value="To Date" />
                            <p:calendar
                                id="toDate"
                                class="w-100"
                                inputStyleClass="w-100"
                                value="#{admissionReportController.toDate}"
                                navigator="false"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <h:outputLabel value="Date Basis" />
                            <p:selectOneMenu styleClass="w-100" value="#{admissionReportController.dateBasis}">
                                <f:selectItem itemValue="createdAt" itemLabel="Created Date (default)" />
                                <f:selectItem itemValue="admissionDate" itemLabel="Admission Date" />
                            </p:selectOneMenu>

                            <h:outputLabel value="Admission Type" />
                            <p:selectOneMenu styleClass="w-100" value="#{admissionReportController.admissionType}">
                                <f:selectItem itemLabel="All" itemValue="#{null}" />
                                <f:selectItems value="#{admissionTypeController.items}" var="at" itemValue="#{at}" itemLabel="#{at.name}" />
                            </p:selectOneMenu>

                            <h:outputLabel value="Payment Method" />
                            <p:selectOneMenu styleClass="w-100" value="#{admissionReportController.paymentMethod}">
                                <f:selectItem itemLabel="All" itemValue="#{null}" />
                                <f:selectItems value="#{enumController.paymentMethodForAdmission}" />
                            </p:selectOneMenu>

                            <h:outputLabel value="Institution" />
                            <p:selectOneMenu styleClass="w-100" value="#{admissionReportController.institution}" filter="true">
                                <f:selectItem itemLabel="All Institutions" itemValue="#{null}" />
                                <f:selectItems value="#{institutionController.companies}" var="ins" itemLabel="#{ins.name}" itemValue="#{ins}" />
                            </p:selectOneMenu>

                            <h:outputLabel value="Site" />
                            <p:selectOneMenu styleClass="w-100" value="#{admissionReportController.site}" filter="true">
                                <f:selectItem itemLabel="All Sites" itemValue="#{null}" />
                                <f:selectItems value="#{institutionController.sites}" var="site" itemLabel="#{site.name}" itemValue="#{site}" />
                            </p:selectOneMenu>

                            <h:outputLabel value="Department" />
                            <p:autoComplete styleClass="w-100" completeMethod="#{departmentController.completeDept}"
                                            var="dept" itemLabel="#{dept.name}" itemValue="#{dept}"
                                            forceSelection="true" value="#{admissionReportController.department}" />
                        </h:panelGrid>

                        <h:panelGrid class="mx-4" columns="3">
                            <p:commandButton icon="fas fa-search" class="" id="btnSearch" ajax="false" value="Search" action="#{searchController.createDueFeeTableAll()}"/>
                            <p:commandButton icon="fas fa-print" class="mx-1 ui-button-info" value="Print" ajax="false" action="#"  >
                                <p:printer target="tblFee" ></p:printer>
                            </p:commandButton>

                            <p:commandButton icon="fas fa-file-excel" class="mx-1 ui-button-success" ajax="false" value="Excel"   actionListener="#{searchController.createDueFeeTableInwardAll()}">
                                <p:dataExporter type="xlsx" target="tblFee" fileName="BHT_Income_by_Categories"  />
                            </p:commandButton>
                        </h:panelGrid>


                        <br/><br/>

                        <p:defaultCommand target="btnSearch" />

                        <p:dataTable rowIndexVar="i"  id="tblFee" value="#{searchController.billFees}" var="bf">
                            <p:column headerText="No" styleClass="alignTop">
                                <h:outputLabel value="#{i+1}"/>
                            </p:column>

                            <p:column headerText="Speciality">
                                <f:facet name="header">
                                    <h:outputLabel value="Speciality"/>
                                </f:facet>
                                <h:commandLink action="/inward/payment_staff_bill" >

                                    <h:outputLabel value="#{bf.staff.speciality.name}"/>


                                    <f:setPropertyActionListener value="#{bf.staff}" target="#{staffPaymentBillController.currentStaff}"/>
                                </h:commandLink>
                            </p:column>

                            <p:column headerText="Doctor" >
                                <h:commandLink action="/inward/payment_staff_bill" >
                                    <h:outputLabel value="#{bf.staff.person.name}">
                                    </h:outputLabel>
                                    <f:setPropertyActionListener value="#{bf.staff}" target="#{staffPaymentBillController.currentStaff}"/>
                                </h:commandLink>
                            </p:column>

                            <p:column headerText="Patient" >
                                <h:commandLink action="/inward/payment_staff_bill" >
                                    <h:outputLabel value="#{bf.bill.patient.person.nameWithTitle}"/>

                                    <f:setPropertyActionListener value="#{bf.staff}" target="#{staffPaymentBillController.currentStaff}"/>
                                </h:commandLink>
                            </p:column>

                            <p:column headerText="Bill No">
                                <h:commandLink action="/inward/payment_staff_bill" >
                                    <h:outputLabel value="#{bf.bill.deptId}">
                                    </h:outputLabel>
                                    <f:setPropertyActionListener value="#{bf.staff}" target="#{staffPaymentBillController.currentStaff}"/>
                                </h:commandLink>
                            </p:column>

                            <p:column headerText="BilledAt" >
                                <h:commandLink action="/inward/payment_staff_bill" >
                                    <h:outputLabel value="#{bf.bill.createdAt}">
                                    </h:outputLabel>
                                    <f:setPropertyActionListener value="#{bf.staff}" target="#{staffPaymentBillController.currentStaff}"/>
                                </h:commandLink>
                            </p:column>


                            <p:column headerText="Test" >
                                <h:commandLink action="/inward/payment_staff_bill" >
                                    <h:outputLabel value="#{bf.billItem.item.name}" />
                                    <f:setPropertyActionListener value="#{bf.staff}" target="#{staffPaymentBillController.currentStaff}"/>
                                </h:commandLink>
                            </p:column>

                            <p:column styleClass="averageNumericColumn" headerText="Charge">
                                <h:commandLink action="/inward/payment_staff_bill" >
                                    <h:outputLabel value="#{bf.feeValue}" >
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputLabel>

                                    <f:setPropertyActionListener value="#{bf.staff}" target="#{staffPaymentBillController.currentStaff}"/>
                                </h:commandLink>
                            </p:column>

                        </p:dataTable>

                    </p:panel>

                </h:form>
            </ui:define>


        </ui:composition>

    </h:body>
</html>
