<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">

                <h:form id="formDiagnosisCards">
                    <p:growl id="msgDx"/>

                    <!-- Navigation bar -->
                    <div class="row mb-2">
                        <div class="col-12 px-4 d-flex gap-2">
                            <p:commandButton
                                value="Back to Inpatient Dashboard"
                                ajax="false"
                                action="#{admissionController.navigateToAdmissionProfilePage}"
                                icon="fa fa-arrow-left"
                                class="ui-button-warning">
                                <f:setPropertyActionListener
                                    value="#{inpatientClinicalDataController.parentAdmission}"
                                    target="#{admissionController.current}" />
                            </p:commandButton>
                            <p:commandButton
                                value="Clinical Data"
                                ajax="false"
                                action="#{inpatientClinicalDataController.navigateToEncounterClinicalData()}"
                                icon="fa fa-stethoscope"
                                class="ui-button-secondary">
                            </p:commandButton>
                        </div>
                    </div>

                    <!-- Patient info strip -->
                    <div class="row mx-2 mb-2">
                        <div class="col-12">
                            <p:panel>
                                <div class="row">
                                    <div class="col-md-3">
                                        <p:outputLabel value="Patient: " styleClass="fw-bold"/>
                                        <h:outputText value="#{inpatientClinicalDataController.parentAdmission.patient.person.nameWithTitle}"/>
                                    </div>
                                    <div class="col-md-2">
                                        <p:outputLabel value="BHT: " styleClass="fw-bold"/>
                                        <h:outputText value="#{inpatientClinicalDataController.parentAdmission.bhtNo}"/>
                                    </div>
                                    <div class="col-md-2">
                                        <p:outputLabel value="Age/Sex: " styleClass="fw-bold"/>
                                        <h:outputText value="#{inpatientClinicalDataController.parentAdmission.patient.person.ageAsString} / #{inpatientClinicalDataController.parentAdmission.patient.person.sex}"/>
                                    </div>
                                    <div class="col-md-2">
                                        <p:outputLabel value="Admitted: " styleClass="fw-bold"/>
                                        <h:outputText value="#{inpatientClinicalDataController.parentAdmission.dateOfAdmission}">
                                            <f:convertDateTime pattern="dd/MM/yyyy"/>
                                        </h:outputText>
                                    </div>
                                    <div class="col-md-3">
                                        <p:outputLabel value="Ward: " styleClass="fw-bold"/>
                                        <h:outputText value="#{inpatientClinicalDataController.parentAdmission.department.name}"/>
                                    </div>
                                </div>
                            </p:panel>
                        </div>
                    </div>

                    <!-- Main two-panel layout -->
                    <div class="row mx-2">

                        <!-- Left panel: template selector + saved cards list -->
                        <div class="col-md-4">

                            <!-- Generate new card -->
                            <p:panel class="mb-2">
                                <f:facet name="header">
                                    <h:outputText styleClass="fa fa-plus-circle"/>
                                    <h:outputText value=" Generate New Diagnosis Card" class="mx-2"/>
                                </f:facet>
                                <div class="row mb-2">
                                    <div class="col-12">
                                        <p:outputLabel value="Select Template" class="form-label fw-bold"/>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-9">
                                        <p:selectOneMenu
                                            id="somDxTemplates"
                                            value="#{inpatientClinicalDataController.selectedDocumentTemplate}"
                                            styleClass="w-100">
                                            <f:selectItem itemLabel="-- Select --" itemValue=""/>
                                            <f:selectItems
                                                value="#{inpatientClinicalDataController.diagnosisCardTemplates}"
                                                var="dt"
                                                itemLabel="#{dt.name}"
                                                itemValue="#{dt}"/>
                                        </p:selectOneMenu>
                                    </div>
                                    <div class="col-3 d-flex gap-1">
                                        <p:commandButton
                                            id="btnRefreshTemplates"
                                            icon="fas fa-sync-alt"
                                            title="Refresh templates"
                                            class="ui-button-info"
                                            process="btnRefreshTemplates"
                                            update="somDxTemplates"
                                            action="#{inpatientClinicalDataController.refreshDiagnosisCardTemplates}">
                                        </p:commandButton>
                                        <p:commandButton
                                            id="btnGenerateCard"
                                            value="Generate"
                                            icon="pi pi-plus"
                                            title="Generate card from selected template"
                                            class="ui-button-warning"
                                            process="btnGenerateCard somDxTemplates"
                                            update="lstSavedCards gpCardDoc msgDx"
                                            action="#{inpatientClinicalDataController.generateAndAddDocumentFromTemplate}">
                                        </p:commandButton>
                                    </div>
                                </div>
                                <div class="row mt-2">
                                    <div class="col-12">
                                        <p:commandButton
                                            id="btnGenerateAi"
                                            value="Generate with AI"
                                            icon="fa fa-magic"
                                            title="Generate diagnosis card using AI (Claude)"
                                            class="ui-button-info w-100"
                                            process="@this"
                                            update="lstSavedCards gpCardDoc msgDx"
                                            action="#{inpatientClinicalDataController.generateDiagnosisCardWithAi}"
                                            onstart="PF('aiBlockUI').show();"
                                            oncomplete="PF('aiBlockUI').hide();">
                                        </p:commandButton>
                                    </div>
                                </div>
                            </p:panel>

                            <!-- Saved diagnosis cards list -->
                            <p:panel>
                                <f:facet name="header">
                                    <h:outputText styleClass="fa fa-list"/>
                                    <h:outputText value=" Saved Diagnosis Cards" class="mx-2"/>
                                </f:facet>
                                <p:selectOneListbox
                                    id="lstSavedCards"
                                    value="#{inpatientClinicalDataController.encounterReferral}"
                                    styleClass="w-100"
                                    style="min-height: 200px;">
                                    <f:selectItems
                                        value="#{inpatientClinicalDataController.encounterDocuments}"
                                        var="doc"
                                        itemLabel="#{doc.stringValue}"
                                        itemValue="#{doc}"/>
                                    <p:ajax
                                        process="lstSavedCards"
                                        update="gpCardDoc"/>
                                </p:selectOneListbox>
                            </p:panel>

                        </div>

                        <!-- Right panel: editor + actions -->
                        <div class="col-md-8">
                            <p:panel id="gpCardDoc">
                                <f:facet name="header">
                                    <div class="d-flex justify-content-between align-items-center w-100">
                                        <h:outputText
                                            id="txtCardName"
                                            rendered="#{inpatientClinicalDataController.encounterReferral.stringValue ne null}"
                                            value="#{inpatientClinicalDataController.encounterReferral.stringValue}"
                                            styleClass="fw-bold"/>
                                        <h:outputText
                                            rendered="#{inpatientClinicalDataController.encounterReferral.stringValue eq null}"
                                            value="No card selected"
                                            styleClass="text-muted"/>
                                        <div class="d-flex gap-2">
                                            <p:commandButton
                                                id="btnToggleEdit"
                                                value="#{inpatientClinicalDataController.editingDiagnosisCard ? 'View' : 'Edit'}"
                                                icon="#{inpatientClinicalDataController.editingDiagnosisCard ? 'pi pi-eye' : 'pi pi-pencil'}"
                                                class="ui-button-secondary"
                                                action="#{inpatientClinicalDataController.toggleEditingDiagnosisCard()}"
                                                process="@this"
                                                update="gpCardDoc"
                                                title="Toggle between view and edit mode">
                                            </p:commandButton>
                                            <p:commandButton
                                                id="btnSaveCard"
                                                value="Save"
                                                icon="pi pi-save"
                                                class="ui-button-warning"
                                                action="#{inpatientClinicalDataController.saveEncounterReferral()}"
                                                process="btnSaveCard txeCardEdit"
                                                update="lstSavedCards gpCardDoc msgDx"
                                                title="Save changes to this diagnosis card">
                                            </p:commandButton>
                                            <p:commandButton
                                                id="btnDeleteCard"
                                                value="Delete"
                                                icon="pi pi-trash"
                                                class="ui-button-danger"
                                                action="#{inpatientClinicalDataController.removeEncounterReferral()}"
                                                process="btnDeleteCard"
                                                update="lstSavedCards gpCardDoc msgDx"
                                                onclick="if(!confirm('Are you sure you want to delete this diagnosis card?')) return false;"
                                                title="Delete this diagnosis card">
                                            </p:commandButton>
                                            <p:commandButton
                                                id="btnPrintCard"
                                                ajax="false"
                                                value="Print"
                                                icon="pi pi-print"
                                                class="ui-button-info"
                                                title="Print this diagnosis card">
                                                <p:printer target="pnlCardView"/>
                                            </p:commandButton>
                                            <p:commandButton
                                                id="btnDownloadCard"
                                                ajax="false"
                                                value="Download PDF"
                                                icon="pi pi-file-pdf"
                                                class="ui-button-success"
                                                title="Download as PDF">
                                                <p:fileDownload value="#{inpatientClinicalDataController.downloadAsPdf()}"/>
                                            </p:commandButton>
                                        </div>
                                    </div>
                                </f:facet>

                                <!-- Rendered HTML view (default) -->
                                <h:panelGroup id="pnlCardView"
                                    rendered="#{inpatientClinicalDataController.encounterReferral.lobValue ne null and not inpatientClinicalDataController.editingDiagnosisCard}"
                                    layout="block"
                                    style="width: 100%; min-height: 500px; border: 1px solid #dee2e6; padding: 15px; background: #fff; overflow: auto;">
                                    <h:outputText id="txeCardContent" value="#{inpatientClinicalDataController.encounterReferral.lobValue}" escape="false"/>
                                </h:panelGroup>

                                <!-- WYSIWYG editor using contenteditable -->
                                <h:panelGroup
                                    rendered="#{inpatientClinicalDataController.encounterReferral.lobValue ne null and inpatientClinicalDataController.editingDiagnosisCard}"
                                    layout="block">
                                    <div id="cardEditToolbar" class="mb-2 d-flex gap-1 flex-wrap p-2" style="background:#f0f0f0; border:1px solid #dee2e6; border-radius:4px;">
                                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.execCommand('bold')" title="Bold"><i class="pi pi-bold"></i> <b>B</b></button>
                                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.execCommand('italic')" title="Italic"><i class="pi pi-italic"></i> <i>I</i></button>
                                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.execCommand('underline')" title="Underline"><u>U</u></button>
                                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.execCommand('insertUnorderedList')" title="Bullet List">&#8226; List</button>
                                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.execCommand('insertOrderedList')" title="Numbered List">1. List</button>
                                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.execCommand('undo')" title="Undo">Undo</button>
                                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="document.execCommand('redo')" title="Redo">Redo</button>
                                    </div>
                                    <div id="cardEditArea" contenteditable="true"
                                         style="width:100%; min-height:500px; border:1px solid #dee2e6; padding:15px; background:#fff; overflow:auto; outline:none;">
                                    </div>
                                    <h:inputHidden id="txeCardEdit" value="#{inpatientClinicalDataController.encounterReferral.lobValue}"/>
                                    <script type="text/javascript">
                                        //<![CDATA[
                                        (function() {
                                            var editArea = document.getElementById('cardEditArea');
                                            var hiddenInput = document.querySelector("[id$='txeCardEdit']");
                                            if (editArea && hiddenInput) {
                                                editArea.innerHTML = hiddenInput.value;
                                                editArea.addEventListener('input', function() {
                                                    hiddenInput.value = editArea.innerHTML;
                                                });
                                                editArea.addEventListener('blur', function() {
                                                    hiddenInput.value = editArea.innerHTML;
                                                });
                                            }
                                        })();
                                        //]]>
                                    </script>
                                </h:panelGroup>

                                <h:panelGroup
                                    rendered="#{inpatientClinicalDataController.encounterReferral.lobValue eq null}"
                                    layout="block"
                                    styleClass="text-center py-5">
                                    <h:outputText value="No diagnosis card selected" styleClass="text-muted fs-5"/>
                                    <br/>
                                    <h:outputText value="Select a saved card from the list, or generate a new one using a template." styleClass="text-muted"/>
                                </h:panelGroup>

                            </p:panel>
                        </div>

                    </div>

                    <p:blockUI block="formDiagnosisCards" widgetVar="aiBlockUI">
                        <div style="text-align:center; padding:20px;">
                            <i class="pi pi-spin pi-spinner" style="font-size:2rem;"></i>
                            <div style="margin-top:10px; font-weight:bold;">Generating diagnosis card with AI...</div>
                            <div style="margin-top:5px; color:#666;">This may take a few seconds</div>
                        </div>
                    </p:blockUI>

                </h:form>

            </ui:define>
        </ui:composition>
    </h:body>
</html>
