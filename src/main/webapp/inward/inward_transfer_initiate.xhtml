<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/resources/template/template.xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:in="http://xmlns.jcp.org/jsf/composite/inward">

    <ui:define name="content">
        <h:form>

            <p:panel class="my-3" rendered="#{patientTransferController.current eq null}">
                <f:facet name="header">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h:outputText styleClass="fa fa-arrow-right fa-lg"/>
                            <p:outputLabel value="Initiate Transfer — Select Patient" class="m-2"/>
                        </div>
                    </div>
                </f:facet>

                <h:panelGrid columns="3">
                    <h:outputLabel value="Type Patient Name or BHT : " class="mx-2"/>
                    <p:autoComplete
                        converter="dis"
                        widgetVar="aPt"
                        id="acPt"
                        forceSelection="true"
                        value="#{patientTransferController.current}"
                        completeMethod="#{admissionController.completePatient}"
                        var="myItem"
                        itemValue="#{myItem}"
                        itemLabel="#{myItem.bhtNo}"
                        size="30"
                        class="w-100">
                        <p:column headerText="PHN" style="padding: 6px; width: 8em;">
                            <h:outputLabel value="#{myItem.patient.phn}"/>
                        </p:column>
                        <p:column headerText="BHT No" style="padding: 6px; width: 8em;">
                            <h:outputLabel value="#{myItem.bhtNo}"/>
                        </p:column>
                        <p:column headerText="Patient" style="padding: 6px; width: 400px;">
                            <h:outputLabel value="#{myItem.patient.person.nameWithTitle}"/>
                        </p:column>
                        <p:column headerText="Room" style="padding: 6px; width: 8em;">
                            <h:outputLabel value="#{myItem.currentPatientRoom.roomFacilityCharge.name}"/>
                        </p:column>
                    </p:autoComplete>
                    <p:commandButton
                        id="btnSelect"
                        value="Select"
                        ajax="false"
                        class="mx-3"/>
                </h:panelGrid>
            </p:panel>

            <h:panelGroup rendered="#{patientTransferController.current ne null}">
                <p:panel class="my-3">
                    <f:facet name="header">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h:outputText styleClass="fa fa-arrow-right fa-lg"/>
                                <p:outputLabel value="Initiate Transfer" class="m-2"/>
                            </div>
                            <div>
                                <p:commandButton
                                    value="Back"
                                    icon="fa fa-arrow-left"
                                    ajax="false"
                                    class="ui-button-secondary"
                                    action="#{patientTransferController.navigateToInitiateTransfer()}"/>
                            </div>
                        </div>
                    </f:facet>

                    <div class="row w-100">
                        <div class="col-4">
                            <p:panel>
                                <f:facet name="header">
                                    <h:outputText styleClass="fas fa-id-card-alt"/>
                                    <h:outputLabel value="Patient Details" class="mx-4"/>
                                </f:facet>
                                <in:bhtDetail admission="#{patientTransferController.current}"/>
                                <div class="row mt-2">
                                    <div class="col-md-4"><p:outputLabel value="Current Room"/></div>
                                    <div class="col-md-1 justify-content-end d-flex"><p:outputLabel value=":"/></div>
                                    <div class="col-md-7">
                                        <h:outputText value="#{patientTransferController.current.currentPatientRoom.roomFacilityCharge.name}"/>
                                    </div>
                                </div>
                            </p:panel>
                        </div>
                        <div class="col-8">
                            <p:panel>
                                <f:facet name="header">
                                    <h:outputText styleClass="fas fa-door-open"/>
                                    <h:outputLabel value="Transfer Details" class="mx-4"/>
                                </f:facet>

                                <h:panelGrid columns="2" cellpadding="5">
                                    <h:outputLabel value="Target Room"/>
                                    <p:autoComplete
                                        forceSelection="true"
                                        id="targetRoom"
                                        value="#{patientTransferController.targetRoomFacilityCharge}"
                                        completeMethod="#{roomFacilityChargeController.completeRoom}"
                                        var="rf"
                                        itemLabel="#{rf.name}"
                                        itemValue="#{rf}"
                                        size="30"
                                        class="my-2 mx-5"/>

                                    <h:outputLabel value="Notes"/>
                                    <p:inputTextarea
                                        value="#{patientTransferController.notes}"
                                        rows="3"
                                        cols="40"
                                        class="my-2 mx-5"/>
                                </h:panelGrid>

                                <div class="mt-2">
                                    <p:commandButton
                                        value="Initiate Transfer"
                                        icon="fa fa-arrow-right"
                                        ajax="false"
                                        class="ui-button-success"
                                        action="#{patientTransferController.initiateTransfer()}"/>
                                </div>

                                <h:panelGroup rendered="#{not empty patientTransferController.pendingTransfersForCurrentBht}">
                                    <p:panel class="mt-3">
                                        <f:facet name="header">
                                            <p:outputLabel value="Pending Transfer Requests for This Patient"/>
                                        </f:facet>
                                        <p:dataTable value="#{patientTransferController.pendingTransfersForCurrentBht}" var="req">
                                            <p:column headerText="Status">
                                                <h:outputText value="#{req.status}"/>
                                            </p:column>
                                            <p:column headerText="To Room">
                                                <h:outputText value="#{req.toRoomFacilityCharge.name}"/>
                                            </p:column>
                                            <p:column headerText="Initiated At">
                                                <h:outputText value="#{req.initiatedAt}">
                                                    <f:convertDateTime pattern="dd MMM yyyy HH:mm"/>
                                                </h:outputText>
                                            </p:column>
                                            <p:column headerText="Initiated By">
                                                <h:outputText value="#{req.initiatedBy.webUserPerson.name}"/>
                                            </p:column>
                                        </p:dataTable>
                                    </p:panel>
                                </h:panelGroup>
                            </p:panel>
                        </div>
                    </div>
                </p:panel>
            </h:panelGroup>

        </h:form>
    </ui:define>

</ui:composition>
