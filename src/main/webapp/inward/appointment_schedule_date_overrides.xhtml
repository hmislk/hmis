<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>Appointment Schedule Date Overrides</title>
    </h:head>
    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">
                <h:form id="formOverrides">
                    <h:panelGroup rendered="#{not webUserController.hasPrivilege('InwardAdministration')}">
                        <na:not_authorize xmlns:na="http://xmlns.jcp.org/jsf/composite/template" />
                    </h:panelGroup>
                    <h:panelGroup rendered="#{webUserController.hasPrivilege('InwardAdministration')}">
                    <p:panel>
                        <f:facet name="header">
                            <h:outputText value="Appointment Schedule Date Overrides" />
                        </f:facet>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <h:panelGrid columns="3" cellpadding="5"
                                             columnClasses="col-4,col-1,col-7">
                                    <p:outputLabel value="Select Template" for="acTemplate" />
                                    <h:outputText value=":" />
                                    <p:autoComplete id="acTemplate"
                                                    value="#{appointmentScheduleTemplateController.selectedTemplateForOverrides}"
                                                    completeMethod="#{appointmentScheduleTemplateController.completeTemplate}"
                                                    var="t"
                                                    itemLabel="#{t.name}"
                                                    itemValue="#{t}"
                                                    forceSelection="true"
                                                    inputStyleClass="form-control w-100"
                                                    class="w-100"
                                                    placeholder="Search Template">
                                        <p:ajax event="itemSelect"
                                                listener="#{appointmentScheduleTemplateController.onTemplateSelectedForOverrides()}"
                                                update="pnlOverrideForm pnlOverrideList" />
                                    </p:autoComplete>
                                </h:panelGrid>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-5">
                                <h:panelGroup id="pnlOverrideForm">
                                    <h:panelGroup rendered="#{appointmentScheduleTemplateController.selectedTemplateForOverrides ne null}">
                                        <p:panel header="Create / Edit Date Override">
                                            <h:panelGrid columns="3" cellpadding="5" class="w-100"
                                                         columnClasses="col-4,col-1,col-7">

                                                <p:outputLabel value="Override Date" for="calOverrideDate" />
                                                <h:outputText value=":" />
                                                <p:datePicker id="calOverrideDate"
                                                              value="#{appointmentScheduleTemplateController.currentOverride.overrideDate}"
                                                              pattern="dd/MM/yyyy"
                                                              inputStyleClass="form-control w-100"
                                                              class="w-100"
                                                              showButtonBar="true" />

                                                <p:outputLabel value="Override Type" for="cmbOverrideType" />
                                                <h:outputText value=":" />
                                                <p:selectOneMenu id="cmbOverrideType"
                                                                 value="#{appointmentScheduleTemplateController.currentOverride.overrideType}"
                                                                 class="w-100">
                                                    <f:selectItem itemLabel="Select Type" itemValue="" />
                                                    <f:selectItems value="#{appointmentScheduleTemplateController.overrideTypes}"
                                                                   var="ot"
                                                                   itemLabel="#{ot.displayName}"
                                                                   itemValue="#{ot}" />
                                                    <p:ajax update="pnlOverrideExtra" process="@this" />
                                                </p:selectOneMenu>

                                                <p:outputLabel value="Reason" for="txtReason" />
                                                <h:outputText value=":" />
                                                <p:inputText id="txtReason"
                                                             value="#{appointmentScheduleTemplateController.currentOverride.reason}"
                                                             class="form-control w-100"
                                                             placeholder="e.g. Vesak Poya Holiday" />
                                            </h:panelGrid>

                                            <h:panelGroup id="pnlOverrideExtra">
                                                <h:panelGroup rendered="#{appointmentScheduleTemplateController.currentOverride.overrideType eq 'CUSTOM_LIMIT' or appointmentScheduleTemplateController.currentOverride.overrideType eq 'CUSTOM_TIME'}">
                                                    <h:panelGrid columns="3" cellpadding="5" class="w-100"
                                                                 columnClasses="col-4,col-1,col-7">

                                                        <p:outputLabel value="Override Max Count" for="txtOverrideMax" />
                                                        <h:outputText value=":" />
                                                        <p:inputText id="txtOverrideMax"
                                                                     value="#{appointmentScheduleTemplateController.currentOverride.overriddenMaxCount}"
                                                                     class="form-control w-100"
                                                                     placeholder="Leave blank to use template default" />
                                                    </h:panelGrid>
                                                </h:panelGroup>

                                                <h:panelGroup rendered="#{appointmentScheduleTemplateController.currentOverride.overrideType eq 'CUSTOM_TIME'}">
                                                    <h:panelGrid columns="3" cellpadding="5" class="w-100"
                                                                 columnClasses="col-4,col-1,col-7">

                                                        <p:outputLabel value="Start Time" for="calOverrideStart" />
                                                        <h:outputText value=":" />
                                                        <p:datePicker id="calOverrideStart"
                                                                      value="#{appointmentScheduleTemplateController.currentOverride.overriddenStartTime}"
                                                                      timeOnly="true"
                                                                      showTime="true"
                                                                      pattern="hh:mm a"
                                                                      inputStyleClass="form-control w-100"
                                                                      class="w-100" />

                                                        <p:outputLabel value="End Time" for="calOverrideEnd" />
                                                        <h:outputText value=":" />
                                                        <p:datePicker id="calOverrideEnd"
                                                                      value="#{appointmentScheduleTemplateController.currentOverride.overriddenEndTime}"
                                                                      timeOnly="true"
                                                                      showTime="true"
                                                                      pattern="hh:mm a"
                                                                      inputStyleClass="form-control w-100"
                                                                      class="w-100" />
                                                    </h:panelGrid>
                                                </h:panelGroup>
                                            </h:panelGroup>

                                            <div class="d-flex justify-content-end mt-3">
                                                <p:commandButton value="Save Override"
                                                                 icon="fa fa-save"
                                                                 action="#{appointmentScheduleTemplateController.saveDateOverride()}"
                                                                 update="formOverrides"
                                                                 class="ui-button-success" />
                                            </div>
                                        </p:panel>
                                    </h:panelGroup>
                                </h:panelGroup>
                            </div>

                            <div class="col-md-7">
                                <h:panelGroup id="pnlOverrideList">
                                    <h:panelGroup rendered="#{appointmentScheduleTemplateController.selectedTemplateForOverrides ne null}">
                                        <p:panel header="Date Overrides">
                                            <p:dataTable value="#{appointmentScheduleTemplateController.dateOverrides}"
                                                         var="o"
                                                         emptyMessage="No date overrides found."
                                                         rows="10"
                                                         paginator="true">

                                                <p:column headerText="Date">
                                                    <h:outputText value="#{o.overrideDate}">
                                                        <f:convertDateTime pattern="dd/MM/yyyy" />
                                                    </h:outputText>
                                                </p:column>

                                                <p:column headerText="Type">
                                                    <h:outputText value="#{o.overrideType.displayName}" rendered="#{o.overrideType ne null}" />
                                                </p:column>

                                                <p:column headerText="Max Count">
                                                    <h:outputText value="#{o.overriddenMaxCount}" rendered="#{o.overriddenMaxCount ne null}" />
                                                    <h:outputText value="-" rendered="#{o.overriddenMaxCount eq null}" />
                                                </p:column>

                                                <p:column headerText="Reason">
                                                    <h:outputText value="#{o.reason}" />
                                                </p:column>

                                                <p:column headerText="Actions" style="width:120px">
                                                    <p:commandButton icon="fa fa-pencil"
                                                                     title="Edit"
                                                                     class="ui-button-warning ui-button-outlined"
                                                                     action="#{appointmentScheduleTemplateController.editDateOverride(o)}"
                                                                     update="formOverrides"
                                                                     style="margin-right:5px" />
                                                    <p:commandButton icon="fa fa-trash"
                                                                     title="Retire"
                                                                     class="ui-button-danger ui-button-outlined"
                                                                     action="#{appointmentScheduleTemplateController.retireDateOverride(o)}"
                                                                     update="formOverrides">
                                                        <p:confirm header="Confirm" message="Retire this override?" icon="pi pi-exclamation-triangle" />
                                                    </p:commandButton>
                                                </p:column>

                                            </p:dataTable>
                                            <p:confirmDialog global="true">
                                                <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes ui-button-success" icon="pi pi-check" />
                                                <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-danger" icon="pi pi-times" />
                                            </p:confirmDialog>
                                        </p:panel>
                                    </h:panelGroup>
                                </h:panelGroup>
                            </div>
                        </div>
                    </p:panel>
                    </h:panelGroup>
                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
