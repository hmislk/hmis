<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>

        <ui:composition template="/inward/inward_reports.xhtml">

            <ui:define name="subcontent">
                <h:form >
                    <h:panelGrid columns="2" >
                        <h:outputLabel value="From Department" />
                        <p:autoComplete completeMethod="#{departmentController.completeDept}" 
                                        var="dept" itemLabel="#{dept.name}"
                                        itemValue="#{dept}" forceSelection="true" 
                                        value="#{reportsTransfer.fromDepartment}" 
                                         >
                        </p:autoComplete>                    
                        <h:outputLabel value="From" ></h:outputLabel>
                        <p:calendar value="#{reportsTransfer.fromDate}" pattern="#{sessionController.applicationPreference.longDateTimeFormat}"  ></p:calendar>
                        <h:outputLabel value="To" ></h:outputLabel>
                        <p:calendar value="#{reportsTransfer.toDate}" pattern="#{sessionController.applicationPreference.longDateTimeFormat}"  ></p:calendar>
                        <h:outputLabel value="Date Basis" />
                        <p:selectOneMenu styleClass="w-100" value="#{reportsTransfer.dateBasis}">
                            <f:selectItem itemValue="createdAt" itemLabel="Created Date (default)" />
                            <f:selectItem itemValue="admissionDate" itemLabel="Admission Date" />
                        </p:selectOneMenu>
                        <h:outputLabel value="Admission Type" />
                        <p:selectOneMenu styleClass="w-100" value="#{reportsTransfer.admissionType}">
                            <f:selectItem itemLabel="All" itemValue="#{null}" />
                            <f:selectItems value="#{admissionTypeController.items}" var="at" itemValue="#{at}" itemLabel="#{at.name}" />
                        </p:selectOneMenu>
                        <h:outputLabel value="Payment Method" />
                        <p:selectOneMenu styleClass="w-100" value="#{reportsTransfer.paymentMethod}">
                            <f:selectItem itemLabel="All" itemValue="#{null}" />
                            <f:selectItems value="#{enumController.paymentMethodForAdmission}" />
                        </p:selectOneMenu>
                        <h:outputLabel value="Institution" />
                        <p:selectOneMenu styleClass="w-100" value="#{reportsTransfer.institution}" filter="true">
                            <f:selectItem itemLabel="All Institutions" itemValue="#{null}" />
                            <f:selectItems value="#{institutionController.companies}" var="ins" itemLabel="#{ins.name}" itemValue="#{ins}" />
                        </p:selectOneMenu>
                        <h:outputLabel value="Site" />
                        <p:selectOneMenu styleClass="w-100" value="#{reportsTransfer.site}" filter="true">
                            <f:selectItem itemLabel="All Sites" itemValue="#{null}" />
                            <f:selectItems value="#{institutionController.sites}" var="site" itemLabel="#{site.name}" itemValue="#{site}" />
                        </p:selectOneMenu>
                        <h:outputLabel value="Department" />
                        <p:autoComplete styleClass="w-100" completeMethod="#{departmentController.completeDept}"
                                        var="dept" itemLabel="#{dept.name}" itemValue="#{dept}"
                                        forceSelection="true" value="#{reportsTransfer.department}" />
                    </h:panelGrid>

                    <p:panelGrid columns="3">
                    <p:commandButton ajax="false" value="Fill BHT Issue" 
                                    action="#{reportsTransfer.fillItemCountsBht()}" />

                    <p:commandButton ajax="false" value="Fill Surgery Issue" 
                                    action="#{reportsTransfer.fillItemCountsBhtSurgery()}" />
                    
                    </p:panelGrid>


                    <p:dataTable id="tbl"  value="#{reportsTransfer.itemCounts}"  var="i"  >
                        <p:column headerText="Item">
                            #{i.itemBatch.item.name}
                        </p:column>
                        <p:column>
                            #{i.itemBatch.batchNo}
                        </p:column>
                        <p:column style="text-align: right;" headerText="Count">
                            #{i.count}
                            
                        </p:column>                          
                        <p:column headerText="Gross Value" styleClass="averageNumericColumn">
                            <h:outputLabel value="#{i.gross}">
                                <f:convertNumber  pattern="#,#00.00"/>
                            </h:outputLabel>  
                            <f:facet name="footer">
                                <h:outputLabel value="#{reportsTransfer.totalsValue}">
                                   <f:convertNumber  pattern="#,#00.00"/>
                                </h:outputLabel> 
                            </f:facet>
                        </p:column>
                        <p:column headerText="Margin Value" styleClass="averageNumericColumn">
                            <h:outputLabel value="#{i.margin}">
                                 <f:convertNumber  pattern="#,#00.00"/>
                            </h:outputLabel> 
                            <f:facet name="footer">
                                <h:outputLabel value="#{reportsTransfer.marginValue}">
                                    <f:convertNumber  pattern="#,#00.00"/>
                                </h:outputLabel>  
                            </f:facet>
                        </p:column>  
                        <p:column headerText="Discount Value" styleClass="averageNumericColumn">
                            <h:outputLabel value="#{i.discount}">
                                <f:convertNumber  pattern="#,#00.00"/>
                            </h:outputLabel> 
                            <f:facet name="footer">
                                <h:outputLabel value="#{reportsTransfer.discountsValue}">
                                    <f:convertNumber  pattern="#,#00.00"/>
                                </h:outputLabel>  
                            </f:facet>
                        </p:column>  
                        <p:column headerText="Net Value" styleClass="averageNumericColumn">
                            <h:outputLabel value="#{i.net}">
                                <f:convertNumber  pattern="#,#00.00"/>
                            </h:outputLabel>   
                            <f:facet name="footer">
                                <h:outputLabel value="#{reportsTransfer.netTotalValues}">
                                    <f:convertNumber  pattern="#,#00.00"/>
                                </h:outputLabel> 
                            </f:facet>
                        </p:column>

                    </p:dataTable>



                </h:form>
            </ui:define>


        </ui:composition>
    </h:body>
</html>
