<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/inward/inward_reports.xhtml">
            <ui:define name="subcontent">
                <h:form id="frm">

                    <!-- ===== Filters ===== -->
                    <p:panel header="Inward Charge Type Detail Report" class="m-1">

                        <h:panelGrid columns="8" styleClass="w-100 form-grid"
                                     columnClasses="label-icon-column, input-column">

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa ml-5" />
                                <h:outputLabel value="From" for="fromDate" class="mx-3"/>
                            </h:panelGroup>
                            <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="fromDate"
                                value="#{inwardChargeTypeDetailController.fromDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa mr-2" />
                                <h:outputLabel value="To" for="toDate" class="mx-3"/>
                            </h:panelGroup>
                            <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="toDate"
                                value="#{inwardChargeTypeDetailController.toDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf017;" styleClass="fa mr-2" />
                                <h:outputLabel value="Date Basis" for="dateBasisMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="dateBasisMenu"
                                styleClass="w-100 form-control"
                                value="#{inwardChargeTypeDetailController.dateBasis}">
                                <f:selectItem itemValue="dischargeDate" itemLabel="Discharge Date" />
                                <f:selectItem itemValue="admissionDate" itemLabel="Admission Date" />
                            </p:selectOneMenu>

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf05a;" styleClass="fa mr-2" />
                                <h:outputLabel value="Admission Status" for="admStatusMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="admStatusMenu"
                                styleClass="w-100 form-control"
                                value="#{inwardChargeTypeDetailController.admissionStatus}">
                                <f:selectItems
                                    value="#{enumController.admissionStatuses}"
                                    var="s"
                                    itemValue="#{s}"
                                    itemLabel="#{s.label}" />
                            </p:selectOneMenu>

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf0f0;" styleClass="fa mr-2" />
                                <h:outputLabel value="Admission Type" for="admTypeMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="admTypeMenu"
                                styleClass="w-100 form-control"
                                value="#{inwardChargeTypeDetailController.admissionType}">
                                <f:selectItem itemLabel="All" itemValue="#{null}" />
                                <f:selectItems
                                    value="#{admissionTypeController.items}"
                                    var="at"
                                    itemValue="#{at}"
                                    itemLabel="#{at.name}" />
                            </p:selectOneMenu>

                            <p:spacer width="50" />
                            <p:spacer width="50" />
                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf19c;" styleClass="fa mr-2" />
                                <h:outputLabel value="Institution" for="cmbIns" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="cmbIns"
                                styleClass="w-100 form-control"
                                value="#{inwardChargeTypeDetailController.institution}"
                                filter="true">
                                <f:selectItem itemLabel="All Institutions" />
                                <f:selectItems value="#{institutionController.companies}" var="ins"
                                               itemLabel="#{ins.name}" itemValue="#{ins}" />
                                <p:ajax process="cmbIns" update="cmbDept" />
                            </p:selectOneMenu>

                            <p:spacer />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf3c5;" styleClass="fa mr-2" />
                                <h:outputLabel value="Site" for="siteMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="siteMenu"
                                styleClass="w-100 form-control"
                                value="#{inwardChargeTypeDetailController.site}"
                                filter="true">
                                <f:selectItem itemLabel="All Sites" />
                                <f:selectItems value="#{institutionController.sites}" var="site"
                                               itemLabel="#{site.name}" itemValue="#{site}" />
                                <p:ajax process="siteMenu" update="cmbDept" />
                            </p:selectOneMenu>

                            <p:spacer />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf0e8;" styleClass="fa mr-2" />
                                <h:outputLabel value="Department" for="cmbDept" class="mx-3"/>
                            </h:panelGroup>
                            <h:panelGroup id="cmbDept">
                                <p:selectOneMenu
                                    rendered="#{inwardChargeTypeDetailController.institution eq null and inwardChargeTypeDetailController.site eq null}"
                                    styleClass="w-100 form-control"
                                    value="#{inwardChargeTypeDetailController.department}"
                                    filterMatchMode="contains" filter="true">
                                    <f:selectItem itemLabel="All Departments" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite()}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>
                                <p:selectOneMenu
                                    rendered="#{inwardChargeTypeDetailController.institution eq null and inwardChargeTypeDetailController.site ne null}"
                                    styleClass="w-100 form-control"
                                    value="#{inwardChargeTypeDetailController.department}"
                                    filterMatchMode="contains" filter="true">
                                    <f:selectItem itemLabel="All Departments" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite(inwardChargeTypeDetailController.site)}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>
                                <p:selectOneMenu
                                    rendered="#{inwardChargeTypeDetailController.institution ne null and inwardChargeTypeDetailController.site eq null}"
                                    styleClass="w-100 form-control"
                                    value="#{inwardChargeTypeDetailController.department}"
                                    filterMatchMode="contains" filter="true">
                                    <f:selectItem itemLabel="All Departments" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSiteForInstitution(inwardChargeTypeDetailController.institution)}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>
                                <p:selectOneMenu
                                    rendered="#{inwardChargeTypeDetailController.institution ne null and inwardChargeTypeDetailController.site ne null}"
                                    styleClass="w-100 form-control"
                                    value="#{inwardChargeTypeDetailController.department}"
                                    filterMatchMode="contains" filter="true">
                                    <f:selectItem itemLabel="All Departments" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite(inwardChargeTypeDetailController.institution, inwardChargeTypeDetailController.site)}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>
                            </h:panelGroup>

                            <!-- ===== Mandatory charge type selector ===== -->
                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf0d0;" styleClass="fa mr-2" />
                                <h:outputLabel value="Charge Type *" for="cmbChargeType" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="cmbChargeType"
                                styleClass="w-100 form-control"
                                value="#{inwardChargeTypeDetailController.selectedChargeType}"
                                filter="true"
                                filterMatchMode="contains">
                                <f:selectItem itemLabel="-- Select Charge Type --" itemValue="#{null}" />
                                <f:selectItems
                                    value="#{inwardChargeTypeDetailController.allChargeTypes}"
                                    var="ct"
                                    itemLabel="#{inwardChargeTypeDetailController.getChargeTypeLabel(ct)}"
                                    itemValue="#{ct}" />
                            </p:selectOneMenu>

                        </h:panelGrid>

                        <p:message for="cmbChargeType" styleClass="text-danger" />
                        <p:messages globalOnly="false" showDetail="true" showSummary="false"
                                    rendered="#{not empty inwardChargeTypeDetailController.errorMessage}"
                                    styleClass="text-danger m-1" />

                        <p:commandButton
                            value="Generate"
                            icon="fas fa-cogs"
                            action="#{inwardChargeTypeDetailController.generateReport()}"
                            ajax="false"
                            class="ui-button-success m-1" />

                    </p:panel>

                    <!-- ===== Error message when charge type not selected ===== -->
                    <p:panel rendered="#{not empty inwardChargeTypeDetailController.errorMessage}"
                             styleClass="m-1">
                        <h:outputText value="#{inwardChargeTypeDetailController.errorMessage}"
                                      styleClass="text-danger" />
                    </p:panel>

                    <!-- ===== Results ===== -->
                    <p:panel id="pnlResults"
                             rendered="#{inwardChargeTypeDetailController.reportRows != null}">

                        <f:facet name="header">
                            <div class="d-flex justify-content-between align-items-center">
                                <h:outputText value="#{inwardChargeTypeDetailController.getChargeTypeLabel(inwardChargeTypeDetailController.selectedChargeType)} — Detail" />
                                <div>
                                    <p:commandButton value="Print"
                                                     icon="fas fa-print"
                                                     class="ui-button-info me-1"
                                                     ajax="false">
                                        <p:printer target="tblReport" />
                                    </p:commandButton>
                                    <p:commandButton value="Excel"
                                                     icon="fas fa-file-excel"
                                                     class="ui-button-success"
                                                     ajax="false">
                                        <p:dataExporter type="xlsx"
                                                        target="tblReport"
                                                        fileName="Inward_Charge_Type_Detail" />
                                    </p:commandButton>
                                </div>
                            </div>
                        </f:facet>

                        <p:dataTable
                            id="tblReport"
                            value="#{inwardChargeTypeDetailController.reportRows}"
                            var="row"
                            emptyMessage="No records found"
                            paginator="true"
                            rows="20"
                            paginatorAlwaysVisible="false"
                            paginatorPosition="bottom"
                            paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                            currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                            rowsPerPageTemplate="10,20,50,{ShowAll|'All'}"
                            styleClass="w-100">

                            <p:column headerText="BHT No" style="white-space:nowrap;">
                                <h:outputText value="#{row.bhtNo}" />
                            </p:column>

                            <p:column headerText="Patient Name">
                                <h:outputText value="#{row.patientName}" />
                            </p:column>

                            <p:column headerText="Admitted" style="white-space:nowrap;">
                                <h:outputText value="#{row.dateOfAdmission}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Discharged" style="white-space:nowrap;">
                                <h:outputText value="#{row.dateOfDischarge}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Item / Service">
                                <h:outputText value="#{row.itemName}" />
                            </p:column>

                            <p:column headerText="From" style="white-space:nowrap;">
                                <h:outputText value="#{row.fromTime}" rendered="#{row.fromTime != null}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="To" style="white-space:nowrap;">
                                <h:outputText value="#{row.toTime}" rendered="#{row.toTime != null}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Gross" style="text-align:right; white-space:nowrap;">
                                <h:outputText value="#{row.grossValue}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText>
                                <f:facet name="footer">
                                    <h:outputText value="#{inwardChargeTypeDetailController.totalGross}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </f:facet>
                            </p:column>

                            <p:column headerText="Discount" style="text-align:right; white-space:nowrap;">
                                <h:outputText value="#{row.discount}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText>
                                <f:facet name="footer">
                                    <h:outputText value="#{inwardChargeTypeDetailController.totalDiscount}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </f:facet>
                            </p:column>

                            <p:column headerText="Net" style="text-align:right; white-space:nowrap; font-weight:bold;">
                                <h:outputText value="#{row.netValue}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText>
                                <f:facet name="footer">
                                    <h:outputText value="#{inwardChargeTypeDetailController.totalNet}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </f:facet>
                            </p:column>

                        </p:dataTable>

                    </p:panel>

                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
