<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      >

    <h:body>
        <ui:composition template="/payments/credit_company_pay_index.xhtml">
            <ui:define name="admin">
                <h:form><p:panel>
                        <f:facet name="header">
                            <h:outputLabel value="INWARD CREDIT DUE"/>
                        </f:facet>
                        <h:panelGrid columns="2" class="my-2">
                                <h:outputLabel value="From Date"/>
                                <p:calendar class="mx-4 w-100" inputStyleClass="w-100" id="fromDate" value="#{creditCompanyDueController.fromDate}" navigator="true" pattern="#{sessionController.applicationPreference.longDateTimeFormat}" >
                                    <f:ajax event="dateSelect" execute="toDate @this"  render="lst"/>
                                </p:calendar>
                                <h:outputLabel value="To Date &emsp;"/>
                                <p:calendar class="mx-4 w-100" inputStyleClass="w-100" id="toDate" value="#{creditCompanyDueController.toDate}" navigator="true" pattern="#{sessionController.applicationPreference.longDateTimeFormat}" >
                                    <f:ajax event="dateSelect" execute="@this fromDate"  render="lst"/>
                                </p:calendar>
                                <p:spacer width="100" height="1"/>
                            </h:panelGrid>
                        <h:panelGrid columns="6" class="my-2">
                            <p:commandButton class="ui-button-warning" icon="fas fa-cogs" ajax="false" value="Process" action="#{creditCompanyDueController.createInwardCreditDue()}" />
                            <p:commandButton class="ui-button-info mx-2" icon="fas fa-print" ajax="false" value="Print"  >
                                <p:printer target="lst"  />
                            </p:commandButton>

                            <p:commandButton class="ui-button-success" icon="fas fa-file-excel" actionListener="#{creditCompanyDueController.createInwardCreditDue()}" ajax="false" value="Excel"  >
                                <p:dataExporter type="xlsx" target="lst" fileName="Due Search(Credit Company)"  />
                            </p:commandButton>
                        </h:panelGrid>
                        <p:dataTable id="lst" value="#{creditCompanyDueController.institutionEncounters}" var="i">
                            <f:facet name="header">
                                <h:outputLabel value="Due Search(Credit Company)"/>
                                <br />
                                <h:outputLabel value=" From :&emsp;" style="white-space: pre-line"/>
                                <h:outputLabel value="#{creditCompanyDueController.fromDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputLabel>
                                <h:outputLabel value="&emsp;&emsp;To :&emsp;"/>
                                <h:outputLabel value="#{creditCompanyDueController.toDate}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                </h:outputLabel>
                            </f:facet>
                            <p:columnGroup type="header">
                                <p:row>
                                    <p:column headerText="BHT No"/>
                                    <p:column headerText="Date Of Discharge"/>
                                    <p:column headerText="Patient Name"/>
                                    <p:column headerText="Credit Company"/>
                                    <p:column headerText="Bill Amount"/>
                                    <p:column headerText="Paid"/>
                                    <p:column headerText="Outstanding"/>
                                </p:row>
                            </p:columnGroup>
                            <p:subTable value="#{i.bills}" var="bill">
                                <f:facet name="header">
                                    <h:outputLabel value="#{i.institution.name}"/>
                                </f:facet>
                                <p:column>
                                    <h:outputLabel value="#{bill.patientEncounter.bhtNo}"/>
                                </p:column>
                                <p:column>
                                    <h:outputLabel value="#{bill.patientEncounter.dateOfDischarge}">
                                        <f:convertDateTime pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                                    </h:outputLabel>
                                </p:column>
                                <p:column>
                                    <h:outputLabel value="#{bill.patient.person.nameWithTitle}"/>
                                </p:column>
                                <p:column>
                                    <h:outputLabel value="#{bill.creditCompany.name}"/>
                                </p:column>
                                <p:column style="text-align: right;">
                                    <h:outputLabel value="#{bill.netTotal}">
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputLabel>
                                </p:column>
                                <p:column style="text-align: right;">
                                    <h:outputLabel value="#{bill.paidAmount}">
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputLabel>
                                </p:column>
                                <p:column style="text-align: right;">
                                    <h:outputLabel value="#{bill.netTotal - bill.paidAmount}">
                                        <f:convertNumber pattern="#,##0.00"/>
                                    </h:outputLabel>
                                </p:column>
                                <p:columnGroup type="footer">
                                    <p:row>
                                        <p:column footerText="Sub Total" colspan="4"/>
                                        <p:column style="text-align: right;">
                                            <f:facet name="footer">
                                                <h:outputLabel value="#{i.total}">
                                                    <f:convertNumber pattern="#,##0.00"/>
                                                </h:outputLabel>
                                            </f:facet>
                                        </p:column>
                                        <p:column style="text-align: right;">
                                            <f:facet name="footer">
                                                <h:outputLabel value="#{i.paidTotal}">
                                                    <f:convertNumber pattern="#,##0.00"/>
                                                </h:outputLabel>
                                            </f:facet>
                                        </p:column>
                                        <p:column style="text-align: right;">
                                            <f:facet name="footer">
                                                <h:outputLabel value="#{i.total - i.paidTotal}">
                                                    <f:convertNumber pattern="#,##0.00"/>
                                                </h:outputLabel>
                                            </f:facet>
                                        </p:column>
                                    </p:row>
                                </p:columnGroup>
                            </p:subTable>
                            <p:columnGroup type="footer">
                                <p:row>
                                    <p:column footerText="Grand Total" colspan="4"/>
                                    <p:column style="text-align: right;">
                                        <f:facet name="footer">
                                            <h:outputLabel value="#{creditCompanyDueController.finalTotal}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputLabel>
                                        </f:facet>
                                    </p:column>
                                    <p:column style="text-align: right;">
                                        <f:facet name="footer">
                                            <h:outputLabel value="#{creditCompanyDueController.finalPaidTotal}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputLabel>
                                        </f:facet>
                                    </p:column>
                                    <p:column style="text-align: right;">
                                        <f:facet name="footer">
                                            <h:outputLabel value="#{creditCompanyDueController.finalTotal - creditCompanyDueController.finalPaidTotal}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputLabel>
                                        </f:facet>
                                    </p:column>
                                </p:row>
                            </p:columnGroup>
                            <f:facet name="footer">
                                <h:outputLabel class="my-2" value="Printed By : #{sessionController.loggedUser.webUserPerson.name}" style="float: right"/>
                            </f:facet>
                        </p:dataTable>
                    </p:panel>
                </h:form>
            </ui:define>


        </ui:composition>

    </h:body>
</html>
