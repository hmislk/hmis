<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/payments/credit_company_pay_index.xhtml">
            <ui:define name="admin">
                <h:form>            
                    <p:panel class="my-2">
                        <f:facet name="header">
                            <h:outputLabel value="INWARD DUE AGE" />
                        </f:facet>
                        <h:panelGrid columns="2" class="my-2">
                            <h:outputLabel value="From"/>
                            <p:calendar value="#{creditCompanyDueController.fromDate}" pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                            <h:outputLabel value="To"/>
                            <p:calendar value="#{creditCompanyDueController.toDate}" pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                            <h:outputLabel value="Date Basis"/>
                            <p:selectOneMenu value="#{creditCompanyDueController.dateBasis}">
                                <f:selectItem itemValue="dischargeDate" itemLabel="Discharge Date"/>
                                <f:selectItem itemValue="admissionDate" itemLabel="Admission Date"/>
                            </p:selectOneMenu>
                            <h:outputLabel value="Institution"/>
                            <p:selectOneMenu value="#{creditCompanyDueController.institution}" filter="true">
                                <f:selectItem itemLabel="All Institutions" itemValue="#{null}"/>
                                <f:selectItems value="#{institutionController.companies}" var="ins" itemLabel="#{ins.name}" itemValue="#{ins}"/>
                            </p:selectOneMenu>
                            <h:outputLabel value="Site"/>
                            <p:selectOneMenu value="#{creditCompanyDueController.site}" filter="true">
                                <f:selectItem itemLabel="All Sites" itemValue="#{null}"/>
                                <f:selectItems value="#{institutionController.sites}" var="dueSite" itemLabel="#{dueSite.name}" itemValue="#{dueSite}"/>
                            </p:selectOneMenu>
                            <h:outputLabel value="Department"/>
                            <p:selectOneMenu value="#{creditCompanyDueController.department}" filter="true" filterMatchMode="contains">
                                <f:selectItem itemLabel="All Departments" itemValue="#{null}"/>
                                <f:selectItems value="#{departmentController.getDepartmentsOfInstitutionAndSite()}" var="d" itemLabel="#{d.name}" itemValue="#{d}"/>
                            </p:selectOneMenu>
                        </h:panelGrid>
                        <p:commandButton id="btnSearch" class="ui-button-warning" icon="fas fa-cogs" ajax="false" value="Process Due Age" action="#{creditCompanyDueController.createInwardAgeTableWithFilters()}"  />
                    <p:defaultCommand target="btnSearch"/>
                    
                    <p:dataTable id="lst" value="#{creditCompanyDueController.creditCompanyAge}" var="i"
                                 filteredValue="#{creditCompanyDueController.filteredList}">                       
                        <p:column headerText="Supplier Name" filterBy="#{i.institution.name}" filterMatchMode="contains">       
                            <h:outputLabel  value="#{i.institution.name}"/>
                        </p:column>                               
                        <p:column headerText="0-30" style="text-align: right;">   
                            <h:outputLabel  value="#{i.value1}">
                                 <f:convertNumber pattern="#,##0.00" />
                            </h:outputLabel>
                        </p:column>
                        <p:column headerText="30-60" style="text-align: right;">    
                             <h:outputLabel  value="#{i.value2}">
                                  <f:convertNumber pattern="#,##0.00" />
                             </h:outputLabel>
                        </p:column>
                        <p:column headerText="60-90" style="text-align: right;">  
                             <h:outputLabel  value="#{i.value3}">
                                  <f:convertNumber pattern="#,##0.00" />
                             </h:outputLabel>
                        </p:column>
                        <p:column headerText="90 More" style="text-align: right;">   
                             <h:outputLabel  value="#{i.value4}">
                                  <f:convertNumber pattern="#,##0.00" />
                             </h:outputLabel>
                        </p:column>                      
                    </p:dataTable>
                    </p:panel>
                </h:form>
            </ui:define>


        </ui:composition>

    </h:body>
</html>
