<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/inward/inward_reports.xhtml">
            <ui:define name="subcontent">
                <h:form id="frm">

                    <p:panel header="Inpatient Credit Company Payment Report" class="m-1">

                        <h:panelGrid columns="8" styleClass="w-100 form-grid" columnClasses="label-icon-column, input-column">

                            <!-- Row 1: From | To | Credit Company -->
                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa ml-5" />
                                <h:outputLabel value="From" for="fromDate" class="mx-3"/>
                            </h:panelGroup>
                            <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="fromDate"
                                value="#{inwardReportController1.fromDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf073;" styleClass="fa mr-2" />
                                <h:outputLabel value="To" for="toDate" class="mx-3"/>
                            </h:panelGroup>
                            <p:calendar
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                id="toDate"
                                value="#{inwardReportController1.toDate}"
                                pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf19c;" styleClass="fa mr-2" />
                                <h:outputLabel value="Credit Company" for="cmbCc" class="mx-3"/>
                            </h:panelGroup>
                            <p:autoComplete
                                id="cmbCc"
                                styleClass="w-100"
                                inputStyleClass="w-100 form-control"
                                value="#{inwardReportController1.institution}"
                                completeMethod="#{institutionController.completeCreditCompany}"
                                var="cc"
                                itemLabel="#{cc.name}"
                                itemValue="#{cc}"
                                forceSelection="true" />

                            <!-- Row 2: Date Basis -->
                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf017;" styleClass="fa mr-2" />
                                <h:outputLabel value="Date Basis" for="dateBasisMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu id="dateBasisMenu" styleClass="w-100 form-control"
                                             value="#{inwardReportController1.dateBasis}">
                                <f:selectItem itemValue="createdAt"     itemLabel="Payment/Bill Date" />
                                <f:selectItem itemValue="dischargeDate" itemLabel="Discharge Date" />
                                <f:selectItem itemValue="admissionDate" itemLabel="Admission Date" />
                            </p:selectOneMenu>
                            <p:spacer width="50" />
                            <p:spacer width="50" />
                            <p:spacer width="50" />
                            <p:spacer width="50" />
                            <p:spacer width="50" />
                            <p:spacer width="50" />

                            <!-- Row 3: Institution | Site | Department -->
                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf19c;" styleClass="fa mr-2" />
                                <h:outputLabel value="Institution" for="cmbIns" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="cmbIns"
                                styleClass="w-100 form-control"
                                value="#{inwardReportController1.admittingInstitution}"
                                filter="true">
                                <f:selectItem itemLabel="All Institutions" itemValue="#{null}" />
                                <f:selectItems value="#{institutionController.companies}" var="ins" itemLabel="#{ins.name}" itemValue="#{ins}" />
                                <p:ajax process="cmbIns" update="cmbDept" />
                            </p:selectOneMenu>

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf3c5;" styleClass="fa mr-2" />
                                <h:outputLabel value="Site" for="siteMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="siteMenu"
                                styleClass="w-100 form-control"
                                value="#{inwardReportController1.site}"
                                filter="true">
                                <f:selectItem itemLabel="All Sites" itemValue="#{null}" />
                                <f:selectItems value="#{institutionController.sites}" var="site" itemLabel="#{site.name}" itemValue="#{site}" />
                                <p:ajax process="siteMenu" update="cmbDept" />
                            </p:selectOneMenu>

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf0e8;" styleClass="fa mr-2" />
                                <h:outputLabel value="Department" for="cmbDept" class="mx-3"/>
                            </h:panelGroup>
                            <h:panelGroup id="cmbDept">

                                <p:selectOneMenu
                                    rendered="#{inwardReportController1.admittingInstitution eq null and inwardReportController1.site eq null}"
                                    styleClass="w-100 form-control"
                                    value="#{inwardReportController1.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                    <f:selectItem itemLabel="All Departments" itemValue="#{null}" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite()}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>

                                <p:selectOneMenu
                                    rendered="#{inwardReportController1.admittingInstitution eq null and inwardReportController1.site ne null}"
                                    styleClass="w-100 form-control"
                                    value="#{inwardReportController1.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                    <f:selectItem itemLabel="All Departments" itemValue="#{null}" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite(inwardReportController1.site)}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>

                                <p:selectOneMenu
                                    rendered="#{inwardReportController1.admittingInstitution ne null and inwardReportController1.site eq null}"
                                    styleClass="w-100 form-control"
                                    value="#{inwardReportController1.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                    <f:selectItem itemLabel="All Departments" itemValue="#{null}" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSiteForInstitution(inwardReportController1.admittingInstitution)}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>

                                <p:selectOneMenu
                                    rendered="#{inwardReportController1.admittingInstitution ne null and inwardReportController1.site ne null}"
                                    styleClass="w-100 form-control"
                                    value="#{inwardReportController1.department}"
                                    filterMatchMode="contains"
                                    filter="true">
                                    <f:selectItem itemLabel="All Departments" itemValue="#{null}" />
                                    <f:selectItems
                                        value="#{departmentController.getDepartmentsOfInstitutionAndSite(inwardReportController1.admittingInstitution, inwardReportController1.site)}"
                                        var="d" itemLabel="#{d.name}" itemValue="#{d}" />
                                </p:selectOneMenu>

                            </h:panelGroup>

                            <!-- Row 3: Admission Type | Payment Method -->
                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf0f0;" styleClass="fa mr-2" />
                                <h:outputLabel value="Admission Type" for="admTypeMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="admTypeMenu"
                                styleClass="w-100 form-control"
                                value="#{inwardReportController1.admissionType}">
                                <f:selectItem itemLabel="All Admission Types" itemValue="#{null}" />
                                <f:selectItems
                                    value="#{admissionTypeController.items}"
                                    var="at"
                                    itemValue="#{at}"
                                    itemLabel="#{at.name}" />
                            </p:selectOneMenu>

                            <p:spacer width="50" />

                            <h:panelGroup layout="block" styleClass="form-group">
                                <h:outputText value="&#xf09d;" styleClass="fa mr-2" />
                                <h:outputLabel value="Settlement Method" for="pmMenu" class="mx-3"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                id="pmMenu"
                                styleClass="w-100 form-control"
                                value="#{inwardReportController1.paymentMethod}">
                                <f:selectItem itemLabel="All Methods" itemValue="#{null}" />
                                <f:selectItems value="#{enumController.paymentMethodsWithoutCredit}" />
                            </p:selectOneMenu>

                            <p:spacer width="50" />
                            <p:spacer />
                            <p:spacer />

                        </h:panelGrid>

                        <p:commandButton
                            value="Process"
                            icon="fas fa-cogs"
                            action="#{inwardReportController1.inwardCreditCompanyPayments()}"
                            ajax="false"
                            class="ui-button-warning m-1" />

                    </p:panel>

                    <p:panel id="pnlResults"
                             rendered="#{inwardReportController1.billItems != null}">

                        <f:facet name="header">
                            <div class="d-flex justify-content-between align-items-center">
                                <h:outputText value="Inpatient Credit Company Payments" />
                                <div>
                                    <p:commandButton value="Print"
                                                     icon="fas fa-print"
                                                     class="ui-button-info me-1"
                                                     ajax="false">
                                        <p:printer target="tblReport" />
                                    </p:commandButton>
                                    <p:commandButton value="Excel"
                                                     icon="fas fa-file-excel"
                                                     class="ui-button-success"
                                                     ajax="false">
                                        <p:dataExporter type="xlsx"
                                                        target="tblReport"
                                                        fileName="inward_credit_company_payments" />
                                    </p:commandButton>
                                </div>
                            </div>
                        </f:facet>

                        <p:dataTable
                            id="tblReport"
                            value="#{inwardReportController1.billItems}"
                            var="bi"
                            emptyMessage="No payments found"
                            paginator="true"
                            rows="20"
                            paginatorAlwaysVisible="false"
                            paginatorPosition="bottom"
                            paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                            currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                            rowsPerPageTemplate="10,20,50,{ShowAll|'All'}"
                            styleClass="w-100">

                            <p:column headerText="Bill No" style="white-space:nowrap;">
                                <h:outputText value="#{bi.referenceBill.deptId}" />
                            </p:column>

                            <p:column headerText="BHT No" style="white-space:nowrap;">
                                <h:outputText value="#{bi.referenceBill.patientEncounter.bhtNo}" />
                            </p:column>

                            <p:column headerText="Patient Name">
                                <h:outputText value="#{bi.referenceBill.patient.person.name}" />
                            </p:column>

                            <p:column headerText="Credit Company">
                                <h:outputText value="#{bi.referenceBill.creditCompany.name}" />
                            </p:column>

                            <p:column headerText="Final Bill Total" style="text-align:right; white-space:nowrap;">
                                <h:outputText value="#{bi.referenceBill.netTotal}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Payment Date" style="white-space:nowrap;">
                                <h:outputText value="#{bi.bill.createdAt}">
                                    <f:convertDateTime pattern="#{sessionController.applicationPreference.shortDateFormat}" />
                                </h:outputText>
                            </p:column>

                            <p:column headerText="Payment Method" style="white-space:nowrap;">
                                <h:outputText value="#{bi.bill.paymentMethod.label}" />
                            </p:column>

                            <p:column headerText="Cheque / Ref No">
                                <h:outputText value="#{bi.bill.chequeRefNo}" />
                            </p:column>

                            <p:column headerText="Bank">
                                <h:outputText value="#{bi.bill.bank.name}" rendered="#{bi.bill.bank != null}" />
                            </p:column>

                            <p:column headerText="Paid Amount" style="text-align:right; white-space:nowrap; font-weight:bold;">
                                <h:outputText value="#{bi.netValue}">
                                    <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                </h:outputText>
                                <f:facet name="footer">
                                    <h:outputText value="#{inwardReportController1.creditPaymentTotalValue}">
                                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2" />
                                    </h:outputText>
                                </f:facet>
                            </p:column>

                        </p:dataTable>

                    </p:panel>

                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
