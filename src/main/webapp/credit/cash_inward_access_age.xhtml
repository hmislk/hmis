<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/inward/inward_reports.xhtml">
            <ui:define name="subcontent">
                <h:form>
                    <h:panelGrid columns="2">
                        <h:outputLabel value="From"/>
                        <p:calendar value="#{creditCompanyDueController.fromDate}" pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                        <h:outputLabel value="To"/>
                        <p:calendar value="#{creditCompanyDueController.toDate}" pattern="#{sessionController.applicationPreference.longDateTimeFormat}"/>
                        <h:outputLabel value="Date Basis"/>
                        <p:selectOneMenu value="#{creditCompanyDueController.dateBasis}">
                            <f:selectItem itemValue="dischargeDate" itemLabel="Discharge Date"/>
                            <f:selectItem itemValue="admissionDate" itemLabel="Admission Date"/>
                        </p:selectOneMenu>
                        <h:outputLabel value="Institution"/>
                        <p:selectOneMenu value="#{creditCompanyDueController.institution}" filter="true">
                            <f:selectItem itemLabel="All Institutions" itemValue="#{null}"/>
                            <f:selectItems value="#{institutionController.companies}" var="ins" itemLabel="#{ins.name}" itemValue="#{ins}"/>
                        </p:selectOneMenu>
                        <h:outputLabel value="Site"/>
                        <p:selectOneMenu value="#{creditCompanyDueController.site}" filter="true">
                            <f:selectItem itemLabel="All Sites" itemValue="#{null}"/>
                            <f:selectItems value="#{institutionController.sites}" var="exSite" itemLabel="#{exSite.name}" itemValue="#{exSite}"/>
                        </p:selectOneMenu>
                        <h:outputLabel value="Department"/>
                        <p:selectOneMenu value="#{creditCompanyDueController.department}" filter="true" filterMatchMode="contains">
                            <f:selectItem itemLabel="All Departments" itemValue="#{null}"/>
                            <f:selectItems value="#{departmentController.getDepartmentsOfInstitutionAndSite()}" var="d" itemLabel="#{d.name}" itemValue="#{d}"/>
                        </p:selectOneMenu>
                        <h:outputLabel value="Admission Type"/>
                        <p:selectOneMenu value="#{creditCompanyDueController.admissionType}">
                            <f:selectItem itemLabel="All Admission Types" itemValue="#{null}"/>
                            <f:selectItems value="#{admissionTypeController.items}" var="at" itemValue="#{at}" itemLabel="#{at.name}"/>
                        </p:selectOneMenu>
                        <h:outputLabel value="Payment Method"/>
                        <p:selectOneMenu value="#{creditCompanyDueController.paymentMethod}">
                            <f:selectItem itemLabel="All Methods" itemValue="#{null}"/>
                            <f:selectItems value="#{enumController.paymentMethodsWithoutCredit}"/>
                        </p:selectOneMenu>
                    </h:panelGrid>
                    <p:commandButton class="my-2" id="btnSearch" ajax="false" value="Process Cash Access Age" action="#{creditCompanyDueController.createInwardCashAgeTableAccess()}"  />
                    <p:defaultCommand target="btnSearch"/>
                    
                    <p:dataTable id="lst" value="#{creditCompanyDueController.creditCompanyAge}" var="i"
                                 filteredValue="#{creditCompanyDueController.filteredList}">                       
                        <p:column headerText="Supplier Name" filterBy="#{i.string}" filterMatchMode="contains">       
                            <h:outputLabel  value="#{i.string}"/>
                        </p:column>                               
                        <p:column headerText="0-30" filterBy="#{i.value1}" filterMatchMode="contains">   
                            <h:outputLabel  value="#{i.value1}">
                                 <f:convertNumber pattern="#,##0.00" />
                            </h:outputLabel>
                        </p:column>
                        <p:column headerText="30-60" filterBy="#{i.value2}" filterMatchMode="contains">    
                             <h:outputLabel  value="#{i.value2}">
                                  <f:convertNumber pattern="#,##0.00" />
                             </h:outputLabel>
                        </p:column>
                        <p:column headerText="60-90" filterBy="#{i.value3}" filterMatchMode="contains">  
                             <h:outputLabel  value="#{i.value3}">
                                  <f:convertNumber pattern="#,##0.00" />
                             </h:outputLabel>
                        </p:column>
                        <p:column headerText="90 More" filterBy="#{i.value4}" filterMatchMode="contains">   
                             <h:outputLabel  value="#{i.value4}">
                                  <f:convertNumber pattern="#,##0.00" />
                             </h:outputLabel>
                        </p:column>                      
                    </p:dataTable>
                </h:form>
            </ui:define>


        </ui:composition>

    </h:body>
</html>
