<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/reportInstitution/report_own.xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ca="http://xmlns.jcp.org/jsf/composite/cashSummery"
                >

    <ui:define name="subcontent">
        <h:outputStylesheet library="css" name="printing.css"></h:outputStylesheet>
        <style>
            .credit-report-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 24px;
            }
            .credit-report-table thead th {
                background-color: #343a40;
                color: #ffffff;
                font-weight: bold;
                padding: 10px 8px;
                border: 1px solid #454d55;
            }
            .credit-report-table td {
                padding: 7px 8px;
                border: 1px solid #dee2e6;
                vertical-align: middle;
            }
            .credit-report-table .dept-header-row td {
                background-color: #495057;
                color: #ffffff;
                font-weight: bold;
                font-size: 24px;
            }
            .credit-report-table .cat-header-row td {
                background-color: #6c757d;
                color: #ffffff;
                font-weight: bold;
            }
            .credit-report-table .item-row:nth-child(even) td {
                background-color: #f8f9fa;
            }
            .credit-report-table .cat-footer-row td {
                background-color: #e9ecef;
                font-weight: bold;
                border-top: 2px solid #adb5bd;
            }
            .credit-report-table .dept-footer-row td {
                background-color: #ced4da;
                font-weight: bold;
                border-top: 2px solid #868e96;
            }
            .credit-report-table .grand-total-row td {
                background-color: #343a40;
                color: #ffffff;
                font-weight: bold;
                border-top: 2px solid #000;
            }
        </style>
        <h:form>

            <p:panel>
                <f:facet name="header" >
                    <p:outputLabel value=" Credit Summary - Report By Item"/>
                    </f:facet>
                <h:panelGrid columns="2" class="my-2" >
                        <h:outputLabel value="Credit Company"/>
                        <p:autoComplete class="w-100 mx-4" inputStyleClass="w-100" id="creditCom" forceSelection="true" value="#{creditSummeryController.institution}" 
                                        completeMethod="#{creditCompanyController.completeCredit}" var="ix" itemLabel="#{ix.name}" itemValue="#{ix}" size="30"  style="width: 400px;">

                        </p:autoComplete>


                        <h:outputLabel value="Service Name"/>
                        <p:autoComplete class="w-100 mx-4" inputStyleClass="w-100 my-1" value="#{creditSummeryController.item}" completeMethod="#{itemController.completeService}" var="ix" 
                                        itemLabel="#{ix.name}" itemValue="#{ix}" size="30"  style="width: 400px;" forceSelection="true" >
                            <p:column>
                                #{ix.name}
                            </p:column>
                            <p:column>
                                #{ix.department.name}
                            </p:column>  
                            <p:column>
                                #{ix.category.name}
                            </p:column>

                            <p:column>
                                #{ix.category.parentCategory.name}
                            </p:column> 

                        </p:autoComplete>

                        <h:outputLabel value="From Date"/>
                        <p:calendar class="w-100 mx-4" inputStyleClass="w-100" id="frmDate" value="#{creditSummeryController.fromDate}" pattern="#{sessionController.applicationPreference.longDateTimeFormat}"  >
                        </p:calendar>

                        <h:outputLabel value="To Date"/>
                        <p:calendar class="w-100 mx-4" inputStyleClass="w-100 my-1" id="toDate" value="#{creditSummeryController.toDate}" pattern="#{sessionController.applicationPreference.longDateTimeFormat}"  >
                        </p:calendar>
                    </h:panelGrid>
                <h:panelGrid columns="6" class="my-2" >
                        <p:commandButton id="btnRefresh" value="Process" ajax="false"  
                                         class="ui-button-warning" icon="fas fa-cogs" action="#{creditSummeryController.createDailyCashTable}"/>
                        <p:commandButton ajax="false" value="Print" class="ui-button-info mx-2" icon="fas fa-print"  >
                            <p:printer target="panelPrint" />
                        </p:commandButton>
                        <p:commandButton ajax="false" value="Export to Excel" class="ui-button-success mx-2" icon="fas fa-file-excel"
                                         action="#{creditSummeryController.exportToExcel}"/>
                    </h:panelGrid>

                <p:panel id="panelPrint" styleClass="noBorder summeryBorder">
                    <f:facet name="header">
                         <p:spacer width="100%" height="30" />
                             <p:outputLabel value="#{creditSummeryController.institution.name} "/> 
                             <p:outputLabel value="&emsp; - REPORT BY ITEM &emsp; "/>
                             <p:outputLabel value="#{d.department.name}"/>
                             <h:outputLabel value=" From : &nbsp;" style="white-space: pre-line"/>
                        <h:outputLabel  value="#{creditSummeryController.fromDate}">
                            <f:convertDateTime pattern="dd MMM yyyy hh:mm:ss a"/>
                        </h:outputLabel>
                      <h:outputLabel value="&emsp;&emsp;To : &nbsp;"/>
                        <h:outputLabel  value="#{creditSummeryController.toDate}" >
                            <f:convertDateTime pattern="dd MMM yyyy hh:mm:ss a"/>
                        </h:outputLabel>
                            </f:facet>
                    <table class="credit-report-table">
                        <thead>
                            <tr>
                                <th style="width:40%; text-align:left;">Service Item Name</th>
                                <th style="width:8%;  text-align:center;">Count</th>
                                <th style="width:17%; text-align:right;">Hospital Fee</th>
                                <th style="width:17%; text-align:right;">Professional Fee</th>
                                <th style="width:18%; text-align:right;">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{creditSummeryController.dailyCashSummery}" var="d">
                                <ui:fragment rendered="#{d.departmentTotal!=0}">
                                    <tr class="dept-header-row">
                                        <td colspan="5"><h:outputText value="#{d.department.name}" /></td>
                                    </tr>
                                    <ui:repeat value="#{d.categoryWitmItems}" var="s">
                                        <ui:fragment rendered="#{s.subTotal!=0}">
                                            <tr class="cat-header-row">
                                                <td colspan="5"><h:outputText value="#{s.category.name}" /></td>
                                            </tr>
                                            <ui:repeat value="#{s.itemWithFees}" var="i">
                                                <ui:fragment rendered="#{i.total!=0}">
                                                    <tr class="item-row">
                                                        <td><h:outputText value="#{i.item.name}" /></td>
                                                        <td style="text-align:center;"><h:outputText value="#{i.count}" /></td>
                                                        <td style="text-align:right;">
                                                            <h:outputText value="#{i.hospitalFee}">
                                                                <f:convertNumber pattern="#,##0.00"/>
                                                            </h:outputText>
                                                        </td>
                                                        <td style="text-align:right;">
                                                            <h:outputText value="#{i.proFee}">
                                                                <f:convertNumber pattern="#,##0.00"/>
                                                            </h:outputText>
                                                        </td>
                                                        <td style="text-align:right;">
                                                            <h:outputText value="#{i.total}">
                                                                <f:convertNumber pattern="#,##0.00"/>
                                                            </h:outputText>
                                                        </td>
                                                    </tr>
                                                </ui:fragment>
                                            </ui:repeat>
                                            <tr class="cat-footer-row">
                                                <td colspan="2"><h:outputText value="#{s.category.name} Sub Total :" /></td>
                                                <td style="text-align:right;">
                                                    <h:outputText value="#{s.subHosTotal}">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </td>
                                                <td style="text-align:right;">
                                                    <h:outputText value="#{s.subTotal-s.subHosTotal}">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </td>
                                                <td style="text-align:right;">
                                                    <h:outputText value="#{s.subTotal}">
                                                        <f:convertNumber pattern="#,##0.00"/>
                                                    </h:outputText>
                                                </td>
                                            </tr>
                                        </ui:fragment>
                                    </ui:repeat>
                                    <tr class="dept-footer-row">
                                        <td colspan="4"><h:outputText value="#{d.department.name} Total :" /></td>
                                        <td style="text-align:right;">
                                            <h:outputText value="#{d.departmentTotal}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                </ui:fragment>
                            </ui:repeat>
                        </tbody>
                        <tfoot>
                            <ui:repeat value="#{creditSummeryController.vatTableOpdCredit}" var="sm">
                                <tr class="grand-total-row">
                                    <td colspan="4"><h:outputText value="#{sm.string}" /></td>
                                    <td style="text-align:right;">
                                        <h:outputText value="#{sm.value1}">
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputText>
                                    </td>
                                </tr>
                            </ui:repeat>
                        </tfoot>
                    </table>
                </p:panel>
            </p:panel>
        </h:form>
    </ui:define>


</ui:composition>
