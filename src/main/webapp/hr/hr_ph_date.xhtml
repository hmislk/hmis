<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/hr/hr_admin.xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core">

    <ui:define name="subContent">
        <h:form>
            <p:panel header="Manage Holiday">

                <div class="row">
                    <div class="col-6">
                        <p:panel>
                            <p:commandButton
                                id="btnAdd"
                                ajax="false"
                                icon="fas fa-plus"
                                styleClass="w-25 ui-button-success"
                                value="Add"
                                action="#{phDateController.prepareAdd()}" />

                            <p:commandButton
                                id="btnDelete"
                                icon="fas fa-trash"
                                styleClass="ui-button-danger w-25 mx-1"
                                ajax="false"
                                onclick="if (!confirm('Are you sure you want to delete this record?')) return false;"
                                action="#{phDateController.delete()}"
                                value="Delete"
                                disabled="#{empty phDateController.current or empty phDateController.current.id}" />

                            <p:selectOneListbox
                                id="lstSelect"
                                filter="true"
                                styleClass="w-100 mt-2"
                                converter="phDateCon"
                                value="#{phDateController.current}"
                                style="min-width: 223px; height: 300px;">

                                <f:selectItems
                                    value="#{phDateController.items}"
                                    var="myItem"
                                    itemValue="#{myItem}"
                                    itemLabel="#{myItem.name}" />

                                <f:ajax
                                    execute="@this"
                                    render="gpDetail btnDelete" />
                            </p:selectOneListbox>
                        </p:panel>
                    </div>

                    <div class="col-6">
                        <p:panel id="gpDetail">
                            <f:facet name="header">
                                <h:outputText value="Holiday Details" />
                            </f:facet>

                            <h:panelGrid id="gpDetailText" columns="2">
                                <h:outputText value="Name" />
                                <p:inputText
                                    class="w-100 mx-4"
                                    autocomplete="off"
                                    value="#{phDateController.current.name}" />

                                <h:outputLabel for="dayType" value="Select Day Type" />
                                <p:selectOneMenu
                                    id="dayType"
                                    class="w-100 mx-4"
                                    value="#{phDateController.current.phType}">
                                    <f:selectItems
                                        value="#{enumController.dayTypesForPh}"
                                        var="dayType"
                                        itemLabel="#{dayType.label}"
                                        itemValue="#{dayType}" />
                                </p:selectOneMenu>

                                <h:outputLabel for="calS" value="Holiday" />
                                <p:calendar
                                    id="calS"
                                    class="w-100 mx-4"
                                    inputStyleClass="w-100"
                                    value="#{phDateController.current.phDate}"
                                    pattern="#{sessionController.applicationPreference.longDateFormat}" />
                            </h:panelGrid>

                            <p:commandButton
                                id="btnSave"
                                ajax="false"
                                value="Save"
                                styleClass="w-25 ui-button-warning mt-4"
                                action="#{phDateController.saveSelected}" />

                            <p:defaultCommand target="btnSave" />
                        </p:panel>

                        <h:panelGrid id="gpDetailButtons" columns="2">
                        </h:panelGrid>
                    </div>
                </div>

            </p:panel>
        </h:form>
    </ui:define>

</ui:composition>
