<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/hr/hr_admin.xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui">

    <ui:define name="subContent">

        <h:form>
            <p:growl id="growlMsg" />

            <!-- FIX: Removed p:focus id="detailFocus" context="gpDetail".
                 gpDetail is a h:panelGroup (a plain div), not a focusable input.
                 p:focus requires context to point at a focusable component.
                 Pointing it at a panelGroup causes a silent JS error on every render. -->
            <p:focus id="selectFocus" context="lstSelect" />

            <style>
                .psc-page { padding: 2rem 1.5rem; }

                .psc-page-title {
                    font-size: 1.25rem;
                    font-weight: 600;
                    color: #2d3748;
                    margin: 0 0 1.5rem 0;
                    padding-bottom: 0.75rem;
                    border-bottom: 2px solid #e2e8f0;
                }

                .psc-layout {
                    display: grid;
                    grid-template-columns: 320px 1fr;
                    gap: 1.5rem;
                    align-items: start;
                }

                .psc-list-panel {
                    background: #ffffff;
                    border: 1px solid #e2e8f0;
                    border-radius: 10px;
                    padding: 1.25rem;
                }

                .psc-toolbar {
                    display: flex;
                    gap: 0.6rem;
                    margin-bottom: 1rem;
                }

                .psc-toolbar .ui-button {
                    flex: 1;
                    justify-content: center;
                }

                .psc-list-label {
                    font-size: 0.75rem;
                    font-weight: 600;
                    text-transform: uppercase;
                    letter-spacing: 0.05em;
                    color: #718096;
                    margin-bottom: 0.5rem;
                }

                .psc-listbox .ui-selectlistbox-list-wrapper {
                    border-radius: 8px !important;
                    border: 1px solid #e2e8f0 !important;
                }
                .psc-listbox .ui-selectlistbox-item {
                    padding: 0.55rem 0.75rem !important;
                    font-size: 0.875rem !important;
                    border-radius: 6px !important;
                    margin: 2px 4px !important;
                }
                .psc-listbox .ui-selectlistbox-item.ui-state-highlight {
                    background: #ebf8ff !important;
                    color: #2b6cb0 !important;
                    border-color: transparent !important;
                }

                .psc-detail-panel {
                    background: #ffffff;
                    border: 1px solid #e2e8f0;
                    border-radius: 10px;
                    padding: 1.5rem;
                }

                .psc-section-title {
                    font-size: 0.7rem;
                    font-weight: 700;
                    text-transform: uppercase;
                    letter-spacing: 0.07em;
                    color: #a0aec0;
                    margin: 0 0 0.85rem 0;
                }

                .psc-field-group {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 1rem;
                    margin-bottom: 1rem;
                }

                .psc-field-full {
                    margin-bottom: 1rem;
                }

                .psc-field label {
                    display: block;
                    font-size: 0.8rem;
                    font-weight: 600;
                    color: #4a5568;
                    margin-bottom: 0.3rem;
                }

                .psc-field .ui-inputtext,
                .psc-field .ui-selectonemenu {
                    width: 100% !important;
                    border-radius: 7px !important;
                    border: 1px solid #cbd5e0 !important;
                    font-size: 0.875rem !important;
                    padding: 0.45rem 0.65rem !important;
                }

                .psc-field .ui-inputtext:focus,
                .psc-field .ui-selectonemenu:focus {
                    border-color: #63b3ed !important;
                    box-shadow: 0 0 0 3px rgba(99,179,237,0.2) !important;
                }

                .psc-divider {
                    border: none;
                    border-top: 1px solid #edf2f7;
                    margin: 1.25rem 0;
                }

                .psc-toggles {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 0.6rem;
                }

                .psc-toggle-row {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    background: #f7fafc;
                    border: 1px solid #edf2f7;
                    border-radius: 8px;
                    padding: 0.6rem 0.85rem;
                    gap: 0.75rem;
                }

                .psc-toggle-row.full-width {
                    grid-column: 1 / -1;
                }

                .psc-toggle-row .toggle-label {
                    font-size: 0.825rem;
                    color: #4a5568;
                }

                .psc-save-bar {
                    display: flex;
                    justify-content: flex-end;
                    margin-top: 1.5rem;
                    padding-top: 1.25rem;
                    border-top: 1px solid #edf2f7;
                }

                @media (max-width: 768px) {
                    .psc-layout { grid-template-columns: 1fr; }
                    .psc-field-group { grid-template-columns: 1fr; }
                    .psc-toggles { grid-template-columns: 1fr; }
                    .psc-toggle-row.full-width { grid-column: 1; }
                }
            </style>

            <div class="psc-page">
                <p class="psc-page-title">Manage Paysheet Component</p>

                <div class="psc-layout">

                    <!-- ═══ Left: List Panel ═══ -->
                    <div class="psc-list-panel">

                        <div class="psc-toolbar">
                            <p:commandButton
                                styleClass="ui-button-success"
                                icon="fas fa-plus"
                                id="btnAdd"
                                ajax="false"
                                value="Add"
                                process="btnAdd"
                                update="gpDetail"
                                action="#{paysheetComponentSystemController.prepareAdd()}" />

                            <!-- FIX: Added disabled guard. The controller already handles null
                                 current with an error message but the button had no visual guard.
                                 Driven by isNothingSelected() added to the controller.
                                 btnDelete added to f:ajax render so disabled state refreshes
                                 on selection change. -->
                            <p:commandButton
                                styleClass="ui-button-danger"
                                icon="fas fa-trash"
                                id="btnDelete"
                                process="btnDelete"
                                update="gpDetail lstSelect btnDelete"
                                disabled="#{paysheetComponentSystemController.nothingSelected}"
                                onclick="if (!confirm('Are you sure you want to delete this record?')) return false;"
                                action="#{paysheetComponentSystemController.delete()}"
                                value="Delete" />
                        </div>

                        <p class="psc-list-label">Components</p>

                        <p:selectOneListbox
                            styleClass="psc-listbox w-100"
                            filter="true"
                            filterMatchMode="contains"
                            id="lstSelect"
                            value="#{paysheetComponentSystemController.current}"
                            style="height: 280px;">
                            <f:selectItems
                                value="#{paysheetComponentSystemController.items}"
                                var="myItem"
                                itemValue="#{myItem}"
                                itemLabel="#{myItem.name}" />
                            <f:ajax render="gpDetail btnDelete" execute="lstSelect" />
                        </p:selectOneListbox>

                    </div>

                    <!-- ═══ Right: Detail Panel ═══ -->
                    <div class="psc-detail-panel">
                        <h:panelGroup id="gpDetail">

                            <p class="psc-section-title">Basic details</p>

                            <div class="psc-field-group">
                                <div class="psc-field">
                                    <!-- FIX: Removed debug artifact #{...current.id} from label value -->
                                    <label for="fldName">Name</label>
                                    <p:inputText id="fldName"
                                        autocomplete="off"
                                        placeholder="Component name"
                                        value="#{paysheetComponentSystemController.current.name}" />
                                </div>
                                <div class="psc-field">
                                    <label for="fldOrder">Order no.</label>
                                    <p:inputText id="fldOrder"
                                        autocomplete="off"
                                        placeholder="e.g. 1"
                                        value="#{paysheetComponentSystemController.current.orderNo}" />
                                </div>
                            </div>

                            <div class="psc-field psc-field-full">
                                <label for="fldType">Component type</label>
                                <!-- FIX: Added noSelectionOption="true" so empty selection
                                     correctly maps to null in the controller -->
                                <p:selectOneMenu id="fldType"
                                    value="#{paysheetComponentSystemController.current.componentType}">
                                    <f:selectItem itemLabel="Please select component type" itemValue="" noSelectionOption="true" />
                                    <f:selectItems value="#{enumController.paysheetComponentTypesSystemDefinded}" />
                                </p:selectOneMenu>
                            </div>

                            <hr class="psc-divider" />

                            <p class="psc-section-title">Inclusion rules</p>

                            <div class="psc-toggles">

                                <div class="psc-toggle-row">
                                    <span class="toggle-label">Include for EPF</span>
                                    <p:selectBooleanCheckbox value="#{paysheetComponentSystemController.current.includedForEpf}" />
                                </div>

                                <div class="psc-toggle-row">
                                    <span class="toggle-label">Include for ETF</span>
                                    <p:selectBooleanCheckbox value="#{paysheetComponentSystemController.current.includedForEtf}" />
                                </div>

                                <div class="psc-toggle-row">
                                    <span class="toggle-label">Include for pay tax</span>
                                    <p:selectBooleanCheckbox value="#{paysheetComponentSystemController.current.includedForPayTax}" />
                                </div>

                                <div class="psc-toggle-row">
                                    <span class="toggle-label">Include for OT</span>
                                    <p:selectBooleanCheckbox value="#{paysheetComponentSystemController.current.includedForOt}" />
                                </div>

                                <div class="psc-toggle-row">
                                    <span class="toggle-label">Include for no pay</span>
                                    <p:selectBooleanCheckbox value="#{paysheetComponentSystemController.current.includedForNoPay}" />
                                </div>

                                <div class="psc-toggle-row">
                                    <span class="toggle-label">Include for PH</span>
                                    <p:selectBooleanCheckbox value="#{paysheetComponentSystemController.current.includedForPh}" />
                                </div>

                                <div class="psc-toggle-row full-width">
                                    <span class="toggle-label">Include for allowances (payment on PH and day-off)</span>
                                    <p:selectBooleanCheckbox value="#{paysheetComponentSystemController.current.includeForAllowance}" />
                                </div>

                            </div>

                            <div class="psc-save-bar">
                                <!-- FIX: Added gpDetail and @form to update so growl messages render -->
                                <p:commandButton
                                    id="btnSave"
                                    value="Save"
                                    styleClass="ui-button-warning"
                                    icon="fas fa-save"
                                    process="btnSave gpDetail"
                                    update="lstSelect gpDetail @form"
                                    action="#{paysheetComponentSystemController.saveSelected()}" />
                            </div>

                        </h:panelGroup>
                    </div>

                </div>
            </div>

        </h:form>

    </ui:define>

</ui:composition>
