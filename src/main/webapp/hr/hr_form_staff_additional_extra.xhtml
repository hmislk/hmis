<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/resources/template/template.xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:au="http://xmlns.jcp.org/jsf/composite/autocomplete"
                xmlns:ez="http://xmlns.jcp.org/jsf/composite/ezcomp">

    <ui:define name="content">

        <style type="text/css">
            /* ===== enterDateTime composite sizing ===== */
            .ez-datetime-wrap {
                display: flex !important;
                flex-wrap: wrap !important;
                align-items: center;
                gap: 0.35rem;
                width: 100% !important;
            }
            .ez-datetime-wrap input[type="text"],
            .ez-datetime-wrap .ui-inputtext,
            .ez-datetime-wrap .ui-inputfield {
                min-width: 3.2rem !important;
                height: 2.25rem !important;
                padding: 0.35rem 0.5rem !important;
                font-size: 0.95rem !important;
                text-align: center;
                box-sizing: border-box !important;
            }
            .ez-datetime-wrap input[type="text"]:first-child,
            .ez-datetime-wrap .ui-inputtext:first-of-type {
                min-width: 4.5rem !important;
            }
            .ez-datetime-wrap .ui-calendar {
                flex: 1 1 auto !important;
            }
            .ez-datetime-wrap .ui-calendar input {
                width: 100% !important;
            }
            .ez-datetime-wrap > input[type="text"]:last-child {
                flex-basis: 100% !important;
                width: 100% !important;
            }

            /* ===== polish ===== */
            .redText { color: #c0392b !important; }
            .ui-panel .ui-panel-titlebar { padding: 0.5rem 0.75rem; }
            .ui-autocomplete, .ui-autocomplete-input { width: 100% !important; }
        </style>

        <h:form id="addFormFrm">

            <p:panel header="Additional Extra Time Forms" styleClass="ui-fluid">

                <div class="ui-g">

                    <!-- ================= FORM ENTRY ================= -->
                    <div class="ui-g-12 ui-lg-10">
                        <p:panel header="Form Details" toggleable="true">

                            <p:fieldset legend="Form Info" toggleable="true" styleClass="ui-fluid">
                                <div class="ui-g">
                                    <div class="ui-g-12 ui-md-4">
                                        <h:outputLabel for="code" value="Form Number" />
                                    </div>
                                    <div class="ui-g-12 ui-md-8">
                                        <p:inputText id="code"
                                                     value="#{staffAdditionalFormController.currentAdditionalForm.code}" />
                                    </div>

                                    <div class="ui-g-12 ui-md-4">
                                        <h:outputLabel for="staff" value="Staff" />
                                    </div>
                                    <div class="ui-g-12 ui-md-8">
                                        <au:completeStaff id="staff" value="#{staffAdditionalFormController.currentAdditionalForm.staff}" />
                                    </div>
                                </div>
                            </p:fieldset>

                            <p:fieldset legend="Shift &amp; Time" toggleable="true" styleClass="ui-fluid">
                                <div class="ui-g">
                                    <div class="ui-g-12 ui-md-4">
                                        <h:outputLabel for="shiftDate" value="Shift Date" />
                                    </div>
                                    <div class="ui-g-12 ui-md-8">
                                         <p:calendar id="shiftDate"
                                                     value="#{staffAdditionalFormController.date}"
                                                    navigator="true"
                                                    pattern="yyyy MM dd"
                                                    showIcon="true">
                                            <f:ajax execute="@this"
                                                    render=":#{p:resolveFirstComponentWithId('fromDate',view).clientId} :#{p:resolveFirstComponentWithId('toDate',view).clientId}"
                                                    event="dateSelect"
                                                    listener="#{staffAdditionalFormController.onDateSelect}" />
                                        </p:calendar>
                                    </div>

                                    <div class="ui-g-12">
                                        <p:commandButton ajax="false"
                                                         value="Process Staff Shift"
                                                         icon="pi pi-refresh"
                                                         styleClass="ui-button-secondary"
                                                         action="#{staffAdditionalFormController.fetchStaffShift()}" />
                                    </div>

                                    <div class="ui-g-12 ui-md-4">
                                        <h:outputLabel for="staffShift" value="Staff Shift" />
                                    </div>
                                    <div class="ui-g-12 ui-md-8">
                                        <p:selectOneMenu id="staffShift"
                                                         value="#{staffAdditionalFormController.currentAdditionalForm.staffShift}"
                                                         var="t">
                                            <f:selectItem itemLabel="Select Staff Shift" />
                                            <f:selectItems value="#{staffAdditionalFormController.staffShifts}"
                                                           var="itm"
                                                           itemLabel="#{itm.shift.name}"
                                                           itemValue="#{itm}" />
                                            <p:column headerText="Name">
                                                <h:outputText value="#{t.shift.name}" />
                                            </p:column>
                                            <p:column headerText="Start">
                                                <h:outputText value="#{t.shiftStartTime}">
                                                    <f:convertDateTime pattern="yyyy MM dd HH:mm:ss" />
                                                </h:outputText>
                                            </p:column>
                                            <p:column headerText="End">
                                                <h:outputText value="#{t.shiftEndTime}">
                                                    <f:convertDateTime pattern="yyyy MM dd HH:mm:ss" />
                                                </h:outputText>
                                            </p:column>
                                        </p:selectOneMenu>
                                    </div>

                                    <div class="ui-g-12 ui-md-4">
                                        <h:outputLabel for="timeType" value="Time Type" />
                                    </div>
                                    <div class="ui-g-12 ui-md-8">
                                        <p:selectOneMenu id="timeType"
                                                         value="#{staffAdditionalFormController.currentAdditionalForm.times}">
                                            <f:selectItem itemLabel="Select Time Type" />
                                            <f:selectItems value="#{enumController.timeses}" />
                                            <f:ajax event="change"
                                                    execute="@this staffShift"
                                                    render="fromDate toDate"
                                                    listener="#{staffAdditionalFormController.timeSelectListener}" />
                                        </p:selectOneMenu>
                                    </div>

                                    <div class="ui-g-12 ui-md-4">
                                        <h:outputLabel for="fromDate" value="From Time" />
                                    </div>
                                    <div class="ui-g-12 ui-md-8">
                                        <h:panelGroup layout="block" styleClass="ez-datetime-wrap">
                                            <ez:enterDateTime id="fromDate"
                                                              idValue="from"
                                                              timeEnterListener="#{staffAdditionalFormController.timeEnterListenerFrom()}"
                                                              timeSelectListener="#{staffAdditionalFormController.timeSelectListenerFrom()}"
                                                              date="#{staffAdditionalFormController.currentAdditionalForm.fromTime}"
                                                              systemTimeStamp="#{staffAdditionalFormController.fromSystemTimeStamp}" />
                                        </h:panelGroup>
                                    </div>

                                    <div class="ui-g-12 ui-md-4">
                                        <h:outputLabel for="toDate" value="To Time" />
                                    </div>
                                    <div class="ui-g-12 ui-md-8">
                                        <h:panelGroup layout="block" styleClass="ez-datetime-wrap">
                                            <ez:enterDateTime id="toDate"
                                                              idValue="to"
                                                              timeEnterListener="#{staffAdditionalFormController.timeEnterListenerTo()}"
                                                              timeSelectListener="#{staffAdditionalFormController.timeSelectListenerTo()}"
                                                              date="#{staffAdditionalFormController.currentAdditionalForm.toTime}"
                                                              systemTimeStamp="#{staffAdditionalFormController.toSystemTimeStamp}" />
                                        </h:panelGroup>
                                    </div>
                                </div>
                            </p:fieldset>

                            <p:fieldset legend="Approval &amp; Notes" toggleable="true" styleClass="ui-fluid">
                                <div class="ui-g">
                                    <div class="ui-g-12 ui-md-4">
                                        <h:outputLabel for="approvedStaff" value="Approved Staff" />
                                    </div>
                                    <div class="ui-g-12 ui-md-8">
                                        <au:completeStaff id="approvedStaff" value="#{staffAdditionalFormController.currentAdditionalForm.approvedStaff}" />
                                    </div>

                                    <div class="ui-g-12 ui-md-4">
                                        <h:outputLabel for="comments" value="Comment" />
                                    </div>
                                    <div class="ui-g-12 ui-md-8">
                                        <p:inputTextarea id="comments"
                                                         rows="3"
                                                         autoResize="false"
                                                         value="#{staffAdditionalFormController.currentAdditionalForm.comments}" />
                                    </div>

                                    <div class="ui-g-12 ui-md-4">
                                        <h:outputLabel for="recomment" value="Retire Comment" />
                                    </div>
                                    <div class="ui-g-12 ui-md-8">
                                        <p:inputText id="recomment"
                                                     value="#{staffAdditionalFormController.currentAdditionalForm.retireComments}" />
                                    </div>
                                </div>
                            </p:fieldset>

                            <p:toolbar style="margin-top:1rem;">
                                <p:toolbarGroup align="left">
                                    <p:commandButton id="btnAdd"
                                                     ajax="false"
                                                     value="Save"
                                                     icon="pi pi-save"
                                                     styleClass="ui-button-primary"
                                                     disabled="#{staffAdditionalFormController.currentAdditionalForm.id ne null}"
                                                     action="#{staffAdditionalFormController.saveAdditionalFormExtra()}" />
                                    <span style="display:inline-block;width:0.5rem;" />
                                    <p:commandButton ajax="false"
                                                     value="Clear"
                                                     icon="pi pi-eraser"
                                                     styleClass="ui-button-secondary"
                                                     action="#{staffAdditionalFormController.clear}" />
                                </p:toolbarGroup>
                                <p:toolbarGroup align="right">
                                    <p:commandButton ajax="false"
                                                    value="Delete"
                                                    icon="pi pi-trash"
                                                    styleClass="ui-button-danger"
                                                    disabled="#{staffAdditionalFormController.currentAdditionalForm.id eq null}"
                                                    action="#{staffAdditionalFormController.deleteAdditionalForm()}">
                                        <p:confirm header="Confirm Delete"
                                                message="Delete this additional extra time form?"
                                                icon="pi pi-exclamation-triangle" />
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar>

                        </p:panel>
                    </div>

                    <!-- ================= LINKS ================= -->
                    <div class="ui-g-12 ui-lg-2">
                        <p:panel header="Links" toggleable="true">
                            <div class="ui-g">
                                <div class="ui-g-12">
                                    <p:commandLink value="Finger Print Analysis"
                                                   action="/hr/hr_shift_table_finger_print_by_staff"
                                                   ajax="false" />
                                </div>
                            </div>
                        </p:panel>
                    </div>

                    <!-- ================= SEARCH ================= -->
                    <div class="ui-g-12">
                        <p:panel header="Search Forms" toggleable="true">

                            <div class="ui-g">
                                <div class="ui-g-12 ui-md-3">
                                    <h:outputLabel for="searchFromDate" value="From Date" />
                                </div>
                                <div class="ui-g-12 ui-md-3">
                                    <p:calendar id="searchFromDate"
                                                value="#{staffAdditionalFormController.fromDate}"
                                                pattern="yyyy MM dd HH:mm:ss"
                                                showIcon="true" />
                                </div>

                                <div class="ui-g-12 ui-md-3">
                                    <h:outputLabel for="searchToDate" value="To Date" />
                                </div>
                                <div class="ui-g-12 ui-md-3">
                                    <p:calendar id="searchToDate"
                                                value="#{staffAdditionalFormController.toDate}"
                                                pattern="yyyy MM dd HH:mm:ss"
                                                showIcon="true" />
                                </div>

                                <div class="ui-g-12 ui-md-3">
                                    <h:outputLabel for="searchStaff" value="Staff" />
                                </div>
                                <div class="ui-g-12 ui-md-3">
                                    <au:completeStaff id="searchStaff" value="#{staffAdditionalFormController.staff}" />
                                </div>

                                <div class="ui-g-12 ui-md-3">
                                    <h:outputLabel for="searchApprovedStaff" value="Approved Person" />
                                </div>
                                <div class="ui-g-12 ui-md-3">
                                    <au:completeStaff id="searchApprovedStaff" value="#{staffAdditionalFormController.approvedStaff}" />
                                </div>

                                <div class="ui-g-12">
                                    <p:commandButton ajax="false"
                                                     value="Search"
                                                     icon="pi pi-search"
                                                     styleClass="ui-button-primary"
                                                     action="#{staffAdditionalFormController.createAmmendmentTableShiftDateExtraShift()}" />
                                </div>
                            </div>

                            <p:divider />

                            <p:dataTable value="#{staffAdditionalFormController.additionalForms}"
                                         var="add"
                                         rowStyleClass="#{add.retired eq true ? 'redText' : ''}"
                                         scrollable="true"
                                         scrollHeight="400">

                                <p:column headerText="View" style="width:70px;text-align:center;">
                                    <p:commandButton ajax="false"
                                                     value="View"
                                                     action="#{staffAdditionalFormController.viewAdditionalForm(add)}"
                                                     disabled="#{add.retired}" />
                                </p:column>
                                <p:column headerText="Id" style="width:70px;">
                                    <h:outputText value="#{add.id}" />
                                </p:column>
                                <p:column headerText="Staff">
                                    <h:outputText value="#{add.staff.person.nameWithTitle}" />
                                </p:column>
                                <p:column headerText="Roster">
                                    <h:outputText value="#{add.staff.roster.name}" />
                                </p:column>
                                <p:column headerText="Day Type">
                                    <h:outputText value="#{add.staffShift.dayType}" />
                                </p:column>
                                <p:column headerText="From">
                                    <h:outputText value="#{add.fromTime}">
                                        <f:convertDateTime pattern="yyyy MM dd HH:mm:ss" />
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="To">
                                    <h:outputText value="#{add.toTime}">
                                        <f:convertDateTime pattern="yyyy MM dd HH:mm:ss" />
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Shift Start">
                                    <h:outputText value="#{add.staffShift.shiftStartTime}">
                                        <f:convertDateTime pattern="yyyy MM dd HH:mm:ss" />
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Shift End">
                                    <h:outputText value="#{add.staffShift.shiftEndTime}">
                                        <f:convertDateTime pattern="yyyy MM dd HH:mm:ss" />
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Approved By">
                                    <h:outputText value="#{add.approvedStaff.person.nameWithTitle}" />
                                </p:column>
                                <p:column headerText="Comment">
                                    <h:outputText value="#{add.comments}" />
                                </p:column>
                                <p:column headerText="Creator">
                                    <h:outputText value="#{add.creater.webUserPerson.nameWithTitle}" />
                                    <h:panelGroup rendered="#{add.retired}">
                                        <br />
                                        <h:outputText value="Deleted By #{add.retirer.webUserPerson.nameWithTitle}"
                                                      style="color:#2962ff;" />
                                    </h:panelGroup>
                                </p:column>
                            </p:dataTable>

                        </p:panel>
                    </div>

                </div>

            </p:panel>

            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                <p:commandButton value="Yes" type="button"
                                styleClass="ui-confirmdialog-yes ui-button-danger"
                                icon="pi pi-check" />
                <p:commandButton value="No" type="button"
                                styleClass="ui-confirmdialog-no ui-button-secondary"
                                icon="pi pi-times" />
            </p:confirmDialog>

        </h:form>
    </ui:define>

</ui:composition>
