<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
    <h:body>
        <ui:composition template="/admin/users/user_list.xhtml">
            <ui:define name="users">
                <p:panel>
                    <f:facet name="header">
                        <i class="fa fa-tachometer-alt"></i>
                        <h:outputLabel class="m-2" value="Drawer Balances"/>
                    </f:facet>
                    <div class="grid">
                        <div class="col-12 md:col-6">
                            <table class="ui-datatable ui-widget w-100">
                                <thead class="ui-datatable-thead">
                                    <tr>
                                        <th class="ui-state-default" style="padding:4px 8px;">Payment Method</th>
                                        <th class="ui-state-default" class="text-end" style="padding:4px 8px;">Current Value</th>
                                    </tr>
                                </thead>
                                <tbody class="ui-datatable-data ui-widget-content">
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-money-bill"></i> Cash</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.cashInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-credit-card"></i> Card</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.cardInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-users"></i> Staff</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.staffInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-tag"></i> Credit</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.creditInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-briefcase"></i> Staff Welfare</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.staffWelfareInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-ticket"></i> Voucher</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.voucherInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-file-o"></i> IOU</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.iouInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-user-plus"></i> Agent</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.agentInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-envelope"></i> Cheque</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.chequeInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-file"></i> Slip</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.slipInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-wallet"></i> E-wallet</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.ewalletInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-inbox"></i> Patient Deposit</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.patientDepositInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-star"></i> Patient Points</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.patientPointsInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                    <tr class="ui-widget-content">
                                        <td style="padding:3px 8px;"><i class="pi pi-minus-circle"></i> None</td>
                                        <td class="text-end" style="padding:3px 8px;">
                                            <h:outputText value="#{drawerController.current.noneInHandValue}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </td>
                                    </tr>
                                </tbody>
                                <tfoot>
                                    <tr class="ui-widget-content">
                                        <th class="ui-state-default" style="padding:4px 8px;">Total</th>
                                        <th class="ui-state-default" class="text-end" style="padding:4px 8px;">
                                            <h:outputText value="#{drawerController.current.totalInHand}">
                                                <f:convertNumber pattern="#,##0.00"/>
                                            </h:outputText>
                                        </th>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </p:panel>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
