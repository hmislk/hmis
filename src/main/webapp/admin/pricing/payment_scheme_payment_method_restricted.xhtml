<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/admin/pricing/index.xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:p="http://primefaces.org/ui">

    <ui:define name="subcontent">

        <h:form id="frmRestricted">
            <p:growl id="growlRestricted" showDetail="true" life="3000"/>
            <p:focus context="frmRestricted"/>

            <p:panel>
                <f:facet name="header">
                    <div class="d-flex justify-content-between align-items-center w-100">
                        <h:outputText value="Manage Discount Scheme Restricted Payment Methods" styleClass="fw-bold"/>
                        <p:badge value="#{empty paymentSchemeController.restrictedPaymentMethods ? 0 : paymentSchemeController.restrictedPaymentMethods.size()}"
                                 severity="info"/>
                    </div>
                </f:facet>

                <div class="row g-3">

                    <!-- Selection column -->
                    <div class="col-12 col-lg-5">
                        <p:panel header="Select Scheme &amp; Method" styleClass="h-100">

                            <h:panelGrid columns="1" styleClass="w-100" cellpadding="4">

                                <p:outputLabel for="selScheme" value="Discount Scheme"/>
                                <p:selectOneMenu 
                                    id="selScheme"
                                    value="#{paymentSchemeController.current}"
                                    styleClass="w-100"
                                    title="Choose a discount scheme to view its restricted payment methods">
                                    <f:selectItem itemLabel="-- Select Discount Scheme --" noSelectionOption="true"/>
                                    <f:selectItems 
                                        value="#{paymentSchemeController.items}"
                                        var="i"
                                        itemValue="#{i}"
                                        itemLabel="#{i.name}"/>
                                    <p:ajax 
                                        event="change"
                                        listener="#{paymentSchemeController.createRestrictedPaymentMethods()}"
                                        update="frmRestricted">
                                    </p:ajax>
                                </p:selectOneMenu>

                                <p:outputLabel for="lstSelect" value="Restricted Payment Methods"/>
                                <p:selectOneListbox 
                                    id="lstSelect"
                                    value="#{paymentSchemeController.currentRestrictedPaymentMethod}"
                                    scrollHeight="260"
                                    styleClass="w-100">
                                    <f:selectItems 
                                        value="#{paymentSchemeController.restrictedPaymentMethods}"
                                        var="myItem"
                                        itemValue="#{myItem}"
                                        itemLabel="#{myItem.paymentMethod}"/>
                                    <p:ajax update=":frmRestricted:gpDetail"/>
                                </p:selectOneListbox>

                                <h:panelGroup 
                                    layout="block"
                                    rendered="#{empty paymentSchemeController.restrictedPaymentMethods}">
                                    <h:outputText 
                                        value="No restricted payment methods configured for this scheme yet."
                                        styleClass="text-muted fst-italic small">
                                    </h:outputText>
                                </h:panelGroup>

                            </h:panelGrid>

                            <div class="d-flex flex-wrap gap-2 mt-3">

                                <p:commandButton 
                                    id="btnAdd"
                                    value="New"
                                    icon="fas fa-plus"
                                    ajax="false"
                                    action="#{paymentSchemeController.prepareAddRestrictedPaymentMethod()}"
                                    styleClass="ui-button-info ui-button-outlined"
                                    title="Clear the form to add a new restricted payment method">
                                </p:commandButton>

                                <p:commandButton 
                                    id="btnDelete"
                                    value="Delete"
                                    icon="fas fa-trash"
                                    ajax="false"
                                    action="#{paymentSchemeController.deleteRestrictedPaymentMethod()}"
                                    onclick="return confirm('Are you sure you want to delete this record?');"
                                    styleClass="ui-button-danger"
                                    title="Retire the selected restricted payment method">
                                </p:commandButton>

                                <p:commandButton 
                                    id="btnClear"
                                    value="Reset"
                                    icon="fas fa-eraser"
                                    ajax="false"
                                    action="#{paymentSchemeController.recreateModel}"
                                    styleClass="ui-button-secondary ui-button-outlined"
                                    title="Reset the scheme list">
                                </p:commandButton>

                            </div>
                        </p:panel>
                    </div>

                    <!-- Detail column -->
                    <div class="col-12 col-lg-7">
                        <p:panel header="Payment Method Details" styleClass="h-100">

                            <h:panelGroup id="gpDetail" layout="block">

                                <p:panelGrid columns="2" layout="tabular" styleClass="w-100">

                                    <p:outputLabel for="selPaymentMethod" value="Payment Method"/>
                                    <p:selectOneMenu 
                                        id="selPaymentMethod"
                                        value="#{paymentSchemeController.currentRestrictedPaymentMethod.paymentMethod}"
                                        styleClass="w-100"
                                        title="The payment method to restrict for this scheme">
                                        <f:selectItem itemLabel="-- Select Payment Method --" noSelectionOption="true"/>
                                        <f:selectItems value="#{enumController.paymentMethods}"/>
                                    </p:selectOneMenu>

                                    <p:outputLabel value="Status"/>
                                    <h:panelGroup>
                                        <p:badge 
                                            value="#{empty paymentSchemeController.currentRestrictedPaymentMethod.id ? 'New' : 'Editing'}"
                                            severity="#{empty paymentSchemeController.currentRestrictedPaymentMethod.id ? 'warning' : 'info'}">
                                        </p:badge>
                                    </h:panelGroup>

                                </p:panelGrid>

                                <div class="d-flex justify-content-end gap-2 mt-3">
                                    <p:commandButton 
                                        id="btnSave"
                                        value="Save"
                                        icon="fas fa-save"
                                        action="#{paymentSchemeController.saveSelectedRestrictedPaymentMethod()}"
                                        update="frmRestricted"
                                        styleClass="ui-button-success"
                                        title="Save the restricted payment method">
                                    </p:commandButton>
                                </div>

                            </h:panelGroup>

                        </p:panel>
                    </div>

                </div>
            </p:panel>

        </h:form>

    </ui:define>

</ui:composition>
