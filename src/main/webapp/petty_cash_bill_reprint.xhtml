<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:bi="http://xmlns.jcp.org/jsf/composite/bill"
      xmlns:pa="http://xmlns.jcp.org/jsf/composite/paymentMethod">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">
                <h:form>
                    <p:panel header="Reprint" >
                        <f:facet name="header" >
                            <div class="d-flex align-items-center justify-content-between">
                                <div>
                                    <h:outputLabel value="Petty Cash Re-Print" ></h:outputLabel>
                                </div>
                                <div>
                                    <h:panelGroup class="mx-1" rendered="#{configOptionApplicationController.getBooleanValueByKey('Need Approvel For Petty Cash Bill Cancelletion') eq false}">
                                        <p:commandButton  
                                            ajax="false" 
                                            class="ui-button-danger" 
                                            icon="fas fa-ban" 
                                            value="To Cancel" 
                                            action="#{pettyCashBillSearch.navigateToPettyCashCancel()}" 
                                            disabled="#{pettyCashBillSearch.bill.cancelled}"> 
                                        </p:commandButton>
                                    </h:panelGroup>


                                    <h:panelGroup class="mx-1" rendered="#{configOptionApplicationController.getBooleanValueByKey('Need Approvel For Petty Cash Bill Cancelletion')}" >
                                        <h:panelGroup rendered="#{pettyCashBillSearch.bill.approveAt ne null}">
                                            <p:commandButton 
                                                class="mx-1 ui-button-danger" 
                                                icon="fas fa-ban" 
                                                ajax="false" 
                                                value="Cancel" 
                                                action="#{pettyCashBillSearch.navigateToPettyCashCancel()}" 
                                                disabled="#{pettyCashBillSearch.bill.cancelled}">                           
                                            </p:commandButton>
                                        </h:panelGroup>
                                        <p:commandButton 
                                            ajax="false" 
                                            class="ui-button-danger" 
                                            icon="fas fa-ban" 
                                            value="To Cancel" 
                                            action="#{pettyCashBillSearch.sendToApprovePettyCashBillCancellation}" 
                                            disabled="#{pettyCashBillSearch.bill.approveAt ne null or pettyCashBillSearch.bill.cancelled}">                           
                                        </p:commandButton>
                                    </h:panelGroup>

                                    <h:panelGroup rendered="#{webUserController.hasPrivilege('PettyCashBillCancellationApprove')}" >
                                        <p:commandButton 
                                            ajax="false" 
                                            value="Approve" 
                                            class="ui-button-success" 
                                            icon="fas fa-check" 
                                            action="#{pettyCashBillController.pettyCashCancelBillApprove}" 
                                            disabled="#{pettyCashBillSearch.bill.approveAt ne null}">                           
                                        </p:commandButton>
                                    </h:panelGroup>


                                    <p:commandButton  
                                        class="mx-1 ui-button-warning" 
                                        ajax="false"
                                        icon="fas fa-arrow-left" 
                                        action="/petty_cash_bill_search_own?faces-redirect=true"
                                        value="Back to Search">                           
                                    </p:commandButton>
                                </div>
                            </div>
                        </f:facet>


                        <div class="row">

                            <div class="col-md-6">
                                <p:panel>
                                    <f:facet name="header">
                                        <h:outputText value="&#xf007;" styleClass="fa mr-2"></h:outputText>
                                        <h:outputLabel value="Bill Details" class="mx-2"></h:outputLabel>
                                    </f:facet>
                                    <p:panelGrid columns="2">
                                        <h:outputLabel value="Paid To :" ></h:outputLabel>
                                        <h:panelGroup rendered="#{pettyCashBillSearch.bill.staff ne null}">
                                            <div class="d-flex gap-2">
                                                <p:badge value="Staff" severity="warning" style="width: 120px;" ></p:badge>
                                                <h:outputLabel value="-"></h:outputLabel>
                                                <h:outputLabel value="Staff - #{pettyCashBillSearch.bill.staff.person.nameWithTitle}"></h:outputLabel>
                                            </div>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{pettyCashBillSearch.bill.person ne null}">
                                            <div class="d-flex gap-2">
                                                <p:badge value="Person" severity="info"  style="width: 120px;"></p:badge>
                                                <h:outputLabel value="-"></h:outputLabel>
                                                <h:outputLabel value="#{pettyCashBillSearch.bill.person.nameWithTitle}"/>
                                            </div>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{pettyCashBillSearch.bill.toDepartment ne null}">
                                            <div class="d-flex gap-2">
                                                <p:badge value="Department" severity="success" style="width: 120px;"></p:badge>
                                                <h:outputLabel value="-"></h:outputLabel>
                                                <h:outputLabel value="#{pettyCashBillSearch.bill.toDepartment.name}"/>
                                            </div>
                                        </h:panelGroup>
                                        <h:outputLabel value="Bill No :" ></h:outputLabel>
                                        <h:outputLabel value="#{pettyCashBillSearch.bill.deptId}" ></h:outputLabel>
                                        <h:outputLabel value="Payment Type : " ></h:outputLabel>
                                        <h:outputLabel value="#{pettyCashBillSearch.bill.paymentMethod}" ></h:outputLabel>                                        
                                        <h:outputLabel value="Net Total :" ></h:outputLabel>
                                        <h:outputLabel value="#{pettyCashBillSearch.bill.netTotal}" ></h:outputLabel>

                                        <h:outputLabel value="Total Refuneded:" ></h:outputLabel>
                                        <h:outputLabel value="#{pettyCashBillController.totalOfRedundedBills}" ></h:outputLabel>
                                    </p:panelGrid>


                                </p:panel>
                            </div>

                            <div class="col-md-6">
                                <p:panel >
                                    <f:facet name="header">
                                        <div class="d-flex justify-content-between">
                                            <h:outputLabel value="Preview" class="mt-2"></h:outputLabel>
                                            <p:commandButton 
                                                value="Print" 
                                                class="ui-button-info"
                                                icon="fa fa-print"
                                                ajax="false">
                                                <p:printer target="gpBillPreview" />
                                            </p:commandButton> 
                                        </div>

                                    </f:facet>

                                    <h:panelGroup id="gpBillPreview">
                                        <bi:petty bill="#{pettyCashBillSearch.bill}" billController="#{pettyCashBillSearch}" dup="true"/>
                                    </h:panelGroup>

                                </p:panel>
                            </div>
                        </div>

                    </p:panel>

                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
