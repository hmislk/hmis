<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

    <h:body>
        <ui:composition template="/resources/template/template.xhtml">
            <ui:define name="content">
                <h:form>
                    <p:panel>
                        <f:facet name="header">
                            <div class="d-flex justify-content-between align-items-center" style="min-height: 40px;">
                                <div class="d-flex align-items-center gap-2">
                                    <h:outputText styleClass="fas fa-search" />
                                    <h:outputLabel value="Petty Cash Bill Search" styleClass="mx-2"/>
                                </div>
                                <div class="d-flex align-items-center gap-5">
                                    <p:badge 
                                        value="#{requestController.pendingPettyCashApprovalCount}"
                                        severity="danger"
                                        rendered="#{requestController.pendingPettyCashApprovalCount gt 0}">
                                        <p:commandButton
                                            value="Pending Approvals"
                                            icon="fas fa-clock"
                                            ajax="false"
                                            class="ui-button-warning"
                                            action="#{requestController.navigateToPendingPettyCashRequests()}">
                                        </p:commandButton>
                                    </p:badge>
                                    
                                    <p:commandButton
                                        value="Back"
                                        icon="fas fa-arrow-left"
                                        class="ui-button-primary"
                                        action="/payments/pay_index?faces-redirect=true"
                                        ajax="false">
                                    </p:commandButton>
                                </div>
                            </div>
                        </f:facet>

                        <div class="row">
                            <div class="col-md-2">
                                <h:outputLabel value="From Date"/>
                                <p:calendar 
                                    styleClass="dateTimePicker" 
                                    id="fromDate" 
                                    class="w-100"
                                    inputStyleClass="form-control"
                                    value="#{searchController.fromDate}" 
                                    navigator="false" 
                                    pattern="#{sessionController.applicationPreference.longDateTimeFormat}" >      
                                </p:calendar>
                                <h:outputLabel value="To Date"/>
                                <p:calendar 
                                    id="toDate" 
                                    value="#{searchController.toDate}" 
                                    navigator="false" 
                                    class="w-100"
                                    inputStyleClass="form-control"
                                    pattern="#{sessionController.applicationPreference.longDateTimeFormat}" >                                                                              
                                </p:calendar>

                                <p:commandButton 
                                    id="btnSearch" 
                                    ajax="false" 
                                    value="Search" 
                                    icon="fas fa-search"
                                    class="w-100 my-2 ui-button-warning"
                                    action="#{searchController.createPettyTable()}">
                                </p:commandButton>


                                <h:outputLabel value="Bill No"/>
                                <p:inputText 
                                    autocomplete="off" 
                                    class="w-100" 
                                    value="#{searchController.searchKeyword.billNo}" />
                                <h:outputLabel value="Invoice Number"/>
                                <p:inputText 
                                    autocomplete="off" 
                                    class="w-100" 
                                    value="#{searchController.searchKeyword.number}"/>
                                <h:outputLabel value="Paid To (Staff)"/>
                                <p:autoComplete   
                                    id="cmbDoc1" 
                                    value="#{searchController.staff}" 
                                    completeMethod="#{staffController.completeStaffWithoutDoctors}" 
                                    forceSelection="true"
                                    var="ix" 
                                    itemLabel="#{ix.person.nameWithTitle}" 
                                    itemValue="#{ix}" 
                                    size="20"
                                    inputStyleClass="form-control"
                                    class="w-100">
                                    <p:column style="width: 150px; padding: 3px;">
                                        #{ix.code}
                                    </p:column>
                                    <p:column style="width: 250px; padding: 3px;">
                                        #{ix.person.nameWithTitle}
                                    </p:column>
                                </p:autoComplete>
                                <h:outputLabel value="Paid To (Person)"/>
                                <p:inputText 
                                    autocomplete="off" 
                                    class="w-100" 
                                    value="#{searchController.searchKeyword.personName}" />
                                <h:outputLabel value="Value"/>
                                <p:inputText 
                                    autocomplete="off" 
                                    class="w-100" 
                                    value="#{searchController.searchKeyword.netTotal}" />
                            </div>
                            <div class="col-md-10">
                                <p:dataTable 
                                    id="tblBills" 
                                    rowIndexVar="i"
                                    paginator="true"
                                    paginatorPosition="bottom"
                                    rows="15"
                                    value="#{searchController.bills}" 
                                    rowsPerPageTemplate="15,30,50,{ShowAll|'All'}"
                                    var="bill"  >

                                    <p:column headerText="#" style="padding: 8px;" width="2em;" class="text-center" >
                                        #{i+1}
                                    </p:column>

                                    <p:column headerText="Pre-Bill No" style="padding: 8px;" width="11em;" >
                                        <p:commandLink 
                                            id="billNo" 
                                            ajax="false" 
                                            value="#{bill.deptId}" 
                                            action="#{pettyCashBillController.navigatePettyAndIouReprint()}"
                                            actionListener="#{pettyCashBillController.fillBillsReferredByCurrentBill()}">
                                            <f:setPropertyActionListener value="#{bill.referenceBill}" target="#{pettyCashBillSearch.bill}"/>
                                            <f:setPropertyActionListener value="#{bill.referenceBill}" target="#{pettyCashBillController.current}"/>
                                        </p:commandLink>
                                    </p:column>
                                    
                                    <p:column headerText="Bill No" style="padding: 8px;" width="11em;" >
                                        <p:commandLink 
                                            id="prebillNo" 
                                            ajax="false" 
                                            value="#{bill.referenceBill.deptId}" 
                                            action="#{pettyCashBillController.navigatePettyAndIouReprint()}"
                                            actionListener="#{pettyCashBillController.fillBillsReferredByCurrentBill()}"
                                            >
                                            <f:setPropertyActionListener value="#{bill}" target="#{pettyCashBillSearch.bill}"/>
                                            <f:setPropertyActionListener value="#{bill}" target="#{pettyCashBillController.current}"/>
                                        </p:commandLink>
                                    </p:column>

                                    <p:column headerText="Invoice No" style="padding: 8px;"  width="8em;">
                                        <h:outputLabel  value="#{bill.invoiceNumber}"  />
                                    </p:column>

                                    <p:column headerText="Billed At" style="padding: 8px;" width="13em;" >
                                        <h:outputLabel value="#{bill.createdAt}" >
                                            <f:convertDateTime  timeZone="Asia/Colombo" pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                        </h:outputLabel>
                                        <br/>
                                        <h:panelGroup rendered="#{bill.cancelled}" >
                                            <h:outputLabel style="color: red;" value="Cancelled at " />
                                            <h:outputLabel style="color: red;" rendered="#{bill.cancelled}" value="#{bill.cancelledBill.createdAt}" >
                                                <f:convertDateTime  timeZone="Asia/Colombo" pattern="#{sessionController.applicationPreference.longDateTimeFormat}" />
                                            </h:outputLabel>
                                        </h:panelGroup>
                                    </p:column>

                                    <p:column headerText="Billed By" style="padding: 8px;" width="12em;" >
                                        <h:outputLabel value="#{bill.creater.webUserPerson.nameWithTitle}" ></h:outputLabel>
                                        <br/>
                                        <h:panelGroup rendered="#{bill.cancelled}" >
                                            <h:outputLabel style="color: red;" value="Cancelled at " />
                                            <h:outputLabel style="color: red;" rendered="#{bill.cancelled}" value="#{bill.cancelledBill.creater.webUserPerson.nameWithTitle}" >                                       
                                            </h:outputLabel>
                                        </h:panelGroup>
                                    </p:column>  

                                    <p:column headerText="Paid To" style="padding: 8px;" width="28em;"  >
                                        <h:panelGroup rendered="#{bill.staff ne null}">
                                            <div class="d-flex gap-2">
                                                <p:badge value="Staff" severity="warning" style="width: 120px;" ></p:badge>
                                                <h:outputLabel value="-"></h:outputLabel>
                                                <h:outputLabel value="Staff - #{bill.staff.person.nameWithTitle}"></h:outputLabel>
                                            </div>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{bill.person ne null}">
                                            <div class="d-flex gap-2">
                                                <p:badge value="Person" severity="info"  style="width: 120px;"></p:badge>
                                                <h:outputLabel value="-"></h:outputLabel>
                                                <h:outputLabel value="#{bill.person.nameWithTitle}"/>
                                            </div>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{bill.toDepartment ne null}">
                                            <div class="d-flex gap-2">
                                                <p:badge value="Department" severity="success" style="width: 120px;"></p:badge>
                                                <h:outputLabel value="-"></h:outputLabel>
                                                <h:outputLabel value="#{bill.toDepartment.name}"/>
                                            </div>
                                        </h:panelGroup>
                                    </p:column>

                                    <p:column headerText="Status" style="padding: 8px;" width="7em;" class="text-center">
                                        <p:badge  value="#{bill.currentRequest.status.label}" severity="warning" rendered="#{bill.currentRequest.status eq 'PENDING'}" class="w-100"/>
                                        <p:badge  value="#{bill.currentRequest.status.label}" severity="info" rendered="#{bill.currentRequest.status eq 'UNDER_REVIEW'}" class="w-100"/>
                                        <p:badge  value="#{bill.currentRequest.status.label}" severity="success" rendered="#{bill.currentRequest.status eq 'APPROVED'}" class="w-100"/>
                                        <p:badge  value="#{bill.currentRequest.status.label}" severity="danger" rendered="#{bill.currentRequest.status eq 'REJECTED'}" class="w-100"/>
                                    </p:column>

                                    <p:column headerText="Net Value" style="padding: 8px;" width="8em;" class="text-end" >
                                        <h:outputLabel value="#{bill.netTotal}" class="text-end" >
                                            <f:convertNumber pattern="#,##0.00"/>
                                        </h:outputLabel>
                                    </p:column>

                                </p:dataTable>
                            </div>
                        </div>
                    </p:panel>

                </h:form>
            </ui:define>
        </ui:composition>
    </h:body>
</html>
