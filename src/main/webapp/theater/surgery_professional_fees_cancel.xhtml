<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/resources/template/template.xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns="http://www.w3.org/1999/xhtml">

    <ui:define name="content">

        <h:panelGroup styleClass="opdPanel">
            <h:form id="form">

                <p:panel>
                    <f:facet name="header">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h:outputText styleClass="fa-solid fa-ban fa-lg" style="color: red;"/>
                                <p:outputLabel value="Cancel Professional Fee Bill" class="m-2"/>
                                <p:outputLabel value="#{inwardSearch.bill.deptId}"
                                               style="font-weight: bold;"/>
                            </div>
                            <div class="d-flex gap-2 align-items-center">
                                <p:outputLabel value="Reason for Cancellation" style="font-weight: 600;"/>
                                <p:inputText
                                    value="#{inwardSearch.comment}"
                                    placeholder="Enter a reason to cancel"
                                    style="width: 350px;"/>
                                <p:commandButton
                                    value="Confirm Cancel"
                                    icon="fas fa-ban"
                                    class="ui-button-danger"
                                    ajax="false"
                                    action="#{inwardSearch.cancelBillService()}"
                                    onclick="return confirm('Are you sure you want to cancel this bill?');"/>
                                <p:commandButton
                                    value="Back to List"
                                    icon="fa fa-arrow-left"
                                    class="ui-button-secondary"
                                    ajax="false"
                                    action="#{inwardProfessionalBillController.navigateToSurgeryProfessionalFeesList(inwardSearch.bill.forwardReferenceBill)}"/>
                            </div>
                        </div>
                    </f:facet>

                    <p:panelGrid columns="2" style="width: 100%;">
                        <p:panel header="Patient Details">
                            <h:panelGrid columns="3" class="w-100" style="font-size: 12pt">
                                <h:outputLabel value="Patient Name"/>
                                <h:outputLabel value=":"/>
                                <h:outputLabel value="#{inwardSearch.bill.patient.person.nameWithTitle}"/>
                                <h:outputLabel value="BHT No"/>
                                <h:outputLabel value=":"/>
                                <h:outputLabel value="#{inwardSearch.bill.patientEncounter.bhtNo}"/>
                                <h:outputLabel value="Surgery"/>
                                <h:outputLabel value=":"/>
                                <h:outputLabel value="#{inwardSearch.bill.forwardReferenceBill.procedure.item.name}"/>
                            </h:panelGrid>
                        </p:panel>
                        <p:panel header="Bill Details">
                            <h:panelGrid columns="3" class="w-100" style="font-size: 12pt">
                                <h:outputLabel value="Bill No"/>
                                <h:outputLabel value=":"/>
                                <h:outputLabel value="#{inwardSearch.bill.deptId}"/>
                                <h:outputLabel value="Total"/>
                                <h:outputLabel value=":"/>
                                <h:outputLabel value="#{inwardSearch.bill.total}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputLabel>
                                <h:outputLabel value="Added By"/>
                                <h:outputLabel value=":"/>
                                <h:outputLabel value="#{inwardSearch.bill.creater.webUserPerson.name}"/>
                            </h:panelGrid>
                        </p:panel>
                    </p:panelGrid>

                    <p:panel header="Fee Lines" class="mt-3">
                        <p:dataTable value="#{inwardProfessionalBillController.getEncounterComponentsForBill(inwardSearch.bill)}"
                                     var="ec"
                                     emptyMessage="No fee lines found.">
                            <p:column headerText="Role">
                                <h:outputLabel value="#{ec.patientEncounterComponentType}"/>
                            </p:column>
                            <p:column headerText="Doctor/Staff">
                                <h:outputLabel value="#{ec.staff.person.nameWithTitle}"/>
                            </p:column>
                            <p:column headerText="Fee" styleClass="text-end">
                                <h:outputLabel value="#{ec.billFee.feeValue}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputLabel>
                            </p:column>
                        </p:dataTable>
                    </p:panel>

                </p:panel>

            </h:form>
        </h:panelGroup>
    </ui:define>
</ui:composition>
