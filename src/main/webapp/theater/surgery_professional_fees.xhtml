<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/resources/template/template.xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:in="http://xmlns.jcp.org/jsf/composite/inward">

    <ui:define name="content">

        <h:panelGroup rendered="true" styleClass="opdPanel">
            <h:form id="form">

                <p:panel rendered="#{inwardProfessionalBillController.batchBill eq null}">
                    <f:facet name="header">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h:outputText styleClass="fa-solid fa-scissors fa-lg"/>
                                <p:outputLabel value="Surgery Professional Fees" class="m-2"/>
                            </div>
                            <div>
                                <h:panelGroup rendered="#{webUserController.hasPrivilege('NursingWorkBench')}">
                                    <p:commandButton
                                        value="Surgery WorkBench"
                                        action="#{surgeryBillController.navigateToAddSurgeriesFromMenu()}"
                                        ajax="false"
                                        class="ui-button-operating-theatre"
                                        icon="fa fa-arrow-left">
                                    </p:commandButton>
                                </h:panelGroup>
                            </div>
                        </div>
                    </f:facet>

                    <h:outputLabel value="Type Surgery Name or BHT : "/>
                    <p:autoComplete
                        forceSelection="true"
                        value="#{inwardProfessionalBillController.batchBill}"
                        completeMethod="#{billController.completeSurgeryBills}"
                        var="apt2"
                        itemLabel="#{apt2.patientEncounter.bhtNo}"
                        itemValue="#{apt2}"
                        size="40"
                        class="m-2">
                        <p:column>
                            #{apt2.procedure.item.name}
                        </p:column>
                        <p:column>
                            #{apt2.patientEncounter.bhtNo}
                        </p:column>
                        <p:column>
                            #{apt2.patientEncounter.patient.person.name}
                        </p:column>
                    </p:autoComplete>

                    <p:commandButton
                        id="btnSelect"
                        value="Select"
                        ajax="false">
                    </p:commandButton>
                </p:panel>

                <p:panel style="min-height: 600px; position:relative;" rendered="#{inwardProfessionalBillController.batchBill ne null}">
                    <f:facet name="header">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h:outputText styleClass="fa-solid fa-scissors"/>
                                <p:outputLabel value="Surgery Professional Fees" class="mx-2"/>
                            </div>
                            <div class="d-flex gap-2">
                                <p:commandButton
                                    value="Settle Bill"
                                    ajax="false"
                                    icon="fa fa-save"
                                    class="ui-button-success"
                                    action="#{inwardProfessionalBillController.saveProfessionalFeeBill()}"
                                    disabled="#{inwardProfessionalBillController.batchBill.patientEncounter.paymentFinalized}">
                                </p:commandButton>
                                <p:commandButton
                                    value="Clear Form"
                                    ajax="false"
                                    icon="fa fa-times"
                                    class="ui-button-warning"
                                    action="#{inwardProfessionalBillController.clearProfessionalFeeForm()}"
                                    onclick="return confirm('Discard unsaved fee rows?');">
                                </p:commandButton>

                                <h:panelGroup rendered="#{webUserController.hasPrivilege('InwardSearch')}">
                                    <p:commandButton
                                        ajax="false"
                                        icon="fa-solid fa-address-card"
                                        class="ui-button-secondary"
                                        value="Inpatient Dashboard"
                                        action="#{admissionController.navigateToAdmissionProfilePage}">
                                        <f:setPropertyActionListener
                                            value="#{inwardProfessionalBillController.batchBill.patientEncounter}"
                                            target="#{admissionController.current}">
                                        </f:setPropertyActionListener>
                                    </p:commandButton>
                                </h:panelGroup>

                                <p:commandButton
                                    value="Surgery WorkBench"
                                    ajax="false"
                                    action="/theater/surgery_workbench?faces-redirect=true"
                                    class="ui-button-operating-theatre"
                                    icon="fa fa-arrow-left">
                                </p:commandButton>
                            </div>
                        </div>
                    </f:facet>

                    <div class="row">
                        <div class="col-md-6">
                            <p:panel>
                                <f:facet name="header">
                                    <h:outputText styleClass="fas fa-user"/>
                                    <h:outputText value="Patient Details" class="mx-4"/>
                                </f:facet>
                                <in:bhtDetail admission="#{inwardProfessionalBillController.batchBill.patientEncounter}"/>
                                <in:surgeryDetail procedure="#{inwardProfessionalBillController.batchBill.procedure}"/>
                            </p:panel>
                        </div>

                        <div class="col-md-6">
                            <p:panel id="pIxAdd" style="min-height: 350px;">
                                <f:facet name="header">
                                    <h:outputText styleClass="fas fa-money-bill"/>
                                    <h:outputText value="Add Professional Fee" class="mx-4"/>
                                </f:facet>
                                <h:panelGrid columns="2" id="profPanel">
                                    <h:outputText value="Speciality"/>
                                    <p:autoComplete forceSelection="true" id="cmbSpe"
                                                    value="#{inwardProfessionalBillController.proEncounterComponent.billFee.speciality}"
                                                    completeMethod="#{specialityController.completeSpeciality}" var="sp"
                                                    itemLabel="#{sp.name}"
                                                    itemValue="#{sp}" size="70" style="width: 400px;" class="mx-4 my-1">
                                        <f:ajax event="itemSelect" execute="cmbSpe" render="cmbDoc pIxAdd"/>
                                    </p:autoComplete>

                                    <h:outputText value="Doctor/Staff"/>
                                    <p:autoComplete forceSelection="true" id="cmbDoc"
                                                    value="#{inwardProfessionalBillController.proEncounterComponent.billFee.staff}"
                                                    completeMethod="#{inwardProfessionalBillController.completeItems}" var="st"
                                                    itemLabel="#{st.person.nameWithTitle}" itemValue="#{st}" size="70"
                                                    style="width: 400px;" class="mx-4 my-1">
                                        <f:ajax event="itemSelect" execute="cmbDoc" render="pIxAdd"/>
                                    </p:autoComplete>

                                    <h:outputLabel value="Description"/>
                                    <p:inputText class="mx-4 my-1" size="70" autocomplete="off" id="txtDes"
                                                 value="#{inwardProfessionalBillController.proEncounterComponent.description}"/>

                                    <h:outputLabel value="Fee"/>
                                    <p:inputText class="mx-4 my-1" size="70" autocomplete="off" id="prof"
                                                 value="#{inwardProfessionalBillController.proEncounterComponent.billFee.feeValue}"/>
                                </h:panelGrid>
                                <br/>
                                <p:commandButton ajax="false"
                                                 value="Add Professional Fee"
                                                 icon="fa-solid fa-check"
                                                 class="ui-button-success"
                                                 action="#{inwardProfessionalBillController.addProfessionalFee()}"
                                                 disabled="#{inwardProfessionalBillController.batchBill.patientEncounter.paymentFinalized}"/>
                            </p:panel>

                        </div>
                    </div>

                    <p:panel class="mt-3">
                        <f:facet name="header">
                            <h:outputText styleClass="fas fa-list-check"/>
                            <h:outputText value="Current Bill — Unsaved Fees" class="mx-2"/>
                            <h:outputText value=" (click 'Settle Bill' to save as a new bill)"
                                          style="font-style: italic; font-size: 0.9em; color: #888;"/>
                        </f:facet>

                    <h:panelGroup id="panelBillItems">
                        <p:dataTable value="#{inwardProfessionalBillController.proEncounterComponents}" var="c"
                                     emptyMessage="No fees added yet. Use the form above to add fees, then click 'Save Bill'.">
                            <p:column headerText="Role">
                                <h:outputLabel value="#{c.patientEncounterComponentType}"/>
                            </p:column>
                            <p:column headerText="Doctor/Staff">
                                <h:outputLabel value="#{c.billFee.staff.person.nameWithTitle}"/>
                            </p:column>
                            <p:column headerText="Fee">
                                <p:inputText autocomplete="off" style="width: 130px"
                                             value="#{c.billFee.feeValue}"/>
                            </p:column>
                            <p:column headerText="Remove">
                                <p:commandButton ajax="false" value="Remove"
                                                 icon="fa fa-times"
                                                 class="ui-button-danger"
                                                 action="#{inwardProfessionalBillController.removeProEncFromList(c)}"
                                                 disabled="#{inwardProfessionalBillController.batchBill.patientEncounter.paymentFinalized}"/>
                            </p:column>
                        </p:dataTable>
                    </h:panelGroup>
                    </p:panel>

                    <!-- Saved professional fee bills for this surgery -->
                    <p:panel class="mt-3" rendered="#{not empty inwardProfessionalBillController.surgeryProfessionalFeeBills}">
                        <f:facet name="header">
                            <h:outputText styleClass="fas fa-receipt"/>
                            <h:outputText value="Saved Professional Fee Bills" class="mx-2"/>
                        </f:facet>
                        <p:dataTable value="#{inwardProfessionalBillController.surgeryProfessionalFeeBills}" var="sb"
                                     emptyMessage="No saved bills yet.">
                            <p:column headerText="Bill No">
                                <h:outputLabel value="#{sb.deptId}"/>
                            </p:column>
                            <p:column headerText="Date">
                                <h:outputLabel value="#{sb.createdAt}">
                                    <f:convertDateTime timeZone="Asia/Colombo"
                                                       pattern="#{sessionController.applicationPreference.shortDateFormat}"/>
                                </h:outputLabel>
                            </p:column>
                            <p:column headerText="Total" styleClass="text-end">
                                <h:outputLabel value="#{sb.total}">
                                    <f:convertNumber pattern="#,##0.00"/>
                                </h:outputLabel>
                            </p:column>
                            <p:column headerText="Status">
                                <h:panelGroup rendered="#{!sb.cancelled}">
                                    <h:outputLabel value="Active" style="color: green; font-weight: bold;"/>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{sb.cancelled}">
                                    <h:outputLabel value="Cancelled" style="color: red; font-weight: bold;"/>
                                </h:panelGroup>
                            </p:column>
                        </p:dataTable>
                    </p:panel>

                </p:panel>

            </h:form>
        </h:panelGroup>
    </ui:define>
</ui:composition>
